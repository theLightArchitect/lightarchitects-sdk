// ── Selection + lens state ─────────────────────────────────────
let bpSelected = { kind: 'build', id: BUILD_PROGRESS_MOCK.build.codename };
let bpLens = 'progress'; // progress | trace | diff

function bpStatusGlyph(s) { return { complete: '✓', active: '▶', pending: '○', queued: '○' }[s] || '·'; }

function bpFindNode(id) {
  const b = BUILD_PROGRESS_MOCK;
  if (id === b.build.codename) return { kind: 'build', node: b.build };
  for (const phase of b.phases) {
    if (phase.id === id) return { kind: 'phase', node: phase };
    for (const wave of (phase.waves || [])) {
      if (wave.id === id) return { kind: 'wave', node: wave, parentPhase: phase };
      for (const task of (wave.tasks || [])) {
        if (task.id === id) return { kind: 'task', node: task, parentWave: wave, parentPhase: phase };
      }
    }
  }
  return { kind: 'build', node: b.build };
}

function bpActiveWave() {
  for (const phase of BUILD_PROGRESS_MOCK.phases) {
    if (phase.status !== 'active') continue;
    for (const wave of (phase.waves || [])) if (wave.status === 'active') return { phase, wave };
  }
  return null;
}

// ── Header render — replaces .cp-file-info / .cp-tabs / .cp-diff-stat ──
function renderBuildHeader() {
  const b = BUILD_PROGRESS_MOCK.build;
  const found = bpFindNode(bpSelected.id);
  const path = (() => {
    if (found.kind === 'build') return [b.codename];
    if (found.kind === 'phase') return [b.codename, found.node.id];
    if (found.kind === 'wave')  return [b.codename, found.parentPhase.id, found.node.id];
    if (found.kind === 'task')  return [b.codename, found.parentPhase.id, found.parentWave.id, found.node.id];
    return [b.codename];
  })();

  const fileInfo = document.querySelector('#codePanel .cp-file-info');
  fileInfo.innerHTML = `
    <span class="cp-file-icon">◆</span>
    <span class="cp-d2-breadcrumb">
      ${path.map((seg, i) => `
        <span class="cp-d2-bc-cur${i === path.length - 1 ? '' : ' dim'}">${seg}</span>
        ${i < path.length - 1 ? '<span class="cp-d2-bc-sep">›</span>' : ''}
      `).join('')}
    </span>
  `;

  const tabs = document.querySelector('#codePanel .cp-tabs');
  tabs.innerHTML = `
    <button class="cp-tab ${bpLens === 'progress' ? 'active' : ''}" data-bp-lens="progress">PROGRESS</button>
    <button class="cp-tab ${bpLens === 'trace' ? 'active' : ''}" data-bp-lens="trace">TRACE</button>
    <button class="cp-tab ${bpLens === 'diff' ? 'active' : ''}" data-bp-lens="diff">DIFF</button>
  `;
  tabs.querySelectorAll('[data-bp-lens]').forEach(btn => {
    btn.addEventListener('click', () => { bpLens = btn.dataset.bpLens; renderBuildPanel(); });
  });

  const aw = bpActiveWave();
  const diffStat = document.querySelector('#codePanel .cp-diff-stat');
  diffStat.innerHTML = aw
    ? `<span style="color:var(--la-text-mute);font-size:8px">${aw.phase.id}/p5</span> &nbsp;<span style="color:var(--la-warn)">▶ ${aw.wave.id}</span> &nbsp;<span style="color:var(--la-text-mute)">+${aw.wave.timing && aw.wave.timing.started_ago || '—'}</span>`
    : `<span style="color:var(--la-text-mute)">idle</span>`;

  // Update cp command bar placeholder for d2 lens grammar
  const cmdInput = document.getElementById('cpCmdInput');
  if (cmdInput) cmdInput.placeholder = ':phase  ·  /regex  ·  |yq .gates  ·  ?file';
}

// ── PROGRESS lens — hierarchical tree ──────────────────────────
function renderBuildTree() {
  const b = BUILD_PROGRESS_MOCK.build;
  const phases = BUILD_PROGRESS_MOCK.phases;

  const treeHtml = `
    <div class="bp-tree">
      <div class="bp-build-hdr">
        <div class="bp-build-title">◆ ${b.title}</div>
        <div class="bp-build-meta">
          <span class="bp-meta-chip branch">⎇ ${b.git.feature_branch}</span>
          <span class="bp-meta-chip">↑${b.git.ahead} ↓${b.git.behind}${b.git.dirty ? ' · dirty' : ''}</span>
          <span class="bp-meta-chip pr">PR #${b.pr.number} · ${b.pr.state}</span>
          <span class="bp-meta-chip acc">${b.tier} · LASDLC ${b.template_version}</span>
          <span class="bp-meta-chip">HEAD ${b.git.head}</span>
          <span class="bp-meta-chip">${b.elapsed} elapsed</span>
        </div>
        <div class="bp-build-meta" style="margin-top:3px">
          <span class="bp-meta-chip path">worktree: ${b.git.worktree}</span>
        </div>
      </div>
      ${phases.map(renderBpPhase).join('')}
    </div>
  `;

  document.getElementById('cpBody').innerHTML = treeHtml;

  // Wire selection clicks
  document.querySelectorAll('#cpBody [data-bp-select]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = el.dataset.bpSelect;
      bpSelected = { kind: 'node', id };
      renderBuildPanel();
    });
  });

  // Scroll selected into view
  if (bpSelected.id !== b.codename) {
    const sel = document.querySelector(`#cpBody [data-bp-select="${bpSelected.id}"]`);
    if (sel) sel.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function renderBpPhase(phase) {
  const selected = bpSelected.id === phase.id ? 'selected' : '';
  const activeCls = phase.status === 'active' ? 'active-node' : '';
  const expanded = phase.status === 'active' || phase.status === 'complete';
  return `
    <div class="bp-phase ${phase.status === 'active' ? 'active' : ''}">
      <div class="bp-row ${selected} ${activeCls}" data-bp-select="${phase.id}">
        <span class="bp-glyph ${phase.status}">${bpStatusGlyph(phase.status)}</span>
        <span class="bp-name ${phase.status === 'pending' ? 'dim' : 'bright'}">${phase.name}</span>
        ${phase.gates ? renderBpGates(phase.gates) : ''}
        ${phase.timing && phase.timing.actual ? `<span class="bp-ago">${phase.timing.actual}</span>` : ''}
        ${phase.timing && phase.timing.drift ? `<span class="bp-drift ${phase.timing.drift.startsWith('+') ? 'over' : 'under'}">${phase.timing.drift}</span>` : ''}
      </div>
      ${bpSelected.id === phase.id ? bpFocusBlock(phase, 'phase') : ''}
      ${(phase.amendments || []).map(a => `
        <div class="bp-amend">⚠ <b>AMENDMENT</b> · ${a.wave} · ${a.when}<br>
          ${a.desc}
          <div class="bp-amend-impact">→ ${a.impact}</div>
        </div>
      `).join('')}
      ${expanded && phase.waves ? phase.waves.map(renderBpWave).join('') : ''}
    </div>
  `;
}

function renderBpWave(wave) {
  const selected = bpSelected.id === wave.id ? 'selected' : '';
  const activeCls = wave.status === 'active' ? 'active-node' : '';
  const expanded = wave.status !== 'queued' || bpSelected.id === wave.id;
  const lastCommit = (wave.commits && wave.commits.length) ? wave.commits[wave.commits.length - 1] : null;
  return `
    <div class="bp-wave ${wave.status === 'active' ? 'active' : ''}">
      <div class="bp-row ${selected} ${activeCls}" data-bp-select="${wave.id}">
        <span class="bp-glyph ${wave.status}">${bpStatusGlyph(wave.status)}</span>
        <span class="bp-name ${wave.status === 'queued' ? 'dim' : ''}">${wave.name}</span>
        ${lastCommit ? `<span class="bp-sha" title="${lastCommit.msg}">${lastCommit.short}</span>` : ''}
        ${wave.timing && wave.timing.started_ago ? `<span class="bp-ago">${wave.timing.started_ago}</span>` : ''}
        <div class="bp-agents">${(wave.agents || []).map(a =>
          `<span class="bp-agent-pill ${a.state}" title="${a.name} · ${a.role} · ${a.state}">${a.role}</span>`).join('')}</div>
      </div>
      ${bpSelected.id === wave.id ? bpFocusBlock(wave, 'wave') : ''}
      ${expanded && wave.tasks ? wave.tasks.map(t => renderBpTask(t, wave)).join('') : ''}
    </div>
  `;
}

function renderBpTask(task, wave) {
  const selected = bpSelected.id === task.id ? 'selected' : '';
  const activeCls = task.status === 'active' ? 'active-node' : '';
  const focusedBy = (wave.agents || []).find(a => a.focus === task.id);
  const showMeta = (selected || activeCls || focusedBy) && task.files;
  return `
    <div class="bp-task ${task.status === 'active' ? 'active' : ''}">
      <div class="bp-row ${selected} ${activeCls}" data-bp-select="${task.id}">
        <span class="bp-glyph ${task.status}">${bpStatusGlyph(task.status)}</span>
        <span class="bp-name ${task.status === 'pending' ? 'dim' : ''}">${task.name}</span>
        ${task.cwe ? `<span class="bp-sha cwe" title="${task.cwe}">${task.cwe}</span>` : ''}
        ${task.commit ? `<span class="bp-sha">${task.commit.slice(0,7)}</span>` : ''}
        ${task.current_cov !== undefined ? `<span class="bp-drift over">${task.current_cov}% → ${task.target_cov}%</span>` : ''}
        ${task.diff ? `<span class="bp-diffstat"><span class="ca">+${task.diff.a}</span> <span class="cd">−${task.diff.r}</span></span>` : ''}
        ${focusedBy ? `<span class="bp-agent-pill running" title="${focusedBy.name} · running ${focusedBy.running}">▶ ${focusedBy.role}</span>` : ''}
      </div>
      ${showMeta ? `
        <div class="bp-task-meta">
          ${task.files.map(f => `<b>${f}</b>`).join(' · ')}
          ${task.target_fn ? `· ${task.target_fn}` : ''}
        </div>` : ''}
      ${bpSelected.id === task.id ? bpFocusBlock(task, 'task') : ''}
    </div>
  `;
}

function renderBpGates(gates) {
  return `<div class="bp-gates">${Object.entries(gates).map(([k, v]) =>
    `<span class="bp-gate ${v}" title="[${k}] ${v.toUpperCase()}">${k}</span>`).join('')}</div>`;
}

// ── Focus block — inline detail under selected node ──────────
function bpFocusBlock(node, kind) {
  let rows = '';
  if (kind === 'phase') {
    rows = `
      <div class="bp-focus-row"><span class="bp-focus-key">STATUS</span><span class="bp-focus-val"><b>${node.status.toUpperCase()}</b></span></div>
      ${node.timing ? `<div class="bp-focus-row"><span class="bp-focus-key">TIMING</span><span class="bp-focus-val">est ${node.timing.est} · actual <b>${node.timing.actual || '—'}</b> · drift ${node.timing.drift || '—'}</span></div>` : ''}
      ${node.gates ? `<div class="bp-focus-row"><span class="bp-focus-key">GATES</span><span class="bp-focus-val">${Object.entries(node.gates).map(([k,v]) => `[${k}] <b>${v.toUpperCase()}</b>`).join(' · ')}</span></div>` : ''}
      ${node.waves ? `<div class="bp-focus-row"><span class="bp-focus-key">WAVES</span><span class="bp-focus-val">${node.waves.length} (${node.waves.filter(w => w.status === 'active').length} active · ${node.waves.filter(w => w.status === 'complete').length} done)</span></div>` : ''}
    `;
  } else if (kind === 'wave') {
    rows = `
      <div class="bp-focus-row"><span class="bp-focus-key">STATUS</span><span class="bp-focus-val"><b>${node.status.toUpperCase()}</b></span></div>
      ${node.timing && node.timing.started_ago ? `<div class="bp-focus-row"><span class="bp-focus-key">TIMING</span><span class="bp-focus-val">started <b>${node.timing.started_ago}</b> · est ${node.timing.est}</span></div>` : ''}
      <div class="bp-focus-row"><span class="bp-focus-key">AGENTS</span><span class="bp-focus-val">${(node.agents || []).map(a => `<b>${a.name}</b> <span style="color:var(--la-text-mute)">(${a.state}${a.focus ? ' · ' + a.focus : ''})</span>`).join(' · ') || '—'}</span></div>
      ${node.commits && node.commits.length ? `
        <div class="bp-focus-row"><span class="bp-focus-key">COMMITS</span>
          <span class="bp-focus-val">${node.commits.map(c => `<span class="bp-sha">${c.short}</span> ${c.msg} <span style="color:var(--la-text-mute)">· ${c.ago} · ${c.files} file${c.files === 1 ? '' : 's'}</span>`).join('<br>')}</span>
        </div>` : `<div class="bp-focus-row"><span class="bp-focus-key">COMMITS</span><span class="bp-focus-val" style="color:var(--la-text-mute)">— no commits yet</span></div>`}
      ${node.tasks ? `<div class="bp-focus-row"><span class="bp-focus-key">TASKS</span><span class="bp-focus-val">${node.tasks.length} (${node.tasks.filter(t => t.status === 'complete').length} done · ${node.tasks.filter(t => t.status === 'active').length} active)</span></div>` : ''}
    `;
  } else if (kind === 'task') {
    rows = `
      <div class="bp-focus-row"><span class="bp-focus-key">STATUS</span><span class="bp-focus-val"><b>${node.status.toUpperCase()}</b></span></div>
      ${node.files ? `<div class="bp-focus-row"><span class="bp-focus-key">FILES</span><span class="bp-focus-val">${node.files.map(f => `<b>${f}</b>`).join(' · ')}</span></div>` : ''}
      ${node.target_fn ? `<div class="bp-focus-row"><span class="bp-focus-key">TARGET</span><span class="bp-focus-val"><b>${node.target_fn}</b></span></div>` : ''}
      ${node.commit ? `<div class="bp-focus-row"><span class="bp-focus-key">COMMIT</span><span class="bp-focus-val"><span class="bp-sha">${node.commit}</span></span></div>` : ''}
      ${node.cwe ? `<div class="bp-focus-row"><span class="bp-focus-key">CWE</span><span class="bp-focus-val"><span class="bp-sha cwe">${node.cwe}</span> <span style="color:var(--la-text-mute)">· domain ${node.domain || 'S'}</span></span></div>` : ''}
      ${node.current_cov !== undefined ? `<div class="bp-focus-row"><span class="bp-focus-key">COVERAGE</span><span class="bp-focus-val"><b style="color:var(--la-err)">${node.current_cov}%</b> → target <b style="color:var(--la-ok)">${node.target_cov}%</b> · ${node.target_cov - node.current_cov}pp gap</span></div>` : ''}
      ${node.blocking_gate ? `<div class="bp-focus-row"><span class="bp-focus-key">BLOCKING</span><span class="bp-focus-val" style="color:var(--la-warn)"><b>${node.blocking_gate}</b> gate · phase can't advance until cleared</span></div>` : ''}
      ${node.blocked_on ? `<div class="bp-focus-row"><span class="bp-focus-key">BLOCKED ON</span><span class="bp-focus-val">${node.blocked_on}</span></div>` : ''}
      ${node.diff ? `<div class="bp-focus-row"><span class="bp-focus-key">DIFF</span><span class="bp-focus-val"><span class="bp-diffstat"><span class="ca">+${node.diff.a}</span> <span class="cd">−${node.diff.r}</span></span></span></div>` : ''}
    `;
  }

  const canDrill = (kind === 'task' && node.files && node.files.length)
    || (kind === 'wave' && (node.tasks || []).some(t => t.files));
  const drillFile = kind === 'task' && node.files ? node.files[0]
    : kind === 'wave' ? ((node.tasks || []).find(t => t.files) || {}).files?.[0]
    : null;

  return `
    <div class="bp-focus">
      <div class="bp-focus-hdr"><span class="bp-focus-kind">${kind.toUpperCase()}</span> · ${node.id || node.codename}</div>
      ${rows}
      <div class="bp-focus-actions">
        ${canDrill && drillFile ? `<button class="bp-focus-btn" onclick="setD3File('${drillFile}');drillTo(3)">→ DRILL TO d3 · ${drillFile}</button>` : ''}
        <button class="bp-focus-btn secondary" onclick="bpLens='trace';renderBuildPanel()">SHOW TRACE</button>
        <button class="bp-focus-btn secondary" onclick="bpLens='diff';renderBuildPanel()">SHOW DIFF</button>
      </div>
    </div>
  `;
}

// ── TRACE lens — scope-filtered, time-ordered execution events ─
function renderBuildTrace() {
  const sel = bpFindNode(bpSelected.id);

  // Selection determines scope; trace events are filtered to that scope.
  let scopeFilter, scopeLabel;
  if (sel.kind === 'build') {
    scopeFilter = () => true;
    scopeLabel = 'all events · entire build';
  } else if (sel.kind === 'phase') {
    const waveIds = (sel.node.waves || []).map(w => w.id);
    scopeFilter = ev => waveIds.includes(ev.wave_id);
    scopeLabel = `phase ${sel.node.id} · ${waveIds.length} wave${waveIds.length === 1 ? '' : 's'}`;
  } else if (sel.kind === 'wave') {
    scopeFilter = ev => ev.wave_id === sel.node.id;
    scopeLabel = `wave ${sel.node.id}`;
  } else if (sel.kind === 'task') {
    scopeFilter = ev => ev.task_id === sel.node.id;
    scopeLabel = `task ${sel.node.id}`;
  } else {
    scopeFilter = () => true;
    scopeLabel = 'all';
  }

  const events = BUILD_TRACE_MOCK.filter(scopeFilter).slice().reverse();

  const html = `
    <div class="bp-tree" style="overflow-y:auto;height:100%">
      <div class="bp-build-hdr">
        <div class="bp-build-title">⏱ EXECUTION TRACE</div>
        <div class="bp-build-meta">
          <span class="bp-meta-chip acc">scope: ${scopeLabel}</span>
          <span class="bp-meta-chip">${events.length} event${events.length === 1 ? '' : 's'} · newest first</span>
          <span class="bp-meta-chip path">click any row with → file artifact to drill d3</span>
        </div>
      </div>
      ${events.length === 0
        ? `<div class="bp-stub">No events in this scope. Select a wider node from PROGRESS lens to broaden the trace.</div>`
        : `<div class="bp-trace">${events.map(renderBpTraceRow).join('')}</div>`}
    </div>
  `;
  document.getElementById('cpBody').innerHTML = html;

  // Wire clicks on rows with file artifact → drill d3
  document.querySelectorAll('#cpBody [data-trace-file]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      setD3File(el.dataset.traceFile);
      drillTo(3);
    });
  });
}

function renderBpTraceRow(ev) {
  const isAmend  = ev.kind === 'amendment';
  const isFail   = ev.gate_status === 'fail';
  const isActive = ev.kind === 'agent_focused' || ev.kind === 'task_active';
  const cls = isAmend ? 'amend' : isFail ? 'fail' : isActive ? 'active' : 'complete';
  const glyph = isAmend ? '⚠' : isFail ? '✗' : isActive ? '▶' : '✓';
  const isClickable = !!ev.artifact;

  return `
    <div class="bp-trace-row ${cls}"${isClickable ? ` data-trace-file="${ev.artifact}" title="drill to d3"` : ''}>
      <span class="bp-trace-ts">${ev.ts}</span>
      <span class="bp-trace-glyph">${glyph}</span>
      <div class="bp-trace-body">
        <div class="bp-trace-line">
          <span class="bp-trace-wave">${ev.wave_id}</span>
          ${ev.task_id ? `<span class="bp-trace-task">${ev.task_id}</span>` : ''}
          ${ev.domain ? `<span class="bp-trace-domain">${ev.domain}</span>` : ''}
          ${ev.cwe ? `<span class="bp-sha cwe">${ev.cwe}</span>` : ''}
          ${ev.commit ? `<span class="bp-sha">${ev.commit}</span>` : ''}
          <span class="bp-trace-actor">${ev.actor}</span>
        </div>
        <div class="bp-trace-desc">${ev.desc}</div>
        ${ev.artifact ? `<div class="bp-trace-artifact">→ ${ev.artifact}${ev.target_fn ? ` · ${ev.target_fn}` : ''}</div>` : ''}
        ${ev.impact ? `<div class="bp-trace-impact">↳ ${ev.impact}</div>` : ''}
      </div>
    </div>
  `;
}

function renderBuildDiff() {
  const sel = bpFindNode(bpSelected.id);
  // Aggregate files in scope
  const filesInScope = new Set();
  const visit = node => {
    if (!node) return;
    if (node.files) node.files.forEach(f => filesInScope.add(f));
    (node.waves || []).forEach(visit);
    (node.tasks || []).forEach(visit);
  };
  visit(sel.node);
  document.getElementById('cpBody').innerHTML = `
    <div class="bp-stub">
      <b>DIFF</b> lens — unified multi-file diff scoped to <b>${sel.node.id || sel.node.codename}</b>
      <div class="bp-stub-hint">
        Files in scope: <b>${[...filesInScope].join(', ') || 'none'}</b><br><br>
        Would render unified diff (libgit2 / <code>git diff base..HEAD --</code> &lt;files&gt;), color-coded by domain risk.
        Collapsible per file. Each hunk → click → d3 at that line with DIFF lens active.
        <br><br>Contract: reuse <code>code.file-diff.v1</code> per file; new <code>build.diff.v1</code> for the aggregation envelope.
      </div>
    </div>
  `;
}

// ── Entry point ────────────────────────────────────────────────
function renderBuildPanel() {
  renderBuildHeader();
  if (bpLens === 'progress') renderBuildTree();
  else if (bpLens === 'trace') renderBuildTrace();
  else if (bpLens === 'diff')  renderBuildDiff();
}

// ── Main depth renderer ─────────────────────────────────────────
function renderDepth(depth, animate) {
  const data = DEPTHS[depth];
  document.body.className = data.depthClass;

  document.getElementById('depthBadge').textContent = data.label;
  document.getElementById('scopeBadge').textContent = data.scope;

  updateRings(depth);
  updateBreadcrumb(depth);

  renderPortal(depth);
  applyPreset(currentPreset, depth);

  // Right-side drawer: rendered at d2 (BUILD PROGRESS) and d3 (CODE).
  // Same panel container — content swapped by depth.
  const _hadPanel = _lastDepthWasD2 || _lastDepthWasD3;
  if (depth === 3) {
    renderCodePanel();
    if (!_hadPanel) { setCpState('half'); }
    _lastDepthWasD3 = true;
    _lastDepthWasD2 = false;
  } else if (depth === 2) {
    renderBuildPanel();
    if (!_hadPanel) { setCpState('half'); }
    _lastDepthWasD2 = true;
    _lastDepthWasD3 = false;
  } else {
    // d0, d1 — no drawer
    document.getElementById('cpBody').innerHTML = '';
    clearTimeout(cursorTimer);
    if (_hadPanel) {
      const panel = document.getElementById('codePanel');
      const left  = document.getElementById('cockpitLeft');
      panel.style.flex = panel.style.opacity = panel.style.overflow = panel.style.transition = '';
      left.style.flex  = left.style.transition = '';
      document.getElementById('cpResizeBar').classList.remove('panel-hidden');
      document.body.classList.remove('cp-hidden');
      cpPanelState = 'half';
      ['cpWcHide','cpWcFull'].forEach(id => document.getElementById(id).classList.remove('active'));
      document.getElementById('cpWcHalf').classList.add('active');
    }
    _lastDepthWasD3 = false;
    _lastDepthWasD2 = false;
  }

  if (animate) {
    document.querySelectorAll('.card').forEach((c,i) => {
      c.style.animationDelay = `${i * 0.03}s`;
      c.classList.add('depth-pulse');
      c.addEventListener('animationend', () => c.classList.remove('depth-pulse'), { once: true });
    });
  }
}

// ── Drill navigation ────────────────────────────────────────────
let currentDepth = 0;

function drillTo(depth, originEl) {
  if (depth === currentDepth) return;
  currentDepth = depth;

  // Flash animation from origin position
  const flash = document.getElementById('drillFlash');
  if (originEl) {
    const rect = originEl.getBoundingClientRect();
    const x = ((rect.left + rect.width / 2) / window.innerWidth * 100).toFixed(1) + '%';
    const y = ((rect.top  + rect.height / 2) / window.innerHeight * 100).toFixed(1) + '%';
    flash.style.setProperty('--flash-x', x);
    flash.style.setProperty('--flash-y', y);
  }
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 200);

  setTimeout(() => renderDepth(depth, true), 80);
}

// ── Breadcrumb nav ──────────────────────────────────────────────
document.querySelectorAll('.wp-seg').forEach(el => {
  el.addEventListener('click', () => {
    const depth = parseInt(el.dataset.depth || el.closest('[data-depth]')?.dataset.depth || '0');
    if (!isNaN(depth) && depth !== currentDepth) drillTo(depth, el);
  });
});
// Assign data-depth to each seg by index
document.querySelectorAll('.wp-seg').forEach((el, i) => {
  el.dataset.depth = i;
});

// ── Code panel tab switcher ─────────────────────────────────────
document.querySelectorAll('.cp-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cp-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cpView = btn.dataset.view;
    if (currentDepth === 3) renderCodePanel();
  });
});

// ── Command Bar (⌘K) ─────────────────────────────────────────────
let cmdBarOpen = false;
let _cmdDebounce = null;

function openCmdBar() {
  if (currentDepth !== 3) return;
  cmdBarOpen = true;
  document.body.classList.add('cp-cmd-open');
  const inp = document.getElementById('cpCmdInput');
  inp.value = '';
  inp.focus();
  _setCmdMode('');
  document.getElementById('cpCmdHint').innerHTML = '';
}

function closeCmdBar() {
  if (!cmdBarOpen) return;
  cmdBarOpen = false;
  document.body.classList.remove('cp-cmd-open');
  document.getElementById('cpCmdHint').innerHTML = '';
  renderCodePanel();
}

function _setCmdMode(val) {
  const el = document.getElementById('cpCmdMode');
  el.className = 'cp-cmd-mode';
  if      (val.startsWith('/')) { el.textContent = 'GREP';  el.classList.add('m-grep');  }
  else if (val.startsWith('|')) { el.textContent = 'JQ';    el.classList.add('m-jq');    }
  else if (val.startsWith(':')) { el.textContent = 'JUMP';  el.classList.add('m-jump');  }
  else if (val.startsWith('?')) { el.textContent = 'FUZZY'; el.classList.add('m-fuzzy'); }
  else                          { el.textContent = '⌘K';   el.classList.add('m-idle');  }
}

document.getElementById('cpCmdInput').addEventListener('input', e => {
  const val = e.target.value;
  _setCmdMode(val);
  clearTimeout(_cmdDebounce);
  if (val.startsWith(':')) {
    const n = parseInt(val.slice(1));
    if (!isNaN(n)) _cmdJump(n);
    return;
  }
  _cmdDebounce = setTimeout(() => {
    if      (!val)            { renderCodePanel(); document.getElementById('cpCmdHint').innerHTML = ''; }
    else if (val[0] === '/') _cmdGrep(val.slice(1));
    else if (val[0] === '|') _cmdJq(val.slice(1).replace(/^\s*jq\s*/, ''));
    else if (val[0] === '?') _cmdFuzzy(val.slice(1));
  }, 160);
});

document.getElementById('cpCmdInput').addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCmdBar(); e.preventDefault(); }
  if (e.key === 'Enter' && e.target.value.startsWith(':')) { closeCmdBar(); e.preventDefault(); }
});

document.getElementById('cpCmdClose').addEventListener('click', closeCmdBar);

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k' && currentDepth === 3) {
    cmdBarOpen ? closeCmdBar() : openCmdBar();
    e.preventDefault();
  }
  if (e.key === 'Escape' && cmdBarOpen) { closeCmdBar(); e.preventDefault(); }
});

// ── Shared helpers ────────────────────────────────────────────────
function _escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function _getViewLines() {
  if (cpView === 'raw') return RAW_LINES.map(l => ({ ...l }));
  const out = [];
  CODE_SECTIONS.forEach(sec => sec.forEach(l => {
    const aug = { ...l };
    if (cpView === 'blame') {
      const a = blameFor(l);
      aug.author = a.name; aug.hash = a.hash; aug.when = a.when; aug.msg = a.msg;
    }
    out.push(aug);
  }));
  return out;
}

function _lineHtmlFiltered(line, src, dimmed) {
  const t    = line.t || 'context';
  const raw  = cpView === 'raw' ? ' raw-line' : '';
  const dim  = dimmed ? ' ctx-dim' : '';
  const mark = t==='added'?'+':t==='removed'?'-':t==='hl'?'▶':' ';
  return `<div class="cp-line ${t}${raw}${dim}">` +
    `<span class="cp-ln">${line.n || '&nbsp;'}</span>` +
    `<span class="cp-mark">${mark}</span>` +
    `<span class="cp-src">${src}</span>` +
    `</div>`;
}

function _setHint(html) { document.getElementById('cpCmdHint').innerHTML = html; }

// Highlight regex matches in syntax-highlighted HTML — only touch text nodes, not tags
function _highlightInHtml(htmlStr, rx) {
  return htmlStr.replace(/(<[^>]+>)|([^<]+)/g, (_, tag, text) => {
    if (tag) return tag;
    rx.lastIndex = 0;
    return text.replace(rx, m => `<span class="cp-match">${_escHtml(m)}</span>`);
  });
}

// ── GREP (/pattern) ───────────────────────────────────────────────
//
// Currently: client-side regex over already-fetched line objects (RAW_LINES / CODE_SECTIONS).
// Sufficient for files already in-memory. For files not yet loaded, or for
// cross-file search, delegate to:
//
// @api   POST /api/code/search
// @auth  Authorization: Bearer ${LIGHTARCHITECTS_WEBSHELL_TOKEN}
// @body  {
//          cwd:           string,   // repo root — safe_cwd validated
//          pattern:       string,   // regex string (server uses Rust regex crate)
//          path?:         string,   // restrict to single file (our use case)
//          context_lines: number,   // lines of context each side (we use 3)
//          case_sensitive?: boolean // default false
//        }
// @returns {
//   matches: Array<{
//     path:    string,
//     line_n:  number,
//     content: string,         // matching line text
//     context_before: string[],
//     context_after:  string[]
//   }>,
//   truncated: boolean         // true if >500 matches
// }
// @spec  webshell-api-surface-v1.md §2.9 — /api/code/search  ✓ EXISTS
// @note  Client-side path is preferred when content is already loaded (no round-trip).
//        Switch to server path when: file > 1 MB, or cross-file search mode added.
//
function _cmdGrep(pattern) {
  if (!pattern) { renderCodePanel(); _setHint(''); return; }
  let rx;
  try { rx = new RegExp(pattern, 'gi'); }
  catch { _setHint('<span class="err">bad regex</span>'); return; }

  const lines = _getViewLines();
  const CTX = 3;
  const keep = new Set();
  lines.forEach((l, i) => {
    const plain = l.s.replace(/<[^>]+>/g, '');
    rx.lastIndex = 0;
    if (rx.test(plain)) {
      for (let c = Math.max(0, i-CTX); c <= Math.min(lines.length-1, i+CTX); c++) keep.add(c);
    }
  });

  if (keep.size === 0) { _setHint('<span class="wrn">no matches</span>'); renderCodePanel(); return; }

  const direct = lines.filter(l => { rx.lastIndex=0; return rx.test(l.s.replace(/<[^>]+>/g,'')); }).length;
  _setHint(`<span class="ok">${direct} match${direct>1?'es':''}</span> · ${keep.size} lines`);

  const sorted = [...keep].sort((a,b)=>a-b);
  const body   = document.getElementById('cpBody');
  let html = '', prev = -2;

  sorted.forEach(i => {
    if (prev >= 0 && i > prev + 1)
      html += `<div class="cp-fold">··· ${i-prev-1} lines ···</div>`;
    const l = lines[i];
    rx.lastIndex = 0;
    const isDirect = rx.test(l.s.replace(/<[^>]+>/g,''));
    rx.lastIndex = 0;
    html += _lineHtmlFiltered(l, _highlightInHtml(l.s, rx), !isDirect);
    prev = i;
  });

  body.innerHTML = html;
  const first = body.querySelector('.cp-line:not(.ctx-dim)');
  if (first) first.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

// ── JQ (|jq .field [op "val"]) ────────────────────────────────────
//
// Fully client-side — operates on the structured line objects already in memory.
// No backend API needed for file-scope jq.
//
// Line object shape per view:
//   RAW:   { n: number, s: string }
//   DIFF:  { n: number, s: string, t: "context"|"added"|"removed" }
//   BLAME: { n: number, s: string, t, author: string, hash: string, when: string, msg: string }
//
// Supported expressions (prototype subset):
//   .field                       → extract field value from every line
//   .field == "value"            → filter lines where field equals value
//   .field contains "substring"  → filter lines where field contains substring
//
// Future: pipe to real jq binary via:
// @api   POST /api/code/jq  (NOT YET SPECCED)
// @body  { cwd, path, ref, expr }   // expr = jq filter string
// @note  Security: jq filter must be sandboxed (read-only jq, no @sh, no $ENV)
//        Reject expressions containing: @sh, env, $__loc, limit, path(), getpath()
//        STATUS: ⚠ MISSING — not in API surface; la-contracts kind stub needed
//
function _cmdJq(expr) {
  expr = expr.trim();
  if (!expr) { renderCodePanel(); _setHint(''); return; }

  // Supported: .field   .field == "val"   .field contains "val"
  const m = expr.match(/^\.(\w+)(?:\s*(==|contains)\s*["']([^"']*)["'])?$/);
  if (!m) {
    _setHint('<span class="err">syntax: .field · .field == "val" · .field contains "val"</span>');
    return;
  }
  const [, field, op, operand] = m;
  const lines  = _getViewLines();
  const rows   = [];

  lines.forEach(l => {
    const raw = l[field] !== undefined ? l[field] : undefined;
    if (raw === undefined) return;
    const str = String(raw).replace(/<[^>]+>/g, '');
    if (!op || (op === '==' && str === operand) || (op === 'contains' && str.includes(operand)))
      rows.push({ n: l.n, val: field === 's' ? l.s : _escHtml(str) });
  });

  _setHint(rows.length
    ? `<span class="ok">${rows.length}</span> rows · <span style="color:var(--la-text-dim)">.${field}</span>`
    : `<span class="wrn">0 rows</span>`);

  const body = document.getElementById('cpBody');
  let html = `<div class="cp-fold" style="padding-left:10px;border:none;margin-bottom:3px">` +
    `<span style="color:var(--la-text-mute);font-size:8px">jq ${_escHtml(expr)} · ${rows.length} rows</span></div>`;
  rows.slice(0, 400).forEach(r => {
    html += `<div class="cp-line context">` +
      `<span class="cp-ln">${r.n || ''}</span>` +
      `<span class="cp-mark"> </span>` +
      `<span class="cp-src" style="color:var(--la-text-dim)">${r.val}</span>` +
      `</div>`;
  });
  if (rows.length > 400)
    html += `<div class="cp-fold">··· ${rows.length-400} more ···</div>`;
  body.innerHTML = html;
}

// ── JUMP (:line) ──────────────────────────────────────────────────
//
// Fully client-side — scrolls to a rendered line number.
// Switches to RAW view first (only view with all line numbers addressable).
//
// Prerequisite: file content must be loaded. In the real implementation:
//   1. Ensure /api/code/read has been called for this file (content in memory)
//   2. Switch to RAW view (triggers renderRawPanel which populates line elements)
//   3. requestAnimationFrame to wait for DOM, then querySelector('.cp-ln') to find target
//
// No backend API needed. Edge case: line outside the loaded window (e.g. file > 1 MB
// with virtual scroll) would need:
// @api   GET /api/code/read?path=&cwd=&ref=&line_start=&line_end=   (windowed read)
//        STATUS: ⚠ NOT SPECCED — only needed for files > virtual-scroll threshold
//
function _cmdJump(targetLine) {
  // Switch to RAW — only view where all line numbers are addressable
  if (cpView !== 'raw') {
    cpView = 'raw';
    document.querySelectorAll('.cp-tab').forEach(b => b.classList.toggle('active', b.dataset.view==='raw'));
  }
  renderCodePanel();
  requestAnimationFrame(() => {
    const body = document.getElementById('cpBody');
    let found = null;
    body.querySelectorAll('.cp-ln').forEach(el => {
      if (parseInt(el.textContent) === targetLine && !found)
        found = el.closest('.cp-line, .bl-line');
    });
    if (found) {
      found.scrollIntoView({ block: 'center', behavior: 'smooth' });
      found.style.transition = 'background 0s';
      found.style.background = 'rgba(255,173,46,0.18)';
      setTimeout(() => { found.style.transition = 'background 1.4s ease'; found.style.background = ''; }, 80);
      _setHint(`<span class="ok">→ L${targetLine}</span>`);
    } else {
      _setHint(`<span class="wrn">L${targetLine} not in view</span>`);
    }
  });
}

// ── FUZZY (?query) ────────────────────────────────────────────────
//
// Client-side fuzzy match over loaded line objects (consecutive-char scoring).
// For symbol/function-name search across large files, prefer a symbols endpoint:
//
// @api   GET /api/code/symbols?path={path}&cwd={cwd}&ref={ref}   (NOT YET SPECCED)
// @returns {
//   symbols: Array<{
//     name:  string,   // function / type / const / impl name
//     kind:  "fn" | "struct" | "enum" | "trait" | "impl" | "const" | "mod",
//     line:  number,
//     col:   number,
//     scope: string    // e.g. "pub" | "pub(crate)" | ""
//   }>
// }
// @impl  Use rust-analyzer LSP (textDocument/documentSymbols) or
//        tree-sitter query for Rust. Fall back to regex: r"(?:pub\s+)?(?:async\s+)?fn\s+(\w+)"
// @spec  webshell-api-surface-v1.md — STATUS: ⚠ MISSING
//        Candidate: §2.9 extension ("Code Editor — symbol index")
//        la-contracts kind: "code.symbols.v1"
// @note  Client-side fuzzy is the correct default when content is loaded.
//        Symbols endpoint unlocks ?query to match fn/struct names even before
//        full file content is fetched (cheap index vs. full file read).
//
function _cmdFuzzy(query) {
  if (!query) { renderCodePanel(); _setHint(''); return; }
  const q = query.toLowerCase();
  const lines = _getViewLines();
  const scored = [];

  lines.forEach(l => {
    const text = l.s.replace(/<[^>]+>/g, '').toLowerCase();
    let qi = 0, consec = 0, score = 0, last = -1;
    for (let ci = 0; ci < text.length && qi < q.length; ci++) {
      if (text[ci] === q[qi]) {
        consec = last === ci-1 ? consec+1 : 1;
        score += 10 + consec*3 - Math.max(0, ci-last-1)*0.4;
        last = ci; qi++;
      }
    }
    if (qi === q.length) scored.push({ l, score });
  });
  scored.sort((a,b) => b.score - a.score);
  const top = scored.slice(0, 60);

  _setHint(top.length
    ? `<span class="ok">${top.length}</span> / ${lines.length} lines`
    : `<span class="wrn">no match</span>`);

  const body = document.getElementById('cpBody');
  if (!top.length) { body.innerHTML = `<div class="cp-fold">no fuzzy match for "${_escHtml(query)}"</div>`; return; }

  let html = '';
  top.forEach(({ l }) => {
    // Mark matched chars in the plain text (syntax highlighting stripped for clarity)
    const plain = l.s.replace(/<[^>]+>/g, '');
    const lower = plain.toLowerCase();
    let qi = 0, out = '';
    for (let ci = 0; ci < plain.length; ci++) {
      const ch = _escHtml(plain[ci]);
      if (qi < q.length && lower[ci] === q[qi]) { out += `<span class="cp-match">${ch}</span>`; qi++; }
      else out += ch;
    }
    html += _lineHtmlFiltered(l, out, false);
  });
  body.innerHTML = html;
}

function applyPreset(preset, depth) {
  currentPreset = preset;
  const d = depth ?? currentDepth;

  if (preset === 'engineer') {
    const eng = PRESET_SLOTS.engineer;
    if (d === 3) {
      // File scope (d3): all existing depth-aware renderers
      renderContext(d); renderHealth(d); renderHitl(d);
      renderFleet(d);   renderGit(d);   renderStrat(d); renderWave(d);
    } else {
      // Platform/Project/Build (d0-d2): use research-informed overrides for context/health/git
      ['context','health','git'].forEach(slot => {
        document.getElementById(slot + 'Lbl').textContent = eng[slot].lbl(d);
        document.getElementById(slot + 'Body').innerHTML  = eng.overrides[slot](d);
      });
      renderHitl(d); renderFleet(d); renderStrat(d); renderWave(d);
      // Wire predicate drill (d2 health → d3 file)
      if (d === 2) {
        document.querySelectorAll('#healthBody [data-pred-drill]').forEach(el => {
          el.addEventListener('click', () => drillTo(3, el));
        });
      }
    }
    return;
  }

  const p = PRESET_SLOTS[preset];

  const slots = ['context','health','hitl','fleet','git','strat','wave'];
  slots.forEach(slot => {
    const cfg = p[slot];
    document.getElementById(slot + 'Lbl').textContent  = cfg.lbl(d);
    document.getElementById(slot + 'Body').innerHTML   = cfg.render(d);
  });
}

// ── Preset chips ────────────────────────────────────────────────
document.querySelectorAll('.preset-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyPreset(btn.dataset.preset);
  });
});

// ── Rings click (jump to depth) ─────────────────────────────────
document.querySelector('.depth-rings').addEventListener('click', e => {
  // Cycle forward through depths
  drillTo((currentDepth + 1) % 4, e.target);
});

let cpPanelState = 'half';

function setCpState(state, widthPct) {
  cpPanelState = state;
  const panel     = document.getElementById('codePanel');
  const left      = document.getElementById('cockpitLeft');
  const resizeBar = document.getElementById('cpResizeBar');

  const isDrag = widthPct !== undefined;
  if (isDrag) {
    // During drag: no transition for real-time tracking
    panel.style.transition = 'none';
    left.style.transition  = 'none';
  } else {
    // Button snap: short animated transition
    panel.classList.add('cp-snapping');
    left.classList.add('cp-snapping');
    panel.style.transition = '';
    left.style.transition  = '';
    setTimeout(() => {
      panel.classList.remove('cp-snapping');
      left.classList.remove('cp-snapping');
    }, 250);
  }

  if (state === 'hidden') {
    panel.style.flex    = '0 0 0%';
    panel.style.opacity = '0';
    left.style.flex     = '1';
    resizeBar.classList.add('panel-hidden');
    document.body.classList.add('cp-hidden');
  } else if (state === 'full') {
    panel.style.flex    = '0 0 100%';
    panel.style.opacity = '1';
    left.style.flex     = '0 0 0%';
    resizeBar.classList.remove('panel-hidden');
    document.body.classList.remove('cp-hidden');
  } else {
    // 'half' or custom drag width
    const pct = widthPct !== undefined ? widthPct : 48;
    const leftPct = 100 - pct;
    panel.style.flex    = `0 0 ${pct}%`;
    panel.style.opacity = '1';
    left.style.flex     = `0 0 ${leftPct}%`;
    resizeBar.classList.remove('panel-hidden');
    document.body.classList.remove('cp-hidden');
  }

  // Update window control active states
  document.getElementById('cpWcHide').classList.toggle('active', state === 'hidden');
  document.getElementById('cpWcHalf').classList.toggle('active', state === 'half');
  document.getElementById('cpWcFull').classList.toggle('active', state === 'full');
}

// Reset to half on fresh d3 entry; preserve state within a d3 session
let _lastDepthWasD3 = false;
let _lastDepthWasD2 = false;

// ── Drag-to-resize ───────────────────────────────────────────────
(function () {
  const resizeBar   = document.getElementById('cpResizeBar');
  const cockpitBody = document.querySelector('.cockpit-body');

  let dragging    = false;
  let startX      = 0;
  let startPanelW = 0;
  let totalW      = 0;

  resizeBar.addEventListener('pointerdown', e => {
    if (currentDepth !== 3) return;
    dragging    = true;
    startX      = e.clientX;
    startPanelW = document.getElementById('codePanel').getBoundingClientRect().width;
    totalW      = cockpitBody.getBoundingClientRect().width;
    resizeBar.classList.add('dragging');
    resizeBar.setPointerCapture(e.pointerId);
    document.body.style.cursor     = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  resizeBar.addEventListener('pointermove', e => {
    if (!dragging) return;
    const delta  = startX - e.clientX;           // drag left = widen panel
    const minPx  = 220;
    const maxPx  = totalW - 220;
    const newW   = Math.max(minPx, Math.min(maxPx, startPanelW + delta));
    const pct    = newW / totalW * 100;
    setCpState('half', pct);   // 'half' label while dragging (custom width)
  });

  resizeBar.addEventListener('pointerup', e => {
    if (!dragging) return;
    dragging = false;
    resizeBar.classList.remove('dragging');
    resizeBar.releasePointerCapture(e.pointerId);
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
    // Snap to nearest preset if very close to an edge
    const pct = parseFloat(document.getElementById('codePanel').style.flex.replace(/.*0 /, ''));
    if (pct < 10)  { setCpState('hidden'); }
    if (pct > 90)  { setCpState('full'); }
  });
})();

// ── Minimap live viewport sync ──────────────────────────────────
(function () {
  function syncMinimap() {
    const body = document.getElementById('cpBody');
    const vp   = document.getElementById('cpMmViewport');
    const mm   = document.getElementById('cpMinimap');
    if (!body || !vp || !mm) return;
    const scrollH = body.scrollHeight;
    const clientH = body.clientHeight;
    if (scrollH <= clientH) { vp.style.top = '0'; vp.style.height = '100%'; return; }
    const scrollRatio  = body.scrollTop / (scrollH - clientH);
    const visibleRatio = clientH / scrollH;
    const mmH = mm.clientHeight;
    const vpH = Math.max(16, visibleRatio * mmH);
    vp.style.height = vpH + 'px';
    vp.style.top    = (scrollRatio * (mmH - vpH)) + 'px';
  }

  // Scroll → move viewport indicator
  document.getElementById('cpBody').addEventListener('scroll', syncMinimap, { passive: true });

  // Click/drag on minimap → jump code panel
  const mm = document.getElementById('cpMinimap');
  mm.addEventListener('pointerdown', e => {
    const jumpTo = (clientY) => {
      const body  = document.getElementById('cpBody');
      const vp    = document.getElementById('cpMmViewport');
      const rect  = mm.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
      const vpH   = parseFloat(vp.style.height || '0');
      const mmH   = rect.height;
      const adj   = Math.max(0, Math.min(1, (clientY - rect.top - vpH / 2) / (mmH - vpH)));
      body.scrollTop = adj * (body.scrollHeight - body.clientHeight);
    };
    jumpTo(e.clientY);
    mm.setPointerCapture(e.pointerId);
    const onMove = ev => jumpTo(ev.clientY);
    const onUp   = ()  => { mm.removeEventListener('pointermove', onMove); mm.removeEventListener('pointerup', onUp); };
    mm.addEventListener('pointermove', onMove, { passive: true });
    mm.addEventListener('pointerup',   onUp);
    e.preventDefault();
  });

  // Re-sync after each render (content height changes)
  const _origSetMinimap = setMinimap;
  window.setMinimap = function(html) { _origSetMinimap(html); requestAnimationFrame(syncMinimap); };
})();

// ── Symbol cursor bridge ─────────────────────────────────────────
// selectSym / jumpToSymInCode / loadCommitDiff / filterBlameByAuthor / dispatchWaveAction
// These functions form a unified focus plane: clicking any bento card element at d3
// propagates selection intent to all other panels simultaneously.

let _selectedSymName = null;

function selectSym(nameOrAbbrev) {
  const syms = DEPTHS[3].portal.symbols;
  // Normalize: strip trailing () and whitespace so abbreviated names match full names
  const bare  = nameOrAbbrev.replace(/\(.*\)$/, '').trim();
  const match = syms.find(s => s.name === bare)
             || syms.find(s => s.name.startsWith(bare))
             || syms.find(s => bare.startsWith(s.name));
  const name  = match ? match.name : bare;

  if (_selectedSymName === name) {
    // Second click clears selection
    clearSymSelection();
    return;
  }
  _selectedSymName = name;

  // Highlight matching sym-items in CODE MAP
  document.querySelectorAll('.sym-item').forEach(el => {
    el.classList.toggle('sym-selected', el.dataset.symName === name);
  });

  // Dim scan rows that don't reference this symbol
  document.querySelectorAll('.scan-row').forEach(el => {
    const symEl = el.querySelector('.scan-sym');
    if (!symEl) return;
    const t = symEl.textContent.replace(/\(.*\)$/, '').trim();
    el.style.opacity = (t === name || name.startsWith(t) || t.startsWith(name)) ? '1' : '0.28';
  });

  // Highlight matching risk matrix row
  document.querySelectorAll('.risk-matrix tbody tr').forEach(tr => {
    const cell = tr.querySelector('td');
    if (!cell) return;
    const t = (cell.title || cell.textContent).replace(/\(.*\)$/, '').trim();
    tr.classList.toggle('rm-row-selected', t === bare || name.startsWith(t) || t.startsWith(name));
  });

  jumpToSymInCode(name);
}

function clearSymSelection() {
  _selectedSymName = null;
  document.querySelectorAll('.sym-item').forEach(el => el.classList.remove('sym-selected'));
  document.querySelectorAll('.scan-row').forEach(el => el.style.opacity = '');
  document.querySelectorAll('.risk-matrix tbody tr').forEach(tr => tr.classList.remove('rm-row-selected'));
}

function jumpToSymInCode(name) {
  const cp = document.getElementById('codePanel');
  if (!cp || cp.style.display === 'none') return;

  // Switch to RAW view so source lines are present
  const rawBtn = document.querySelector('.cp-tab[data-view="raw"]');
  if (rawBtn && !rawBtn.classList.contains('active')) rawBtn.click();

  // Find the fn/struct/enum/trait/impl definition line
  const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const pattern  = new RegExp(
    `(pub(\\s*\\(crate\\))?\\s+)?(async\\s+fn|fn|struct|enum|trait|impl)\\s+${escaped}[\\s(<{]`, 'i'
  );

  let targetLine = null;
  document.querySelectorAll('.cp-line').forEach(line => {
    if (!targetLine && pattern.test(line.textContent)) targetLine = line;
  });

  if (targetLine) {
    targetLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
    targetLine.classList.add('sym-jump-flash');
    setTimeout(() => targetLine.classList.remove('sym-jump-flash'), 1350);
  }
}

function loadCommitDiff(idx, shortMsg) {
  // Switch code panel to DIFF view and indicate which commit is active
  const diffBtn = document.querySelector('.cp-tab[data-view="diff"]');
  if (!diffBtn) return;
  diffBtn.click();
  // Flash diff header with commit context
  const header = document.querySelector('.cp-header');
  if (header) {
    header.style.color = 'var(--acc)';
    header.style.transition = 'color 1s ease';
    setTimeout(() => { header.style.color = ''; }, 1400);
  }
}

function filterBlameByAuthor(authorName) {
  // Switch to BLAME view, then dim lines not belonging to this author
  const blameBtn = document.querySelector('.cp-tab[data-view="blame"]');
  if (!blameBtn) return;
  blameBtn.click();
  // Wait one frame for the blame panel to render
  setTimeout(() => {
    document.querySelectorAll('.blame-line').forEach(line => {
      const au = line.querySelector('.bl-author');
      if (au) line.style.opacity = au.textContent.trim() === authorName ? '1' : '0.22';
    });
  }, 60);
}

function dispatchWaveAction(action, el) {
  // Visual feedback: flash green then fade
  el.classList.add('dispatched');
  setTimeout(() => el.classList.remove('dispatched'), 950);
  // Pre-fill command bar with the action command
  if (typeof openCmdBar === 'function') openCmdBar(action + ' ');
}

// ── Boot ────────────────────────────────────────────────────────
renderDepth(0, false);
