<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cockpit — Recursive Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ── Design Tokens ────────────────────────────────────────────── */
:root {
  --la-bg-base:     #07080f;
  --la-bg-panel:    #0d0f18;
  --la-bg-card:     #111420;
  --la-hair-faint:  rgba(255,255,255,0.04);
  --la-hair-base:   rgba(255,255,255,0.08);
  --la-hair-strong: rgba(255,255,255,0.15);
  --la-text-bright: rgba(255,255,255,0.95);
  --la-text-base:   rgba(255,255,255,0.80);
  --la-text-dim:    rgba(255,255,255,0.50);
  --la-text-mute:   rgba(255,255,255,0.28);
  --la-ok:   #39ff8a;
  --la-err:  #ff4d6a;
  --la-warn: #ffad2e;
  --la-font-mono:    'Azeret Mono', monospace;
  --la-font-display: 'Syne', sans-serif;
  --la-tk-loose: 0.12em;
  --la-tk-mid:   0.07em;
  --la-tk-tight: 0.04em;
  --la-fast: 0.15s ease;

  /* ── Depth accent system ── */
  --d0: #4d8eff;
  --d1: #39ff8a;
  --d2: #ffad2e;
  --d3: #ff5c8a;

  /* Active depth color — everything keys off this */
  --acc: var(--d0);
  --acc-tint: rgba(77,142,255,0.07);
  --depth-shift: 0.4s cubic-bezier(0.4,0,0.2,1);
}

body.d0 { --acc: var(--d0); --acc-tint: rgba(77,142,255,0.07); }
body.d1 { --acc: var(--d1); --acc-tint: rgba(57,255,138,0.06); }
body.d2 { --acc: var(--d2); --acc-tint: rgba(255,173,46,0.06); }
body.d3 { --acc: var(--d3); --acc-tint: rgba(255,92,138,0.06); }

/* ── Depth background tint — the body breathes per depth ── */
body.d0 { background: #07080f; }
body.d1 { background: color-mix(in srgb, #07080f 96%, #39ff8a); }
body.d2 { background: color-mix(in srgb, #07080f 96%, #ffad2e); }
body.d3 { background: color-mix(in srgb, #07080f 96%, #ff5c8a); }

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  color: var(--la-text-base);
  font-family: var(--la-font-mono);
  font-size: 12px;
  line-height: 1.5;
  transition: background var(--depth-shift);
}

/* Grain overlay */
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.024;
}

/* ── Drill flash overlay ──────────────────────────────────────── */
.drill-flash {
  position: fixed; inset: 0; pointer-events: none; z-index: 1000;
  opacity: 0;
  background: radial-gradient(circle at var(--flash-x, 50%) var(--flash-y, 50%),
    color-mix(in srgb, var(--acc) 30%, transparent) 0%,
    transparent 60%);
  transition: opacity 0.08s ease;
}
.drill-flash.active { opacity: 1; }

/* ── Shell ────────────────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ───────────────────────────────────────────────────── */
.cockpit-hdr {
  background: var(--la-bg-panel);
  border-bottom: 1px solid var(--la-hair-base);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 46px;
  position: relative;
  z-index: 20;
  flex-shrink: 0;
}

/* Depth rings widget */
.depth-rings {
  width: 36px; height: 36px; flex-shrink: 0;
  cursor: default;
  position: relative;
}
.rings-svg { width: 36px; height: 36px; }
.ring {
  transition: opacity var(--depth-shift), filter var(--depth-shift);
}
.ring-platform { stroke: var(--d0); }
.ring-project  { stroke: var(--d1); }
.ring-build    { stroke: var(--d2); }
.ring-file     { stroke: var(--d3); }

/* Breadcrumb workspace path */
.workspace-path {
  display: flex;
  align-items: center;
  gap: 0;
  overflow: hidden;
  flex: 1;
  min-width: 0;
}
.wp-seg {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: var(--la-tk-mid);
  color: var(--la-text-mute);
  padding: 3px 8px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 160px;
  transition: color var(--la-fast);
  border-radius: 2px;
  flex-shrink: 1;
}
.wp-seg:hover { color: var(--la-text-dim); background: var(--la-hair-faint); }
.wp-seg.active { color: var(--la-text-bright); font-weight: 700; flex-shrink: 0; }
.wp-sep {
  color: var(--la-text-mute);
  font-size: 10px;
  padding: 0 1px;
  opacity: 0.4;
  flex-shrink: 0;
}
.wp-sep.hidden { display: none; }

/* Preset chips */
.preset-chips { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.preset-chip {
  font-family: var(--la-font-mono);
  font-size: 9px; font-weight: 700;
  letter-spacing: var(--la-tk-mid);
  padding: 3px 9px;
  border: 1px solid var(--la-hair-base);
  color: var(--la-text-mute);
  cursor: pointer;
  background: none;
  text-transform: uppercase;
  transition: all var(--la-fast);
}
.preset-chip:hover { border-color: var(--la-hair-strong); color: var(--la-text-dim); }
.preset-chip.active {
  border-color: var(--acc);
  color: var(--acc);
  background: var(--acc-tint);
  transition: all var(--depth-shift);
}

.divider { width: 1px; height: 20px; background: var(--la-hair-base); flex-shrink: 0; }

/* Right badges */
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.badge {
  font-size: 8px; font-weight: 600; letter-spacing: var(--la-tk-mid);
  padding: 3px 7px; border: 1px solid var(--la-hair-base); color: var(--la-text-mute);
  text-transform: uppercase;
}
.badge-ok { border-color: var(--la-ok); color: var(--la-ok); }
.badge-depth {
  border-color: var(--acc); color: var(--acc);
  background: var(--acc-tint);
  transition: all var(--depth-shift);
}
.badge-scope {
  font-family: var(--la-font-mono);
  font-style: italic;
  font-size: 8px;
  padding: 3px 7px;
  color: var(--la-text-dim);
  border: 1px solid var(--la-hair-faint);
  max-width: 140px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── Body — row container for cockpit-left + resize-bar + code-panel ── */
.cockpit-body {
  overflow: hidden;
  display: flex;
  flex-direction: row;
}

.cockpit-left {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 10px 8px 10px 12px;
  transition: flex var(--depth-shift);
}

/* At d3 (default half state) — overridden by inline style when resized/snapped */
body.d3 .cockpit-left { flex: 0 0 52%; padding-right: 6px; }

/* ── Resize drag handle ───────────────────────────────────────── */
.cp-resize-bar {
  flex: 0 0 5px;
  display: none;
  cursor: col-resize;
  background: transparent;
  position: relative;
  z-index: 20;
  transition: background 0.1s;
  align-items: center;
  justify-content: center;
}
.cp-resize-bar::after {
  content: '';
  position: absolute;
  top: 20%;
  bottom: 20%;
  left: 2px;
  width: 1px;
  background: var(--la-hair-base);
  transition: background 0.1s, width 0.1s, left 0.1s;
}
.cp-resize-bar:hover::after,
.cp-resize-bar.dragging::after {
  background: var(--acc);
  width: 2px;
  left: 1.5px;
  transition: none;
}
body.d3 .cp-resize-bar { display: flex; }
/* Hide resize bar when panel is hidden */
body.d3 .cp-resize-bar.panel-hidden { display: none; }

/* ── Code panel — slides in from right at d3 ─────────────────── */
.code-panel {
  flex: 0 0 0%;
  min-width: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: #090b14;
  border-left: 1px solid transparent;
  opacity: 0;
  transition: flex var(--depth-shift), opacity var(--depth-shift), border-color var(--depth-shift);
}
body.d3 .code-panel {
  flex: 0 0 48%;
  border-left-color: var(--la-hair-base);
  opacity: 1;
}
/* Snap transitions for window controls (faster than depth-shift) */
.code-panel.cp-snapping,
.cockpit-left.cp-snapping {
  transition: flex 0.22s cubic-bezier(0.4,0,0.2,1), opacity 0.22s ease !important;
}

/* ── Window control buttons ──────────────────────────────────── */
.cp-wc-group {
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
  margin-left: 4px;
}
.cp-wc {
  width: 20px;
  height: 20px;
  border: 1px solid var(--la-hair-base);
  border-radius: 3px;
  background: transparent;
  color: var(--la-text-mute);
  font-size: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--la-fast);
  padding: 0;
  line-height: 1;
}
.cp-wc:hover { background: var(--la-hair-base); color: var(--la-text-base); border-color: var(--la-hair-strong); }
.cp-wc.active { background: var(--acc-tint); color: var(--acc); border-color: var(--acc); transition: color var(--depth-shift), background var(--depth-shift), border-color var(--depth-shift); }
/* Minimized pill — shown at edge when panel is hidden */
/* Restore pill: sibling of .code-panel inside .cockpit-body,
   floats at right edge — clickable even when panel width=0 */
.cp-minimized-pill {
  display: none;
  flex: 0 0 18px;
  background: #0a0c16;
  border-left: 1px solid var(--la-hair-base);
  border-right: none;
  padding: 10px 0;
  cursor: pointer;
  z-index: 30;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-family: var(--la-font-mono);
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--la-text-mute);
  align-items: center;
  justify-content: center;
  transition: color var(--la-fast), border-color var(--la-fast), background var(--la-fast);
}
.cp-minimized-pill:hover { color: var(--acc); border-color: var(--acc); background: rgba(255,255,255,0.02); }
body.d3.cp-hidden .cp-minimized-pill { display: flex; }

/* Code panel header */
.cp-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 0 10px; height: 34px;
  border-bottom: 1px solid var(--la-hair-base);
  background: #0a0c16; flex-shrink: 0;
}
.cp-file-info {
  display: flex; align-items: center; gap: 5px; flex: 1; min-width: 0;
}
.cp-file-icon { color: var(--acc); font-size: 10px; flex-shrink: 0; transition: color var(--depth-shift); }
.cp-file-path { font-size: 9px; color: var(--la-text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cp-file-path b { color: var(--la-text-bright); font-weight: 600; }
.cp-modified { color: var(--la-warn); font-size: 10px; flex-shrink: 0; }

.cp-tabs { display: flex; flex-shrink: 0; }
.cp-tab {
  font-family: var(--la-font-mono); font-size: 8px; font-weight: 700;
  letter-spacing: 0.08em; padding: 4px 8px; background: none; border: none;
  border-bottom: 2px solid transparent; color: var(--la-text-mute);
  cursor: pointer; text-transform: uppercase; transition: all var(--la-fast);
}
.cp-tab:hover { color: var(--la-text-dim); }
.cp-tab.active { color: var(--la-text-bright); border-bottom-color: var(--acc); transition: border-color var(--depth-shift); }

.cp-status { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.cp-live { display: flex; align-items: center; gap: 4px; font-size: 8px; font-weight: 700; letter-spacing: 0.08em; color: var(--la-ok); }
.cp-live-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--la-ok);
  animation: livePulse 2s ease-in-out infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(57,255,138,0.5); }
  50%       { opacity: 0.9; box-shadow: 0 0 0 5px rgba(57,255,138,0); }
}
.cp-diff-stat { font-size: 8px; color: var(--la-text-mute); }
.cp-diff-stat .ca { color: var(--la-ok); }
.cp-diff-stat .cd { color: var(--la-err); }

/* ── Command bar (⌘K) ───────────────────────────────────────── */
.cp-cmd-bar {
  display: none; flex-shrink: 0; height: 30px;
  align-items: center; gap: 0;
  background: #070a14;
  border-bottom: 1px solid var(--acc);
  box-shadow: 0 4px 20px rgba(0,0,0,0.55);
  transition: border-color var(--depth-shift);
}
body.d3.cp-cmd-open .cp-cmd-bar { display: flex; }

.cp-cmd-mode {
  flex-shrink: 0; width: 60px; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--la-font-mono); font-size: 8px; font-weight: 700; letter-spacing: 0.1em;
  border-right: 1px solid var(--la-hair-base); user-select: none;
  transition: color 0.12s, background 0.12s;
}
.cp-cmd-mode.m-idle  { color: var(--la-text-mute); background: transparent; }
.cp-cmd-mode.m-grep  { color: #4d8eff; background: rgba(77,142,255,0.07); }
.cp-cmd-mode.m-jq    { color: #39ff8a; background: rgba(57,255,138,0.06); }
.cp-cmd-mode.m-jump  { color: #ffad2e; background: rgba(255,173,46,0.07); }
.cp-cmd-mode.m-fuzzy { color: var(--d3); background: rgba(255,92,138,0.06); }

.cp-cmd-input {
  flex: 1; height: 100%; background: transparent;
  border: none; outline: none; padding: 0 12px;
  font-family: var(--la-font-mono); font-size: 11px;
  color: var(--la-text-bright); caret-color: var(--acc);
}
.cp-cmd-input::placeholder {
  color: var(--la-text-mute); font-size: 9px; letter-spacing: 0.05em;
}

.cp-cmd-hint {
  flex-shrink: 0; padding: 0 10px; height: 100%;
  display: flex; align-items: center; gap: 4px;
  border-left: 1px solid var(--la-hair-faint);
  font-family: var(--la-font-mono); font-size: 9px;
  color: var(--la-text-mute); white-space: nowrap; min-width: 110px;
}
.cp-cmd-hint .ok  { color: var(--la-ok); }
.cp-cmd-hint .err { color: var(--la-err); }
.cp-cmd-hint .wrn { color: var(--la-warn); }

.cp-cmd-close {
  flex-shrink: 0; padding: 0 10px; height: 100%;
  background: transparent; border: none; border-left: 1px solid var(--la-hair-faint);
  font-family: var(--la-font-mono); font-size: 7px; font-weight: 700; letter-spacing: 0.1em;
  color: var(--la-text-mute); cursor: pointer;
}
.cp-cmd-close:hover { background: var(--la-hair-faint); color: var(--la-text-dim); }

.cp-cmd-trigger {
  display: none; align-items: center; padding: 2px 5px;
  border: 1px solid var(--la-hair-base); border-radius: 3px;
  font-family: var(--la-font-mono); font-size: 7px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--la-text-mute); background: transparent; cursor: pointer;
  transition: color var(--la-fast), border-color var(--la-fast), background var(--la-fast);
}
body.d3 .cp-cmd-trigger { display: flex; }
.cp-cmd-trigger:hover { color: var(--acc); border-color: var(--acc); background: var(--acc-tint); }
body.d3.cp-cmd-open .cp-cmd-trigger { color: var(--acc); border-color: var(--acc); background: var(--acc-tint); }

/* Grep / fuzzy match highlight */
.cp-match { background: rgba(255,173,46,0.22); color: #ffd080; border-radius: 1px; }
/* Context lines dimmed around grep matches */
.cp-line.ctx-dim { opacity: 0.32; }

/* Fold separator (ellipsis between sections) */
.cp-fold {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 0 3px 56px; margin: 1px 0;
  color: var(--la-text-mute); font-size: 9px; font-family: var(--la-font-mono);
  border-top: 1px solid var(--la-hair-faint); border-bottom: 1px solid var(--la-hair-faint);
  background: rgba(255,255,255,0.01); cursor: default;
}

/* Individual code lines */
.cp-line {
  display: flex; align-items: stretch; min-height: 18px;
  font-family: var(--la-font-mono); font-size: 11px; line-height: 18px;
}
.cp-line:hover { background: rgba(255,255,255,0.03) !important; }
.cp-line.context { background: transparent; }
.cp-line.added   { background: rgba(57,255,138,0.055); }
.cp-line.removed { background: rgba(255,77,106,0.055); }
.cp-line.hl      { background: rgba(255,255,255,0.04); } /* active / highlighted */

/* Line number gutter */
.cp-ln {
  width: 40px; min-width: 40px; text-align: right; padding-right: 8px;
  color: rgba(255,255,255,0.18); flex-shrink: 0; user-select: none;
  border-right: 2px solid transparent; font-size: 10px; line-height: 18px;
}
.cp-line.added   .cp-ln { border-right-color: rgba(57,255,138,0.5); }
.cp-line.removed .cp-ln { border-right-color: rgba(255,77,106,0.5); }
.cp-line.hl      .cp-ln { border-right-color: color-mix(in srgb, var(--acc) 60%, transparent); }

/* Diff gutter (+/-) */
.cp-mark {
  width: 16px; min-width: 16px; text-align: center; flex-shrink: 0;
  font-size: 12px; line-height: 18px; user-select: none;
}
.cp-line.added   .cp-mark { color: var(--la-ok); }
.cp-line.removed .cp-mark { color: var(--la-err); }
.cp-line.context .cp-mark { color: transparent; }
.cp-line.hl      .cp-mark { color: var(--acc); transition: color var(--depth-shift); }

/* Source code text */
.cp-src { flex: 1; padding: 0 12px 0 8px; white-space: pre; overflow-x: visible; }

/* ── Code panel body row (code + minimap side by side) ──────── */
.cp-body-row {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
  position: relative;
}
.cp-body { flex: 1; overflow-y: auto; overflow-x: hidden; }
.cp-body::-webkit-scrollbar { width: 4px; }
.cp-body::-webkit-scrollbar-thumb { background: var(--la-hair-base); }

/* ── Minimap ─────────────────────────────────────────────────── */
.cp-minimap {
  width: 52px;
  flex-shrink: 0;
  background: #060810;
  border-left: 1px solid var(--la-hair-faint);
  overflow: hidden;
  position: relative;
  cursor: ns-resize;
}
.cp-mm-content { position: absolute; top: 0; left: 0; right: 0; padding: 4px 7px; }
.cp-mm-row { height: 2px; margin-bottom: 0.5px; border-radius: 1px; }
.cp-mm-row.added   { background: var(--la-ok); opacity:.85; }
.cp-mm-row.removed { background: var(--la-err); opacity:.85; }
.cp-mm-row.hl      { background: var(--acc); opacity:.9; transition: background var(--depth-shift); }
.cp-mm-row.context { background: rgba(255,255,255,0.09); }
.cp-mm-row.fold    { height: 1px; background: var(--la-hair-strong); margin: 3px 0; }
.cp-mm-row.blank   { height: 2px; background: transparent; }
.cp-mm-viewport {
  position: absolute; left: 0; right: 0;
  background: rgba(255,255,255,0.04);
  border-top: 1px solid rgba(255,255,255,0.12);
  border-bottom: 1px solid rgba(255,255,255,0.12);
  pointer-events: none;
}

/* ── Hunk header (diff view) ─────────────────────────────────── */
.cp-hunk {
  display: flex; align-items: center; gap: 8px;
  padding: 2px 10px 2px 6px; margin: 0;
  background: rgba(77,142,255,0.04);
  border-top: 1px solid rgba(77,142,255,0.12);
  border-bottom: 1px solid rgba(77,142,255,0.12);
  font-family: var(--la-font-mono); font-size: 9px;
}
.cp-hunk-range { color: #4d8eff; font-weight: 700; flex-shrink: 0; }
.cp-hunk-ctx   { color: var(--la-text-mute); font-style: italic; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cp-hunk-ctx .sf { font-style: normal; }

/* ── Status bar footer ───────────────────────────────────────── */
.cp-footer {
  flex-shrink: 0; height: 22px;
  display: flex; align-items: center; gap: 0;
  padding: 0 10px;
  background: #060810;
  border-top: 1px solid var(--la-hair-faint);
  font-family: var(--la-font-mono); font-size: 9px;
  color: var(--la-text-mute); overflow: hidden;
}
.cp-ft { display: flex; align-items: center; gap: 3px; padding: 0 8px 0 0; white-space: nowrap; }
.cp-ft + .cp-ft { border-left: 1px solid var(--la-hair-faint); padding-left: 8px; }
.cp-ft .v { color: var(--la-text-dim); }
.cp-ft .ok { color: var(--la-ok); }
.cp-ft .err { color: var(--la-err); }
.cp-ft .acc { color: var(--acc); transition: color var(--depth-shift); }
.cp-ft-spacer { flex: 1; }

/* ── Blame ownership bar ─────────────────────────────────────── */
.cp-own {
  flex-shrink: 0; padding: 7px 10px 6px;
  background: #070912;
  border-bottom: 1px solid var(--la-hair-faint);
}
.cp-own-title { font-size: 7px; color: var(--la-text-mute); letter-spacing: .07em; margin-bottom: 5px; }
.cp-own-strip {
  height: 5px; display: flex; border-radius: 2px; overflow: hidden; margin-bottom: 7px;
  gap: 1px;
}
.cp-own-leg { display: flex; gap: 14px; flex-wrap: wrap; }
.cp-own-item { display: flex; align-items: center; gap: 5px; font-family: var(--la-font-mono); font-size: 8px; color: var(--la-text-dim); }
.cp-own-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.cp-own-pct { color: var(--la-text-base); font-weight: 700; }

/* ── Syntax token colours ─────────────────────────────────────── */
.sk  { color: #4d8eff; font-weight: 500; }   /* keyword */
.st  { color: #39ff8a; }                       /* type / trait */
.ss  { color: #ffad2e; }                       /* string */
.sc  { color: rgba(255,255,255,0.28); font-style: italic; }  /* comment */
.sm  { color: #b478ff; }                       /* macro */
.sn  { color: #ff8c42; }                       /* number / bool literal */
.sl  { color: #ff5c8a; }                       /* lifetime */
.sa  { color: rgba(255,255,255,0.4); }         /* attribute */
.sf  { color: #c8cfff; }                       /* fn/method name */

/* ── Blinking cursor ─────────────────────────────────────────── */
.cursor {
  display: inline-block; width: 2px; height: 13px;
  background: rgba(255,255,255,0.85);
  animation: cursorBlink 1.1s step-end infinite;
  vertical-align: text-bottom; margin-left: 1px;
}
@keyframes cursorBlink { 0%,100% { opacity:1; } 50% { opacity:0; } }

/* ── Preset-specific card patterns ───────────────────────────── */

/* Service health rows (OPS) */
.svc-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; border-bottom: 1px solid var(--la-hair-faint); font-size: 9px;
}
.svc-row:last-child { border-bottom: none; }
.svc-name { flex: 1; color: var(--la-text-dim); font-size: 9px; }
.svc-lat  { color: var(--la-text-mute); width: 34px; text-align: right; }
.svc-err  { color: var(--la-text-mute); width: 52px; text-align: right; }

/* Log stream (OPS) */
.log-line {
  display: flex; align-items: flex-start; gap: 6px;
  padding: 2px 0; font-family: var(--la-font-mono); font-size: 9px; line-height: 1.5;
  border-bottom: 1px solid var(--la-hair-faint);
}
.log-line:last-child { border-bottom: none; }
.log-lvl { flex-shrink: 0; font-weight: 700; font-size: 8px; letter-spacing: 0.06em; width: 32px; }
.log-lvl.err  { color: var(--la-err); }
.log-lvl.warn { color: var(--la-warn); }
.log-lvl.info { color: var(--la-text-mute); }
.log-msg  { flex: 1; color: var(--la-text-dim); word-break: break-all; }
.log-ts   { flex-shrink: 0; color: rgba(255,255,255,0.15); font-size: 8px; }

/* CI pipeline stages (OPS) */
.pipe-stages { display: flex; align-items: center; gap: 0; margin: 6px 0; }
.pipe-stage {
  flex: 1; text-align: center; padding: 4px 2px;
  font-size: 8px; letter-spacing: 0.05em; font-weight: 600; text-transform: uppercase;
  border: 1px solid var(--la-hair-base); margin-right: -1px; position: relative;
}
.pipe-stage.pass  { background: rgba(57,255,138,0.08); color: var(--la-ok); border-color: rgba(57,255,138,0.25); }
.pipe-stage.fail  { background: rgba(255,77,106,0.08); color: var(--la-err); border-color: rgba(255,77,106,0.25); }
.pipe-stage.run   { background: rgba(var(--la-acc-rgb,77,142,255),0.1); color: var(--acc); border-color: var(--acc); animation: pipeRun 1.2s ease-in-out infinite; }
.pipe-stage.idle  { color: var(--la-text-mute); }
@keyframes pipeRun { 0%,100% { opacity:1; } 50% { opacity:0.55; } }
.pipe-time { font-size: 8px; color: var(--la-text-mute); text-align: center; margin-top: 2px; }

/* Rollback history rows (OPS) */
.rollback-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; border-bottom: 1px solid var(--la-hair-faint); font-size: 9px;
}
.rollback-row:last-child { border-bottom: none; }
.rb-hash  { font-family: var(--la-font-mono); color: var(--acc); font-size: 9px; flex-shrink: 0; transition: color var(--depth-shift); }
.rb-msg   { flex: 1; color: var(--la-text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rb-age   { color: var(--la-text-mute); font-size: 8px; flex-shrink: 0; }
.rb-cur   { font-size: 7px; font-weight: 700; letter-spacing: 0.08em; color: var(--la-ok); flex-shrink: 0; }

/* Security findings rows */
.finding-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; border-bottom: 1px solid var(--la-hair-faint); font-size: 9px;
}
.finding-row:last-child { border-bottom: none; }
.sev { font-size: 7px; font-weight: 700; letter-spacing: 0.08em; width: 30px; flex-shrink: 0; padding: 1px 3px; text-align: center; }
.sev.crit { background: rgba(255,77,106,0.15); color: var(--la-err); }
.sev.high { background: rgba(255,173,46,0.12); color: var(--la-warn); }
.sev.med  { background: rgba(255,200,80,0.1);  color: #ffc84d; }
.sev.info { background: rgba(255,255,255,0.05); color: var(--la-text-mute); }
.sev.ok   { background: rgba(57,255,138,0.08); color: var(--la-ok); }
.finding-sym  { color: var(--la-text-dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.finding-cwe  { font-family: var(--la-font-mono); color: var(--la-text-mute); font-size: 8px; flex-shrink: 0; }
.finding-fix  { font-size: 7px; font-weight: 700; color: var(--la-ok); flex-shrink: 0; }

/* Dep audit rows (SECURITY) */
.dep-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; border-bottom: 1px solid var(--la-hair-faint); font-size: 9px;
}
.dep-row:last-child { border-bottom: none; }
.dep-name { flex: 1; color: var(--la-text-dim); font-family: var(--la-font-mono); font-size: 9px; }
.dep-cnt  { color: var(--la-text-mute); font-size: 8px; flex-shrink: 0; width: 36px; text-align: right; }
.dep-cve  { font-size: 8px; flex-shrink: 0; }
.dep-cve.ok   { color: var(--la-ok); }
.dep-cve.warn { color: var(--la-warn); }
.dep-cve.err  { color: var(--la-err); }

/* Secrets audit (SECURITY) */
.secret-row {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 0; border-bottom: 1px solid var(--la-hair-faint); font-size: 9px;
}
.secret-row:last-child { border-bottom: none; }
.secret-key { font-family: var(--la-font-mono); color: var(--la-text-dim); font-size: 8px; flex: 1; }
.secret-status { font-size: 8px; flex-shrink: 0; }
.secret-status.ok   { color: var(--la-ok); }
.secret-status.warn { color: var(--la-warn); }
.secret-status.err  { color: var(--la-err); }

/* Quality: complexity hotspots */
.cpx-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; border-bottom: 1px solid var(--la-hair-faint);
}
.cpx-row:last-child { border-bottom: none; }
.cpx-fn  { font-family: var(--la-font-mono); color: var(--la-text-dim); font-size: 9px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cpx-val { font-size: 9px; font-weight: 700; flex-shrink: 0; width: 20px; text-align: right; }
.cpx-val.fail { color: var(--la-err); }
.cpx-val.warn { color: var(--la-warn); }
.cpx-action { font-size: 7px; font-weight: 700; letter-spacing: 0.06em; color: var(--acc); flex-shrink: 0; cursor: pointer; transition: color var(--depth-shift); }

/* Quality: doc coverage rows */
.doc-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; border-bottom: 1px solid var(--la-hair-faint); font-size: 9px;
}
.doc-row:last-child { border-bottom: none; }
.doc-crate { font-family: var(--la-font-mono); color: var(--la-text-dim); font-size: 9px; flex: 1; }
.doc-pct   { font-size: 9px; font-weight: 600; flex-shrink: 0; width: 34px; text-align: right; }
.doc-miss  { font-size: 8px; color: var(--la-text-mute); flex-shrink: 0; width: 50px; text-align: right; }

/* Quality: tech debt */
.debt-group { margin-bottom: 6px; }
.debt-kind  { font-size: 8px; font-weight: 700; letter-spacing: 0.08em; color: var(--la-text-mute); margin-bottom: 3px; }
.debt-item  {
  display: flex; gap: 6px; align-items: center;
  padding: 2px 0; font-size: 9px;
  border-bottom: 1px solid var(--la-hair-faint);
}
.debt-item:last-child { border-bottom: none; }
.debt-loc   { font-family: var(--la-font-mono); font-size: 8px; color: var(--acc); flex-shrink: 0; transition: color var(--depth-shift); }
.debt-msg   { flex: 1; color: var(--la-text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.debt-age   { color: var(--la-text-mute); font-size: 8px; flex-shrink: 0; }

/* Quality: test pyramid bars */
.pyramid-row {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 0; border-bottom: 1px solid var(--la-hair-faint);
}
.pyramid-row:last-child { border-bottom: none; }
.pyramid-lbl { font-size: 8px; color: var(--la-text-dim); flex-shrink: 0; width: 70px; text-transform: uppercase; letter-spacing: 0.05em; }
.pyramid-bar { flex: 1; height: 3px; background: var(--la-hair-base); }
.pyramid-fill { height: 100%; background: var(--acc); transition: background var(--depth-shift); }
.pyramid-fill.pass { background: var(--la-ok); }
.pyramid-fill.warn { background: var(--la-warn); }
.pyramid-fill.fail { background: var(--la-err); }
.pyramid-cnt { font-size: 8px; color: var(--la-text-mute); flex-shrink: 0; width: 28px; text-align: right; }

/* Quality: gate status */
.gate-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; border-bottom: 1px solid var(--la-hair-faint); font-size: 9px;
}
.gate-row:last-child { border-bottom: none; }
.gate-dim  { font-size: 8px; font-weight: 700; letter-spacing: 0.05em; width: 18px; flex-shrink: 0; }
.gate-name { flex: 1; color: var(--la-text-dim); }
.gate-val  { color: var(--la-text-mute); font-size: 8px; flex-shrink: 0; width: 36px; text-align: right; }
.gate-st   { font-size: 7px; font-weight: 700; letter-spacing: 0.08em; flex-shrink: 0; width: 32px; text-align: right; }
.gate-st.pass { color: var(--la-ok); }
.gate-st.warn { color: var(--la-warn); }
.gate-st.fail { color: var(--la-err); }

/* ── Blame view ───────────────────────────────────────────────── */
.bl-line {
  display: flex; align-items: stretch; min-height: 18px;
  font-family: var(--la-font-mono); font-size: 11px; line-height: 18px;
}
.bl-line:hover { background: rgba(255,255,255,0.03) !important; }
.bl-hash {
  width: 52px; min-width: 52px; padding: 0 6px 0 8px; flex-shrink: 0;
  font-size: 9px; line-height: 18px; letter-spacing: 0.04em;
  opacity: 0.85; user-select: none; overflow: hidden;
}
.bl-author {
  width: 96px; min-width: 96px; padding: 0 4px; flex-shrink: 0;
  font-size: 9px; line-height: 18px; color: rgba(255,255,255,0.35);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none;
}
.bl-when {
  width: 42px; min-width: 42px; padding: 0 6px 0 2px; flex-shrink: 0;
  font-size: 9px; line-height: 18px; color: rgba(255,255,255,0.2);
  text-align: right; user-select: none;
}
.bl-msg {
  width: 160px; min-width: 0; flex-shrink: 1; padding: 0 8px 0 4px;
  font-size: 9px; line-height: 18px; color: rgba(255,255,255,0.22);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none;
  font-style: italic;
}
.bl-sep {
  width: 1px; min-width: 1px; flex-shrink: 0;
  background: var(--la-hair-faint); margin: 3px 0;
}
.bl-line .cp-ln  { color: rgba(255,255,255,0.14); border-right: none; }
.bl-line .cp-src { padding-left: 10px; }

/* Raw view reuses .cp-line without diff colours */
.cp-line.raw-line { background: transparent; }
.cp-line.raw-line .cp-mark { display: none; }
.cp-line.raw-line .cp-ln { color: rgba(255,255,255,0.22); border-right: 1px solid var(--la-hair-faint); }

/* ── Bento Grid ───────────────────────────────────────────────── */
/*
  Layout (repurposed):
  portal portal  context
  portal portal  context
  health hitl    fleet
  git    strat   wave
*/
.bento {
  display: grid;
  height: 100%;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 1.4fr 1.4fr 1fr 0.9fr 0.7fr;
  grid-template-areas:
    "portal  portal  hitl"
    "portal  portal  wave"
    "strat   strat   strat"
    "context context context"
    "health  fleet   git";
  gap: 8px;
}

/* ── Card base ─────────────────────────────────────────────────── */
.card {
  background: var(--la-bg-panel);
  border: 1px solid var(--la-hair-base);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  transition: border-color var(--la-fast);
}

/* Depth accent stripe on left edge */
.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--acc);
  opacity: 0;
  transition: opacity var(--depth-shift), background var(--depth-shift);
}
.card.scoped::before { opacity: 1; }

.card-hdr {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px 0;
  flex-shrink: 0;
}
.card-lbl {
  font-size: 8px; font-weight: 700;
  letter-spacing: var(--la-tk-loose);
  color: var(--la-text-mute);
  text-transform: uppercase;
  flex: 1;
  transition: color var(--depth-shift);
}
.card.scoped .card-lbl { color: var(--acc); }
.card-meta { font-size: 8px; color: var(--la-text-mute); }
.card-body { flex: 1; overflow-y: auto; padding: 6px 10px 8px; }
.card-body::-webkit-scrollbar { width: 3px; }
.card-body::-webkit-scrollbar-track { background: transparent; }
.card-body::-webkit-scrollbar-thumb { background: var(--la-hair-base); }

/* Grid areas */
.card-portal   { grid-area: portal; }
.card-context  { grid-area: context; }
.card-health   { grid-area: health; }
.card-hitl     { grid-area: hitl; }
.card-fleet    { grid-area: fleet; }
.card-git      { grid-area: git; }
.card-strat    { grid-area: strat; }
.card-wave     { grid-area: wave; }

/* ── Portal card ──────────────────────────────────────────────── */
.card-portal {
  border-color: color-mix(in srgb, var(--acc) 35%, var(--la-hair-base));
  transition: border-color var(--depth-shift);
}
.card-portal::before { opacity: 1; }
.card-portal .card-lbl { color: var(--acc); transition: color var(--depth-shift); }

/* Portal title + depth kind label */
.portal-kind {
  font-size: 8px; letter-spacing: var(--la-tk-loose);
  color: color-mix(in srgb, var(--acc) 70%, transparent);
  background: var(--acc-tint);
  padding: 2px 6px;
  border: 1px solid color-mix(in srgb, var(--acc) 25%, transparent);
  transition: all var(--depth-shift);
  flex-shrink: 0;
}

/* Portal items list */
.portal-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* Individual portal item */
.portal-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  cursor: pointer;
  border: 1px solid transparent;
  border-radius: 0;
  position: relative;
  transition: background var(--la-fast), border-color var(--la-fast);
  overflow: visible;
}
.portal-item:hover {
  background: var(--acc-tint);
  border-color: color-mix(in srgb, var(--acc) 20%, transparent);
}
.portal-item.no-drill { cursor: default; }
.portal-item.no-drill:hover { background: var(--la-hair-faint); border-color: transparent; }

/* Status dot */
.pi-dot {
  width: 5px; height: 5px; border-radius: 50%;
  flex-shrink: 0; margin-top: 1px;
}
.pi-dot.ok   { background: var(--la-ok); box-shadow: 0 0 6px var(--la-ok); }
.pi-dot.warn { background: var(--la-warn); box-shadow: 0 0 6px var(--la-warn); }
.pi-dot.err  { background: var(--la-err); box-shadow: 0 0 6px var(--la-err); }
.pi-dot.dim  { background: var(--la-text-mute); }
.pi-dot.active { background: var(--acc); box-shadow: 0 0 6px var(--acc); transition: all var(--depth-shift); }

.pi-info { flex: 1; min-width: 0; }
.pi-name {
  font-size: 11px; font-weight: 500;
  color: var(--la-text-bright);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: var(--la-tk-tight);
}
.pi-meta {
  font-size: 9px; color: var(--la-text-dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
}

/* Drill arrow */
.pi-drill {
  font-size: 10px;
  color: var(--la-text-mute);
  flex-shrink: 0;
  opacity: 0;
  transform: translateX(-4px);
  transition: all var(--la-fast);
}
.portal-item:hover .pi-drill {
  opacity: 1;
  transform: translateX(0);
  color: var(--acc);
}

/* ── Mini workspace preview on portal item hover ─────────────── */
.pi-preview {
  position: absolute;
  left: calc(100% + 8px);
  top: 50%;
  transform: translateY(-50%);
  width: 160px;
  background: var(--la-bg-card);
  border: 1px solid color-mix(in srgb, var(--acc) 35%, var(--la-hair-base));
  padding: 10px;
  z-index: 100;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.12s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.portal-item:hover .pi-preview { opacity: 1; }

/* Mini grid within preview */
.mini-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  grid-template-rows: 1fr 1fr auto auto;
  gap: 3px;
  height: 80px;
  margin-bottom: 8px;
}
.mini-card {
  border-radius: 1px;
  background: var(--la-hair-faint);
  border: 1px solid var(--la-hair-faint);
}
.mini-card.mc-portal { grid-row: span 2; background: var(--acc-tint); border-color: color-mix(in srgb, var(--acc) 30%, transparent); transition: all var(--depth-shift); }
.mini-card.mc-bottom { grid-column: span 2; }
.pi-preview-label {
  font-size: 8px; font-weight: 700;
  letter-spacing: var(--la-tk-mid);
  color: var(--acc);
  text-align: center;
  text-transform: uppercase;
  transition: color var(--depth-shift);
}

/* ── Small card inner elements ────────────────────────────────── */
.stat-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid var(--la-hair-faint);
}
.stat-row:last-child { border-bottom: none; }
.stat-label { font-size: 9px; color: var(--la-text-dim); }
.stat-value { font-size: 11px; font-weight: 600; color: var(--la-text-bright); }
.stat-value.ok { color: var(--la-ok); }
.stat-value.warn { color: var(--la-warn); }
.stat-value.err { color: var(--la-err); }
.stat-value.acc { color: var(--acc); transition: color var(--depth-shift); }

.event-row {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 5px 0;
  border-bottom: 1px solid var(--la-hair-faint);
}
.event-row:last-child { border-bottom: none; }
.event-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.event-dot.ok   { background: var(--la-ok); }
.event-dot.warn { background: var(--la-warn); }
.event-dot.err  { background: var(--la-err); }
.event-dot.info { background: var(--la-text-mute); }
.event-dot.acc  { background: var(--acc); transition: background var(--depth-shift); }
.event-text { font-size: 9px; color: var(--la-text-dim); line-height: 1.4; }
.event-text b { color: var(--la-text-bright); font-weight: 500; }
.event-time { font-size: 8px; color: var(--la-text-mute); margin-left: auto; flex-shrink: 0; padding-top: 2px; }

.agent-row {
  display: flex; align-items: center; gap: 7px;
  padding: 4px 0; border-bottom: 1px solid var(--la-hair-faint);
}
.agent-row:last-child { border-bottom: none; }
.agent-name { font-size: 10px; font-weight: 500; color: var(--la-text-base); flex: 1; }
.agent-status { font-size: 8px; letter-spacing: var(--la-tk-mid); }
.agent-status.active { color: var(--la-ok); }
.agent-status.idle   { color: var(--la-text-mute); }
.agent-status.acc    { color: var(--acc); transition: color var(--depth-shift); }

.chip-row { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  font-size: 8px; font-weight: 600; letter-spacing: var(--la-tk-mid);
  padding: 2px 6px;
  border: 1px solid var(--la-hair-base);
  color: var(--la-text-mute);
  text-transform: uppercase;
  cursor: default;
}
.chip.acc {
  border-color: color-mix(in srgb, var(--acc) 40%, transparent);
  color: var(--acc);
  background: var(--acc-tint);
  transition: all var(--depth-shift);
}

.progress-row {
  display: flex; align-items: center; gap: 8px; padding: 3px 0;
}
.progress-label { font-size: 9px; color: var(--la-text-dim); flex-shrink: 0; width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.progress-track { flex: 1; height: 3px; background: var(--la-hair-base); }
.progress-fill { height: 100%; background: var(--acc); transition: background var(--depth-shift), width 0.4s ease; }
.progress-pct { font-size: 8px; color: var(--la-text-mute); flex-shrink: 0; width: 30px; text-align: right; }

.wave-action {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px;
  border: 1px solid var(--la-hair-base);
  cursor: pointer;
  transition: background var(--la-fast), border-color var(--la-fast);
  flex: 1;
}
.wave-action:hover {
  background: var(--acc-tint);
  border-color: color-mix(in srgb, var(--acc) 30%, transparent);
}
.wave-action-label { font-size: 9px; font-weight: 600; letter-spacing: var(--la-tk-mid); color: var(--la-text-dim); text-transform: uppercase; flex: 1; }
.wave-action-glyph { font-size: 12px; color: var(--acc); transition: color var(--depth-shift); }
.wave-act-icon { font-size: 10px; flex-shrink: 0; width: 14px; text-align: center; }
.wave-act-badge { font-size: 7px; font-weight: 700; letter-spacing: 0.08em; flex-shrink: 0; padding: 1px 4px; border: 1px solid currentColor; }
.wave-act-badge.warn { color: var(--la-warn); }
.wave-act-badge.info { color: var(--la-text-mute); }

/* ── Depth transition — cards pulse on depth change ──────────── */
.card.depth-pulse {
  animation: depthPulse 0.35s ease forwards;
}
@keyframes depthPulse {
  0%   { opacity: 1; }
  25%  { opacity: 0.4; }
  100% { opacity: 1; }
}

/* ── Scrollbar global ───────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--la-hair-base); }

/* ── Utility ──────────────────────────────────────────────────── */
.mono { font-family: var(--la-font-mono); }
.dim  { color: var(--la-text-mute); }
.ok   { color: var(--la-ok); }
.warn { color: var(--la-warn); }
.err  { color: var(--la-err); }
.acc  { color: var(--acc); transition: color var(--depth-shift); }
.sep  { border-bottom: 1px solid var(--la-hair-faint); margin: 4px 0; }

/* ═══════════════════════════════════════════════════════════════
   D3 — FILE SCOPE COMPONENTS
   ═══════════════════════════════════════════════════════════════ */

/* ── Symbol items (portal card at d3) ─────────────────────────── */
.sym-item {
  display: flex; flex-direction: column; gap: 4px;
  padding: 7px 10px;
  border-bottom: 1px solid var(--la-hair-faint);
  transition: background var(--la-fast);
}
.sym-item:last-child { border-bottom: none; }
.sym-item:hover { background: var(--acc-tint); }

.sym-row1 { display: flex; align-items: center; gap: 7px; }

.sym-kind-pill {
  font-size: 7px; font-weight: 800; letter-spacing: 0.08em;
  padding: 1px 5px; flex-shrink: 0; text-transform: uppercase;
  border: 1px solid var(--la-hair-base); color: var(--la-text-mute);
}
.sym-kind-pill.fn     { border-color: rgba(77,142,255,0.45); color: #4d8eff; }
.sym-kind-pill.struct { border-color: rgba(57,255,138,0.45); color: #39ff8a; }
.sym-kind-pill.trait  { border-color: rgba(255,173,46,0.45); color: #ffad2e; }
.sym-kind-pill.enum   { border-color: rgba(255,92,138,0.45); color: #ff5c8a; }

.sym-name-wrap { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 5px; }
.sym-name {
  font-size: 10px; font-weight: 600; letter-spacing: var(--la-tk-tight);
  color: var(--la-text-bright);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sym-async { font-size: 8px; color: var(--la-text-mute); font-style: italic; flex-shrink: 0; }

.sym-domain-badges { display: flex; gap: 3px; flex-shrink: 0; }
.sym-domain {
  font-size: 7px; font-weight: 800; letter-spacing: 0.06em;
  padding: 1px 4px; border: 1px solid transparent;
}
.sym-domain.ok   { display: none; }
.sym-domain.na   { display: none; }
.sym-domain.warn { border-color: rgba(255,173,46,0.45); color: var(--la-warn); }
.sym-domain.fail { border-color: rgba(255,77,106,0.45); color: var(--la-err); }

/* ── Portal hotspot badges + risk pill (d2 file portal pre-roll) ── */
.pi-domains { display: flex; gap: 2px; flex-shrink: 0; }
.pi-domain {
  font-size: 7px; font-weight: 800; letter-spacing: 0.06em;
  padding: 1px 3px; border: 1px solid transparent;
}
.pi-domain.warn { border-color: rgba(255,173,46,0.45); color: var(--la-warn); }
.pi-domain.fail { border-color: rgba(255,77,106,0.45); color: var(--la-err); background: rgba(255,77,106,0.06); }
.pi-risk {
  font-size: 7px; font-weight: 800; letter-spacing: 0.08em;
  padding: 2px 5px; flex-shrink: 0;
  border: 1px solid transparent;
}
.pi-risk.crit { border-color: rgba(255,77,106,0.55);  color: var(--la-err);  background: rgba(255,77,106,0.08); }
.pi-risk.high { border-color: rgba(255,77,106,0.4);   color: var(--la-err); }
.pi-risk.med  { border-color: rgba(255,173,46,0.4);   color: var(--la-warn); }
.pi-risk.low  { border-color: rgba(57,255,138,0.3);   color: var(--la-ok); }
.pi-risk.ok   { border-color: rgba(57,255,138,0.3);   color: var(--la-ok); }

.sym-row2 { display: flex; gap: 10px; }
.sym-bar-group { display: flex; align-items: center; gap: 4px; flex: 1; }
.sym-bar-label { font-size: 7px; color: var(--la-text-mute); flex-shrink: 0; width: 22px; letter-spacing: 0.06em; }
.sym-bar-track { flex: 1; height: 3px; background: var(--la-hair-base); }
.sym-bar-fill  { height: 100%; transition: width 0.5s ease; }
.sym-bar-fill.ok   { background: var(--la-ok); }
.sym-bar-fill.warn { background: var(--la-warn); }
.sym-bar-fill.fail { background: var(--la-err); }
.sym-bar-val { font-size: 8px; font-weight: 600; flex-shrink: 0; width: 28px; text-align: right; }
.sym-bar-val.ok   { color: var(--la-ok); }
.sym-bar-val.warn { color: var(--la-warn); }
.sym-bar-val.fail { color: var(--la-err); }

/* ── Symbol cursor bridge — interactive states ─────────────────── */
.sym-item { cursor: pointer; }
.sym-item.sym-selected { background: rgba(77,142,255,0.08); border-left: 2px solid var(--acc); padding-left: 4px; }
@keyframes symJumpFlash {
  0%   { background: rgba(255,173,46,0.22); }
  100% { background: transparent; }
}
.cp-line.sym-jump-flash { animation: symJumpFlash 1.2s ease forwards; }
.risk-matrix tbody tr.rm-row-selected td { background: rgba(77,142,255,0.08); }
.stat-row.clickable { cursor: pointer; }
.stat-row.clickable:hover { background: var(--la-hair-faint); }
.agent-row.clickable { cursor: pointer; }
.agent-row.clickable:hover { background: var(--la-hair-faint); }
.scan-row.clickable { cursor: pointer; }
.scan-row.clickable:hover { background: var(--la-hair-faint); }
.wave-smart-item { cursor: pointer; }
.wave-smart-item:hover { background: var(--la-hair-faint); }
@keyframes waveDispatch {
  0%   { background: rgba(57,255,138,0.18); }
  100% { background: transparent; }
}
.wave-smart-item.dispatched { animation: waveDispatch 0.8s ease forwards; }

/* ── Domain scan rows (context + hitl at d3) ──────────────────── */
.scan-row {
  display: flex; align-items: flex-start; gap: 7px;
  padding: 5px 0; border-bottom: 1px solid var(--la-hair-faint);
}
.scan-row:last-child { border-bottom: none; }

.scan-domain {
  font-size: 7px; font-weight: 800; letter-spacing: 0.06em;
  padding: 2px 4px; min-width: 18px; text-align: center;
  border: 1px solid var(--la-hair-base); color: var(--la-text-mute);
  flex-shrink: 0; margin-top: 1px;
}
.scan-domain.A { border-color: rgba(57,255,138,0.4);  color: #39ff8a; }
.scan-domain.S { border-color: rgba(255,77,106,0.4);  color: #ff4d6a; }
.scan-domain.Q { border-color: rgba(255,173,46,0.4);  color: #ffad2e; }
.scan-domain.T { border-color: rgba(77,142,255,0.4);  color: #4d8eff; }
.scan-domain.P { border-color: rgba(255,140,66,0.4);  color: #ff8c42; }
.scan-domain.D { border-color: rgba(180,120,255,0.4); color: #b478ff; }
.scan-domain.K { border-color: rgba(57,255,138,0.4);  color: #39ff8a; }
.scan-domain.O { border-color: rgba(255,220,100,0.4); color: #ffdc64; }

.scan-info   { flex: 1; min-width: 0; }
.scan-sym    { font-size: 9px; font-weight: 600; color: var(--la-text-bright); margin-bottom: 1px; }
.scan-msg    { font-size: 9px; color: var(--la-text-dim); line-height: 1.4; }
.scan-status {
  font-size: 7px; font-weight: 800; letter-spacing: 0.08em;
  padding: 2px 5px; flex-shrink: 0; text-transform: uppercase;
  border: 1px solid transparent; margin-top: 1px;
}
.scan-status.ok   { border-color: rgba(57,255,138,0.4);  color: var(--la-ok); }
.scan-status.warn { border-color: rgba(255,173,46,0.4);  color: var(--la-warn); }
.scan-status.fail { border-color: rgba(255,77,106,0.4);  color: var(--la-err); }

/* ── Cross-domain risk matrix (strat at d3) ───────────────────── */
.risk-matrix {
  width: 100%; border-collapse: collapse; font-size: 9px; table-layout: fixed;
}
.risk-matrix thead th {
  font-size: 7px; font-weight: 800; letter-spacing: 0.08em;
  color: var(--la-text-mute); text-align: center;
  padding: 3px 2px; border-bottom: 1px solid var(--la-hair-base);
}
.risk-matrix thead th:first-child { text-align: left; padding-left: 0; width: 38%; }
.risk-matrix tbody td {
  padding: 4px 2px; text-align: center;
  border-bottom: 1px solid var(--la-hair-faint); font-size: 10px;
}
.risk-matrix tbody td:first-child {
  text-align: left; color: var(--la-text-dim); font-size: 8px;
  padding-left: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.risk-matrix tbody tr:last-child td { border-bottom: none; }
.rm-ok   { color: var(--la-ok); }
.rm-warn { color: var(--la-warn); }
.rm-fail { color: var(--la-err); }
.rm-na   { color: var(--la-text-mute); opacity: 0.35; font-size: 8px; }
/* rm-cell: td-scoped glyph colouring for compliance matrix */
.rm-cell      { text-align: center; font-size: 11px; }
.rm-cell.ok   { color: var(--la-ok); }
.rm-cell.warn { color: var(--la-warn); }
.rm-cell.fail { color: var(--la-err); opacity: 0.7; }
.rm-cell.na   { color: var(--la-text-mute); opacity: 0.3; font-size: 8px; }

/* Risk matrix legend */
.rm-legend {
  display: flex; gap: 10px; margin-top: 6px; padding-top: 5px;
  border-top: 1px solid var(--la-hair-faint);
}
.rm-leg-item { display: flex; align-items: center; gap: 3px; font-size: 7px; color: var(--la-text-mute); }

/* ── Smart wave dispatch (wave at d3) ─────────────────────────── */
.wave-smart { display: flex; flex-direction: column; gap: 4px; }
.wave-smart-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px; border: 1px solid var(--la-hair-base);
  cursor: pointer; transition: all var(--la-fast);
}
.wave-smart-item:hover { background: var(--la-hair-faint); }
.wave-smart-item.priority {
  border-color: color-mix(in srgb, var(--acc) 40%, transparent);
  background: var(--acc-tint);
  transition: all var(--depth-shift);
}
.wsi-action { font-size: 9px; font-weight: 700; letter-spacing: var(--la-tk-mid); color: var(--la-text-mute); flex-shrink: 0; min-width: 72px; }
.wave-smart-item.priority .wsi-action { color: var(--acc); transition: color var(--depth-shift); }
.wsi-reason { font-size: 8px; color: var(--la-text-mute); flex: 1; line-height: 1.4; }
.wave-smart-item.priority .wsi-reason { color: var(--la-text-dim); }
.wsi-domain {
  font-size: 7px; font-weight: 800; letter-spacing: 0.06em;
  padding: 1px 4px; flex-shrink: 0;
  border: 1px solid var(--la-hair-faint); color: var(--la-text-mute);
}
.wave-smart-item.priority .wsi-domain {
  border-color: color-mix(in srgb, var(--acc) 40%, transparent);
  color: var(--acc); transition: all var(--depth-shift);
}

/* ═════════════════════════════════════════════════════════════════
   D2 BUILD PROGRESS — right-side drawer at build scope
   Mirrors d3's code-panel infrastructure (resize, ⌘K, hide/half/full)
   but renders the build tree instead of file content.
   ═════════════════════════════════════════════════════════════════ */

/* Reuse d3 panel layout at d2 */
body.d2 .code-panel {
  flex: 0 0 48%;
  border-left-color: var(--la-hair-base);
  opacity: 1;
}
body.d2 .cockpit-left { flex: 0 0 52%; padding-right: 6px; }
body.d2 .cp-resize-bar { display: flex; }
body.d2 .cp-resize-bar.panel-hidden { display: none; }
body.d2.cp-hidden .cp-minimized-pill { display: flex; }
body.d2 .cp-cmd-trigger { display: flex; }
body.d2.cp-cmd-open .cp-cmd-bar { display: flex; }
/* Hide d3-specific bits */
body.d2 .cp-minimap { display: none; }
body.d2 .cp-footer  { display: none; }
body.d2 .cp-modified { display: none; }

/* ── Build header (replaces file path at d2) ─────────────────── */
.cp-d2-breadcrumb {
  display: flex; align-items: center; gap: 4px;
  font-size: 9px; color: var(--la-text-dim);
  flex: 1; min-width: 0; overflow: hidden;
}
.cp-d2-bc-sep { color: var(--la-text-mute); font-size: 8px; }
.cp-d2-bc-cur { color: var(--la-text-bright); font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cp-d2-bc-cur.dim { color: var(--la-text-dim); font-weight: 400; }

/* ── PROGRESS lens — tree ─────────────────────────────────────── */
.bp-tree {
  font-family: var(--la-font-mono);
  font-size: 10px;
  padding: 8px 10px 14px;
  overflow-y: auto;
  height: 100%;
}
.bp-build-hdr {
  padding: 4px 6px 10px;
  border-bottom: 1px solid var(--la-hair-base);
  margin-bottom: 8px;
}
.bp-build-title {
  font-size: 11px; font-weight: 700; color: var(--la-text-bright);
  letter-spacing: 0.02em;
  margin-bottom: 5px;
}
.bp-build-meta {
  display: flex; gap: 5px; flex-wrap: wrap;
  font-size: 8px;
}
.bp-meta-chip {
  padding: 1px 5px;
  border: 1px solid var(--la-hair-base);
  letter-spacing: 0.04em;
  color: var(--la-text-mute);
  font-size: 7px;
}
.bp-meta-chip.branch { color: var(--la-ok);  border-color: rgba(57,255,138,0.3); }
.bp-meta-chip.pr     { color: var(--la-warn); border-color: rgba(255,173,46,0.35); }
.bp-meta-chip.acc    { color: var(--acc); border-color: color-mix(in srgb, var(--acc) 30%, transparent); transition: color var(--depth-shift), border-color var(--depth-shift); }
.bp-meta-chip.path   { color: var(--la-text-mute); font-size: 7px; }

/* Tree nesting */
.bp-phase {
  margin-bottom: 4px;
  border-left: 1px solid var(--la-hair-base);
  padding-left: 8px;
  margin-left: 4px;
}
.bp-phase.active { border-left-color: var(--acc); }
.bp-wave {
  border-left: 1px solid var(--la-hair-faint);
  padding-left: 8px;
  margin: 3px 0 3px 14px;
}
.bp-wave.active { border-left-color: var(--acc); }
.bp-task {
  padding-left: 8px;
  margin: 1px 0 1px 14px;
  border-left: 1px solid transparent;
}
.bp-task.active { border-left-color: var(--acc); }

/* Row — universal tree row */
.bp-row {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 6px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background var(--la-fast), border-color var(--la-fast);
}
.bp-row:hover { background: var(--acc-tint); border-color: color-mix(in srgb, var(--acc) 25%, transparent); transition: background var(--depth-shift), border-color var(--depth-shift); }
.bp-row.selected {
  background: var(--acc-tint);
  border-color: color-mix(in srgb, var(--acc) 55%, transparent);
  transition: background var(--depth-shift), border-color var(--depth-shift);
}
.bp-row.active-node {
  background: color-mix(in srgb, var(--acc) 8%, transparent);
}

.bp-glyph {
  font-size: 9px; width: 12px; text-align: center; flex-shrink: 0;
}
.bp-glyph.complete { color: var(--la-ok); }
.bp-glyph.active   { color: var(--acc); animation: bp-pulse 1.5s ease-in-out infinite; transition: color var(--depth-shift); }
.bp-glyph.pending  { color: var(--la-text-mute); }
.bp-glyph.queued   { color: var(--la-text-mute); }
@keyframes bp-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }

.bp-name {
  flex: 1; min-width: 0;
  font-size: 10px; color: var(--la-text-bright);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.bp-name.dim { color: var(--la-text-dim); font-weight: 400; }
.bp-name.bright { color: var(--la-text-bright); font-weight: 600; }

/* SHA pill — git anchor on every row that has one */
.bp-sha {
  font-family: var(--la-font-mono);
  font-size: 8px;
  color: var(--acc);
  padding: 1px 5px;
  border: 1px solid color-mix(in srgb, var(--acc) 30%, transparent);

.bp-gate.fail { color: var(--la-err); border-color: rgba(255,77,106,0.4); }

// ── Render helpers ────────────────────────────────────────────────
function portalItemHtml(item, nextLabel) {
  const hasDrill = item.drill !== null;
  const domainBadges = item.domains
    ? Object.entries(item.domains)
        .filter(([, v]) => v === 'warn' || v === 'fail')
        .map(([k, v]) => `<span class="pi-domain ${v}" title="${domainTitle(k)} · ${v}">${k}</span>`)
        .join('')
    : '';
  const riskPill = item.risk
    ? `<span class="pi-risk ${item.risk.toLowerCase()}">${item.risk}</span>`
    : '';
  return `
    <div class="portal-item${hasDrill ? '' : ' no-drill'}"
         ${hasDrill ? `data-drill="${item.drill}"` : ''}
         style="position:relative">
      <div class="pi-dot ${item.status}"></div>
      <div class="pi-info">
        <div class="pi-name">${item.name}</div>
        <div class="pi-meta">${item.meta}</div>
      </div>
      ${domainBadges ? `<div class="pi-domains">${domainBadges}</div>` : ''}
      ${riskPill}
      ${hasDrill ? `<div class="pi-drill">›</div>` : ''}
      ${hasDrill && nextLabel ? `
        <div class="pi-preview">
          <div class="mini-grid">
            <div class="mini-card mc-portal"></div>
            <div class="mini-card mc-context"></div>
            <div class="mini-card"></div>
            <div class="mini-card"></div>
            <div class="mini-card mc-bottom"></div>
          </div>
          <div class="pi-preview-label">${nextLabel}</div>
        </div>` : ''}
    </div>`;
}

function symItemHtml(sym) {
  const CPX_MAX = 15;
  const cpxPct = Math.min(100, (sym.complexity / CPX_MAX) * 100).toFixed(0);
  const cpxCls = sym.complexity >= 10 ? 'fail' : sym.complexity >= 7 ? 'warn' : 'ok';
  const covCls = sym.coverage !== null
    ? (sym.coverage < 50 ? 'fail' : sym.coverage < 75 ? 'warn' : 'ok') : '';

  const domainBadges = Object.entries(sym.domains)
    .filter(([, v]) => v === 'warn' || v === 'fail')
    .map(([k, v]) => `<span class="sym-domain ${v}">${k}</span>`)
    .join('');

  const bars = sym.complexity > 0 ? `
    <div class="sym-row2">
      <div class="sym-bar-group">
        <span class="sym-bar-label">CPX</span>
        <div class="sym-bar-track"><div class="sym-bar-fill ${cpxCls}" style="width:${cpxPct}%"></div></div>
        <span class="sym-bar-val ${cpxCls}">${sym.complexity}</span>
      </div>
      ${sym.coverage !== null ? `
      <div class="sym-bar-group">
        <span class="sym-bar-label">COV</span>
        <div class="sym-bar-track"><div class="sym-bar-fill ${covCls}" style="width:${sym.coverage}%"></div></div>
        <span class="sym-bar-val ${covCls}">${sym.coverage}%</span>
      </div>` : ''}
    </div>` : '';

  return `
    <div class="sym-item" data-sym-name="${sym.name}" onclick="selectSym('${sym.name}')">
      <div class="sym-row1">
        <span class="sym-kind-pill ${sym.kind}">${sym.kind}</span>
        <div class="sym-name-wrap">
          <span class="sym-name">${sym.name}${sym.kind === 'fn' ? '()' : ''}</span>
          ${sym.isAsync ? '<span class="sym-async">async</span>' : ''}
        </div>
        <div class="sym-domain-badges">${domainBadges}</div>
      </div>
      ${bars}
    </div>`;
}

function scanRowHtml(s) {
  return `
    <div class="scan-row clickable" onclick="selectSym('${s.sym}')">
      <span class="scan-domain ${s.domain}">${s.domain}</span>
      <div class="scan-info">
        <div class="scan-sym">${s.sym}</div>
        <div class="scan-msg">${s.msg}</div>
      </div>
      <span class="scan-status ${s.status}">${s.status.toUpperCase()}</span>
    </div>`;
}

/*
 * ── D3 bento card API contracts ───────────────────────────────────────────────
 * All bento cards at depth 3 (file scope) source data from these endpoints.
 *
 * @api CODE MAP (portal.symbols)
 *   GET /api/code/symbols?path={relPath}&ref={ref}
 *   → { symbols: [{ id, kind, name, isAsync, lines, complexity, coverage, domains }] }
 *   Status: NOT YET IMPLEMENTED — no backend endpoint; data synthesized from
 *   clippy JSON + llvm-cov lcov + rust-analyzer LSP. Symbol navigator fallback:
 *   fuzzy-search raw source text via GET /api/code/read.
 *
 * @api DOMAIN SCAN (context.scans)
 *   GET /api/code/scan?path={relPath}&ref={ref}
 *   → { scans: [{ domain, sym, msg, status }] }
 *   Status: NOT YET IMPLEMENTED — findings aggregated server-side from:
 *     [Q] clippy --message-format json | jq '.message.spans'
 *     [T] llvm-cov export --format=lcov → per-function hit counts
 *     [S] SERAPH scan cache + CORSO GUARD per-file finding index
 *     [A/D/K] helix knowledge graph entries referencing this file path
 *
 * @api FILE QUALITY (health.rows)
 *   GET /api/code/quality?path={relPath}&ref={ref}
 *   → { rows: [{ label, value, cls }] }
 *   Status: NOT YET IMPLEMENTED — metrics aggregated from coverage report + clippy.
 *   Metrics: LOC, line/branch coverage, max/avg complexity, doc coverage, unsafe, warnings.
 *
 * @api SECURITY FLAGS (hitl.scans at d3)
 *   GET /api/code/security?path={relPath}&ref={ref}
 *   → { scans: [{ domain, sym, msg, status }] }
 *   Status: NOT YET IMPLEMENTED — sourced from SERAPH scan cache + CORSO GUARD findings.
 *   Filtering: scoped to this file path only (not workspace-wide).
 *
 * @api BLAME · AUTHORS (fleet.agents at d3)
 *   POST /api/git/blame  { "path": "{relPath}", "ref": "{ref}" }
 *   → { lines: [{ hash, author_name, author_time, summary, content, orig_line, final_line }] }
 *   Status: IMPLEMENTED — src/server/git_routes.rs::blame_handler
 *   Ownership bar aggregation (client-side): group by author_name → count lines →
 *   percent = lines / total * 100; bar segment width = percent; label truncated at 18 chars.
 *
 * @api FILE HISTORY (git.rows at d3)
 *   POST /api/git/log-file  { "path": "{relPath}", "n": 20 }
 *   → { commits: [{ hash, summary, author_name, author_time, added, removed }] }
 *   Status: IMPLEMENTED — src/server/git_routes.rs::log_file_handler
 *   Row mapping: label = hash.slice(0,7) (HEAD alias for index 0), value = summary,
 *   cls = "acc" for HEAD, "" for older commits. Final "Net Δ" row is client-derived.
 *
 * @api DOMAIN RISK MATRIX (strat.matrix at d3)
 *   Derived client-side from portal.symbols[].domains — no separate API call.
 *   matrix.rows = symbols mapped 1:1; columns = domain keys [A,S,Q,T,P,D,K].
 *   Cell values pass through directly from the symbol domain map (ok/warn/fail/na).
 *
 * @api SMART DISPATCH (wave.smart at d3)
 *   Pre-computed client-side from domain scan findings:
 *   score = count(fail) per domain → top-N actions ordered by priority flag.
 *   Dispatch click: pre-fills command bar with the action command via openCmdBar().
 *   Copilot submit: POST /api/copilot/message  { message: "/VERIFY ...", context: {...} }
 *
 * @api CODE PANEL — DIFF VIEW
 *   POST /api/git/diff-file  { "path": "{relPath}", "base": "{baseRef}", "head": "{headRef}" }
 *   → { hunks: [{ header, old_start, old_count, new_start, new_count, lines:[{type,content,new_lineno,old_lineno}] }],
 *       stats: { added, removed, hunks } }
 *   Status: IMPLEMENTED — src/server/git_routes.rs::diff_file_handler
 *
 * @api CODE PANEL — RAW VIEW
 *   GET /api/code/read?path={relPath}&ref={ref}
 *   → raw file text (plain text response)
 *   Status: IMPLEMENTED — src/server/code_routes.rs (existing)
 *   Symbol jump: pattern = /^(pub(\s*\(crate\))?\s+)?(async\s+fn|fn|struct|enum|trait|impl)\s+{name}[\s(<{]/i
 *
 * @api CODE PANEL — BLAME VIEW
 *   POST /api/git/blame  { "path": "{relPath}", "ref": "{ref}" }
 *   → { lines: [...] }  (same as BLAME · AUTHORS above)
 *   Status: IMPLEMENTED — shared response, different render path (per-line view vs aggregate)
 * ──────────────────────────────────────────────────────────────────────────────
 */

function updateRings(depth) {
  const rings = [
    document.getElementById('ring0'),
    document.getElementById('ring1'),
    document.getElementById('ring2'),
    document.getElementById('ring3'),
  ];
  const colors = ['#4d8eff', '#39ff8a', '#ffad2e', '#ff5c8a'];
  rings.forEach((r, i) => {
    if (i < depth) {
      r.style.opacity = '0.25';
      r.style.filter = 'none';
    } else if (i === depth) {
      r.style.opacity = '1';
      r.style.filter = `drop-shadow(0 0 4px ${colors[i]})`;
    } else {
      r.style.opacity = '0.15';
      r.style.filter = 'none';
    }
  });
}

function updateBreadcrumb(depth) {
  const segs = ['seg0','seg1','seg2','seg3'].map((id,i) => {
    return document.querySelectorAll('.wp-seg')[i];
  });
  const seps = [
    document.getElementById('sep01'),
    document.getElementById('sep12'),
    document.getElementById('sep23'),
  ];
  document.querySelectorAll('.wp-seg').forEach((el, i) => {
    el.classList.toggle('active', i === depth);
    el.style.display = (i <= depth) ? '' : 'none';
  });
  seps.forEach((sep, i) => {
    if (sep) sep.classList.toggle('hidden', i >= depth);
  });
}

// ── Minimap builder ──────────────────────────────────────────────
function buildDiffMinimap(sections) {
  const totalLines = 1432;
  let rows = '';
  // Leading filler (lines before first section)
  const beforeFirst = Math.floor(sections[0][0].n / totalLines * 60);
  for (let i = 0; i < Math.min(beforeFirst, 20); i++) rows += `<div class="cp-mm-row context" style="opacity:.04"></div>`;
  sections.forEach((sec, si) => {
    if (si > 0) rows += `<div class="cp-mm-row fold"></div>`;
    sec.forEach(l => { rows += `<div class="cp-mm-row ${l.t}"></div>`; });
  });
  // Trailing filler
  for (let i = 0; i < 18; i++) rows += `<div class="cp-mm-row context" style="opacity:.04"></div>`;
  return rows;
}

function buildRawMinimap() {
  // Shows entire 1,432-line file compressed — function boundaries, blank lines, code density
  let rows = '';
  const pattern = [8,12,3,6,1,10,15,2,8,4,7,3,9,11,2,6,5,8,3,12,7,4,9,2,6,10,5,8,3,7,4,11,2,9,6,3,8,5,7,4];
  pattern.forEach((density, i) => {
    for (let j = 0; j < density; j++) rows += `<div class="cp-mm-row context" style="opacity:${0.05 + j/density*0.18}"></div>`;
    if (i % 6 === 5) rows += `<div class="cp-mm-row blank"></div>`;
  });
  // Highlight the current scroll region (handle_message area ~85% down)
  return rows;
}

function buildBlameMinimap(sections) {
  const totalLines = 1432;
  let rows = '';
  const beforeFirst = Math.floor(sections[0][0].n / totalLines * 60);
  for (let i = 0; i < Math.min(beforeFirst, 20); i++) {
    rows += `<div class="cp-mm-row" style="background:${BLAME_AUTHORS.corso.color};opacity:.08"></div>`;
  }
  sections.forEach((sec, si) => {
    if (si > 0) rows += `<div class="cp-mm-row fold"></div>`;
    sec.forEach(l => {
      if (l.t === 'removed') return;
      const a = blameFor(l);
      rows += `<div class="cp-mm-row" style="background:${a.color};opacity:0.55"></div>`;
    });
  });
  for (let i = 0; i < 18; i++) rows += `<div class="cp-mm-row" style="background:${BLAME_AUTHORS.corso.color};opacity:.06"></div>`;
  return rows;
}

/* ════════════════════════════════════════════════════════════════════
 * D2 BUILD PROGRESS PANEL — right-side drawer at build (d2) scope
 *
 * Three lenses over a hierarchical selection state:
 *   PROGRESS  — phase→wave→task tree with gate indicators
 *   TRACE     — span-level execution timeline (AYIN backend)
 *   DIFF      — multi-file git diff scoped to selection
 *
 * Selection state is CLIENT-SIDE ONLY; lens switch is CLIENT-SIDE ONLY.
 * All server calls are keyed on: codename (from URL slug) + scope selector.
 *
 * ── @api BUILD MANIFEST + GIT STATE ─────────────────────────────────
 *   Status  : PARTIAL — manifest.yaml parsed by Rust; git fields from
 *             libgit2/shell; no dedicated HTTP endpoint yet
 *   @target   GET /builds/{codename}
 *             (extends la-contracts kind: build.manifest.v1)
 *   @auth     Bearer token (operator scope)
 *   @security CWE-20: codename validated as /^[\w-]+$/ before FS path
 *             CWE-22: safe_cwd() + ancestor-walk on manifest dir
 *   Response  {
 *               codename, tier, status, phase_current, phase_total,
 *               commit_sha, commit_msg, branch, author, timestamp,
 *               xea_score, northstar_pillars: {P1..P7: score|null},
 *               amendments_count, wave_count, task_count,
 *               quality_gate_status: "pass"|"fail"|"pending"
 *             }
 *   Gaps      northstar_pillars scores require Pillar evaluator not yet
 *             wired; xea_score is manually set in manifest today
 *   NEW KIND  ⚠ build.manifest-extended.v1  (extends build.manifest.v1)
 *
 * ── @api BUILD PROGRESS TREE (PROGRESS lens) ─────────────────────────
 *   Status  : PARTIAL — SSE stream exists; snapshot format proposed
 *   @target   GET /builds/{codename}/progress
 *             ?format=snapshot  → returns full JSON tree (proposed addition)
 *             (without ?format=snapshot → SSE stream, already IMPLEMENTED)
 *   @auth     Bearer token (operator scope)
 *   @security CWE-20: codename slug allowlist /^[\w-]+$/
 *   Response  {
 *               phases: [{
 *                 id, label, status, gate_pass: bool,
 *                 waves: [{
 *                   id, label, status, agent_kind, commit_sha,
 *                   tasks: [{
 *                     id, label, status, file_count, duration_ms,
 *                     amendments: [{label, reason, applied_at}]
 *                   }]
 *                 }]
 *               }]
 *             }
 *   Mock src  (a) manifest.yaml phase/wave count
 *             (b) AgentRunner wave_dispatcher.rs slot state
 *             (c) local git commit SHA per wave
 *             (d) AYIN /api/fleet agent focus (live task highlight)
 *   NEW KIND  ⚠ build.progress.v1  (formalize from mock structure)
 *
 * ── @api FOCUS BLOCK (selection interaction) ──────────────────────────
 *   Status  : CLIENT-SIDE ONLY (selection drives lens scope, not a call)
 *   Behavior  Clicking phase/wave/task row sets bpFocus = {phase,wave,task}
 *             PROGRESS lens: highlights row, collapses siblings
 *             TRACE lens:    filters spans to bpFocus scope
 *             DIFF lens:     scopes diff to bpFocus commit range
 *   Drill     Double-click on task → CLIENT-SIDE → calls IMPLEMENTED:
 *               GET /api/code/read?path={task.primary_file}&cwd={cwd}
 *             opens d3 file view in place of BUILD PROGRESS panel
 *   @security CWE-22: path validated through safe_cwd() before dispatch
 *
 * ── @api BUILD PROGRESS TREE — GATE PREDICATE ROWS ──────────────────
 *   Status  : PARTIAL — gate labels shown; predicate source not yet live
 *   @target   GET /builds/{codename}/gates
 *             (la-contracts kind: build.gates.v1 — PARTIAL)
 *   Response  [{gate_id, gate_label, predicate_cmd, status, sibling,
 *               blocking: bool, passed_at: timestamp|null}]
 *   Display   Gate rows under each phase; BLOCKING failures shown in red
 *             Non-blocking shown in amber; all-pass collapses to green pill
 *
 * ── @api EXECUTION TRACE (TRACE lens) ────────────────────────────────
 *   Status  : NOT YET IMPLEMENTED — AYIN spans not yet proxied through
 *             webshell gateway
 *   @target   GET /api/ayin/spans
 *             ?build_codename={codename}
 *             &scope={phase_id|wave_id|task_id}  ← from bpFocus
 *             &format=build_trace
 *   @auth     Bearer token (operator scope)
 *   @security AYIN is localhost-only (:3742); gateway must proxy with token
 *             validation; never expose raw AYIN port to browser
 *             CWE-20: scope param validated as /^[\w-]+$/ before AYIN call
 *   Response  {
 *               spans: [{
 *                 span_id, parent_id, sibling, action,
 *                 started_at, duration_ms, status,
 *                 attrs: {file?, line?, token_count?, model?}
 *               }]
 *             }
 *   Display   Timeline rows; indent = parent_id depth; color = sibling
 *             Hover shows attrs tooltip
 *   NEW KIND  ⚠ build.trace.v1
 *
 * ── @api TRACE ROW DRILL ─────────────────────────────────────────────
 *   Status  : CLIENT-SIDE → IMPLEMENTED (for file-attr spans)
 *   Behavior  Clicking span row with attrs.file set → calls IMPLEMENTED:
 *               GET /api/code/read?path={attrs.file}&cwd={cwd}&line={attrs.line}
 *             Spans without attrs.file show expand-only (no drill)
 *   @security CWE-22: attrs.file is a server-originated path; still passes
 *             through safe_cwd() before client dispatches read call
 *             (server path from AYIN may be absolute; ancestor-walk required)
 *
 * ── @api MULTI-FILE DIFF (DIFF lens) ─────────────────────────────────
 *   Status  : NOT YET IMPLEMENTED
 *   @target   GET /builds/{codename}/diff
 *             ?scope={phase_id|wave_id|"full"}  ← from bpFocus
 *             &context=5                         ← unified diff context lines
 *   @auth     Bearer token (operator scope)
 *   @security CWE-88: scope validated as /^[\w-]+$/ or literal "full";
 *             codename validated as slug before git invocation
 *             CWE-20: context param clamped server-side to 1–20
 *             XSS: diff output HTML-escaped before injection into DOM
 *   Response  {
 *               from_sha, to_sha,
 *               files: [{
 *                 path, additions, deletions,
 *                 hunks: [{header, lines: [{type:"+"|"-"|" ", text}]}]
 *               }]
 *             }
 *   Display   File accordion; hunk expansion; line count badges
 *   NEW KIND  ⚠ build.diff.v1
 *
 * ── @api COMMAND BAR GRAMMAR (BUILD PROGRESS panel) ──────────────────
 *   Status  : CLIENT-SIDE ONLY — all filtering is local against loaded tree
 *   Grammar   :phase <n>    → expand/focus phase N in PROGRESS lens
 *              :wave  <id>   → expand/focus wave by id
 *              :task  <id>   → expand/focus task by id
 *              /regex        → highlight matching node labels
 *              |yq <expr>    → filter TRACE spans by jq/yq expression
 *                              (CLIENT-SIDE eval against loaded span JSON)
 *              ?file <path>  → scope DIFF lens to specific file path
 *              ?sha  <ref>   → pin DIFF lens to specific commit ref
 *                              (calls IMPLEMENTED GET /api/git/diff-file)
 *   @security All filter expressions evaluated CLIENT-SIDE against already-
 *             loaded JSON; no server-side eval; |yq uses jq-web (WASM)
 *
 * ── MOCK DATA FIELD SOURCES ──────────────────────────────────────────
 *   Field                     Source
 *   ─────────────────────────────────────────────────────────────────
 *   build.codename            URL slug / manifest.yaml
 *   build.commit_sha          git rev-parse HEAD (libgit2)
 *   build.branch              git symbolic-ref HEAD (libgit2)
 *   build.xea_score           manifest.yaml (manually set today)
 *   build.northstar_pillars   manifest.yaml (partially set)
 *   phase[].status            wave_dispatcher.rs phase tracker
 *   wave[].commit_sha         git log --format=%H (per-wave commit)
 *   wave[].agent_kind         manifest.yaml wave spec
 *   task[].status             AgentRunner slot state (AYIN /api/fleet)
 *   task[].duration_ms        AYIN span sum for task scope
 *   spans[].sibling           AYIN GatewaySpanContext.sibling field
 *   spans[].attrs.token_count AYIN copilot-ayin-instrumentation spans
 *
 * ── NEW la-contracts KINDS (BUILD PROGRESS panel) ────────────────────
 *   ⚠ build.manifest-extended.v1  — extended manifest with Northstar scores
 *   ⚠ build.progress.v1          — full phase→wave→task snapshot
 *   ⚠ build.trace.v1             — AYIN span stream shaped for build UI
 *   ⚠ build.diff.v1              — multi-file scoped diff for build range
 * ════════════════════════════════════════════════════════════════════ */
