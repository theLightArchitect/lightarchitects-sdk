# PROPOSAL — manifest.yaml extensions required by the build progress contract
# Companion to: arch/cockpit-d2-build-progress.contract.proposal.yaml
#
# Current state (verified 2026-06-05 against agentic-loops-foundation/manifest.yaml):
#
#   FIELDS THAT EXIST              FIELDS NEEDED BY THE CONTRACT
#   ───────────────────────        ──────────────────────────────
#   codename                  ✓
#   tier                      ✓
#   plan_iteration            ✓
#   status (PROMOTED|MERGED)  ✓ but enum mismatch — see issue M-1 below
#   merged_sha                ✓ (build-level only)
#   merge_commit              ✓
#   review_log                ✓ (planning artifact, not execution trace)
#   canon_amendments          ✓ but distinct from build amendments — see M-2
#   build_topology            ✓ (worktree + branch, partial)
#   phases (integer count)    ✗ need: phases (array of phase objects)
#   phases[].waves[]          ✗ MISSING
#   phases[].waves[].commits[] ✗ MISSING
#   phases[].waves[].tasks[]   ✗ MISSING
#   phases[].amendments[]      ✗ MISSING (build amendments distinct from canon)
#   started_at                 ✗ MISSING
#
# This file shows the proposed v2 manifest shape merged onto an existing
# example (webshell-copilot-providers). Comments mark NEW vs EXISTING.

---
# ──────────────────────────────────────────────────────────────────────
# EXISTING TOP-LEVEL FIELDS — no change
# ──────────────────────────────────────────────────────────────────────
project_id: lightarchitects-sdk
codename: webshell-copilot-providers
plan_file: ~/.claude/plans/webshell-copilot-providers.md
canonical_plan_file: $HELIX/corso/builds/webshell-copilot-providers/plan.md
tier: MEDIUM
plan_iteration: 3
plan_validation_status: VALIDATED
plan_validation_band: STRONG
pillar_mapping: "P1"
northstar_anchor: |
  P1 — multi-provider webshell copilot bridges Claude/Gemini/GhCopilot under one PTY.
stack_classification: full-stack
lasdlc_template_version: "2.8.2"
execution_mode: interactive
created: 2026-06-05
updated: 2026-06-05

# ──────────────────────────────────────────────────────────────────────
# EXISTING: build_topology — keep, but normalize against contract.git
# ──────────────────────────────────────────────────────────────────────
build_topology:
  worktree_target: ~/lightarchitects/worktrees/webshell-copilot-providers
  branch_target: webshell-copilot-providers
  primary_stays_on_main: true

# ──────────────────────────────────────────────────────────────────────
# NEW: started_at — top-level wall-clock for elapsed calc
# Source: /BUILD pipeline first run, written on worktree creation
# ──────────────────────────────────────────────────────────────────────
started_at: 2026-06-05T11:23:00Z

# ──────────────────────────────────────────────────────────────────────
# NEW: status — UNIFIED enum (issue M-1)
#
# CURRENT problem: status is sometimes single value, sometimes pipe-separated:
#   status: PROMOTED | MERGED
# Contract requires: pending | active | complete | failed
#
# Migration: split into two fields:
#   - plan_status:  draft | promoted | abandoned   (planning lifecycle)
#   - build_status: pending | active | complete | failed   (execution lifecycle)
# Drop the pipe-separated form.
# ──────────────────────────────────────────────────────────────────────
plan_status: promoted
build_status: active

# ──────────────────────────────────────────────────────────────────────
# NEW: phases — replaces the integer `phases: N` count.
#
# Each phase entry mirrors response_schemas['200'].phases[] in the contract,
# but uses snake_case at rest and gets surface-translated by the handler.
# ──────────────────────────────────────────────────────────────────────
phases:
  - id: p1
    name: 'Phase 1 · Discovery'
    status: complete
    timing:
      est_ms: 900000        # 15m
      actual_ms: 840000     # 14m
      drift_ms: -60000      # -1m, computed but may be cached
    gates:
      A: pass
      S: pass
      Q: pass
      T: pass
      O: pass
    amendments: []          # empty array preferred over omitted field
    waves:
      - id: w1.1
        name: 'wave-1 · scope + threat model'
        status: complete
        timing:
          started_at: 2026-06-05T11:23:00Z
          est_ms: 600000
          elapsed_ms: 540000

        # NEW: explicit wave→commit mapping
        # Source: written by /BUILD wave-dispatcher on commit completion.
        # Contract: shas[i] is full 40-char; short[i] is computed by handler.
        commits:
          - sha: 7a3f9c200001020304050607080900010203040a
            msg: 'docs: threat model + LASDLC plan'
            authored_at: 2026-06-05T11:25:00Z
            files_count: 1
            net_diff: {added: 247, removed: 0}

        # NEW: explicit wave→task mapping
        # Source: written by /BUILD wave-dispatcher from plan's per-wave task list.
        tasks:
          - id: t1.1.1
            name: 'Surface inventory'
            status: complete
            commit: 7a3f9c200001020304050607080900010203040a
            files: ['plan.md']
            diff: {added: 247, removed: 0}
            domain: K     # Knowledge — discovery output

          - id: t1.1.2
            name: 'Threat model T1-T7'
            status: complete
            commit: 7a3f9c200001020304050607080900010203040a
            files: ['plan.md']
            diff: {added: 89, removed: 0}
            domain: S

  - id: p3
    name: 'Phase 3 · Crit-path · Fixes 1-5'
    status: active
    timing:
      est_ms: 1800000
      actual_ms: 2820000
      drift_ms: 1020000     # +17m
    gates:
      A: pass
      S: pass
      Q: pass
      T: run
      O: pend

    # ──────────────────────────────────────────────────────────────
    # NEW: amendments — wave-scoped plan pivots (distinct from canon_amendments)
    #
    # Use case: during impl, a wave discovers something that changes scope.
    # Today this is captured as free-text in plan.md. The contract surfaces
    # it on the cockpit as a visible amendment banner under the phase row.
    #
    # ──────────────────────────────────────────────────────────────
    amendments:
      - wave: w3.1
        when: 2026-06-05T14:09:00Z
        desc: 'env-inherit leak via shell profile — OPENAI / MISTRAL / GITHUB tokens reachable inside subprocess'
        impact: 'pivot from allowlist → env_remove × 5 across all providers · fail-closed'
        authorized_by: kft

    waves:
      - id: w3.1
        name: 'wave-2 · IMPL · Fixes 2-5'
        status: complete
        timing:
          started_at: 2026-06-05T14:00:00Z
          elapsed_ms: 600000
        commits:
          - sha: 8b6f87000001020304050607080900010203040b
            msg: 'fix: done:true SSE + camelCase fallback'
            authored_at: 2026-06-05T14:01:00Z
            files_count: 2
            net_diff: {added: 89, removed: 34}
          - sha: a4f3e2100001020304050607080900010203040c
            msg: 'fix: --model injection + env_remove × 5'
            authored_at: 2026-06-05T14:09:00Z
            files_count: 2
            net_diff: {added: 91, removed: 17}
        tasks:
          - id: t3.1.3
            name: 'Fix 4: --model flag injection-safe'
            status: complete
            commit: a4f3e2100001020304050607080900010203040c
            files: ['src/copilot/mod.rs']
            diff: {added: 28, removed: 6}
            domain: S
            cwe: CWE-78
          - id: t3.1.4
            name: 'Fix 5: credential env_remove × 5'
            status: complete
            commit: a4f3e2100001020304050607080900010203040c
            files: ['src/copilot/mod.rs', 'src/config.rs']
            diff: {added: 63, removed: 11}
            domain: S
            cwe: CWE-209

      - id: w3.2
        name: 'wave-2 · TEST · cover error branches'
        status: active
        timing:
          started_at: 2026-06-05T14:11:00Z
          est_ms: 1200000
          elapsed_ms: 720000
        commits: []           # empty array, no commits yet
        tasks:
          - id: t3.2.1
            name: 'Cover handle_message error branches'
            status: active
            files: ['src/copilot/mod.rs']
