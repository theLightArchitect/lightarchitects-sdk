            name: 'Cover run_gemini_turn error paths'
            status: pending
            blocked_on: t3.2.1
            domain: T

# ──────────────────────────────────────────────────────────────────────
# EXISTING: canon_amendments — keep as-is, DO NOT conflate with phases[].amendments[]
#
# Distinction:
#   - canon_amendments      = LÆX/Canon proposals surfaced during /SCRUM
#   - phases[].amendments[] = scope pivots discovered during execution
#
# Issue M-2: today plan amendments are buried in plan.md free-text
# (`operator_override_note: |` blocks). Contract requires structured
# wave-scoped records. Migration: extract from plan.md prose on next
# `/SYNC --roadmap <codename>` invocation.
# ──────────────────────────────────────────────────────────────────────
canon_amendments:
  queued: []

# ──────────────────────────────────────────────────────────────────────
# EXISTING: review_log — keep, no change
# (covers plan-iteration history; orthogonal to execution progress)
# ──────────────────────────────────────────────────────────────────────
review_log: []

# ══════════════════════════════════════════════════════════════════════
# OPEN ISSUES (require operator decision before ratification)
# ══════════════════════════════════════════════════════════════════════
#
# M-1: status field unification
#   Current pipe-separated form (`PROMOTED | MERGED`) is ambiguous —
#   is it AND, OR, history? Proposed split: plan_status + build_status.
#   ACTION: bump LASDLC template to v2.9.0 to enforce the split form.
#
# M-2: amendment migration
#   Existing builds have amendment prose in plan.md `operator_override_note:` blocks.
#   /SYNC sweep needs an LLM pass to extract structured (wave, when, desc, impact).
#   ACTION: write /SYNC --extract-amendments subcommand in lightarchitects-cli.
#
# M-3: commit SHA writeback
#   Today, commits are produced by waves but the wave→sha link is implicit
#   (commit message naming convention). The contract requires explicit storage.
#   ACTION: /BUILD wave-dispatcher must write `phases[i].waves[j].commits[]`
#   after each commit it produces. Hook point:
#     lightarchitects/src/lightsquad/wave_dispatcher.rs::on_commit_produced
#
# M-4: task ID generation
#   Plan markdown today has tasks as bullet items without explicit IDs.
#   The contract requires `task.id`. Migration:
#   (a) /BUILD assigns IDs t<phase>.<wave>.<n> on plan promotion
#   (b) Plan markdown gains optional `<!-- id: t3.2.1 -->` HTML comments
#   ACTION: /PLAN finalize step writes IDs back to plan.md.
#
# M-5: backward compat
#   Existing manifests (~50 across active.yaml) lack the new fields.
#   The gateway handler must gracefully fall back when phases[] is absent:
#     - Return phases: [{ id: 'p?', name: 'Unstructured', ... }] with a
#       single phase containing the merged_sha as a single commit.
#     - Set status='complete' if merged_sha present, else 'unknown'.
#   ACTION: implement degraded-mode path in builds.rs handler.
