name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a release in progress

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────
  # Build binaries (Linux x86_64 + macOS ARM64)
  # macOS only runs on tagged releases to stay in free tier
  # ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: lightarchitects
            artifact: lightarchitects-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: lightarchitects
            artifact: lightarchitects-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Linux: install system deps for native builds
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libssl-dev pkg-config

      # Build frontend first (embedded via rust-embed)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: lightarchitects-webshell-ui/pnpm-lock.yaml
      - name: Build frontend
        run: cd lightarchitects-webshell-ui && pnpm install --frozen-lockfile && pnpm build

      # Build Rust binaries
      - name: Build gateway
        run: cargo build --release -p lightarchitects-gateway
      - name: Build webshell
        run: cargo build --release -p lightarchitects-webshell

      # Package
      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.binary }} dist/
          cp target/release/lightarchitects-webshell dist/ 2>/dev/null || true
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ──────────────────────────────────────────────
  # Create GitHub Release with binaries
  # ──────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --generate-notes \
            artifacts/**/*.tar.gz
