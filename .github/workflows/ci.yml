name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  quality:
    name: Quality Gates
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test-macos:
    name: Tests (macOS)
    runs-on: macos-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features
      - run: cargo test --workspace --doc

  test-linux:
    name: Tests (Linux, no-default-features)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --no-default-features

  test-features:
    name: Feature-combination tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Feature none (core only)
        run: cargo test --workspace --no-default-features
      - name: Feature soul
        run: cargo test --no-default-features --features soul -p lightarchitects
      - name: Feature corso
        run: cargo test --no-default-features --features corso -p lightarchitects
      - name: Feature eva
        run: cargo test --no-default-features --features eva -p lightarchitects
      - name: Feature quantum
        run: cargo test --no-default-features --features quantum -p lightarchitects
      - name: Feature seraph
        run: cargo test --no-default-features --features seraph -p lightarchitects
      - name: Feature ayin
        run: cargo test --no-default-features --features ayin -p lightarchitects
      - name: Feature ayin-http
        run: cargo test --no-default-features --features ayin-http -p lightarchitects
      - name: Feature full
        run: cargo test --features full -p lightarchitects
      - name: Feature all
        run: cargo test --workspace --all-features
      - name: Security gate — no reqwest without ayin-http
        run: |
          result=$(cargo tree --no-default-features -p lightarchitects 2>/dev/null | grep reqwest || true)
          if [ -n "$result" ]; then
            echo "FAIL: reqwest present without any feature enabled"
            echo "$result"
            exit 1
          fi
      - name: Security gate — reqwest present with ayin-http
        run: |
          result=$(cargo tree --features ayin-http -p lightarchitects 2>/dev/null | grep reqwest || true)
          if [ -z "$result" ]; then
            echo "FAIL: reqwest absent even with ayin-http feature enabled"
            exit 1
          fi

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  semver:
    name: Semver Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          feature-group: all-features

  msrv:
    name: MSRV (1.87)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.87.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features
