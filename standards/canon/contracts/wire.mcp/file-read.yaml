alpha_gate:
  verdict: pass
  reason: Action dispatcher contract matches lightarchitects-gateway/src/core_tools/read.rs::run
    handler; ancestor-walk canonicalization + size guard verified at SECURITY layer.
wire_mcp:
  action: read
  params_schema:
    type: object
    required:
    - path
    properties:
      path:
        type: string
        minLength: 1
      offset:
        type: integer
        minimum: 1
        default: 1
      limit:
        type: integer
        minimum: 1
        maximum: 100000
        default: 2000
    additionalProperties: false
  result_schema:
    type: object
    required:
    - content
    properties:
      content:
        type: string
      lines_returned:
        type: integer
        minimum: 0
      total_lines:
        type: integer
        minimum: 0
      truncated:
        type: boolean
    additionalProperties: false
  abort_semantics: abortable
  operator_wins: true
  sibling_routing: none
  hosted_by_mcp_capability_contract_id: mcp.capability.gateway-server
