schema_version: la-contracts/v1
id: code.trait.runner
kind: code.trait
version: 0.1.0
status: draft

northstar_pillars: [P1, P2, P3, P4]

operator_intent: |
  Runner is the platform's per-agent dispatch trait — the seam that replaces hardcoded
  'claude --print -p' subprocess invocation in the dispatch executor with a provider-pluggable
  implementation. Each domain agent (engineer, security, ops, etc.) runs via a Runner impl
  configured against the operator's selected provider. Provider switching from
  operator.surface.provider-select propagates here; once a Runner trait impl is in place, both
  dispatch-execute-wave and provider-select alpha gates can flip from FAIL/DEFERRED to
  conditionally PASS.

prior_art:
  - name: lightarchitects::agent::LlmAgentProvider
    url: file://lightarchitects/src/agent/provider.rs
    what_we_adopt: Send + Sync bounds, SanitizedAgentRequest precondition, BoxStream return shape
    what_we_extend: Per-agent context bundle (agent role, file ownership, parent build context), per-agent artifact path injection, parallel-wave-aware lifecycle hooks
  - name: Claude Code Task tool — agent dispatch
    url: https://docs.anthropic.com/en/api/agent-sdk-overview
    what_we_adopt: Structured per-agent invocation surface; agent role discriminator
    what_we_extend: Provider-agnostic — Task tool is Claude-specific; Runner abstracts over any provider

inherits_from:
  - code.trait.llm-agent-provider

canon_refs:
  - canon://platform-canon
  - canon://builders-cookbook
  - canon://agents-playbook
  - canon://security-guardrails

memory_refs:
  - feedback_alpha_provider_agnostic_contract_gate.md
  - feedback_webshell_copilot_provider_coupling.md
  - feedback_streaming_tx_forwarding.md

inputs:
  - name: spec
    type: object
    description: 'AgentSpec — agent role, file ownership, parent build context, task description'
    required: true

observable_outputs:
  - 'run() returns Result<AgentArtifact, RunnerError> with artifact_path pointing inside $PROJECT_ROOT/.tmp/dispatch-<id>/'
  - 'stream() returns BoxStream<AgentEvent>; first event AgentStart; final event AgentComplete or AgentFailed'
  - 'capabilities() returns RunnerCapabilities declaring supported_agents, max_parallel, supports_tool_use'
  - 'AYIN dispatch.agent span emitted per run/stream invocation with agent_name, agent_role, provider, duration_ms, tokens'

errors:
  - condition: 'underlying LLM provider rejected the agent dispatch'
    code: E_RUNNER_PROVIDER_FAILED
    operator_sees: 'Agent {role} failed via provider {name}: {detail}'
    forbidden: 'silently completing with empty artifact'
    severity: HIGH
  - condition: 'artifact path outside allowed sandbox'
    code: E_RUNNER_SANDBOX_VIOLATION
    operator_sees: 'Runner attempted to write outside .tmp/dispatch-<id>/ — refused'
    forbidden: 'allowing writes anywhere on disk without explicit operator approval'
    severity: BLOCKING
    owasp_class: LLM05
  - condition: 'file-ownership conflict detected mid-dispatch (two agents claim the same file)'
    code: E_RUNNER_FILE_OWNERSHIP_CONFLICT
    operator_sees: 'Agents {a} and {b} both claim {path} — serialize via plan or partition file_function_map'
    forbidden: 'allowing both agents to write the same file (race condition)'
    severity: HIGH
  - condition: 'SanitizedAgentRequest sanitization failed before dispatch'
    code: E_RUNNER_SANITIZATION_FAILED
    operator_sees: 'Dispatch rejected pre-spawn (G1 sanitization failed)'
    forbidden: 'bypassing G1 sanitization for agent prompts'
    severity: BLOCKING
    owasp_class: LLM01

observability:
  required_spans:
    - name: dispatch.agent
      required_metadata: [agent_name, agent_role, duration_ms, tokens_input, tokens_output, stop_reason, model, provider, artifact_path]
      parent_relationship: child_of_named
      parent_span_name: dispatch.wave
  duration_budget_ms: 600000
  trace_context_propagation: true

hitl_boundaries:
  - 'Filesystem writes outside .tmp/dispatch-<id>/ require HITL via /api/dispatch/{id}/fs-approve (per dispatch-execute-wave.hitl_boundaries)'

forbidden_behaviors:
  - 'Hardcoding any specific provider binary path (claude, ollama, etc.) as the only execution surface'
  - 'Reading $ANTHROPIC_API_KEY or any credential directly — credentials flow through provider abstraction'
  - 'Returning AgentArtifact with artifact_path == None when stop_reason != early_termination (must always write the buffer)'
  - 'Using unwrap()/expect()/panic!() in any impl (Cookbook §4.1)'
  - 'Spawning subprocesses without setting TRACEPARENT for AYIN lineage'

conformance_test:
  given: 'A concrete Runner impl (e.g. ClaudeCliRunner::default()) + an AgentSpec for the engineer role'
  when: 'run(spec) is called with task "Read CLAUDE.md and report the MSRV"'
  then:
    - assertion: 'Returns Ok(AgentArtifact) with artifact_path inside $PROJECT_ROOT/.tmp/dispatch-<id>/'
      evidence_tier_required: VERIFIED
    - assertion: 'File at artifact_path contains the MSRV string from CLAUDE.md'
      filesystem_witness: $PROJECT_ROOT/.tmp/dispatch-<id>/agent-engineer.md
      evidence_tier_required: VERIFIED
    - assertion: 'AYIN dispatch.agent span emitted with agent_role=engineer + non-zero duration_ms'
      span_witness: dispatch.agent
      evidence_tier_required: VERIFIED
    - assertion: 'stream() variant emits AgentStart before any AgentDelta'
      evidence_tier_required: VERIFIED
  timeout_seconds: 120

