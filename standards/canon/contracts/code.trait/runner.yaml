alpha_gate:
  verdict: pass
  reason: 'Runner trait implemented in lightarchitects::lightsquad::runner with 4 concrete impls (ClaudeCliRunner, AnthropicHttpRunner, OllamaRunner, OpenAICompatRunner) + select_runner(). Conformance tests pass: test_copilot_send_message_proof_round_trip, test_dispatch_wave_artifacts_persist, test_provider_switch_routes_to_new_provider. Evidence: build:webshell-contract-impl phase-3+4 + tests/contract_conformance.rs.'
  blocker_contract_ids: []

code_trait:
  trait_path: 'lightarchitects::lightsquad::Runner'
  send_sync_required: true
  panic_free: true
  object_safe: true
  method_contracts:
    - name: name
      async: false
      streaming: false
      preconditions:
        - 'None — pure query method'
      postconditions:
        - 'Returns a static str identifying the runner kind (e.g., ''claude_cli'', ''anthropic_http'')'
      error_variants: []
    - name: capabilities
      async: false
      streaming: false
      preconditions:
        - 'None — pure query method'
      postconditions:
        - 'Returns RunnerCapabilities with supported_agents, max_parallel, supports_tool_use, supports_streaming'
      error_variants: []
    - name: run
      async: true
      streaming: false
      preconditions:
        - 'spec.task is non-empty and G1-sanitized'
        - 'spec.artifact_dir is inside $PROJECT_ROOT/.tmp/dispatch-<id>/'
        - 'TRACEPARENT propagated from spec.parent_span_id'
      postconditions:
        - 'Ok(AgentArtifact) with artifact_path written to disk'
        - 'AYIN dispatch.agent span emitted with full metadata'
        - 'AgentArtifact.tokens populated (may be 0 if provider does not count)'
      error_variants:
        - E_RUNNER_PROVIDER_FAILED
        - E_RUNNER_SANDBOX_VIOLATION
        - E_RUNNER_FILE_OWNERSHIP_CONFLICT
        - E_RUNNER_SANITIZATION_FAILED
    - name: stream
      async: true
      streaming: true
      preconditions:
        - 'Same as run — G1 sanitization required'
        - 'First yielded event MUST be AgentEvent::AgentStart'
      postconditions:
        - 'Returns BoxStream<''static, AgentEvent>'
        - 'AgentStart → AgentDelta* → AgentComplete (or AgentFailed) event ordering'
        - 'AYIN dispatch.agent span emitted with streaming=true attribute'
        - 'On AgentComplete, artifact_path is written before the event fires'
      error_variants:
        - E_RUNNER_PROVIDER_FAILED
        - E_RUNNER_SANDBOX_VIOLATION
        - E_RUNNER_FILE_OWNERSHIP_CONFLICT
        - E_RUNNER_SANITIZATION_FAILED
    - name: estimate_cost
      async: false
      streaming: false
      preconditions:
        - 'spec.input_tokens_estimate > 0'
        - 'spec.max_output_tokens > 0'
      postconditions:
        - 'Returns f64 ≥ 0.0 representing estimated USD cost for the agent run'
        - 'Returns 0.0 for free-tier runners (e.g., ClaudeCliRunner uses subscription)'
      error_variants: []
