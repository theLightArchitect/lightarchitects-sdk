# ============================================================================
# LASDLC Build Plan Template v1.0
# Light Architects Software Development Lifecycle
# ============================================================================
#
# Executable build plan template for multi-agent software development.
# Implements LASDLC v1.0 specification (helix/user/standards/canon/lasdlc-spec.md).
#
# ── HOW TO USE THIS TEMPLATE ────────────────────────────────────────────────
#
# 1. Select a TIER based on scope: SMALL, MEDIUM, or LARGE
# 2. Copy the phase set for your tier (Section 2)
# 3. Fill in file+function maps per phase (Section 3)
# 4. Assign agents with file ownership (Section 4)
# 5. Quality gates are automatic — [A+S+Q+C+O+P+K+D+T+R] checked at every boundary
# 6. Pre-flight runs once before Phase 1 (Section 5)
# 7. Close-out runs once after the final phase (Section 6)
#
# ── AGENT INSTRUCTIONS ──────────────────────────────────────────────────────
#
# If you are an AI agent reading this template:
#   - `blocking: true` → cannot proceed until this passes
#   - `skill: "/X"` → invoke this skill if available, else use `fallback`
#   - File-ownership is absolute: only edit files you own (Canon XXIII)
#   - Token budget is a hard limit — compact or escalate, never exceed
#   - Manual (HITL) criteria require human approval — you cannot self-approve
#
# ── TERMINOLOGY ─────────────────────────────────────────────────────────────
#
# LASDLC     = Light Architects Software Development Lifecycle
# Phase      = Sequential execution step (Plan, Research, Implement, etc.)
# Gate       = Quality checkpoint between phases (7 dimensions, parallel)
# Dimension  = Quality lens: Architecture, Security, Quality, Performance,
#              Testing, Documentation, Operations
# Tier       = Build complexity: SMALL (4 phases), MEDIUM (6), LARGE (7)
# Agent      = AI coding agent with file ownership + context budget
# Sibling    = SQUAD member: CORSO, EVA, SOUL, QUANTUM, SERAPH, AYIN
# Helix      = SOUL knowledge graph (cross-build memory)
# Arena      = Training data factory (captures execution traces)
# Canon      = Ratified engineering standard (Builders Cookbook)
# HITL       = Human-in-the-loop (requires user decision)
#
# ── MINIMUM REQUIREMENTS ────────────────────────────────────────────────────
#
# Agent: file read/write/edit, shell execution, context >= 128K tokens
# Recommended: Claude Code, Codex CLI, or any MCP-capable agent
# Fallback: cargo fmt/clippy/test for quality gates
#
# ============================================================================

template_name: "LASDLC-TEMPLATE-v1"
template_version: "2.5.3"
# v2.5.3 (2026-05-18): Git Branching Invariants. Plan-level `git_branching_invariants`
# block + per-task `git_scope`. Closes worker-git-awareness gap. Composes with
# Cookbook §64.8 + agents-playbook §15.3.13 + /BUILD v2 Step 11.3.0-11.3.5 (28 gates).
# LÆX candidate #19. See tail-amendment for full schema.
#
# v2.5.2 (2026-05-17): Added optional `architecture_artifacts` block per Canon XLI
# (Diagram-First Doctrine, ratified 2026-05-17 via Canon XXXIX pipeline).
# Backward-compatible: block is `optional` for plans authored under v2.5.1 or earlier;
# `required_if: lasdlc_template_version >= "2.5.2"` enforces presence on new plans only.
# See architecture_artifacts schema below this header.

architecture_artifacts:
  required_if: 'lasdlc_template_version >= "2.5.2"'
  optional_for: 'lasdlc_template_version <= "2.5.1"'
  description: |
    Per Canon XLI, every plan declares tier-appropriate architecture diagrams as
    Phase 1 design artifacts. Required depth scales with tier per Blueprint Part III.
    See Blueprint Part XXIV for compliance-checklist variant matrix.
  schema:
    diagrams:
      tier_SMALL: ["C3_component"]
      tier_MEDIUM: ["C2_container", "C3_component"]
      tier_LARGE: ["C1_context", "C2_container", "C3_component", "C4_code", "ERD_if_persisted_data", "sequence_for_async_flows"]
      tier_PROGRAM: ["all_LARGE_aggregated_at_program_level", "per_build_subset_at_build_level"]
    artifact_format: "Mermaid embedded in plan body OR Likec4 DSL referenced by path"
    source_anchor_discipline: "Each non-trivial relation carries source_anchor: {file, lines} OR source_anchor: architect_assertion. Architect-assertion <=20% per diagram per Canon XLI."
    compliance_checklist: "Per Blueprint Part XXIV - choose variant V1/V2/V3/V4 matching artifact type; verify commands restricted to cmd_exec allowlist per Cookbook §63.P2."
    xea_stamp: "Field xea_verified: YYYY-MM-DD; TTL by tier per Blueprint §24.4."
  operator_override:
    diagram_waiver:
      allowed_tiers: ["SMALL"]
      schema:
        rationale: "single-paragraph justification"
        expires_at: "next [A] gate of this build OR next operator review (whichever first)"
      auto_flags: "LÆX retrospective review queue"
      not_allowed_for: ["MEDIUM", "LARGE", "PROGRAM"]
      override_path_for_higher_tiers: "Canon XV explicit operator authority invocation logged per Canon XXXIX §6.2"

framework: "LASDLC"
framework_version: "1.0.0"
created: "2026-04-26"
spec_reference: "helix/user/standards/canon/lasdlc-spec.md"
companion_doctrine: "helix/user/standards/canon/architects-blueprint.md"   # v3.0+ — procedural discipline + C1-C8 rubric (Part XIV); this template provides the structural schema, the blueprint provides the planning doctrine. Both MUST be cross-referenced per Blueprint Part I.
supersedes: "build-plan-template-v2.yaml"
canons: ["XXIII (file partitioning)", "XXVI (post-edit gates)", "XXVII (6 test suites)", "XXVIII (boundary sanitization)", "XXIX (complete test pyramid)"]

# v2.4.1 — Self-attestation per LDB D6j + rubric C7 polish (closes both N=1 findings)
northstar_lineage:
  description: "LASDLC template's own Northstar (sig 9.0, ratified 2026-05-04). Closes LDB N=1 D6j (compliance framework declaration) + rubric C7 (Northstar Alignment) polish targets."
  added_in_template_version: "2.4.1"
  northstar_helix_entry: "helix://shared/entries/2026-05-04-lasdlc-template-northstar.md"
  northstar_significance: 9.0
  ratified_by: kevin
  ratification_date: "2026-05-04"
  primary_icp: "solo developers + small agentic teams shipping production engineering work end-to-end"
  shipped_means_5_conditions:
    - "Northstar fit verified at every phase (mechanical predicate per §0.5)"
    - "All [A+S+Q+C+O+P+K+D+T+R] gates passed at every phase boundary (per §8)"
    - "Effectiveness rubric aggregate ≥75 (STRONG band)"
    - "LDB v1.0 aggregate band ≥STRONG (canonical reading per cookbook §60.10)"
    - "Independent verification per Canon XXXIII completed"
  measurable_assertion: "First N≥3 builds using v2.4.0+ achieve all 5 shipped conditions; if 2+ miss threshold → drift surfaced via §9.5 canon_drift; LÆX Layer 1+4 course correction"
  optimization_target: "user value delivered (operator semantic-match, post-deploy operator rating); NOT proof-of-work signal or framework-capability demonstration"
  risk_classification:
    ai_risk_tier: none                          # meta-template; no autonomous decision authority
    data_categories_touched: []                 # template configures handling for OTHER builds; not data itself
    jurisdictions: ["EU_GDPR", "US_CALIFORNIA_CCPA", "US_HIPAA"]   # template enables compliance for all per §6.5
    vulnerable_populations: false               # indirect protection via D6 framework
    adversarial_environment: true               # agentic threat surface per OWASP LLM Top 10 + MITRE ATLAS
  security_classification: Restricted
  compliance_self_attestation:
    description: "Per LDB N=1 D6j finding — template's own compliance framework selection now declared explicitly"
    frameworks:
      - { framework: "ISO/IEC 27001 (internal ISMS)", attestation_owner: "LÆX Layer 1+4", review_cadence: "annual OR per minor version bump (whichever first)" }
      - { framework: "NIST SSDF (SP 800-218)", attestation_owner: "LÆX Layer 4 (continuous, per template version)", scope: "PO/PS/PW/RV practices map to §0.5/§6/§6.5/§7.5+§7.6" }
      - { framework: "OWASP LLM Top 10", attestation_owner: "SERAPH (per build run via D6c)", scope: "agentic threat surface per §8 Quality.Security SEC-H4 criteria" }
      - { framework: "ISO/IEC 25010", attestation_owner: "N/A directly; verified through downstream builds' D2 scores", scope: "specification not runtime software; applies indirectly via builds generated" }
  northstar_predicate:
    composition:
      - "build's calibration record rubric_aggregate ≥ 75"
      - "build's LDB canonical aggregate band ∈ {STRONG, EXEMPLARY}"
      - "build's LDB D6i critical_findings == 0"
      - "build's LDB D1c operator_rating ≥ 4"
      - "build's Northstar predicate (per §0.5) evaluates true"
    evaluation_threshold: "ALL 5 must hold for build to count toward LASDLC Northstar"

  # ─── v2.5.0 Agentic Adaptation Frontmatter ──
  # Injected at plan instantiation. Not present in historical plans; backfill
  # on touch only (per feedback_plan_frontmatter_convention.md).
  orchestration_topology:
    # WHY: declares which meta-skills orchestrate the build lifecycle so the
    #   webshell can render the operator's plan as an interactive timeline
    #   and the SQUAD dispatcher knows which skills to invoke in order.
    tier: <SMALL|MEDIUM|LARGE>
    #   MAPS-TO: operator_experience_layer.orchestration_topology_panel.tier_badge
    #   TYPE: enum(SMALL,MEDIUM,LARGE)
    #   WHY: copied from Section 1 tier_selection so the frontmatter is
    #   self-describing; webshell color-codes SMALL=green MEDIUM=yellow LARGE=red

    meta_skills: [/PLAN, /BUILD, /VERIFY]
    #   MAPS-TO: orchestration_topology_panel.skill_timeline + SQUAD.dispatcher.skill_chain
    #   TYPE: string[] (ordered)
    #   WHY: ordered list of meta-skills the build will invoke; used by
    #   webshell to render progress bars and by the gateway to pre-load
    #   skill manifests before agents spawn

    sibling_dispatch: [CORSO, EVA]
    #   MAPS-TO: orchestration_topology_panel.avatar_row + SQUAD.dispatcher.allowed_siblings
    #   TYPE: string[]
    #   WHY: limits which siblings receive dispatch calls; ScopeGovernor
    #   enforces this list at runtime to prevent unauthorized sibling access

    autonomy_level: supervised
    #   MAPS-TO: orchestration_topology_panel.lock_icon_variant + HITLGateOverlay.default_state
    #   TYPE: enum(autonomous,supervised,hitl-gated)
    #   WHY: controls whether the build self-approves gates, requires HITL
    #   only on trigger match, or gates EVERY decision through HITL

    hitl_triggers:
      #   MAPS-TO: HITLGateOverlay.trigger_registry + operator_experience_layer.hitl_settings
      #   TYPE: string[]
      #   WHY: when autonomy_level != autonomous, these strings match
      #   against gate failure events; on match the build pauses for HITL
      - "security gate failure"
      - "cost > $10"
      - "cross-sibling contract mutation"

    # ─── webshell render contract ──
    #   PANEL: operator_experience_layer.orchestration_topology_panel
    #   ROUTE: /builds/<codename>/topology
    #   RENDER: interactive timeline showing meta-skill chain + sibling avatars

  assumption_register:
    # WHY: converts implicit assumptions into explicit, testable constraints
    #   that block Phase 1 until validated. Prevents agents from guessing
    #   when preconditions fail mid-build.
    count: 3
    #   MAPS-TO: risk_register_editor.assumption_count_badge
    #   TYPE: int
    #   WHY: derived count of items[]; displayed as a red badge if >0 unvalidated

    items:
      #   MAPS-TO: risk_register_editor.rows[] (one table row per item)
      #   TYPE: object[]
      #   WHY: each item is a declarative contract with a machine-executable
      #   validation method and a known consequence of failure
      - id: A1
        #   MAPS-TO: row_key + assumption_validation_log.assumption_id
        #   TYPE: string (A1..An)
        #   WHY: stable reference for cross-mention in logs, gates, and HITL prompts
        text: "Neo4j instance is reachable at bolt://localhost:7687"
        #   MAPS-TO: row_text + HITL prompt body
        #   TYPE: string
        #   WHY: human-readable statement of the assumption; shown to operator
        #   in risk register editor and in AskUserQuestion when HITL is required
        validation_method: "Pre-flight check: nc -zv localhost 7687"
        #   MAPS-TO: row_method_badge + pre-flight.executor.command
        #   TYPE: string (shell command OR "HITL confirm")
        #   WHY: executable check that confirms or refutes the assumption;
        #   "HITL confirm" means the operator must manually verify
        risk_if_false: "Block Phase 1; fallback to embedded SQLite"
        #   MAPS-TO: row_risk_tooltip + HITL prompt consequence_text
        #   TYPE: string
        #   WHY: consequence surfaced to operator when validation fails so they
        #   can make an informed accept-risk / fix / abort decision
        validated: false
        #   MAPS-TO: row_checkbox_state + assumption_validation_log.result
        #   TYPE: bool
        #   WHY: starts false; set true ONLY after validation_method executes
        #   successfully. Blocks Phase 1 while false.

      - id: A2
        text: "Operator has Anthropic API key in 1Password"
        validation_method: "HITL confirm"
        risk_if_false: "Block deploy gate"
        validated: false

      - id: A3
        text: "No new external crates required"
        validation_method: "cargo tree diff against main"
        risk_if_false: "Escalate to SERAPH dependency audit"
        validated: false

    # ─── webshell render contract ──
    #   PANEL: operator_experience_layer.risk_register_editor
    #   ROUTE: /builds/<codename>/phase/pre-flight
    #   RENDER: table row per item: id | text | method | risk | [Validate] button

  scope_governor_profile:
    # WHY: enforces runtime boundaries on agent execution so a compromised
    #   or misdirected agent cannot exceed its authorized scope. Boundaries
    #   are declared in the plan and checked by the gateway before every
    #   tool invocation.
    ttl_minutes: 30
    #   MAPS-TO: gate_dashboard.countdown_timer + ScopeGovernor.session_ttl
    #   TYPE: int
    #   WHY: hard time-box for the build session; after expiry all agent
    #   processes receive SIGTERM and the build status flips to TIMEOUT

    target_domains: ["soul", "corso"]
    #   MAPS-TO: gate_dashboard.domain_chips + ScopeGovernor.allowed_domains
    #   TYPE: string[]
    #   WHY: limits which sibling domains the build may touch; prevents a
    #   build scoped to SOUL from dispatching to SERAPH without LÆX override

    allowed_tools: [soul.read_note, corso.guard]
    #   MAPS-TO: gate_dashboard.tool_chips + ScopeGovernor.tool_allowlist
    #   TYPE: string[] (sibling.action format)
    #   WHY: explicit allowlist of tools; any tool call not in this list
    #   is rejected at the gateway with ScopeGovernorViolation

    max_concurrent_agents: 2
    #   MAPS-TO: gate_dashboard.concurrency_badge + SQUAD.dispatcher.max_parallel
    #   TYPE: int
    #   WHY: caps parallel agent count to prevent token-budget exhaustion
    #   and resource contention; gateway queue holds excess agents

    # ─── webshell render contract ──
    #   PANEL: operator_experience_layer.gate_dashboard
    #   ROUTE: /builds/<codename>
    #   RENDER: read-only badge bar: TTL countdown | domain chips | tool chips | concurrency badge

