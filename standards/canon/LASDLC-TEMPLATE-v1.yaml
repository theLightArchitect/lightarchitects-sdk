    "<sub_build>": "Sub-build codename within a PROGRAM-tier parent program"
    "<gate>": "Gate event name (e.g. WGC_PLATFORM_API_V1_SHIPPED)"
    "<wave>": "Wave number/name within Implement phase (e.g. 1, 2-parallel, 3-foundation)"
