    "/ops/drift/schemas":
      status: proposed
      referenced_by: "Section 9.5 drift_management.drift_categories.schema_drift.webshell_render"
      eef_deliverable: "see /ops/drift parent"
    "/ops/drift/dependencies":
      status: proposed
