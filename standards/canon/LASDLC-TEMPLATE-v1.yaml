# ============================================================================
# SECTION 1.7: REFERENCE-TABLE INTEGRITY (NEW v2.5.1 per LÆX canon promotion 2026-05-15)
# ============================================================================
# Plans contain cross-reference sections that drift silently when the main spec
# evolves. This section formalizes the integrity sweep requirement so plan
# authors do not skip it during amendment batches.
#
# PROVISIONALLY_VALID — N=1 session (agent-teams-fleet XEA loop, 2026-05-15).
# Confidence interval: {low: 83, point: 91, high: 96}. Elevates to VALIDATED
# when ≥3 independent build sessions confirm the drift pattern.

reference_table_integrity:
  description: |
    After every batch of ≥3 plan amendments, the plan author MUST explicitly
    sweep ALL cross-reference tables for consistency with the updated spec.
    Silent drift in these tables is a systematic failure mode: the spec changes,
    the reference table is missed, and downstream agents execute against stale
    contracts.
  added_in_template_version: "2.5.1"
  source_memory: "project_canon_promotion_candidates_2026_05_15.md"

  sweep_trigger: "≥3 amendments in a single authoring session"

  high_drift_sections:
    - label: "Tier 1/2/3 reuse maps"
      location: "phases[].reuse_map or integration_constraints"
      why: "Tier boundary changes invalidate downstream reuse entries silently"
    - label: "Blueprint XXI file-function maps"
      location: "file_function_map"
      why: "File ownership reassignment orphans agent dispatch entries"
    - label: "TypeScript EventType constraint entries"
      location: "webshell_events or sse_event_types"
      why: "Type renames break SSE subscriptions without compile-time error"
    - label: "Integration constraint tables"
      location: "phases[].integration_constraints"
      why: "Phase reordering creates forward-reference violations"

  sweep_procedure:
    - step: "List all cross-reference sections present in the plan"
    - step: "For each section, diff it against the updated spec sections it references"
    - step: "Flag any entry that references a renamed, removed, or restructured target"
    - step: "Resolve flags before the next GATE execution"

  gate_behavior: "WARNING (not BLOCKING) — flag and resolve in same session before GATE"

