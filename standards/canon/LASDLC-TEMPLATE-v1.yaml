# ============================================================================
# SECTION 0.4: PRE-FLIGHT ESTABLISHMENT WIZARD (NEW v2.2.2)
# ============================================================================
# Canonical HITL question set asked via AskUserQuestion BEFORE any plan is
# authored. Establishes Northstar context, risk classification (data-type +
# data-security tier), compliance + security framework selection, project
# context, cost budgets, observability requirements, squad preferences.
# Output is a project-level establishment record inherited by all builds.
#
# Resolves: E4 (Section 0.5 prerequisite_gate enforcement) + SEC-C3-RESIDUAL
# (auto_derivation_rules establishment mechanism) + Explore HIGH (bidirectional
# binding gap) + SEC-NEW-H1 (jurisdiction enum) + SEC-NEW-H2 (adversarial
# environment wiring) + Northstar establishment when missing.

preflight_establishment_wizard:
  description: |
    Six question categories asked via AskUserQuestion (per
    feedback_use_askuserquestion canonical pattern) BEFORE any plan can be
    authored. Establishes the foundational decisions that shape downstream
    auto_derivation_rules + framework selection + cost budgets + dispatch
    preferences. Output persists at project level + inherits to all builds.
  source_memory: "Kevin scope clarification 2026-05-04 (v2.2.2 directive — pre-flight HITL establishment)"
  source_canons: ["XXVI (post-edit gates)", "XXXIII (independent verification)", "feedback_use_askuserquestion.md"]
  added_in_template_version: "2.2.2"

  when_to_run:
    - "First build in a new project (no prior preflight-establishment.yaml in project dir)"
    - "Material amendment to existing project (Northstar pivot, jurisdiction expansion, security_classification escalation, etc.)"
    - "Operator override of auto_derivation_rules per Section 0.5 risk_classification_required.operator_override_protocol"
  blocking: true
  type: manual
  enforcement: "Concrete: SessionStart hook (Section 8.5) checks for project's preflight-establishment.yaml; if missing OR stale (>90 days OR Northstar amendment unprocessed), invokes wizard via AskUserQuestion. Resolves E4 v2.2.0 defect (operationally ambiguous halt_condition)."

  question_categories:
    1_northstar_establishment:
      runs_when: "No ratified Northstar at sig ≥9.0 found in helix"
      questions:
        - id: q1_primary_icp
          question: "What is the primary-ICP for this product?"
          header: "Primary ICP"
          options: ["Technical engineers (CLI-first OK)", "Technical-adjacent operators (webshell-first per OD-10)", "Non-technical end users", "Internal team only"]
        - id: q1_shipped_definition
          question: "What does 'shipped' mean for this product?"
          header: "Shipped def"
          options: ["E2E in webshell (no terminal — OD-10)", "CLI + webshell parity", "API-first; UI optional", "Self-hosted runtime"]
        - id: q1_optimization_target
          question: "What is the optimization target?"
          header: "Optimize for"
          options: ["User value (primary-ICP can complete tasks)", "Engineering elegance", "Cost minimization", "Time-to-market"]
        - id: q1_measurable_assertion
          question: "What measurable assertion validates 'shipped'?"
          header: "Northstar metric"
          options: ["terminal_window_open_count === 0 (OD-10 pattern)", "Custom metric (operator defines)", "Test coverage threshold", "Deploy frequency"]
      output_field: "northstar_lineage in project preflight-establishment.yaml"

    2_data_classification:
      runs_when: "Always (per SEC-C3 v2.2.1 + Kevin v2.2.2 directive)"
      questions:
        - id: q2_data_type
          question: "What data types does the build touch? (multi-select)"
          header: "Data types"
          multiSelect: true
          options: ["PII (general identifying info)", "PHI (healthcare protected info)", "PCI (payment card data)", "financial (non-PCI)", "biometric", "location", "inferred-sensitive (derived attributes)", "public", "internal"]
          rationale: "Auto-derives GDPR/HIPAA/PCI_DSS/CCPA per Section 0.5 risk_classification_required.auto_derivation_rules"
        - id: q2_security_classification
          question: "What's the highest data security / handling classification? (Kevin v2.2.2 directive)"
          header: "Security tier"
          options: ["Secret (national security; air-gap required)", "Restricted (financial/legal/sensitive at scale)", "Confidential (standard B2B sensitive)", "Public (no special handling)"]
          rationale: "Auto-derives FedRAMP/ISO_27001 tier + handling controls per data_handling_classification_rules.security_classification_mapping"
        - id: q2_jurisdictions
          question: "What jurisdictions does the product serve? (multi-select; use canonical_jurisdiction_enum keys)"
          header: "Jurisdictions"
          multiSelect: true
          options: ["EU_GDPR", "US_CALIFORNIA_CCPA", "US_HIPAA", "US_FEDERAL", "US_PCI", "UK", "APAC", "GLOBAL"]
        - id: q2_vulnerable_populations
          question: "Are vulnerable populations served? (multi-select)"
          header: "Vulnerable pops"
          multiSelect: true
          options: ["minors", "medical_patients", "refugees", "low_literacy", "none"]
        - id: q2_adversarial_environment
          question: "What's the adversarial environment? (auto-derives OWASP_LLM_Top_10 + MITRE_ATLAS for adversarial_users+)"
          header: "Adversarial env"
          options: ["none (internal trusted users)", "curious_users", "adversarial_users (untrusted public)", "nation_state"]
        - id: q2_ai_risk_tier
          question: "AI risk tier (per EU AI Act)?"
          header: "AI risk tier"
          options: ["minimal (no AI)", "limited (chatbots, recommenders)", "high (HR/credit/biometric/critical-infrastructure)", "unacceptable (banned by EU AI Act)"]
      output_field: "risk_classification per Section 0.5 schema"

    3_compliance_framework_confirmation:
      runs_when: "After step 2 — auto-derives required frameworks; operator confirms or overrides"
      questions:
        - id: q3_auto_derived_confirm
          question: "Auto-derived required compliance frameworks (per risk_classification): [<list computed from auto_derivation_rules>]. Confirm or amend?"
          header: "Auto-derived"
          options: ["Confirm all auto-derived", "Add additional frameworks (operator picks)", "Override auto-derived (HITL escalation; recorded in compliance_override_log)", "Decline auto-derivation (rare; LÆX Layer 1+4 review)"]
        - id: q3_optional_ai_security
          question: "Optional AI-system-security frameworks (beyond auto-derived)?"
          header: "AI security"
          options: ["OWASP_LLM_Top_10 (LLM apps)", "MITRE_ATLAS (AI red-team)", "Both", "None (decline if not LLM-deploying)"]
      output_field: "selected_frameworks in security_compliance"

    4_project_context:
      runs_when: "First build in project OR re-establish on amendment"
      questions:
        - id: q4_project_context
          question: "Is this a new project or extending an existing one?"
          header: "Project context"
          options: ["New project (greenfield)", "Extending existing (read project architecture first per surgical_context_hydration)", "Forking from existing", "Migration from legacy"]
        - id: q4_build_tier
          question: "What tier of build is this?"
          header: "Build tier"
