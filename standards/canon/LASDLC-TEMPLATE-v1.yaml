# Section numbering convention (added v2.0.4 per Explore-agent N3 finding).
section_numbering_convention:
  description: |
    Major sections are integer-numbered (Section 1, 2, ..., 10). Sub-sections
    inserted between major sections use point-numbering (e.g., Section 8.5).
    Point-numbered sections are NOT a renumber-cascade trigger — they coexist
    with adjacent integer sections without breaking external references.
  rationale: |
    The v2.0.0 renumber pass moved Sections 5-9 to 6-10. Subsequently inserting
    a new section as 8.5 (rather than re-cascading 9-10 to 10-11) was a
    deliberate choice to minimize external-reference churn across versions.
    Tooling that parses section numbering MUST accept both integer and
    point-numbered forms.
  current_sections:
    - "0.5": NORTHSTAR-FIRST PLANNING (added v2.2.0 — prerequisite gate before template instantiation)
    - "0.6": CONFIDENCE THRESHOLD GATE (added v2.2.3 — Canon XXXV; ≥95% required, ≥99.99% preferred; verbatim primary-source citation mandatory; UNVALIDATED → research escalation Tier 1-4; v2.2.4 extended with inline_citation_protocol — IEEE-style numeric refs for research-backed decisions + Firecrawl/Context7 cache convention at <build_root>/.context/)
    - "0.7": AUTO-DECISION ELIGIBILITY GATE (added v2.3.0 — Canon XXXVI Phase 3; three preconditions P1 mechanically-checkable Northstar + P2 ≥3 calibrated examples + P3 ≥95% with citations; exclusion zones first-of-kind/contested-Northstar/security-compliance/irreversible; fail-open-to-HITL on any miss)
    - 1: TIER DEFINITIONS
    - "1.5": TIER HIERARCHY (added v2.1.0; v2.2.0 corrected to 6-tier — project → program → build → phase → wave → task)
    - 2: EXECUTION PHASES
    - "2.5": LOOP CYCLE (added v2.1.0 — pre-flight → implementation → cross-validation → feedback → correction)
    - "2.6": PHASE-LEVEL SCHEMAS (added v2.1.0 — cost_budget, observability_contract, expected_deliverables, agent_capability_declaration)
    - "2.7": SURGICAL CONTEXT HYDRATION (added v2.2.0 — 5 context categories + hydration_gate + precision-vs-plausibility)
    - 3: FILE + FUNCTION PLANNING
    - 4: AGENT TOPOLOGY
    - "4.5": "CONTRACTS (added v2.1.0 — 6 contract categories — phase / agent / cross_session / security_threat / observability / cost)"
    - "4.6": SQUAD COORDINATION ACROSS HIERARCHY (added v2.2.0 — per-tier squad composition + hand-off protocol)
    - "4.7": TRUTH-SOURCE PYRAMID (added v2.2.0 — 4-level validation hierarchy with conflict resolution)
    - 5: OPERATOR EXPERIENCE LAYER (added v2.0.0)
    - 6: PRE-FLIGHT
    - "6.5": "SECURITY + COMPLIANCE FRAMEWORKS (added v2.1.0 — 10 selectable frameworks — SOC 2, ISO 27001, HIPAA, GDPR, EU AI Act, NIST CSF, PCI DSS, FedRAMP, OWASP ASVS, CCPA/CPRA)"
    - 7: CLOSE-OUT
    - "7.5": POST-IMPLEMENTATION VALIDATION CYCLE (added v2.2.0 — 5-step validation against truth-source pyramid)
    - "7.6": CALIBRATION SUBSTRATE (added v2.2.5 — Canon XXXVI Phase 2; per-build .calibration/<codename>.json + cross-build aggregate.json; predicate effectiveness + YOUR self-validation ceiling + agent-pairing matrix + research-tier histogram)
    - "7.7": DELIVERABLE BENCHMARK (added v2.4.0 — LDB v1.0 — empirical truth-telling layer for Canon XXXVI; 8 components D1-D8 anchored in ISO/IEC 25010 + CISQ + DORA + SPACE + Flow Framework + Amdahl + Karp-Flatt + Apdex + OpenTelemetry + AYIN + OWASP ASVS + ISO/IEC 27001/27034 + OWASP LLM Top 10 + MITRE ATLAS + ATT&CK + CWE Top 25 + NIST SSDF + SLSA + STRIDE + LINDDUN; D6 Security + D8 Performance/Parallel-Agentic both first-class)
    - 8: QUALITY GATE DIMENSIONS
    - "8.5": HOOKS INTEGRATION (added v2.0.3 as sub-section to avoid 9→10 + 10→11 cascade)
    - "8.6": "CODE QUALITY + EFFICIENCY + PRECISION-OVER-PLAUSIBILITY (added v2.2.0 — three-property integrative layer)"
    - 9: AGENTIC SDLC
    - "9.5": "DRIFT MANAGEMENT (added v2.1.0 — 4 drift categories — prompt / schema / dependency / canon)"
    - "9.6": WEBSHELL ROUTES REGISTRY (added v2.2.0 per CRITICAL fix — 12 live routes + 9 proposed)
    - "9.7": LIGHTARCHITECTS-FIRST AGENT DISPATCH (added v2.2.0 — platform-portable priority order)
    - 10: RELATIONSHIP TO CORSO

# ============================================================================
# SECTION 0.3: CANONICAL JURISDICTION ENUM (NEW v2.2.2 per SEC-NEW-H1 fix)
# ============================================================================
# Resolves SEC-NEW-H1: Northstar.risk_classification.jurisdictions and
# data_handling.jurisdictions used different naming schemes (EU vs EU_GDPR).
# auto_derivation_rules silently mismatched. v2.2.2 canonicalizes.

canonical_jurisdiction_enum:
  description: "Single canonical jurisdiction list. All template blocks (Northstar, data_handling, auto_derivation_rules, security_compliance) MUST use these tokens."
  source_memory: "v2.2.1 verification SEC-NEW-H1 fix"
  added_in_template_version: "2.2.2"
  jurisdictions:
    EU_GDPR:
      friendly_name: "European Union (GDPR)"
      regulation_anchor: "GDPR + EU AI Act + national-implementation laws"
      auto_triggers_frameworks: ["GDPR", "EU_AI_Act"]
    US_CALIFORNIA_CCPA:
      friendly_name: "California (CCPA/CPRA)"
      regulation_anchor: "California Consumer Privacy Act + Cal Privacy Rights Act"
      auto_triggers_frameworks: ["CCPA_CPRA"]
    US_HIPAA:
      friendly_name: "US Healthcare (HIPAA)"
      regulation_anchor: "Health Insurance Portability and Accountability Act"
      auto_triggers_frameworks: ["HIPAA"]
    US_FEDERAL:
      friendly_name: "US Federal Government"
      regulation_anchor: "FedRAMP + FISMA + agency-specific rules"
      auto_triggers_frameworks: ["FedRAMP", "NIST_CSF"]
    US_PCI:
      friendly_name: "US Payment Card Industry"
      regulation_anchor: "PCI-DSS"
      auto_triggers_frameworks: ["PCI_DSS"]
    UK:
      friendly_name: "United Kingdom"
      regulation_anchor: "UK GDPR + Data Protection Act 2018"
      auto_triggers_frameworks: ["GDPR (UK adapted)"]
    APAC:
      friendly_name: "Asia-Pacific (PDPA, etc.)"
      regulation_anchor: "varies by country (Singapore PDPA, Japan APPI, etc.)"
      auto_triggers_frameworks: []
    GLOBAL:
      friendly_name: "Global (no specific regulatory anchor)"
      auto_triggers_frameworks: []
  validation_rule: "Every jurisdiction reference in template manifest MUST match a key in this enum. Mismatch surfaces as compliance_framework_drift.jurisdiction_mismatch (Section 9.5)."
  webshell_render:
    widget: "jurisdiction_picker"
    view_mode: "/project/<projectId>/preflight"
    update_signal: "static (enum-derived)"

# Template variables — replace at instantiation time (added v2.0.2 per R6).
