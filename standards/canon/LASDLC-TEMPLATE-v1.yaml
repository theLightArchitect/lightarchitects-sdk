      - operator_label: "Helix entry authoring"
        target: "soul:SOUL"
        target_type: skill
        agent_id: "soul:SOUL"
        invocation: "via /ENRICH meta-skill"
    fallback: "Write retrospective notes in build manifest"
    exit_gate_type: clean_room
