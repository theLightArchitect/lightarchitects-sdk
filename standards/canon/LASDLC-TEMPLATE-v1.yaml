# ============================================================================
# SECTION 2.5: LOOP CYCLE (NEW v2.1.0 per Phase B-2)
# ============================================================================
# Formalizes the canonical work-loop applied at every phase + every wave:
# pre-flight → implementation → cross-validation/QA → feedback → correction.
# Composes existing primitives (pre_flight, wave_structure, squad_review,
# findings:, fix-it patterns) into a single named cycle.

loop_cycle:
  description: |
    Every phase + every wave instantiates this 5-step loop. The loop is the
    LASDLC unit of execution rigor — skipping a step is a Canon XXVI violation.
    Composes Section 6 pre_flight, wave_structure (Section 2 Implement phase),
    squad_review (Section 2 Plan phase), findings: deliverable + apply_findings
    routing (Canon XXXIII finding_routing_by_signature), and fix-it cycles.
  source_memory: "Kevin scope clarification 2026-05-04 (v2.1.0 directive)"
  source_canons: ["XXVI (post-edit gates)", "XXXIII (cross-validation discipline)", "XXXIV (interval reporting on each pass)"]
  added_in_template_version: "2.1.0"

  steps:
    - step: 1
      name: pre_flight_research_prep_checks
      description: "Before any production action: gather context, validate predecessors, run blocking checks"
      composes:
        - "Section 6 pre_flight (top-of-build runs once)"
        - "Per-phase phase_execution_steps[step:0 or step:1 if pre-action]"
        - "External research protocol (Context7 + Firecrawl per pre_flight.external_research_protocol)"
        - "Bilateral session authority (Canon XXXIII pre-flight)"
      blocking_for: [implementation]
      webshell_render:
        widget: "loop_step_pre_flight"
        view_mode: "/builds/<codename>/phase/<phase>"
        update_signal: "sse_subscribe(pre_flight_events)"

    - step: 2
      name: implementation
      description: "Production action: write code, modify files, dispatch agents per Implementation SOP"
      composes:
        - "Section 2 Implement phase wave_structure.implementation"
        - "Implementation SOP (Prepare → Write → Gate → Repeat) from CLAUDE.md"
        - "Canon XXIII file ownership enforcement (PreToolUse hooks per Section 8.5)"
      sop: "Prepare → Write → Gate → Repeat"
      blocking_for: [cross_validation_qa]
      webshell_render:
        widget: "loop_step_implementation"
        view_mode: "/builds/<codename>/phase/<phase>/wave/<wave>"
        update_signal: "sse_subscribe(implementation_events)"

    - step: 3
      name: cross_validation_qa
      description: "Independent verification of the implementation per Canon XXXIII (self-validation has structural ceiling)"
      composes:
        - "Plan.squad_review.phase_execution_steps step 4 (cross-validation pass per OD-9)"
        - "Plan.squad_review.finding_routing_by_signature (multi-axis vs single-axis vs disputed)"
        - "wave_structure.review (post-wave parallel-agent review)"
        - "Independent Explore agent dispatch when substantive declarative addition (Canon XXXIII)"
      output: "findings: section in manifest with severity + signature classification"
      blocking_for: [feedback]
      webshell_render:
        widget: "loop_step_cross_validation"
        view_mode: "/builds/<codename>/findings"
        update_signal: "sse_subscribe(squad_review_events,findings_events)"

    - step: 4
      name: feedback
      description: "Capture findings + classify by severity + signature; apply auto-fix-its; surface HITL items"
      composes:
        - "apply_findings (severity-based) + finding_routing_by_signature (provenance-based)"
        - "Confidence interval reporting per Canon XXXIV"
        - "Findings record in manifest findings: block per phase"
      output: "applied_findings + deferred_findings + hitl_pending"
      blocking_for: [correction]
      webshell_render:
        widget: "loop_step_feedback"
        view_mode: "/builds/<codename>/findings"
        update_signal: "sse_subscribe(feedback_apply_events)"

    - step: 5
      name: correction
      description: "Apply fix-its for confirmed defects; defer with reason or escalate to HITL; close cycle or re-loop"
      composes:
        - "Fix-it pass per feedback_fix_it_agent_file_ownership.md (parallel agents own non-overlapping file sets)"
        - "HITL escalation via AskUserQuestion (per feedback_use_askuserquestion.md)"
        - "Loop closure: phase exit gate [A+S+Q+C+O+P+K+D+T+R]; or loop re-entry from step 1 if defects cluster"
      exit_condition: "Either (a) all confirmed defects fixed AND phase exit_criteria met → phase advances; OR (b) defects cluster suggests scope re-think → halt and re-plan"
      webshell_render:
        widget: "loop_step_correction"
        view_mode: "/builds/<codename>/phase/<phase>"
        update_signal: "sse_subscribe(correction_events)"

  invariants:
    - "Step 1 → 2 → 3 → 4 → 5 sequential within a phase or wave; no skipping"
    - "Step 3 (cross-validation) MUST run before step 4 even if step 2 completed without obvious defects (Canon XXXIII: agent reports describe INTENT, not REALITY)"
    - "Step 5 (correction) MAY re-loop to step 1 if defects suggest scope/approach change rather than localized fix"
    - "All 5 steps emit per-step events to AYIN per phase observability_contract (Section 2.6 phase_level_schemas — instanced per phase as builds calibrate)"

  webshell_render:
    widget: "loop_cycle_progress"
    view_mode: "/builds/<codename>/phase/<phase>"
    update_signal: "sse_subscribe(loop_step_events)"
    visualization: "5-step circular indicator; current step highlighted; previous steps colored by outcome (PASS/WARN/FAIL); total cycles_completed counter for re-loops"

# ============================================================================
# SECTION 2.6: PHASE-LEVEL SCHEMAS (NEW v2.1.0 per Phase B-2)
# ============================================================================
# Schemas for per-phase blocks: cost_budget, observability_contract,
# expected_deliverables (formalized), agent_capability_declaration. Phases
# instance these schemas as needed. Defined at template top-level to avoid
# bloating each phase with boilerplate; per-phase override via inline values.

phase_level_schemas:
  description: |
    Each phase MAY declare any combination of the schemas below. v2.1.0
    establishes the contracts; v2.1.x calibrates per-phase values during
    EEF Phase 3 + subsequent builds. Hydration is incremental — phases
    that don't yet declare a schema fall back to template defaults.
  source_memory: "Kevin scope clarification 2026-05-04 (v2.1.0 directive)"
  added_in_template_version: "2.1.0"

  cost_budget_schema:
    description: "Per-phase cost budget across 3 dimensions (tokens, dollars, wall-clock); HITL gate at threshold; AYIN tracks actuals"
    schema:
      token_budget: <integer>            # estimated total tokens consumed by all agent dispatches in this phase
      dollar_budget: <float>             # estimated $ cost (Anthropic + tool calls + infra)
      wall_clock_sla_h: <float>          # estimated wall-clock hours from phase start to phase exit
      hitl_threshold: <0.0-1.0>          # fraction of any budget dimension at which HITL gate fires (default 0.80)
      cost_ceiling_hard_stop: <float>    # absolute $ cap that auto-halts phase regardless of HITL (default 2x dollar_budget)
      actual_tokens: <integer or null>   # populated at runtime from AYIN
      actual_dollars: <float or null>
      actual_wall_clock_h: <float or null>
      webshell_render:
        widget: "cost_burn_down_chart"
        view_mode: "/builds/<codename>/phase/<phase>"
        update_signal: "sse_subscribe(cost_events)"
    integration: "AYIN spans tag cost dimensions; gateway aggregates per phase; HITL fires via AskUserQuestion (or webshell HITLGateOverlay post-RBO)"
    canonization_path: "v2.1.x calibration sample N≥3 → canon candidate"

  observability_contract_schema:
    description: "Per-phase AYIN span requirements; signal_latency_budget; trace_coverage_target"
    schema:
      required_spans: [<span_name>, ...]   # spans this phase MUST emit
      optional_spans: [<span_name>, ...]   # spans nice-to-have
      forbidden_spans: [<span_name>, ...]  # spans explicitly disallowed (e.g., raw secrets)
      signal_latency_budget_ms: <integer>  # max ms from event to AYIN ingestion
      trace_coverage_target: <0.0-1.0>     # fraction of declared spans that MUST emit (default 0.95)
      redaction_layer_required: <bool>     # whether AYIN redaction (per security_threat_model.scope_governor_binding.ayin_redaction) MUST run
      retention_days: <integer>            # span retention (default 90)
      webshell_render:
        widget: "observability_panel"
        view_mode: "/builds/<codename>/phase/<phase>"
        update_signal: "sse_subscribe(ayin_spans_for_build)"
    integration: "AYIN trace handlers per phase; Section 8 quality_dimensions Performance + Operations dimensions verify at phase exit"

  expected_deliverables_schema:
    description: "Formalized version of phases.<phase>.deliverables: array. Each deliverable has type + location + validation_predicate."
    schema:
      - artifact_type: "<document|code|test|trace|schema|...>"
        artifact_id: "<unique-id-within-phase>"
        description: "<what it is>"
        location: "<filesystem path OR registry pointer>"
        validation_predicate: "<bash command OR check rule>"
        blocking: <bool>                   # phase exit blocks if missing
        owner: "<agent_id OR sibling>"
        webshell_render:
          widget: "deliverable_card"
          view_mode: "/builds/<codename>/phase/<phase>"
          update_signal: "sse_subscribe(deliverable_status_events)"
    relationship_to_existing:
      legacy: "phases.<phase>.deliverables: [list of strings]"
      formalized: "phases.<phase>.expected_deliverables: [list of dicts per schema above]"
      migration: "Both can coexist v2.1.0+; tooling reads expected_deliverables when present, falls back to deliverables strings"

  agent_capability_declaration_schema:
    description: "Per-agent declaration of tools needed, context budget, cost ceiling, data handling classification. Pre-dispatch verification."
    schema:
      agent_ref: "<phases.<phase>.agents[<index>] OR file_function_map[<file>].owner>"
      tools_required: [<tool_name>, ...]   # e.g., [Read, Edit, Write, Bash, Grep]
      plugins_required: [<plugin_id>, ...] # e.g., [context7, rust-analyzer-lsp]
      context_budget_tokens: <integer>     # max context window the agent will use
      cost_ceiling_usd: <float>            # max $ this agent dispatch may consume
      output_kind: "<diff|new_files|review|report|test|...>"
      output_validation: "<predicate>"     # how to verify output meets contract
      pre_dispatch_check:                  # v2.2.2 E7 fix — structured schema (was placeholder)
        check_type: "<hydration_gate | bash | rule_predicate | composite>"
        predicate: "<for hydration_gate: 'Section 2.7 hydration_gate.cross_reference_validation'; for bash: shell command; for rule_predicate: structured rule reference; for composite: array of sub-checks>"
        on_fail: "<block_dispatch | warn_only | escalate_hitl>"
        timeout_seconds: <integer>         # max wait for check to return; default 30
        retries: <integer>                 # default 0 (fail-fast)
      data_handling:                       # v2.2.1 per SEC-C1 + v2.2.2 extended per Kevin directive (security_classification)
        classification: "<PII | PHI | PCI | public | internal>"   # WHAT — data type the agent touches
        security_classification: "<Secret | Restricted | Confidential | Public>"   # HOW SENSITIVE — handling tier (added v2.2.2 per Kevin directive); orthogonal to classification
        retention_days: <integer>          # max retention for any data the agent processes
        redaction_required: <bool>         # whether AYIN redaction layer MUST run on traces from this agent
        jurisdictions: [<jurisdiction_enum_key>, ...]  # MUST match canonical_jurisdiction_enum (Section 0.3) — e.g., [EU_GDPR, US_CALIFORNIA_CCPA, US_HIPAA]
      webshell_render:
        widget: "agent_capability_card"
        view_mode: "/builds/<codename>/phase/<phase>/wave/<wave>/agent/<agentKey>"
        update_signal: "sse_subscribe(agent_dispatch_events)"
    integration: "Section 4 agent_topology_schema extends with these fields; pre-dispatch hook (Section 8.5 hooks_integration) verifies; data_handling field is the binding surface for compliance frameworks (Section 6.5 security_compliance) per SEC-C1 v2.2.1 fix."

    data_handling_classification_rules:
      description: "How data_handling.classification + security_classification map to compliance framework requirements. v2.2.2: added security_classification dimension (Kevin directive) — orthogonal to classification (data type)."

      classification_mapping:
        description: "Data-type mapping (WHAT) — extends v2.2.1 mapping"
        PII:
          frameworks_triggered: ["GDPR", "CCPA_CPRA"]
          required_actions: ["AYIN redaction MUST be true", "retention_days ≤ 365 unless lawful basis declared", "DPIA required if high-risk processing"]
        PHI:
          frameworks_triggered: ["HIPAA"]
          required_actions: ["AYIN redaction MUST be true", "retention_days follows HIPAA minimum-necessary rule", "BAA in place for any external processor"]
        PCI:
          frameworks_triggered: ["PCI_DSS"]
          required_actions: ["redaction_required: true (PAN patterns)", "retention_days minimum per PCI-DSS 3.4", "agent MUST NOT log full PAN"]
        public:
          frameworks_triggered: []
          required_actions: ["No additional handling beyond standard observability"]
        internal:
          frameworks_triggered: ["SOC_2_Type_II (audit log)", "ISO_27001 (information classification)"]
          required_actions: ["AYIN audit log retention ≥ 1y", "access control documented"]

      security_classification_mapping:
        description: "Handling-tier mapping (HOW SENSITIVE) — added v2.2.2 per Kevin directive. Standard government/enterprise classification levels."
        Secret:
          frameworks_triggered: ["FedRAMP (High)", "ISO_27001 (top tier controls)", "NIST_CSF (Tier 4 Adaptive)"]
          required_actions: ["End-to-end encryption mandatory", "Access strictly need-to-know with audit log", "Air-gapped runtime preferred", "Multi-party HITL required for any data egress", "AYIN redaction MUST be true regardless of classification"]
          example_use_case: "National security, classified research, legally privileged communications"
        Restricted:
          frameworks_triggered: ["SOC_2_Type_II", "ISO_27001 (standard controls)", "NIST_CSF (Tier 3 Repeatable)"]
          required_actions: ["Encryption at rest + in transit", "Access role-controlled with quarterly review", "AYIN audit log retention ≥ 7y", "Cross-jurisdiction transfer requires explicit approval"]
          example_use_case: "Financial records, customer PII at scale, internal IP, security incident details"
        Confidential:
          frameworks_triggered: ["SOC_2_Type_II (basic)", "ISO_27001 (information classification clause)"]
          required_actions: ["Encryption at rest", "Access role-controlled", "AYIN audit log retention ≥ 1y", "Standard redaction in traces"]
          example_use_case: "Customer support records, internal architecture docs, employee data"
        Public:
          frameworks_triggered: []
          required_actions: ["No special handling; observability standard"]
          example_use_case: "Marketing material, open-source code, public documentation"

      composed_classification_examples:
        description: "Real-world combinations of classification × security_classification"
        examples:
          - { classification: "PHI", security_classification: "Restricted", combined_burden: "Highest healthcare burden — HIPAA + ISO 27001 + 7y retention + role-controlled access" }
          - { classification: "PII", security_classification: "Confidential", combined_burden: "Standard B2B SaaS — GDPR/CCPA + SOC 2 + 1y retention" }
          - { classification: "PCI", security_classification: "Restricted", combined_burden: "Payment platform — PCI-DSS + ISO 27001 top-tier" }
          - { classification: "internal", security_classification: "Secret", combined_burden: "Internal classified — air-gap + multi-party HITL + audit-everything" }
          - { classification: "public", security_classification: "Public", combined_burden: "Minimal — standard observability only" }
          - { classification: "PII", security_classification: "Secret", combined_burden: "National security data subjects — FedRAMP High + GDPR + air-gap" }

      validation_predicate: "If data_handling.classification ∈ {PII, PHI, PCI}, the build MUST select corresponding classification framework in security_compliance.selected_frameworks. If data_handling.security_classification ∈ {Secret, Restricted}, the build MUST select corresponding handling-tier framework. Mismatch surfaces as compliance_framework_drift (Section 9.5 canon_drift extended v2.2.2)."

# ============================================================================
# SECTION 2.7: SURGICAL CONTEXT HYDRATION (NEW v2.2.0)
# ============================================================================
# Pre-implementation context loading mandate. Coding agents MUST hydrate
# specific, surgical context before authoring code — never bulk, never
# assumed. This is the load-bearing framework that moves agent output from
# "plausible" to "technically precise." Composes Canon XVIII (Context Before
# Action), Canon XXVI (post-edit gates), Canon XXXIII (independent
# verification), and the project's actual architecture (read, not assumed).

surgical_context_hydration:
  inline_refs: ["[1]", "[5]", "[7]"]
  decision_class: architecture
  description: |
    The default failure mode of coding agents is producing plausible code —
    syntactically correct, naming-conventions-respecting, similar to nearby
    examples — that is nonetheless technically incorrect against the actual
    codebase. The agent's mental model diverges silently from reality;
    plausible code passes review until production-runtime exposes the gap.
    Per Canon XXXIII [1], independent verification recovers what same-author
    self-review misses (~30% structural ceiling); hydration prevents the
    drift that creates that defect surface in the first place.

    Surgical context hydration is the antidote: before any implementation
    action, the agent MUST load 5 categories of precise context (codebase,
    architecture, source-of-truth, Northstar [7], project actuals). Context that
    is "surgical" = targeted, minimal, sufficient for the specific change.
    NOT bulk-everything; NOT none-and-hope.

    This framework is the deepest constraint LASDLC v2.2.0 adds: it
    institutionalizes the difference between "code that looks like it should
    work" and "code that we have empirically verified is correct against the
    actual project architecture being built upon."
  source_memory: "Kevin scope clarification 2026-05-04 (v2.2.0 directive — technically precise code, not plausible)"
  source_canons: ["XVIII (Context Before Action)", "XXVI (post-edit gates)", "XXXIII (Self-Validation Ceiling)"]
  added_in_template_version: "2.2.0"

  five_context_categories:
    1_codebase_exploration:
      description: "Read the actual files agent will modify + 1-hop neighbors (callers, callees, related types)"
      mandatory_tools:
        - "Read on each target file (not Glob to skim)"
        - "Grep for usages of functions/types being modified"
        - "rust-analyzer-lsp (if Rust): definitions + references for symbols touched"
      sufficient_context_predicate: "Agent can answer: (a) what callers depend on the symbol I'm modifying? (b) what types does it consume/return? (c) what's the test coverage on this path?"
      anti_pattern: "Reading entire crate or repo via Glob; bulk = noise, not signal"
      webshell_render:
        widget: "context_hydration_codebase_panel"
        view_mode: "/builds/<codename>/phase/<phase>/wave/<wave>/agent/<agentKey>"
        update_signal: "sse_subscribe(file_read_events)"

    2_architecture_aware:
      description: "Read project's actual architecture, not assumed. Where does this code fit? What patterns does the project enforce?"
      mandatory_artifacts:
        - "Project CLAUDE.md (workspace overview)"
        - "Per-crate CLAUDE.md (when modifying that crate)"
        - "platform-architecture-v2.md (system topology) when crossing architectural boundaries"
        - "Existing similar feature in same crate (read 1-2 reference implementations before authoring new)"
      sufficient_context_predicate: "Agent can answer: (a) what existing pattern does this extend? (b) what conventions am I bound to follow? (c) where does this fit in the architecture diagram?"
      anti_pattern: "Authoring new patterns when existing patterns exist; introducing inconsistency"
      webshell_render:
        widget: "context_hydration_architecture_panel"
        view_mode: "/builds/<codename>/phase/<phase>"
        update_signal: "sse_subscribe(architecture_read_events)"

    3_source_of_truth:
      description: "Read canonical sources for any rule or constraint relevant to the change"
      mandatory_artifacts:
        - "canon.md entries for canons enforced by the build (LASDLC manifest canons:)"
        - "builders-cookbook.md sections relevant to the work (lookup via §N)"
        - "MEMORY.md entries (filesystem-cached behavioral rules)"
        - "Active manifest.yaml for the build (file-function map, agent topology, expected_deliverables)"
      sufficient_context_predicate: "Agent can quote the canon/cookbook/memory rule that governs the change"
      anti_pattern: "Inferring rules from name conventions; canon-by-osmosis"
      webshell_render:
        widget: "context_hydration_canon_panel"
        view_mode: "/builds/<codename>/phase/<phase>"
        update_signal: "sse_subscribe(canon_read_events)"

    4_northstar_alignment:
      description: "Verify the planned change advances the build's declared Northstar"
      mandatory_artifacts:
        - "Section 0.5 northstar_first_planning.build_to_northstar_mapping"
        - "Originating helix entry (sig ≥9.0) for the Northstar"
      sufficient_context_predicate: "Agent can articulate: 'this change advances the Northstar by X, measured via Y'"
      anti_pattern: "Implementing without checking — produces correct-looking-code that doesn't move the product"
      webshell_render:
        widget: "context_hydration_northstar_panel"
        view_mode: "/builds/<codename>/phase/<phase>"
        update_signal: "sse_subscribe(northstar_alignment_events)"

    5_project_actuals:
      description: "Read what currently exists in the project being built upon — NOT what should exist or has been promised"
      mandatory_actions:
        - "git status: confirm working tree state matches manifest assumption"
        - "Read existing types being extended (don't assume schema)"
        - "Run existing tests to baseline: 'this is what passes today; my change must not break it'"
        - "Check for in-flight work on related files (other builds' worktrees) — Canon XXXIII bilateral_session_authority"
      sufficient_context_predicate: "Agent has empirical baseline of project state, not derived/assumed state"
      anti_pattern: "Trusting manifest descriptions over reading actual code; assuming a function exists because manifest mentions it; assuming tests pass because no one mentioned them failing"
      webshell_render:
        widget: "context_hydration_project_actuals_panel"
        view_mode: "/builds/<codename>/phase/<phase>"
        update_signal: "sse_subscribe(actuals_read_events)"

  hydration_gate:
    description: "Pre-dispatch gate; refuses to dispatch implementation agent if context-hydration insufficient. v2.2.1: mechanical predicate via PreToolUse:Task hook (E1 fix)."
    blocking: true
    enforcement: "MECHANICAL via PreToolUse:Task hook in Section 8.5 hooks_integration (added v2.2.1 per E1 fix); no longer aspirational"
    runs: "Before every wave (Implement) AND before every task (non-Implement implementation actions)"
    pass_predicate: "All 5 categories have evidence_artifact recorded AND cross-referenced against session tool-call log for the specific change scope"
    fail_action: "Halt agent dispatch; surface failure to operator with missing categories listed; require hydration before retry"

    evidence_artifact_schema:
      description: "Structured schema; replaces v2.2.0's free-form strings (E1 fix v2.2.1)"
      file_location: "<build_root>/.handoff/hydration-<agent_key>-<timestamp>.json"
      schema:
        agent_key: "<agent_key per agent_topology_schema.agent_key_derivation>"
        change_scope: "<short description of intended change>"
        timestamp: "<ISO-8601>"
        category_1_codebase:
          files_read: ["<absolute path>", ...]      # MUST cross-reference session Read tool log
          read_timestamps: ["<ISO-8601>", ...]
          symbol_dependencies: ["<symbol path>", ...] # callers/callees from rust-analyzer-lsp OR Grep
        category_2_architecture:
          claude_md_sections_read: ["<file:section>", ...]
          reference_impls_cited: ["<file:line-range>", ...]
        category_3_source_of_truth:
          canon_sections_quoted: ["Canon <X>: <quoted text>", ...]
          cookbook_sections_quoted: ["§<X>: <quoted text>", ...]
          memory_entries_quoted: ["<feedback_*.md>: <quoted rule>", ...]
        category_4_northstar:
          alignment_chain: "<concrete X→Y→Z chain>"
          northstar_helix_entry: "<helix entry path>"
        category_5_project_actuals:
          git_status_snapshot: "<command output>"
          types_read: ["<type path>: <signature>", ...]
          tests_baselined: ["<test path>: <pass|fail|count>", ...]

    cross_reference_validation:
      description: "PreToolUse:Task hook (Section 8.5) cross-references evidence_artifact against session tool-call log"
      hook_logic: |
        For each entry in category_1_codebase.files_read:
          assert(file appears in session's Read tool calls in this session OR earlier sessions per --resume)
        For each entry in category_3_source_of_truth.canon_sections_quoted:
          assert(text appears verbatim in canon.md)
        If any assertion fails → block tool dispatch + emit AYIN audit event
      block_action: "Tool dispatch refused; agent receives error message with missing/invalid evidence categories listed"

    webshell_render:
      widget: "context_hydration_gate_status"
      view_mode: "/builds/<codename>/phase/<phase>/wave/<wave>"
      update_signal: "sse_subscribe(hydration_gate_events)"

  precision_vs_plausibility:
    description: "The framework's load-bearing distinction. Code-quality gates verify precision, not plausibility. v2.2.1: deterministic post-edit verification (E2 fix)."
    plausible_code_signature:
      - "Compiles + passes lint + matches naming conventions"
      - "Produces output that resembles desired output"
      - "Cannot answer 'why this approach over alternatives in this codebase'"
      - "Cannot trace its assumptions back to read evidence"
    precise_code_signature:
      - "All 5 surgical_context_hydration categories satisfied with evidence"
      - "Approach justified by reference to existing project patterns"
      - "Edge cases identified by reading actual callers/types"
      - "Test cases derived from actual usage, not invented"

    # ─── Deterministic post-edit verification (E2 fix v2.2.1) ──
    # Replaces v2.2.0's reactive 'if asked' interview with a structured
    # post-edit hook + machine-checkable predicate.
    deterministic_verification:
      description: "After every PostToolUse:Edit (Section 8.5), agent emits precision_evidence.json; hook validates each ref resolves to a file actually read this session"
      added_in_template_version: "2.2.1 (E2 fix per engineer-agent verification)"
      precision_evidence_schema:
        file_location: "<build_root>/.handoff/precision-<agent_key>-<change_id>.json"
        schema:
          change_id: "<sha of edited file or commit hash>"
          agent_key: "<agent_key>"
          timestamp: "<ISO-8601>"
          evidence_artifact_refs: ["<path to hydration_artifact>", ...]
          pattern_reference_files: ["<file:line-range of reference impl>", ...]
          edge_cases_derived_from: ["<file:line-range of caller producing edge case>", ...]
          rationale_for_approach: "<concrete justification with evidence pointers>"
      hook_validation:
        binding: "PostToolUse:Edit hook in Section 8.5 hooks_integration"
        logic: |
          For each entry in evidence_artifact_refs:
            assert file exists at the pointed location
            assert hydration_artifact at that path was generated for this agent_key + within current session window
          For each entry in pattern_reference_files:
            assert file appears in session's Read tool log
            assert line-range falls within file's actual length
          For each entry in edge_cases_derived_from:
            assert file:line was read this session
        block_action: "If any assertion fails: PostToolUse:Edit hook surfaces precision violation; edit reverts OR build flagged for cross-validation"
      pass_predicate: "All 3 ref categories have evidence; all evidence cross-references session tool-log; rationale_for_approach is non-empty + cites at least one ref"

    legacy_operational_test_deprecated_v2_2_1:
      description: "v2.2.0's 'if asked' interview test is DEPRECATED (E2 fix). Replaced by deterministic_verification above."
      reason: "Reactive interview is non-deterministic; relies on missing classifier. Engineer-agent verification 2026-05-04 found: 'a gate that fires only when challenged is not a gate; it's a hope'."

    webshell_render:
      widget: "precision_score_indicator"
      view_mode: "/builds/<codename>/phase/<phase>/wave/<wave>"
      update_signal: "sse_subscribe(precision_evidence_events)"

  composition_with_other_blocks:
    section_2_5_loop_cycle: "Step 1 (pre_flight_research_prep_checks) IS surgical context hydration; this section formalizes what that step requires"
    section_2_6_phase_level_schemas: "agent_capability_declaration.pre_dispatch_check uses hydration_gate as the predicate"
    section_4_5_contracts: "agent_contract validates context hydration completed before agent owns files"
    section_8_quality_dimensions_quality: "Quality dimension's 'precision_vs_plausibility' criterion uses this framework"
    canon_xxxiii: "Independent verification on substantive declarative additions composes with hydration; verification reads same context categories independently"

# ============================================================================
# SECTION 3: FILE + FUNCTION PLANNING
# ============================================================================
# Standard granularity for MEDIUM/LARGE builds. Each phase specifies
# files AND key functions/types to create or modify.

file_function_map_schema:
  description: "Per-phase file+function specification"
  format:
    files:
      "<file_path>":
        create: ["function_name(params): ReturnType"]   # new functions
        modify: ["function_name — description of change"]  # existing functions
        delete: ["function_name — reason for removal"]  # removed functions
  example:
    files:
      src/lib/api.ts:
        create:
          - "createPlan(plan: BuildPlan): Promise<{codename: string}>"
          - "updatePlan(codename: string, updates: object): Promise<void>"
        modify:
          - "initializeStores() — add listBuilds() call"
      src/screens/Intake.svelte:
        create:
          - "togglePlanMode(): void"
          - "submitPlan(): Promise<void>"
        modify:
          - "template section — add Plan Builder toggle"

# ============================================================================
# SECTION 4: AGENT TOPOLOGY
# ============================================================================
# Defines how multiple agents work concurrently within a phase.
# Key constraint: ONE FILE, ONE OWNER. No two agents edit the same file.

agent_topology_schema:
  description: "Per-phase agent assignment with file ownership"
  format:
    agents:
      - id: "string"                    # unique within phase (used as agent_key for webshell routes)
        agent_key: "string"             # URL-safe slug; default = slugify(id) if absent; resolves /agent/<agentKey> webshell route segment (added v2.2.0 per H2 fix)
        sibling: "SiblingId"            # corso, quantum, seraph, eva, soul, ayin, laex
        owns: ["file_path"]             # exclusive write access
        functions: ["file::function"]   # specific targets
        tools: ["ToolName"]             # allowed tools for this agent
        budget: "number (tokens)"       # context window allocation
        depends_on: ["agent_id"]        # must complete before this starts
    merge_policy: "file-ownership | function-ownership | sequential | worktree"
    dag_order:                          # execution waves
      - ["agent-a", "agent-b"]          # wave 1: parallel
      - ["agent-c"]                     # wave 2: depends on wave 1

  agent_key_derivation:
    description: "Webshell routes use /agent/<agentKey>; this defines how agentKey is derived from agent identity (added v2.2.0 per HIGH fix H2)"
    rules:
      - "If agent.agent_key field present: use it directly (URL-safe enforced via slug_validation regex ^[a-zA-Z0-9][a-zA-Z0-9._-]{0,63}$ from pre_flight.worktree_isolation.naming_convention)"
      - "If agent_key absent: agent_key = slugify(agent.id) — lowercase, replace non-alphanumeric with -, collapse repeats, trim ends"
      - "agent_key MUST be unique within a build's full agent topology across all phases (collision = build manifest validation error)"
    examples:
      - { id: "Monaco-integrator-agent", agent_key: "monaco-integrator-agent" }
      - { id: "MCP-tools-agent", agent_key: "mcp-tools-agent" }
      - { id: "feature-dev:code-explorer", agent_key: "feature-dev-code-explorer" }   # colon → dash
    webshell_render:
      widget: "agent_topology_panel"
      view_mode: "/builds/<codename>/phase/<phase>/wave/<wave>"
      update_signal: "sse_subscribe(agent_dispatch_events)"

  merge_policies:
    file-ownership:
      description: "Each agent owns distinct files. Zero conflicts by construction."
      conflict_risk: none
      recommended_for: [SMALL, MEDIUM, LARGE]
    function-ownership:
      description: "Multiple agents in same file, different functions. Careful boundaries required."
      conflict_risk: low
      recommended_for: [LARGE]
    sequential:
      description: "Agents run one after another. Zero parallelism, zero conflicts."
      conflict_risk: none
      recommended_for: [SMALL]
    worktree:
      description: "Each agent gets a Git worktree. Merge at phase end."
      conflict_risk: medium
      recommended_for: [LARGE]

  budget_rules:
    total_phase_budget: "sum(agent_budgets) + 10% orchestration overhead"
    if_exceeds_70_percent: "split into sub-phases OR reduce agent count"
    if_single_agent_exceeds: "compact context OR split owned files into sub-agent"
    compaction_strategy: "handoff summary (key decisions + current state, <2K tokens)"

# ============================================================================
# SECTION 4.5: CONTRACTS (NEW v2.1.0 per Phase B-2)
# ============================================================================
# Aggregator block declaring all contract surfaces in a build plan.
# Composes: phase_contract (deliverables phase produces), agent_contract
# (file-ownership per Canon XXIII), cross_session_dependencies (bilateral
# session authority per Canon XXXIII pre-flight), security_threat_model
# contracts (per-threat mitigation binding), observability_contract (per-phase
# AYIN spans — formalized in Section 2.6 cost+observability v2.1.0 blocks),
# cost_contract (per-phase cost budget with HITL_threshold).

contracts:
  description: |
    Every build plan declares 6 categories of contracts. Each contract has a
    schema, validation predicate, and webshell surface. Contracts make implicit
    expectations explicit; tooling reads contracts to verify a build is honest
    about what it commits to deliver.
  source_memory: "Kevin scope clarification 2026-05-04 (v2.1.0 directive)"
  added_in_template_version: "2.1.0"

  contract_categories:
    phase_contract:
      description: "Each phase commits to producing specific deliverables; Section 2 phases.<phase>.deliverables array (formalized in v2.1.0 expected_deliverables block per phase)"
      schema_pointer: "phases.<phase>.expected_deliverables[]"
      validation_predicate: "Every deliverable has artifact_type + location + validation_predicate; phase exit gate verifies presence at declared location"
      webshell_render:
        widget: "phase_deliverables_panel"
        view_mode: "/builds/<codename>/phase/<phase>"
        update_signal: "sse_subscribe(phase_deliverable_events)"

    agent_contract:
      description: "Each agent owns specific files (Canon XXIII); declared in agent_topology + file_function_map"
      schema_pointer: "phases.<phase>.agents[].owns + file_function_map[].owner"
      validation_predicate: "Canon XXIII: every file appears in exactly one agent's owns: list (or co_owned_files with merge protocol). Hooks (Section 8.5) enforce at runtime."
      webshell_render:
        widget: "agent_ownership_map"
        view_mode: "/builds/<codename>/phase/<phase>/wave/<wave>"
        update_signal: "static (manifest-derived) + sse_subscribe(file_ownership_changes)"

    cross_session_contract:
      description: "Cross-session dependencies declared per Canon XXXIII bilateral_session_authority pre-flight"
      schema_pointer: "active.yaml builds.<codename>.cross_session_dependencies (per pre_flight.bilateral_session_authority.cross_session_dependencies_schema)"
      validation_predicate: "Every blocks_<phase>_<step>_owner references a declared session_id; gate events tracked"
      webshell_render:
        widget: "bilateral_session_map"
        view_mode: "/builds/<codename>"
        update_signal: "sse_subscribe(canonical_reconciliation_events)"

    security_threat_contract:
      description: "Each declared T-N threat in security_threat_model has a mitigation binding (Section 6 security_threat_model.scope_governor_binding)"
      schema_pointer: "security_threat_model.threats[] + security_threat_model.scope_governor_binding"
      validation_predicate: "Every T-N has at least one binding mechanism with verification predicate; SERAPH HARD GATE confirms at Phase 4 Harden"
      webshell_render:
        widget: "threat_model_viewer"
        view_mode: "/builds/<codename>/phase/harden"
        update_signal: "sse_subscribe(threat_status_events)"

    observability_contract:
      description: "Per-phase AYIN span requirements (Section 2.6 v2.1.0 per-phase block)"
      schema_pointer: "phases.<phase>.observability_contract"
      validation_predicate: "Every required span emits at runtime; signal_latency_budget honored; AYIN trace coverage ≥ declared threshold"
      webshell_render:
        widget: "observability_panel"
        view_mode: "/builds/<codename>/phase/<phase>"
        update_signal: "sse_subscribe(ayin_spans_for_build)"

    cost_contract:
      description: "Per-phase cost budget (tokens + dollars + wall-clock) with HITL_threshold (Section 2.6 v2.1.0 per-phase block)"
      schema_pointer: "phases.<phase>.cost_budget"
      validation_predicate: "actual_tokens + actual_dollars + actual_wall_clock_h tracked vs budget; HITL gate fires at 80% of any dimension"
      webshell_render:
        widget: "cost_burn_down_chart"
        view_mode: "/builds/<codename>/phase/<phase>"
        update_signal: "sse_subscribe(cost_events)"

  contract_aggregator_view:
    description: "Single dashboard showing all 6 contract categories' health for a build"
    webshell_render:
      widget: "contracts_dashboard"
      view_mode: "/builds/<codename>/contracts"
      update_signal: "sse_subscribe(all_contract_events)"
      summary_format: "6-cell grid: each cell shows contract category name + green/yellow/red status + drill-down link"

# ============================================================================
# SECTION 4.6: SQUAD COORDINATION ACROSS HIERARCHY (NEW v2.2.0)
# ============================================================================
# Different squad compositions per tier; hand-off protocols between tiers.
# Composes Section 1.5 tier_hierarchy + agent_topology_schema + LASDLC's
# multi-sibling squad_review pattern.

squad_coordination_across_hierarchy:
  description: |
    A single LASDLC build dispatches different squad compositions at different
    tiers. The project squad ≠ build squad ≠ wave squad. Hand-off between
    tiers requires explicit context transfer + decision-relevance translation.
    This section formalizes the per-tier squad composition + hand-off protocol.
  source_memory: "Kevin scope clarification 2026-05-04 (v2.2.0 directive)"
  source_canons: ["XXIII (file partitioning)", "XXIV (lens-driven squad selection)", "XXXIII (independent verification)"]
  added_in_template_version: "2.2.0"

  per_tier_squad_composition:
    project:
      description: "Strategic-tier squad (long-running initiative)"
      composition: "Operator (Kevin) + LÆX Layer 4 (GTM) + LÆX Layer 2 (strategic alignment) + optional sibling for domain expertise"
      decision_scope: "Northstar declaration; program portfolio; long-horizon successors"
      hand_off_to: "program tier — operator dispatches program orchestrator with Northstar lineage"
      webshell_render:
        widget: "project_squad_panel"
        view_mode: "/project/<projectId>"
        update_signal: "sse_subscribe(project_squad_events)"

    program:
      description: "Multi-build coordinated tier"
      composition: "Program orchestrator (claude/Kevin) + per-sub-build co-leads + LÆX Layer 3 (product gate) + 5-sibling squad for cross-build review"
      decision_scope: "Sub-build sequencing; cross-cutting concerns (security model, observability contract); coordinated deploy ordering"
      hand_off_to: "build tier — program orchestrator dispatches build owner with Northstar fit + program-level constraints"
      webshell_render:
        widget: "program_squad_panel"
        view_mode: "/builds/<programCodename>"
        update_signal: "sse_subscribe(program_squad_events)"

    build:
      description: "Single-build squad (primary unit of LASDLC orchestration)"
      composition: "6-sibling squad_review (CORSO + EVA + SOUL + QUANTUM + SERAPH + LÆX Layer 3) per Section 2 Plan.squad_review.agents"
      decision_scope: "File-function map; agent topology; risk register; threat model; gate criteria"
      hand_off_to: "phase tier — build owner dispatches phase agents per phases.<phase>.agents list"
      webshell_render:
        widget: "build_squad_panel"
        view_mode: "/builds/<codename>"
        update_signal: "sse_subscribe(squad_review_events)"

    phase:
      description: "Per-phase squad (lens specific to phase)"
      composition: "Per-phase agents: list (Section 2 phases.<phase>.agents) — varies by phase. E.g., Plan: feature-dev:code-architect + lightarchitects:engineer; Research: context7 + firecrawl + lightarchitects:researcher; Implement: parallel wave agents; Harden: lightarchitects:security + coderabbit:review"
      decision_scope: "Phase exit criteria satisfaction; per-phase findings + apply_findings"
      hand_off_to: "wave tier (Implement only) OR task tier (other phases)"
      webshell_render:
        widget: "phase_squad_panel"
        view_mode: "/builds/<codename>/phase/<phase>"
        update_signal: "sse_subscribe(phase_agent_events)"

    wave:
      description: "Per-wave squad (Implement phase only)"
      composition: "wave_structure.preparation (feature-dev:code-explorer + lightarchitects:quality) + wave_structure.implementation (per-file owner agents) + wave_structure.review (feature-dev:code-reviewer + lightarchitects:quality + coderabbit:review)"
      decision_scope: "Wave file modifications; wave-level cross-validation; wave exit gate"
      hand_off_to: "task tier — wave dispatch parallels per-agent file ownership"
      webshell_render:
        widget: "wave_squad_panel"
        view_mode: "/builds/<codename>/phase/implement/wave/<wave>"
        update_signal: "sse_subscribe(wave_agent_events)"

    task:
      description: "Single-agent task (atomic file ownership per Canon XXIII)"
      composition: "Single agent (subagent_type per agent_capability_declaration_schema)"
      decision_scope: "Owned files + functions; agent_capability_declaration constraints"
      hand_off_to: "(terminal — task completes via wave/phase exit gate)"
      webshell_render:
        widget: "task_panel"
        view_mode: "/builds/<codename>/phase/<phase>/wave/<wave>/agent/<agentKey>"
        update_signal: "sse_subscribe(task_events)"

  hand_off_protocol:
    description: "Cross-tier hand-off requires explicit context transfer + decision-relevance translation. v2.2.2: mechanical schema (E5 fix)."
    required_artifacts:
      - "Context handoff: parent tier writes context summary at tier-boundary timestamp; child tier reads before action (per surgical_context_hydration Section 2.7)"
      - "Decision-relevance map: parent declares which decisions are still mutable vs locked at handoff (e.g., Northstar locked at project; tier selection locked at build; phase choice locked at build manifest)"
      - "Findings inheritance: parent tier's confirmed findings flow down; child tier's new findings flow up (per finding_routing_by_signature in Section 2 Plan.squad_review)"
    invariants:
      - "Child tier MUST NOT mutate parent-tier locked decisions without explicit escalation back to parent"
      - "Parent tier MAY supersede child tier decisions if Northstar fit drift detected"
      - "All hand-offs emit event to AYIN per phase observability_contract"

    # ─── Hand-off record schema (v2.2.2 E5 fix — mechanical not policy) ──
    hand_off_record_schema:
      description: "Schema for the hand-off record file each tier writes at boundary. Replaces v2.2.0 policy invariants with mechanical schema."
      added_in_template_version: "2.2.2 (E5 fix per engineer-agent verification)"
      file_location: "<build_root>/.handoff/tier-<from_tier>-to-<to_tier>-<timestamp>.yaml"
      schema:
        from_tier: "<project|program|build|phase|wave>"
        to_tier: "<program|build|phase|wave|task>"
        from_session_id: "<session_id_uuid>"
        to_session_id: "<session_id_uuid>"
        timestamp: "<ISO-8601>"
        context_summary: "<≤2KB summary per Section 9 agentic.context_budget.handoff_format>"
        mutable_fields: ["<field paths child can change>"]
        locked_fields: ["<field paths child MUST NOT mutate>"]
        escalation_path: "<from_tier session OR operator HITL>"
        northstar_fit_check: "<pass | warn | fail at hand-off moment>"
        ayin_span_emitted: "lasdlc.handoff.<from_tier>.<to_tier>"
      ayin_span_naming_convention: "lasdlc.handoff.<from_tier>.<to_tier> with attributes {from_session_id, to_session_id, locked_field_count, mutable_field_count, northstar_fit_status}"
      validation_predicate: "Hand-off record MUST exist before child tier reads context; missing record blocks child dispatch via PreToolUse:Task hook"

  webshell_render:
    widget: "squad_coordination_overview"
    view_mode: "/builds/<codename>"
    update_signal: "sse_subscribe(squad_handoff_events)"

# ============================================================================
# SECTION 4.7: TRUTH-SOURCE PYRAMID (NEW v2.2.0)
# ============================================================================
# Validation hierarchy when sources conflict. Composes existing primitives
# (canon, Northstar, rubric, project architecture) into ranked authority.

truth_source_pyramid:
  description: |
    Build plans + implementations are validated against multiple truth sources.
    When sources conflict, this pyramid resolves: source-of-truth wins over
    Northstar wins over rubric wins over project-architecture-being-built-upon.
    Conflicts are surfaced honestly, not silently resolved by precedence;
    operator HITL on any non-trivial conflict.
  source_memory: "Kevin scope clarification 2026-05-04 (v2.2.0 directive)"
  added_in_template_version: "2.2.0"

  pyramid_levels:
    1_source_of_truth:
      description: "Highest authority — actual ratified canon + active manifest + actual code as it exists"
      sources:
        - "helix/user/standards/canon/canon.md (ratified canons I-XXXIV)"
        - "helix/user/standards/canon/builders-cookbook.md (operational standards)"
        - "Active manifest.yaml for the build (file-function map, expected_deliverables, threat_model)"
        - "Actual code in repo (read, not assumed)"
      conflict_rule: "Source-of-truth wins; if Northstar contradicts canon, escalate to operator — canon may need amendment OR Northstar may be misframed"

    2_northstar:
      description: "Product strategy — primary-ICP value criterion; ratified per Section 0.5 northstar_first_planning"
      sources:
        - "Originating helix entry (sig ≥9.0) for the Northstar"
        - "Section 0.5 northstar_first_planning.build_to_northstar_mapping"
      conflict_rule: "Northstar wins over rubric + project architecture; if rubric scores high but build doesn't advance Northstar, the rubric is mis-weighted (operator amends)"

    3_effectiveness_rubric:
      description: "Quantitative quality signal per Architects Blueprint Part XIV (C1-C8 rubric)"
      sources:
        - "helix/user/standards/canon/architects-blueprint.md Part XIV (8 components, merged from lasdlc-effectiveness-rubric.md 2026-05-13)"
        - "Per-build aggregate score + interval"
      conflict_rule: "Rubric wins over project-architecture-being-built-upon; if rubric flags a gate but architecture seems to permit, gate wins"

    4_project_architecture:
      description: "What's currently built — actual implemented architecture (read, not assumed)"
      sources:
        - "Project CLAUDE.md (workspace overview)"
        - "Per-crate CLAUDE.md (crate-specific patterns)"
        - "Existing implementations (1-2 reference implementations of similar features)"
      conflict_rule: "Project architecture is the floor — implementations MUST match it OR explicitly evolve it via Plan-phase architectural_thesis"

  conflict_resolution_protocol:
    description: "When two pyramid levels conflict, this resolves"
    steps:
      - "1. Surface the conflict explicitly (don't silently apply precedence)"
      - "2. Determine if conflict is real or apparent (often apparent from incomplete context per surgical_context_hydration)"
      - "3. If real: apply pyramid precedence + emit AYIN event for audit"
      - "4. If real + non-trivial impact: HITL via AskUserQuestion; operator may amend lower-tier source OR explicitly accept lower-tier override (rare)"
    forbidden:
      - "Silently resolving conflicts by intuition"
      - "Letting rubric score override Northstar fit"
      - "Trusting Northstar over canon (canon = ratified; Northstar = product-strategic; canon escalation requires LÆX Layer 1 amendment)"

  webshell_render:
    widget: "truth_source_conflict_panel"
    view_mode: "/builds/<codename>/conflicts"
    update_signal: "sse_subscribe(truth_source_conflict_events)"
    note: "/builds/<codename>/conflicts is a proposed route — register in webshell_routes_registry.proposed_routes"

# ============================================================================
# SECTION 5: OPERATOR EXPERIENCE LAYER (NEW v2.0.0)
# ============================================================================
# Binds the template to OD-10 Northstar (sig 9.0) — primary-ICP operators
# experience the build via webshell, not terminal/files. Every phase, gate,
# finding, risk, threat, and HITL prompt has an explicit operator touchpoint.
# Source: feedback_northstar_product_lens.md + helix/shared/entries/2026-05-03-od10-northstar-e2e-ui-from-fullstack.md

operator_experience_layer:
  northstar_anchor: "OD-10 Northstar (sig 9.0) — primary-ICP operators experience the build via webshell, not terminal/files"
  source_memory: "feedback_northstar_product_lens.md"
  source_helix: "helix/shared/entries/2026-05-03-od10-northstar-e2e-ui-from-fullstack.md"
  added_in_template_version: "2.0.0"
  contract: |
    Every phase, gate, finding, risk, threat, and HITL prompt declared in this
    template MUST resolve to a webshell surface where a non-technical operator
    can observe state and act. Terminal/file fallback exists as escape hatch
    only — see Northstar memory paragraph 3.

    This block is the interface contract between the build lifecycle (Sections
    2 + 6 + 7 + 8) and the webshell surface (lightarchitects-webshell-ui +
    EEF sub-builds). Tooling that renders LASDLC builds in the webshell reads
    this block to know which routes, signals, and click-options correspond to
    each lifecycle moment.

  per_phase_operator_view:
    Plan:
      operator_action: "Click 'New Build' button → /PLAN UI flow opens → fill form → squad_review findings stream live in findings panel → HITL surface for tiebreakers"
      webshell_route: "/builds/<codename>/phase/plan"
      no_terminal_required: true
      eef_sub_build: "manifest-plan-helix-editing (Wave 3)"
      gateable_in_webshell: ["squad_review", "HITL_tiebreaker", "spec_approval"]
    Research:
      operator_action: "Research panel shows live Context7 + Firecrawl results as agents query; deliverable refs render inline; deferred reality artifacts shown with 'awaiting <gate>' badges"
      webshell_route: "/builds/<codename>/phase/research"
      no_terminal_required: true
      eef_sub_build: "manifest-plan-helix-editing (Research panel) + build-spawn-monitor (gate badges)"
      gateable_in_webshell: ["docs_consulted", "live_web_consulted", "prior_art_documented"]
    Implement:
      operator_action: "Per-wave progress visible; file-function map renders as kanban or table; agent dispatch live-streams to findings/log surface; HITL gates surface as prompts with click-options"
      webshell_route: "/builds/<codename>/phase/implement/wave/<wave>"
      no_terminal_required: true
      eef_sub_build: "code-and-files (file edit) + build-spawn-monitor (progress) + manifest-plan-helix-editing (file-function map editor) + shell-and-output (agent log streams)"
      gateable_in_webshell: ["wave_security_gate", "hitl_classification_gate", "identity_backup_gate"]
    Harden:
      operator_action: "Static scan results render in findings table; severity-classified; HITL classification (accept/fix/escalate) via click-options"
      webshell_route: "/builds/<codename>/phase/harden"
      no_terminal_required: true
      eef_sub_build: "manifest-plan-helix-editing (findings table) + build-spawn-monitor (gate state)"
      gateable_in_webshell: ["static_analysis_gate"]
    Verify:
      operator_action: "Test results tree with drill-down; coverage ratchet visualization; canon XXVII 6-suite breakdown; isolation_gate state visible"
      webshell_route: "/builds/<codename>/phase/verify"
      no_terminal_required: true
      eef_sub_build: "shell-and-output (test execution + results tree) + test-and-deploy (coverage)"
      gateable_in_webshell: ["regression_gate", "contract_gate", "isolation_gate"]
    Ship:
      operator_action: "Deploy panel with target selector (color-coded local/staging/prod); deploy progress; rollback button; mcp_reconnect via webshell"
      webshell_route: "/builds/<codename>/phase/ship"
      no_terminal_required: true
      eef_sub_build: "test-and-deploy"
      gateable_in_webshell: ["binary_built", "codesigned", "deployed", "health_check", "mcp_reconnect"]
    Learn:
      operator_action: "Retrospective form; helix entry editor (significance slider, strands picker); SCRUM findings panel"
      webshell_route: "/builds/<codename>/phase/learn"
      no_terminal_required: true
      eef_sub_build: "manifest-plan-helix-editing (helix editor)"
      gateable_in_webshell: ["retrospective_written", "helix_decision", "squad_review"]

  hitl_surfaces:
    primary: "webshell HITLGateOverlay (RBO-owned) — click-options, no terminal"
    fallback: "AskUserQuestion (CLI) — when RBO not yet shipped"
    transition_signal: "RBO HITLGateOverlay SHIPPED → all template HITL prompts route through webshell; AskUserQuestion becomes escape hatch per Northstar memory paragraph 3"
    convention_memory: "feedback_use_askuserquestion.md (CLI fallback) + RBO HITLGateOverlay (post-RBO-ship primary path)"

  finding_surface:
    primary: "webshell findings table — sortable by severity/signature/sibling/file/line; signature column highlights MULTI_AXIS auto-applied vs DISPUTED_HITL pending (per finding_routing_by_signature in Section 2 Plan.squad_review)"
    binding: "Section 2 Plan.squad_review.deliverable.format renders 1:1 in this surface"
    eef_sub_build: "manifest-plan-helix-editing (findings table component)"

  risk_surface:
    primary: "webshell risk register editor — structured form for each R-N entry"
    binding: "Section 6 pre_flight.risk_analysis output renders here; per-risk fields: id, severity, owner, mitigation, signature"
    eef_sub_build: "manifest-plan-helix-editing (risk register editor component)"

  threat_surface:
    primary: "webshell threat model viewer — for LARGE-tier builds with security_threat_model"
    binding: "EEF security_threat_model T-1..T-N pattern + ScopeGovernor binding mechanism display"
    eef_sub_build: "manifest-plan-helix-editing (threat model viewer)"

  components_required:
    - phase_progress_widget         # build-spawn-monitor
    - gate_dashboard                # build-spawn-monitor
    - findings_table                # manifest-plan-helix-editing
    - risk_register_editor          # manifest-plan-helix-editing
    - coverage_ratchet              # test-and-deploy
    - hitl_overlay                  # RBO HITLGateOverlay
    - worktree_status_widget        # git-and-pr
    - phase_status_timeline         # build-spawn-monitor
    - bilateral_session_map         # build-spawn-monitor (or git-and-pr)
    - external_research_panel       # manifest-plan-helix-editing

  webshell_routes:
    - "/builds (list)"
    - "/builds/<codename> (detail with 5 view modes)"
    - "/builds/<codename>/phase/plan"
    - "/builds/<codename>/phase/research"
    - "/builds/<codename>/phase/implement/wave/<wave>"
    - "/builds/<codename>/phase/harden"
    - "/builds/<codename>/phase/verify"
    - "/builds/<codename>/phase/ship"
    - "/builds/<codename>/phase/learn"

  northstar_assertion:
    measurement: "terminal_window_open_count === 0 across full LASDLC lifecycle"
    test_location: "lightarchitects-webshell-ui/e2e/lasdlc-northstar.spec.ts (proposed; sibling to e1-e6)"
    pass_threshold: "0 terminal windows opened during a complete LARGE-tier build executed via webshell only"
    related_axis: "OD-9 spot-check Axis 6 (Northstar fit) — applies to template itself, not just builds"

  related_specs:
    - "EEF parent manifest sub_builds (6) implementing webshell surfaces"
    - "OD-10 Northstar memory project_northstar_e2e_ui.md"
    - "feedback_intuitive_ui.md (avoid LA jargon in labels)"
    - "feedback_responsive_layout.md (Helix 3D panel collapse <1024px)"
    - "feedback_sibling_to_squad.md (UI 'sibling' → 'Squad'/'Agent')"
    - "feedback_vocabulary_canon.md (public surfaces = agent/Squad; internal = preserve sibling)"

# ============================================================================
# SECTION 6: PRE-FLIGHT (before Phase 1)
# ============================================================================
# Runs ONCE before the first execution phase. All blocking checks must pass.

pre_flight:
  worktree_lifecycle:
    label: "Pre-flight gate before any new worktree + branch allocation"
    blocking: true
    skip_if: "Reusing an existing worktree (e.g., aegis main, eef program worktree)"
    source_canon: "helix/user/standards/canon/git-lifecycle-canon.md §III"
    added_in_template_version: "2.0.2"
    added_date: "2026-05-11"
    rationale: |
      Per git-lifecycle-canon v1.0 §III: a new worktree consumes ~10GB of disk
      (target/ artifacts) and pollutes the topology if main is broken or the
      codename collides. 8 gates G1-G8 verify safety before allocation.
      Originated from the 2026-05-11 cleanup session that found 18 stale
      branches accumulated over 13 days due to missing pre-flight gates.
    procedure:
      - "G1: git fetch github main succeeds"
      - "G2: local main == github/main (no divergence)"
      - "G3: cargo check --workspace --all-features clean on aegis"
      - "G4: make quality passes (fmt + clippy + tests)"
      - "G5: branch name + worktree path do not collide with existing"
      - "G6: active.yaml has entry for the codename (or operator confirms placeholder)"
      - "G7: parent program exists in active.yaml if specified"
      - "G8: ≥10GB free disk space"
    automation_script: "scripts/preflight-worktree.sh <codename> [<parent-program>]"
    operator_surface:
      ref: "Webshell intake form runs this gate before /BUILD kickoff"

  external_research_protocol:
    label: "Library docs (Context7) + live web research (Firecrawl) ordering"
    blocking: false   # advisory; required only when Plan/Research phases mention external libraries
    skip_if: "Build does not consume any external library, framework, or API"
    source_memory: "~/.claude/CLAUDE.md PLUGIN ECOSYSTEM MANDATES rule 2 (Specialist Routing)"
    added_in_template_version: "2.0.1"
    rationale: |
      Per global CLAUDE.md: Library/framework docs → Context7. Live web /
      post-cutoff content → Firecrawl. Use Context7 first; fall back to
      Firecrawl when library ID is unavailable or content is behind a URL.
      Operator-facing label: "Research panel" — in webshell, results render as
      live cards as agents query. Context7/Firecrawl are wire-level; operators
      see "Looking up [library]..." not "Calling Context7."
    procedure:
      - "1. Enumerate external libraries / frameworks / APIs the build will consume."
      - "2. For each library: mcp__plugin_context7_context7__resolve-library-id, then mcp__plugin_context7_context7__query-docs."
      - "3. For URL-fetch content (blogs, post-cutoff docs, competitive analysis): mcp__plugin_firecrawl_firecrawl__scrape or __search."
      - "4. Capture refs in plan manifest research_refs: [{library, source: context7|firecrawl, url, retrieved_at, summary}]."
      - "5. Re-query at start of each phase if library version-locked OR retrieved_at > 90 days ago."
    operator_surface:
      ref: "operator_experience_layer.components_required.external_research_panel"
      route: "/builds/<codename>/phase/research (research panel)"
      labels:
        context7_query: "Looking up <library>..."
        firecrawl_query: "Fetching <url>..."
        result_card: "Reference: <library> (via Context7|Firecrawl)"

  bilateral_session_authority:
    label: "Confirm this session is declared authoring authority for this program (when ≥2 parallel Claude sessions are active)"
    blocking: true
    skip_if: "Only one active Claude session OR program-tier is SMALL/MEDIUM with single-session ownership obvious from cwd"
    source_memory: "feedback_bilateral_session_authority_routing.md"
    rationale: |
      When ≥2 Claude sessions work on related programs in parallel, "the other
      session" has unstable referent without a registry-level authority map.
      The 2026-05-03 OD-8 dual-lock confusion (both sessions believed the
      other had completed OD-8 lock-in; neither updated canon) cost ~2h
      debugging + a multi-half helix entry pair + canonical synthesis at
      sig 9.0. Registry-declarative session-to-authority mapping prevents
      recurrence.
    procedure:
      - |
        # 1. READ active.yaml top-level canonical_reconciliation block (if present):
        #    canonical_reconciliation.bilateral_session_clarification.{
        #      this_session_id, other_session_id,
        #      <program>_authoring_authority
        #    }
      - |
        # 2. CONFIRM current session ID matches the declared <program>_authoring_authority
        #    for the program being modified:
        #      - If MATCH: proceed to subsequent pre-flight checks
        #      - If MISMATCH: HALT — surface to operator via AskUserQuestion;
        #        do not mutate this program's manifest/plan/registry
        #      - If MAPPING ABSENT: surface to operator; either declare authority
        #        OR confirm there is no parallel session
      - |
        # 3. NON-INTERFERENCE rules (operationalized once authority confirmed):
        #    - No writes to other-session's manifest (manifest = canonical; mutation owner-only)
        #    - No worktree edits on other-session's program branch — use a dedicated
        #      worktree on a session-owned branch
        #    - Cross-session dependencies declared as cross_session_dependencies in
        #      active.yaml entry — explicit "this awaits X from owner Y", not implicit
        #    - Helix entries authored by either session are FINE (helix is shared knowledge)
    schema:
      block_path: "~/lightarchitects/soul/helix/corso/builds/active.yaml#canonical_reconciliation.bilateral_session_clarification"
      required_keys: ["this_session_id", "other_session_id", "<program>_authoring_authority"]
      generalization_to_n_sessions: |
        At N>2 sessions, schema extends to session_<n>_id keys + per-program
        authority map. Calibration sample is N=2 (WGC reconciliation 2026-05-03).

    cross_session_dependencies_schema:
      # Defines the cross_session_dependencies field referenced in step 3 above.
      # Added v2.0.4 per Explore-agent N2 finding (phantom-schema fix).
      block_path: "active.yaml builds.<codename>.cross_session_dependencies"
      schema_definition: |
        cross_session_dependencies:
          blocks_<phase>_<step>: [<gate_event_name>, ...]   # array of gate events that block this phase/step
          blocks_<phase>_<step>_owner: <session_id>         # which session owns producing the gate events
          soft_predecessor: <description>                   # optional non-blocking predecessor
          soft_predecessor_fallback: <description>          # fallback when soft_predecessor unavailable
          laex_layer_1_signature_pending: <description>     # optional canon-keeper signature awaiting forward
      example:
        # From EEF active.yaml entry (verified canonical example):
        eef_cross_session_dependencies:
          blocks_eef_phase_2: ["WGC platform-api-v1 SHIPPED", "WGC identity-and-scoping SHIPPED"]
          blocks_eef_phase_2_owner: "this_session_e9ee73b5 (per bilateral_session_clarification.wgc_authoring_authority)"
          soft_predecessor: "RBO HITL infrastructure SHIPPED (preferred but not blocking)"
          soft_predecessor_fallback: "AskUserQuestion fallback works pre-RBO; RBO authoring authority = this_session_e9ee73b5"
          laex_layer_1_signature_pending: "Canonical reconciliation §9.5 awaits Layer 1 Canon Keeper forward signature; neither session has authority"
      validation_rules:
        - "Every blocks_<phase>_<step>_owner MUST reference a session_id declared in bilateral_session_clarification"
        - "Every gate_event_name SHOULD be a documented gate_event in the owning session's program manifest"
        - "soft_predecessor + soft_predecessor_fallback MUST be paired (one without the other is incomplete)"
        - "laex_layer_1_signature_pending is OPTIONAL — only present when canonical reconciliation is in flight"

  # ─── security_threat_model_schema (CRITICAL fix v2.2.0 per Explore-agent verification) ──
  # Phantom-schema fix: prior versions referenced security_threat_model in
  # security_compliance composition (Section 6.5), contracts.security_threat_contract
  # (Section 4.5), and operator_experience_layer.threat_surface (Section 5),
  # but never schema-defined the field. EEF parent manifest defined its own ad-hoc
  # threats (T-1..T-11). This block formalizes the schema.
  security_threat_model_schema:
    description: "Schema for the security_threat_model: block that builds declare to enumerate threats + mitigations. Composes with security_compliance (Section 6.5) and contracts.security_threat_contract (Section 4.5)."
    block_path: "manifest.yaml security_threat_model: (per-build, NOT per-phase)"
    added_in_template_version: "2.2.0 (CRITICAL phantom-schema fix per Explore-agent verification)"
    schema_definition: |
      security_threat_model:
        rationale: <string>             # why this build introduces threat surface
        threats:
          - id: "T-<n>"                 # T-1, T-2, ... ; unique within build
            title: <string>
            severity: HIGH | MEDIUM | LOW
            threat_class: appsec | supply_chain | ai_system | governance   # NEW v2.2.2 SEC-H3 fix — taxonomy enum
            technique_id: "<framework_taxonomy_id>"   # NEW v2.2.2 SEC-H3 — e.g., MITRE_ATLAS:AML.T0051 (Prompt Injection); OWASP_LLM_Top_10:LLM01; OWASP_ASVS:V1.5.4
            vector: <string>            # how the threat arises
            mitigation: <string>        # multi-line; what prevents the threat
            owner: <agent_id OR sibling>
        scope_governor_binding:         # binding mechanisms (added EEF v2.0.4)
          path_canonicalization:        # T-2 binding example
            applies_to: [<T-N>, ...]
            rule: <string>
            verification: <string>
          scope_governor_wrap: { applies_to: [...], rule: ..., verification: ... }
          ayin_redaction: { applies_to: [...], rule: ..., verification: ... }
          rate_limiting: { applies_to: [...], rule: ..., verification: ... }
          audit_log: { applies_to: [...], rule: ..., verification: ... }
    threat_class_taxonomy:
      description: "v2.2.2 SEC-H3 fix — categorizes threats so per-framework validation can target relevant subset (e.g., OWASP_LLM_Top_10 needs ai_system threats; PCI_DSS needs appsec + supply_chain)"
      added_in_template_version: "2.2.2"
      enum:
        appsec:
          description: "Traditional application security — injection (SQL/XSS/command/path), AuthN/Z bypass, scope escape, sensitive data in logs"
          example_techniques: ["OWASP_ASVS:V*", "CWE numbers"]
          required_when: "Build has user-facing input OR processes untrusted data"
        supply_chain:
          description: "Dependency / build-system / runtime environment compromise — typosquatting, malicious deps, compromised CI"
          example_techniques: ["MITRE_ATLAS:AML.T0010 (ML Supply Chain Compromise)", "OWASP_LLM_Top_10:LLM05"]
          required_when: "Build adds dependencies OR consumes external models/data"
        ai_system:
          description: "AI/ML-system-specific attack surface — prompt injection, model jailbreak, role hijacking, training data poisoning, model exfiltration, agent-as-confused-deputy, privilege escalation via weaker model"
          example_techniques: ["MITRE_ATLAS:AML.T0051 (LLM Prompt Injection)", "OWASP_LLM_Top_10:LLM01-LLM10", "Canon XXVIII §51.4 multi-model trust"]
          required_when: "Build deploys LLM-backed agents OR composes multi-model architectures OR adversarial_environment ∈ {adversarial_users, nation_state}"
        governance:
          description: "Compliance + audit + policy violation surface — unauthorized framework override, audit-log tampering, BAA non-compliance, DPIA absent for high-risk processing"
          example_techniques: ["compliance_framework_drift rules per Section 9.5"]
          required_when: "Build selects ≥1 compliance framework"

    technique_id_taxonomy:
      description: "Recognized framework taxonomy IDs that technique_id may reference"
      added_in_template_version: "2.2.2"
      registries:
        MITRE_ATLAS:
          format: "AML.T<NNNN>"
          examples: ["AML.T0010 (ML Supply Chain Compromise)", "AML.T0051 (LLM Prompt Injection)", "AML.T0048 (Erode ML Model Integrity)"]
          source: "https://atlas.mitre.org/"
        OWASP_LLM_Top_10:
          format: "LLM<NN>"
          examples: ["LLM01 (Prompt Injection)", "LLM02 (Insecure Output Handling)", "LLM07 (Insecure Plugin Design)"]
          source: "https://owasp.org/www-project-top-10-for-large-language-model-applications/"
        OWASP_ASVS:
          format: "V<N>.<N>.<N>"
          examples: ["V1.5.4 (Trust Boundaries)", "V5.1.1 (Input Validation)"]
          source: "https://owasp.org/www-project-application-security-verification-standard/"
        CWE:
          format: "CWE-<N>"
          examples: ["CWE-78 (OS Command Injection)", "CWE-89 (SQL Injection)"]
          source: "https://cwe.mitre.org/"
    example:
      reference: "EEF parent manifest helix/corso/builds/embodied-engineering-forge/manifest.yaml security_threat_model: (T-1..T-5 + T-7 + T-11; 5 binding mechanisms)"
    composition_with_security_compliance:
      description: "Section 6.5 selected_frameworks (e.g., GDPR, HIPAA) impose required T-N entries; this schema is what those frameworks compose against"
      validation_rule: "If selected_frameworks contains GDPR, security_threat_model.threats MUST contain at least one PII-exfiltration entry; similar conditional rules per framework per security_compliance.per_phase_compliance_check"
    composition_with_contracts:
      description: "Section 4.5 contracts.security_threat_contract.schema_pointer resolves to security_threat_model.threats[] + security_threat_model.scope_governor_binding (this schema)"
    validation_rules:
      - "Every T-N has unique id within the build manifest"
      - "Every T-N referenced in scope_governor_binding.<binding>.applies_to MUST exist in threats[]"
      - "Every T-N has owner declared (per Canon XXVI post-edit accountability)"
      - "SERAPH co-review HARD GATE at Phase 4 Harden verifies all T-N mitigations operational"
    webshell_render:
      widget: "threat_model_viewer"
      view_mode: "/builds/<codename>/phase/harden"
      update_signal: "sse_subscribe(threat_status_events)"

  branch_isolation:
    label: "Dedicated feat/<codename> branch created and checked out"
    blocking: true
    procedure:
      - "git checkout -b feat/<codename>  # from main/master — never build directly on main"
      - "Verify: git branch --show-current returns feat/<codename>"
    rationale: "Builds discovered mid-session on wrong branch (e.g. feat/other-build) produce commits that are hard to untangle; branch-first is the pre-flight gate that prevents this."
    skip_if: "Branch already exists and is checked out (re-entry after context loss)"

  worktree_isolation:
    label: "Parallel build runs in a dedicated git worktree, not the primary CWD"
    blocking: true
    trigger: "active.yaml lists ≥2 builds with status: in-progress simultaneously"
    skip_if: |
      Single active build (branch_isolation is sufficient) OR CI=true (workflow
      runners typically use fresh clones per job, not worktrees).

    naming_convention:
      path: "<repo-dir>-<codename>  # e.g. ~/Projects/lightarchitects-sdk-branching-coordinating-loom"
      slug_validation:
        regex: "^[a-zA-Z0-9][a-zA-Z0-9._-]{0,63}$"
        max_length: 64
        reject: ["leading dot (hidden dir)", "leading dash (flag confusion)", ".", "..", "leading or trailing slash"]
        rationale: |
          Codename becomes a directory segment under ~/Projects/ and a git branch ref.
          Validate before any 'git worktree add' or 'mkdir' invocation.
        anchor: "CC fork worktree.ts:48-87 (VALID_WORKTREE_SLUG_SEGMENT, MAX_WORKTREE_SLUG_LENGTH)"

    procedure:
      - |
        # 1. PRE-EXISTENCE CHECK — guard against stray dirs from manual mkdir or aborted clone.
        # If path exists, it MUST already be a registered worktree for feat/<codename>:
        if [ -e ~/Projects/<repo>-<codename> ]; then
          git -C <canonical_repo> worktree list --porcelain \
            | awk -v p="$HOME/Projects/<repo>-<codename>" '$0 == "worktree " p { found=1 } END { exit !found }' \
            || { echo "Path exists but is not the expected worktree — escalate"; exit 1; }
        fi
      - |
        # 2. ANTI-NESTING — must run from canonical repo root, not inside another worktree.
        # Anchor: CC fork worktree.ts:922-926 (findCanonicalGitRoot vs findGitRoot).
        cd <canonical_repo>
        test "$(git rev-parse --path-format=absolute --git-common-dir)" = "<canonical_repo>/.git"
      - |
        # 3. WORKTREE EXISTS? Detect via porcelain output (anchored exact-match — avoids
        # 'feat/<codename>-old' substring collisions and dynamic-width plain-output brittleness).
        # Anchor: CC fork getWorktreePaths.ts:23, 41-49.
        if git worktree list --porcelain \
             | awk '/^branch refs\/heads\/feat\/<codename>$/ { found=1 } END { exit !found }'; then
          cd ~/Projects/<repo>-<codename>   # fast-resume — worktree already exists
        else
          # 4. CREATE — guarded -B (CC fork uses -B unconditionally because its agent worktrees
          # are disposable; LASDLC feat/<codename> branches are durable, so guard against
          # destroying unmerged work). Anchor: CC fork worktree.ts:326-328.
          if git show-ref --verify --quiet refs/heads/feat/<codename> \
             && [ "$(git rev-list feat/<codename> --not main --count)" -gt 0 ]; then
            # Branch exists with unmerged commits — use -b (no reset) to preserve work:
            git worktree add ~/Projects/<repo>-<codename> feat/<codename>
          else
            # Branch absent OR no unmerged commits — safe to use -B (resets orphan refs):
            git worktree add -B feat/<codename> ~/Projects/<repo>-<codename> main
          fi
          cd ~/Projects/<repo>-<codename>
        fi
      - |
        # 5. VERIFY — at session start, before ANY file edit or commit:
        pwd                         # MUST be inside ~/Projects/<repo>-<codename>
        git branch --show-current   # MUST return feat/<codename>

    rationale: |
      Two parallel Claude Code tabs sharing the same primary CWD silently work on
      whichever branch that CWD is currently checked out on. The second tab overwrites
      the first tab's branch context whenever 'git checkout' happens. A dedicated
      worktree path is permanently bound to feat/<codename> by convention — the CWD
      itself becomes the isolation guarantee.

      What git enforces: branch uniqueness across worktrees (a branch cannot be
      simultaneously checked out in two worktrees — git errors with "already used
      by worktree at <path>").

      What LASDLC enforces (convention, not git): path↔branch stability — the
      worktree path remains permanently bound to feat/<codename> for the lifetime
      of the build. Codex (codex-rs/git-utils/src/info.rs) deliberately does not
      enforce this either; both tools rely on convention at the orchestration layer.

    agent_rule: |
      At session start, the coding agent MUST verify:
        1. git branch --show-current == feat/<codename>
        2. pwd is inside the expected worktree path (not the primary repo CWD)
      If either check fails: cd to the correct worktree path before taking ANY action.
      Checking out a different branch inside a worktree breaks the LASDLC path↔branch
      contract this rule depends on. Git enforces uniqueness (a branch cannot be
      checked out in two worktrees) but does not enforce path↔branch stability —
      that is convention, owned by the operator.
      Use 'git -C <worktree_path>' if running git commands from outside the worktree.

    cleanup: |
      After merge to main — three fail-closed preconditions (run in parallel; order
      independent — Promise.all semantics, anchor: CC fork worktree.ts:1098-1117):

        1. git -C <worktree> --no-optional-locks status --porcelain -uno   # MUST be empty
        2. git -C <worktree> rev-list --max-count=1 HEAD --not --remotes  # MUST be empty (HEAD pushed)
        3. git -C <worktree> stash list                                   # MUST be empty

      Known blind spots (must be addressed by the agent BEFORE cleanup is invoked):
        - 'status --porcelain -uno' suppresses untracked files. New untracked files
          do NOT block cleanup — agent must 'git add' or remove untracked files first.
        - 'rev-list HEAD --not --remotes' only checks HEAD. Unpushed commits on other
          local branches in this worktree are invisible.
        - '--no-optional-locks' (CC fork worktree.ts:1104) prevents write-lock contention
          when another tab is mid-commit; required for parallel-cleanup safety.

      On any non-zero exit OR non-empty output: SKIP removal, log, escalate to user.
      Only on all-clear:
        git worktree remove ~/Projects/<repo>-<codename>
        git -C <canonical_repo> worktree prune              # CC fork worktree.ts:1128 — clears stale admin entries
        git -C <canonical_repo> branch -d feat/<codename>  # lowercase -d: refuses unmerged; never -D in cleanup

      Note on the 30-day stale-worktree sweep (CC fork cleanupStaleAgentWorktrees,
      worktree.ts:1029-1041): only matches ephemeral patterns (agent-a*, wf_*,
      bridge-*, job-*). LASDLC feat/<codename> branches are user-named and
      explicitly NOT in that pattern set — cleanup is always manual.

    concurrency_notes: |
      - Concurrent commits across worktrees do NOT contend on .git/index.lock — each
        worktree has its own index at .git/worktrees/<name>/index.
      - 'git gc --auto' DOES lock shared .git/objects/pack/.tmp-*. Recommend setting
        'gc.auto=0' on the canonical repo OR documenting the risk to the operator.
      - 'git fetch' from any worktree updates shared .git/objects and .git/refs.
        Concurrent fetches usually serialize cleanly but can produce transient pack
        conflicts; prefer fetching from the canonical repo only.
      - macOS: paths from 'git worktree list --porcelain' should be normalized to NFC
        (CC fork getWorktreePaths.ts:53) — HFS+ may decompose filenames containing
        combining characters, breaking exact-match comparisons.

  spec_validation:
    label: "Approved specification exists with clear scope"
    blocking: true
    skill: "/PLAN"
    fallback: "Verify plan.md exists and has acceptance criteria"

  dependency_audit:
    label: "Dependency tree clean (no CVEs, licenses approved)"
    blocking: true
    fallback: "cargo deny check"

  sibling_impact:
    label: "Identify which siblings consume changed crates/modules"
    blocking: true
    skip_if: "No shared crate/package changes"

  architecture_defaults:
    label: "Architectural decisions documented (cloud/local, OSS/paid, DB, embedding, LLM)"
    blocking: false
    defaults:
      cloud_vs_local: "local first"
      oss_vs_paid: "OSS/free first"
      database: "SQLite → Neo4j (file → graph)"
      embedding: "local ONNX → Ollama → cloud"
      llm: "Anthropic → Ollama → local llama.cpp"

  risk_analysis:
    label: "Top 3 failure modes identified with mitigations"
    blocking: true
    skill: "/PLAN"
    output: "Risk register with impact × probability scores"

# ============================================================================
# SECTION 6.5: SECURITY + COMPLIANCE FRAMEWORKS (NEW v2.1.0 per Phase B-2)
# ============================================================================
# Selectable security + compliance frameworks the build conforms to. Each
# framework declares scope + required_artifacts + verification_predicate.
# Composes with security_threat_model (per-build threats) — frameworks are
# regulatory/standardization layers; threat_model is build-specific.

security_compliance:
  description: |
    A build plan declares which security + compliance frameworks it commits
    to conforming to. Each framework has a defined scope, required artifacts
    (audit logs, attestations, controls), and per-phase verification predicates.
    Selection is operator-driven: not every build needs every framework.
    Frameworks REQUIRED by the build's category (e.g. healthcare → HIPAA;
    EU AI deployment → EU AI Act) MUST be selected; frameworks OPTIONAL based
    on go-to-market positioning are operator's call.
  source_memory: "Kevin scope clarification 2026-05-04 (v2.1.0 directive — security frameworks as selectable requirements)"
  added_in_template_version: "2.1.0"
  composes_with: ["security_threat_model (Section 6 pre_flight)", "Canon XXVIII (Boundary Sanitization)", "Canon XVII (Hard Constraints)"]

  available_frameworks:
    SOC_2_Type_II:
      scope: "Trust services criteria — security, availability, processing integrity, confidentiality, privacy"
      jurisdiction: "Common B2B SaaS expectation; auditor-attested"
      required_artifacts: ["audit log retention ≥ 1 year", "access control matrix", "change management records", "incident response runbook", "vendor management list"]
      verification_predicate: "Annual SOC 2 audit by certified CPA firm; per-build audit trail proves controls operating effectively"
      lasdlc_mapping: "AYIN audit log (Canon XXVI) + ScopeGovernor binding (security_threat_model.scope_governor_binding) + Canon XXVIII boundary sanitization"
      operator_visibility: "high — most B2B prospects ask"
      example_selection_trigger: "Selling to enterprise B2B; vendor security questionnaire requires SOC 2"

    ISO_27001:
      scope: "Information Security Management System (ISMS) — risk-based controls + continuous improvement"
      jurisdiction: "International standard; common in EU + APAC enterprise"
      required_artifacts: ["statement of applicability (SoA)", "risk treatment plan", "internal audit reports", "management review minutes"]
      verification_predicate: "Initial certification + annual surveillance audits + 3-year recertification"
      lasdlc_mapping: "security_threat_model T-N entries + Section 6 risk_analysis + close_out.spec_audit"
      operator_visibility: "medium — selectively asked"
      example_selection_trigger: "Selling to ISO-mandating verticals (financial services, healthcare in some regions)"

    HIPAA:
      scope: "US healthcare protected health information (PHI) — administrative, physical, technical safeguards"
      jurisdiction: "United States healthcare"
      required_artifacts: ["business associate agreements (BAA)", "PHI access logs", "breach notification procedures", "risk analysis (NIST 800-66 aligned)"]
      verification_predicate: "Self-attestation + Office for Civil Rights audit eligibility + breach notification within 60 days"
      lasdlc_mapping: "AYIN redaction layer (PHI patterns) + security_threat_model T-N (PHI exfiltration threats) + agent_capability_declaration (agents handling PHI must be declared)"
      operator_visibility: "high in healthcare verticals"
      example_selection_trigger: "Build touches PHI (clinical data, patient identifiers, treatment records)"

    GDPR:
      scope: "EU data subjects — lawful basis, data minimization, right to erasure, data portability, breach notification"
      jurisdiction: "European Union (extraterritorial reach for any EU data subject)"
      required_artifacts: ["records of processing activities (RoPA)", "data protection impact assessments (DPIA) for high-risk processing", "data subject request workflows", "DPO appointment if applicable"]
      verification_predicate: "Self-attestation + supervisory authority audit eligibility + 72-hour breach notification"
      lasdlc_mapping: "AYIN redaction (PII patterns) + Canon XXVIII boundary sanitization + agent_capability_declaration (agents touching EU data)"
      operator_visibility: "very high for any EU-facing product"
      example_selection_trigger: "Any user identifier or behavioral data from EU residents"

    EU_AI_Act:
      scope: "EU AI risk-tier classification (unacceptable, high-risk, limited-risk, minimal-risk) + corresponding obligations"
      jurisdiction: "European Union (extraterritorial for AI systems serving EU users)"
      required_artifacts: ["AI system risk classification", "technical documentation per Annex IV", "conformity assessment for high-risk", "human oversight measures", "transparency obligations"]
      verification_predicate: "Self-classification + notified body assessment for high-risk + post-market monitoring"
      lasdlc_mapping: "agentic.hitl_protocol (human oversight) + operator_experience_layer (transparency) + agent_capability_declaration (system documentation) + Canon XXXIII (independent verification = required for high-risk)"
      operator_visibility: "rising rapidly; B2B EU customers asking"
      example_selection_trigger: "AI system serves EU users OR high-risk classification (e.g., HR/credit/biometric/critical-infrastructure)"

    NIST_CSF:
      scope: "Identify, Protect, Detect, Respond, Recover — cybersecurity framework"
      jurisdiction: "US federal expectation; widely adopted by enterprise"
      required_artifacts: ["asset inventory", "risk assessment", "incident response plan", "recovery objectives (RTO/RPO)"]
      verification_predicate: "Self-assessment + tier rating (Partial → Risk Informed → Repeatable → Adaptive)"
      lasdlc_mapping: "security_threat_model + Section 6 risk_analysis + AYIN observability + Canon XXVI post-edit gates"
      operator_visibility: "medium — common framework for security questionnaires"
      example_selection_trigger: "US federal customers OR enterprise expecting NIST alignment"

    PCI_DSS:
      scope: "Payment card industry data security — cardholder data environment (CDE) controls"
      jurisdiction: "Global; payment card networks"
      required_artifacts: ["network segmentation", "encryption of CHD at rest + in transit", "access control with MFA", "vulnerability scans (quarterly)", "penetration tests (annual)"]
      verification_predicate: "Self-assessment questionnaire (SAQ) OR Report on Compliance (ROC) by QSA + quarterly ASV scans"
      lasdlc_mapping: "security_threat_model T-N (cardholder data threats) + AYIN redaction (PAN patterns) + Section 6 dependency_audit (CVE tracking)"
      operator_visibility: "very high if processing payments"
      example_selection_trigger: "Build processes, stores, or transmits cardholder data"

    FedRAMP:
      scope: "US Federal cloud authorization — Low/Moderate/High impact baselines per FIPS 199"
      jurisdiction: "US Federal government"
      required_artifacts: ["System Security Plan (SSP)", "Plan of Action and Milestones (POA&M)", "continuous monitoring", "FedRAMP Marketplace listing"]
      verification_predicate: "3PAO assessment + Joint Authorization Board (JAB) provisional authorization OR agency authorization"
      lasdlc_mapping: "Heavy — multiple security_threat_model entries + Canon XXVIII + Canon XXXIII independent verification mandatory + extensive observability_contract"
      operator_visibility: "high if pursuing US federal market"
      example_selection_trigger: "Selling to US federal agencies OR contractors"

    OWASP_ASVS:
      scope: "Application Security Verification Standard — Levels 1/2/3 (basic / standard / advanced)"
      jurisdiction: "Global; community-maintained"
      required_artifacts: ["ASVS checklist by Level", "evidence per requirement", "test cases for each verifiable requirement"]
      verification_predicate: "Self-assessment OR third-party verification at chosen Level"
      lasdlc_mapping: "Canon XXVIII boundary sanitization + Canon XXVII test pyramid + security_threat_model"
      operator_visibility: "medium — engineering-credibility signal"
      example_selection_trigger: "Engineering-led organization adoption; supplements compliance frameworks"

    CCPA_CPRA:
      scope: "California consumer privacy — right to know, delete, opt-out of sale, limit use of sensitive PI"
      jurisdiction: "California (extraterritorial for any business with CA consumer data + revenue threshold)"
      required_artifacts: ["privacy policy with required disclosures", "consumer request workflows", "opt-out mechanisms (Do Not Sell)", "service provider contracts"]
      verification_predicate: "Self-attestation + AG enforcement actions + consumer civil action exposure"
      lasdlc_mapping: "AYIN redaction (CA consumer data patterns) + agent_capability_declaration.data_handling.classification: PII + jurisdictions: [US_CALIFORNIA_CCPA]"
      operator_visibility: "high for US consumer-facing products"
      example_selection_trigger: "Service to CA residents AND meets revenue/data-volume thresholds"

    # ─── AI-system-security frameworks (NEW v2.2.1 per SEC-C2 fix) ──
    OWASP_LLM_Top_10:
      scope: "OWASP Top 10 for Large Language Model Applications — LLM-specific attack surface (LLM01 prompt injection, LLM02 insecure output handling, LLM03 training data poisoning, LLM04 model denial-of-service, LLM05 supply chain, LLM06 sensitive information disclosure, LLM07 insecure plugin design, LLM08 excessive agency, LLM09 overreliance, LLM10 model theft)"
      jurisdiction: "Global; OWASP-maintained community standard; emerging de-facto for LLM applications"
      required_artifacts: ["prompt-injection test suite (LLM01)", "output sanitization audit (LLM02)", "supply-chain scan for model + embedding deps (LLM05)", "data-loss-prevention scan on model outputs (LLM06)", "plugin allow-list with permission scoping (LLM07)", "agent-permission ratchet logs (LLM08)", "human-in-loop gates for high-stakes decisions (LLM09)", "model fingerprint + access controls (LLM10)"]
      verification_predicate: "Per-LLM01-10 test suite passes; security_threat_model.threats contains ≥1 entry per applicable LLM-N with threat_class: ai_system + technique_id citing OWASP_LLM_Top_10:LLM<NN>; Canon XXVIII §51.4 multi-model trust extension applied if multi-model architecture"
      lasdlc_mapping: "Section 6 security_threat_model_schema.threats[threat_class: ai_system] + technique_id citing OWASP_LLM_Top_10:LLM01-LLM10 (v2.2.2 — REAL binding; threat_class enum + technique_id field landed) + Canon XXVIII boundary sanitization + agentic.hitl_protocol (high-stakes gating per LLM08/LLM09) + Section 9.5 drift_management.prompt_drift (LLM01) + Section 9.5 drift_management.dependency_drift (LLM05)"
      operator_visibility: "rising rapidly for any LLM-based product; AI-engineering-credibility signal"
      example_selection_trigger: "Build deploys LLM-backed agents AND interacts with untrusted user input OR consumes untrusted external content"

    MITRE_ATLAS:
      scope: "MITRE Adversarial Threat Landscape for AI Systems — attack-pattern taxonomy for AI/ML systems modeled after MITRE ATT&CK (Reconnaissance → Resource Development → Initial Access → ML Model Access → Execution → Persistence → Defense Evasion → Discovery → Collection → ML Attack Staging → Exfiltration → Impact)"
      jurisdiction: "Global; MITRE-maintained; reference framework for AI red-teaming"
      required_artifacts: ["AI threat model mapped to ATLAS tactics", "adversarial-input test corpus", "model-access audit logs", "evasion-resistance evidence", "exfiltration detection mechanisms"]
      verification_predicate: "Threat model entries cite ATLAS technique_id (e.g. MITRE_ATLAS:AML.T0051 LLM Prompt Injection); SERAPH red-team pass at Phase 4 Harden uses ATLAS as taxonomy; SERAPH HARD GATE confirms threat_class: ai_system entries cover applicable ATLAS tactics"
      lasdlc_mapping: "Section 6 security_threat_model_schema.threats[threat_class: ai_system] + technique_id citing MITRE_ATLAS:AML.T<NNNN> (v2.2.2 — REAL binding; threat_class enum + technique_id field landed) + SERAPH HARD GATE Phase 4 + Section 9.5 drift_management.prompt_drift"
      operator_visibility: "high in regulated AI deployments + research"
      example_selection_trigger: "Build deploys AI/ML system in adversarial environment OR composes AI-system-security with EU AI Act high-risk obligations"

  selected_frameworks:
    description: "Build declares which frameworks apply. Use the canonical key from available_frameworks above."
    schema: "List of framework keys (e.g., [SOC_2_Type_II, GDPR, EU_AI_Act])"
    default: []
    example: "[SOC_2_Type_II, GDPR, EU_AI_Act]   # for B2B SaaS selling to EU enterprise with AI features"

  # ─── compliance_override_log schema (v2.2.2 SEC-C3-PHANTOM fix) ──
  compliance_override_log:
    description: "Phantom-field fix: schema for recording operator overrides of auto_derivation_rules (referenced from Section 0.5 risk_classification_required.operator_override_protocol but never defined in v2.2.1)"
    added_in_template_version: "2.2.2 (SEC-C3-PHANTOM fix)"
    block_path: "manifest.yaml compliance_override_log: (per-build)"
    schema:
      override_id: "<UUID or sequential ID>"
      framework_overridden: "<framework key from available_frameworks; e.g. EU_AI_Act>"
      auto_derivation_rule_violated: "<rule_id; e.g. ai_risk_tier ∈ {high, unacceptable} → EU_AI_Act>"
      reason: "<operator-supplied rationale; non-trivial>"
      operator: "<operator name OR session_id>"
      laex_layer_1_signoff: "<LÆX Canon Keeper signature; pending OR signed>"
      laex_layer_4_signoff: "<LÆX GTM signature; pending OR signed>"
      decided_at: "<ISO timestamp>"
      hitl_question_id: "<AskUserQuestion ID that surfaced this override>"
    validation_rules:
      - "Every override entry MUST have non-empty reason; trivial reasons (e.g. 'not needed') REJECTED at HITL"
      - "LÆX Layer 1 signoff REQUIRED for any auto_derivation_rule override"
      - "LÆX Layer 4 signoff REQUIRED if compliance scope being reduced (e.g. dropping HIPAA when PHI present)"
      - "Override expires after 90 days; re-verification required"
    webshell_render:
      widget: "compliance_override_log_panel"
      view_mode: "/builds/<codename>/compliance/overrides"
      update_signal: "sse_subscribe(compliance_override_events)"

  per_phase_compliance_check:
    description: "Per-phase: which selected frameworks impose verification at that phase boundary"
    schema: "phase → [{ framework, requirement, gate_predicate }]"
    example:
      Plan:
        - { framework: "EU_AI_Act", requirement: "AI system risk classification declared", gate_predicate: "manifest.risk_classification.ai_risk_tier ∈ {minimal, limited, high, unacceptable}", testable: true }
        - { framework: "GDPR", requirement: "DPIA scope identified", gate_predicate: "v2.2.2 SEC-H1 fix: file <build_root>/.compliance/gdpr-dpia.md exists AND contains required sections (lawful_basis, data_subjects, processing_categories, risk_assessment, mitigation_measures); checked via grep for required headers", testable: true, file_path: "<build_root>/.compliance/gdpr-dpia.md" }
      Harden:
        - { framework: "SOC_2_Type_II", requirement: "Audit log retention ≥ 1y configured", gate_predicate: "AYIN trace retention_days field in manifest ≥ 365 AND sample audit log probe returns events from ≥365d window", testable: true }
        - { framework: "PCI_DSS", requirement: "Vulnerability scan run", gate_predicate: "cargo audit + sonatype-guide pass with no high-severity unaddressed; output captured in <build_root>/.compliance/pci-vuln-scan-<timestamp>.json", testable: true }
      Ship:
        - { framework: "FedRAMP", requirement: "POA&M updated", gate_predicate: "v2.2.2 SEC-H1 fix: file <build_root>/.compliance/poa-m.csv exists; row count for current build > 0 OR row count delta from prior ship ≥ 1; new rows have status_field populated", testable: true, file_path: "<build_root>/.compliance/poa-m.csv" }
      Learn:
        - { framework: "ISO_27001", requirement: "Internal audit log entry", gate_predicate: "v2.2.2 SEC-H1 fix: helix entry tagged isms_audit_register exists at helix/user/{user_id}/projects/{project_id}/isms-audit-register.md AND has new entry for this build_codename + build_completion_date", testable: true, file_path: "helix/user/{user_id}/projects/{project_id}/isms-audit-register.md" }

  webshell_render:
    widget: "compliance_dashboard"
    view_mode: "/builds/<codename>/compliance"
    update_signal: "sse_subscribe(compliance_check_events)"
    summary_format: "Per-framework status badge (green/yellow/red) + per-phase compliance-check completion %; drill-down to per-requirement evidence"

  composition_with_security_threat_model:
    description: |
      security_threat_model declares per-build T-N threats with mitigations.
      security_compliance declares which compliance frameworks the build
      conforms to. The two compose:
        - Selecting GDPR triggers required T-N for PII exfiltration if not present
        - Selecting HIPAA triggers required T-N for PHI exfiltration if not present
        - Selecting EU_AI_Act high-risk tier triggers Canon XXXIII independent verification as MANDATORY
      Tooling reads selected_frameworks and verifies threat_model has the
      regulatorily-required threat entries.

  # v2.4.1 — Concrete control + practice checklists per LDB N=1 D6b/D6f/D6j findings
  iso_27001_27034_control_checklist:
    description: |
      Concrete ISO/IEC 27001 (information security management) + ISO/IEC 27034
      (application security) control checklist for builds. Closes LDB N=1
      D6b finding ("control mapping incomplete; delegated to LÆX Layer 1+4
      without concrete checklist"). Each control has owner + evidence
      artifact path + mechanical predicate where possible.
    added_in_template_version: "2.4.1"
    source_standards: ["ISO/IEC 27001:2022 Annex A", "ISO/IEC 27034:2011-2018 application security lifecycle"]
    triggered_by: "selected_frameworks contains ISO_27001 OR ISO_27034 OR security_classification ∈ {Restricted, Secret}"
    iso_27001_annex_a_controls:
      - { control_id: "A.5.1", domain: "Organizational - Policies", requirement: "Information security policies defined", owner: "LÆX Layer 1", evidence_artifact: "<build_root>/.compliance/iso27001-policies.md", gate_predicate: "file exists AND contains 'classification' + 'access_control' + 'incident_response' headers" }
      - { control_id: "A.5.7", domain: "Organizational - Threat intelligence", requirement: "Threat intelligence collected + analyzed", owner: "SERAPH", evidence_artifact: "section_6.security_threat_model entries", gate_predicate: "≥1 threat per entry_point per §6.h" }
      - { control_id: "A.6.1", domain: "People - Screening", requirement: "Personnel screening", owner: "LÆX Layer 1", evidence_artifact: "out-of-scope for build artifact; org-level", gate_predicate: "N/A at build level" }
      - { control_id: "A.7.4", domain: "Physical - Physical security monitoring", requirement: "Physical access monitored", owner: "operator (deployment host)", evidence_artifact: "deployment-environment-attestation", gate_predicate: "out-of-scope for spec; operator attests at deploy time" }
      - { control_id: "A.8.1", domain: "Technological - User endpoint devices", requirement: "Endpoint security baseline", owner: "operator", evidence_artifact: "out-of-scope for build artifact", gate_predicate: "N/A at build level" }
      - { control_id: "A.8.5", domain: "Technological - Secure authentication", requirement: "Authentication mechanisms secure", owner: "CORSO GUARD", evidence_artifact: "<build_root>/.security/auth-audit.md", gate_predicate: "no plaintext credentials; MFA where applicable; cookbook §44 enforced" }
      - { control_id: "A.8.9", domain: "Technological - Configuration management", requirement: "Configurations managed + versioned", owner: "CORSO", evidence_artifact: "git history of manifest.yaml + .config/ files", gate_predicate: "all config files version-controlled; no untracked .env in commit history" }
      - { control_id: "A.8.16", domain: "Technological - Monitoring activities", requirement: "Activities monitored", owner: "AYIN", evidence_artifact: "AYIN traces at <build_root>/.observability/", gate_predicate: "tracing instrumented per §2.6 observability_contract" }
      - { control_id: "A.8.23", domain: "Technological - Web filtering", requirement: "Web filtering for outbound", owner: "operator (network)", evidence_artifact: "out-of-scope for build", gate_predicate: "N/A at build level" }
      - { control_id: "A.8.25", domain: "Technological - Secure development lifecycle", requirement: "SDLC defined + followed", owner: "LÆX Layer 4", evidence_artifact: "this LASDLC template + per-build manifest", gate_predicate: "build manifest references LASDLC v2.4.0+ template_version" }
      - { control_id: "A.8.28", domain: "Technological - Secure coding", requirement: "Secure coding standards", owner: "CORSO GUARD", evidence_artifact: "Builders Cookbook + clippy/eslint output", gate_predicate: "cargo clippy --all-targets -- -D warnings passes; cookbook §44 complexity ≤10" }
      - { control_id: "A.8.29", domain: "Technological - Security testing", requirement: "Security testing per release", owner: "SERAPH (D6i live pen-test)", evidence_artifact: "<build_root>/.security/pen-test-report.md", gate_predicate: "zero CRITICAL findings unfixed; HIGH require operator sign-off per LDB §7.7 D6i" }
      - { control_id: "A.8.32", domain: "Technological - Change management", requirement: "Changes controlled", owner: "LÆX Layer 1+4", evidence_artifact: "git PR history + LASDLC phase gates", gate_predicate: "every phase boundary cleared via §8 [A+S+Q+C+O+P+K+D+T+R] gates; squad_review per §1.9.0" }
    iso_27034_application_security_lifecycle:
      - { lifecycle_phase: "Inception", requirement: "Security requirements identified", maps_to: "§0.4 preflight_establishment_wizard + §0.5 risk_classification + §6 pre_flight.security_threat_model", evidence: "wizard answers + threat_model entries" }
      - { lifecycle_phase: "Architecture & Design", requirement: "Security controls specified", maps_to: "§6.5 selected_frameworks + iso_27001_27034_control_checklist (this block)", evidence: "checklist controls each owner-assigned" }
      - { lifecycle_phase: "Implementation", requirement: "Secure coding applied", maps_to: "§8 quality_dimensions.Security + §8.6 code_quality_efficiency_precision", evidence: "automated checks + SERAPH review" }
      - { lifecycle_phase: "Verification", requirement: "Security verification + pen-test", maps_to: "§7.5 post_implementation_validation_cycle + §7.7 LDB D6 + D6i live pen-test", evidence: "D6 sub-component scores + pen-test report" }
      - { lifecycle_phase: "Deployment", requirement: "Secure deployment", maps_to: "§9.7 lightarchitects_first_dispatch + deploy procedures", evidence: "deploy logs + signed SBOM (D6g)" }
      - { lifecycle_phase: "Operations", requirement: "Security monitoring + incident response", maps_to: "AYIN traces + §9.5 drift_management + §6.5 compliance_override_log", evidence: "trace data + drift detection alerts + override entries" }
    review_cadence: "annual OR per minor version bump (whichever first); LÆX Layer 1+4"

  nist_ssdf_practice_list:
    description: |
      NIST SP 800-218 Secure Software Development Framework practice list
      mapped to LASDLC sections. Closes LDB N=1 D6f finding ("delegated
      to LÆX Layer 1+4 process audit; no concrete practice list"). Each
      practice (PO/PS/PW/RV families) has LASDLC section mapping +
      mechanical predicate where possible.
    added_in_template_version: "2.4.1"
    source_standard: "NIST SP 800-218 Secure Software Development Framework v1.1 (2022)"
    # v2.4.2: cache_path + verbatim source anchor per Canon XXXV [3]
    cache_path: "<HELIX>/user/standards/industry-baselines/security/nist/nist-ssdf-v1.1-2026-05-04.md (publication metadata) + nist/nist-ssdf-practices-2026-05-04.md (practice summary)"
    verbatim_source_quote: "Souppaya, Scarfone, Dodson, NIST SP 800-218 Feb 2022: This document recommends the Secure Software Development Framework (SSDF) – a core set of high-level secure software development practices that can be integrated into each SDLC implementation. Following these practices should help software producers reduce the number of vulnerabilities in released software, mitigate the potential impact of the exploitation of undetected or unaddressed vulnerabilities, and address the root causes of vulnerabilities to prevent future recurrences."
    v1_1_changes_from_2020: "Added PO.5 (Implement and Maintain Secure Environments for Software Development); added PO.1.2 (security requirements documentation); added PS.3.2 (component provenance for software releases); added PW.1.2 (track security requirements/risks/design decisions)"
    ref: "[19]"
    triggered_by: "selected_frameworks contains NIST_SSDF OR security_classification ∈ {Restricted, Secret} OR ai_risk_tier ≠ none"
    practices:
      # PO — Prepare the Organization
      - { practice_id: "PO.1.1", family: "Prepare", requirement: "Define security requirements for software development", maps_to: "§0.4 preflight_establishment_wizard q4 (compliance frameworks) + §0.5 northstar_first_planning + §6 pre_flight.security_threat_model", predicate: "preflight wizard completion + threat model entries ≥1 per entry_point" }
      - { practice_id: "PO.1.2", family: "Prepare", requirement: "Implement roles + responsibilities for SDLC", maps_to: "§4 agent_topology_schema + §6.5 LÆX Layer 1+4 review", predicate: "manifest.yaml agent_topology declares owners; LÆX review on minor bumps" }
      - { practice_id: "PO.2.1", family: "Prepare", requirement: "Provide role-based training", maps_to: "out-of-scope for spec; org-level practice", predicate: "operator attests at adoption time" }
      - { practice_id: "PO.3.1", family: "Prepare", requirement: "Implement supporting toolchains", maps_to: "Builders Cookbook + plugin ecosystem (CLAUDE.md plugin inventory) + §9.7 lightarchitects_first_dispatch", predicate: "tools enumerated in CLAUDE.md; Context7 + Firecrawl + AYIN integrations live" }
      - { practice_id: "PO.4.1", family: "Prepare", requirement: "Define + use criteria for software security checks", maps_to: "§8 quality_dimensions.Security criteria + §7.7 LDB D6 sub-components", predicate: "all D6a-j defined; quality_dimensions.Security has ≥5 mechanical criteria" }
      - { practice_id: "PO.5.1", family: "Prepare", requirement: "Implement + maintain secure environments for SDLC", maps_to: "§4.6 squad_coordination_across_hierarchy hand_off_protocol + worktree isolation per pre_flight", predicate: "worktree_isolation declared per build; hand-off records persisted at <build_root>/.handoff/" }
      # PS — Protect the Software
      - { practice_id: "PS.1.1", family: "Protect", requirement: "Protect all forms of code from unauthorized access + tampering", maps_to: "git version control + signed commits where applicable + §6.5 selected_frameworks ISO 27001 A.8.32 change management", predicate: "git history + signed-commit attestation if Restricted/Secret" }
      - { practice_id: "PS.2.1", family: "Protect", requirement: "Provide a mechanism for verifying software release integrity", maps_to: "§7.7 D6g SLSA + CycloneDX SBOM at <build_root>/.security/sbom.cdx.json", predicate: "signed SBOM exists at canonical path post-deploy" }
      - { practice_id: "PS.3.1", family: "Protect", requirement: "Archive + protect each software release", maps_to: "git tags + helix entries + §7.6 calibration substrate", predicate: "release tagged + helix entry written + .calibration/<codename>.* recorded" }
      # PW — Produce Well-Secured Software
      - { practice_id: "PW.1.1", family: "Produce", requirement: "Design software to meet security requirements + mitigate security risks", maps_to: "§0.5 risk_classification + §6 threat_model + §6.5 iso_27001_27034_control_checklist", predicate: "risk_classification populated per §0.5; threat_model entries ≥1 per entry_point; controls owner-assigned" }
      - { practice_id: "PW.2.1", family: "Produce", requirement: "Review software design to verify compliance with security requirements", maps_to: "§4.6 squad_coordination + Plan.squad_review (CORSO + SERAPH minimum for Restricted/Secret) + §1.9.0 review framework", predicate: "squad_review completed per phase boundary" }
      - { practice_id: "PW.4.1", family: "Produce", requirement: "Reuse existing well-secured software when feasible", maps_to: "§0.6 inline_citation_protocol + sonatype-guide dep audit + Builders Cookbook reuse patterns", predicate: "deps audited via sonatype-guide; cookbook patterns referenced via cookbook:// URI scheme" }
      - { practice_id: "PW.5.1", family: "Produce", requirement: "Create source code by adhering to secure coding practices", maps_to: "Builders Cookbook + §8 quality_dimensions.Security + §8.6 code_quality_efficiency_precision", predicate: "clippy --all-targets -- -D warnings passes; complexity ≤10; no .unwrap() in prod" }
      - { practice_id: "PW.6.1", family: "Produce", requirement: "Configure compilation + build processes to improve executable security", maps_to: "Cargo.toml release profile + lto + opt-level + LASDLC §9.7 deploy procedures", predicate: "release builds use release profile + LTO; debug symbols stripped or attached" }
      - { practice_id: "PW.7.1", family: "Produce", requirement: "Review + analyze human-readable code", maps_to: "§4.6 squad_coordination + Plan.squad_review + §7.5 post_implementation_validation", predicate: "≥2 reviewers per LARGE-tier; CORSO + SERAPH for Restricted/Secret" }
      - { practice_id: "PW.8.1", family: "Produce", requirement: "Test executable code to identify vulnerabilities + verify compliance", maps_to: "§7.5 + §7.7 LDB D6 + D6i SERAPH live pen-test", predicate: "D6 sub-components scored; D6i pen-test completed for Restricted/Secret deployable" }
      - { practice_id: "PW.9.1", family: "Produce", requirement: "Configure software to have secure settings by default", maps_to: "§6.5 selected_frameworks default = empty (not safe) — recommendation: default to ISO_27001 + NIST_SSDF + OWASP_LLM_Top_10 for ai_risk_tier ≠ none builds", predicate: "selected_frameworks ≥3 declared OR explicit operator override with rationale" }
      # RV — Respond to Vulnerabilities
      - { practice_id: "RV.1.1", family: "Respond", requirement: "Identify + confirm vulnerabilities on an ongoing basis", maps_to: "§9.5 drift_management + sonatype-guide CVE detection + AYIN observability", predicate: "drift_management active; CVE scan in CI; no CRITICAL CVE >7d unfixed" }
      - { practice_id: "RV.2.1", family: "Respond", requirement: "Assess + prioritize the remediation of all vulnerabilities", maps_to: "§9.5 drift_management severity scoring + LÆX Layer 1+4 prioritization", predicate: "vulnerabilities ranked CRITICAL/HIGH/MEDIUM/LOW; remediation timeline assigned" }
      - { practice_id: "RV.3.1", family: "Respond", requirement: "Analyze vulnerabilities to identify root causes", maps_to: "QUANTUM forensic analysis + helix entry recording root cause", predicate: "post-incident helix entry sig ≥7.0 with root cause + mitigation" }
    review_cadence: "per minor version bump OR quarterly (whichever first); LÆX Layer 4"

  # ─── v2.5.0 assumption_register_validation (NEW per agentic adaptation)
  # Pre-flight check: every assumption declared in assumption_register has been
  # validated via its stated validation_method. Unvalidated assumptions block
  # Phase 1 entry. This is the machine-readable enforcement of the abstract
  # "Assume-In / Assume-Out" discipline.
  assumption_register_validation:
    # WHY: pre-flight gate that enforces every declared assumption has been
    #   validated via its stated method. Unvalidated assumptions block Phase 1
    #   entry, preventing agents from proceeding on unverified preconditions.
    label: "Assumption Register — all items validated via declared method"
    #   MAPS-TO: pre-flight.status_badge.label + risk_register_editor.header
    #   TYPE: string
    #   WHY: human-readable name of the gate shown to operator in webshell

    blocking: true
    #   MAPS-TO: pre-flight.status_badge.color (red = blocking, yellow = skipped)
    #   TYPE: bool
    #   WHY: true means Phase 1 cannot start until this gate passes; false would
    #   make it advisory-only

    skip_if: "assumption_register.count == 0 AND tier == SMALL (SMALL may opt out)"
    #   MAPS-TO: pre-flight.skip_reason_banner
    #   TYPE: string (predicate expression)
    #   WHY: SMALL tier with zero assumptions bypasses this gate to avoid
    #   unnecessary overhead on trivial edits

    added_in_template_version: "2.5.0"
    source_memory: "feedback_match_existing_convention.md + builders-cookbook §7.8"
    rationale: |
      Unvalidated assumptions are the #1 source of phantom-schema drift and
      cross-session confusion. When an assumption (e.g. "Neo4j is up") fails
      mid-build, the agent has no fallback context and reverts to guessing.
      Validating at pre-flight surfaces the failure early with known mitigation.
    procedure:
      #   MAPS-TO: pre-flight.executor.step_list (rendered as numbered checklist)
      #   TYPE: string[]
      #   WHY: ordered steps executed by the build runner before Phase 1 entry
      - "1. READ assumption_register from manifest frontmatter."
      - "2. For each item: execute item.validation_method."
      - "3. If method returns SUCCESS → mark item.validated = true."
      - "4. If method returns FAILURE → surface to operator via HITL: accept risk, fix condition, or abort build."
      - "5. If method is HITL-dependent → present AskUserQuestion with item.risk_if_false."
      - "6. If any item remains unvalidated after HITL → BLOCK Phase 1."
      - "7. Log validation results to active.yaml builds.<codename>.assumption_validation_log[]."
    operator_surface:
      ref: "operator_experience_layer.risk_register_editor"
      route: "/builds/<codename>/phase/pre-flight"
      labels:
        validated_item: "[icon] Assumption {id}: validated"
        pending_item: "[icon] Assumption {id}: awaiting validation"
        failed_item: "[icon] Assumption {id}: FAILED — {risk_if_false}"
        action_buttons: ["Validate now", "Accept risk", "Abort build"]
    log_schema:
      block_path: "active.yaml builds.<codename>.assumption_validation_log"
      entry:
        #   MAPS-TO: assumption_validation_log.timeline_entries[]
        #   TYPE: object[]
        #   WHY: append-only log consumed by webshell history timeline; each entry
        #   is immutable once written
        - assumption_id: "<string>"
          #   MAPS-TO: log_row.assumption_id + risk_register_editor.row_key
          #   TYPE: string
          #   WHY: links log entry back to assumption_register item for drill-down
        - validated_at: "<ISO timestamp>"
          #   MAPS-TO: log_row.timestamp + timeline sort key
          #   TYPE: string(ISO8601)
          #   WHY: enables chronological replay and SLA measurement
        - method_executed: "<string>"
          #   MAPS-TO: log_row.method_badge
          #   TYPE: string
          #   WHY: shows which validation method was run for auditability
        - result: "SUCCESS | FAILURE | HITL_ACCEPTED | HITL_REJECTED"
          #   MAPS-TO: log_row.status_chip (color-coded) + timeline dot color
          #   TYPE: enum
          #   WHY: four terminal states; no intermediate state allowed
        - operator_session_id: "<optional>"
          #   MAPS-TO: log_row.operator_link (click to session detail)
          #   TYPE: string | null
          #   WHY: traceability for HITL-decided results; null for automated checks
    webshell_binding:
      gate_status: "pre-flight.assumption_register_validation renders as red/yellow/green badge on build detail"
      drill_down: "Click badge → opens risk_register_editor filtered to assumption rows"

# ============================================================================
# SECTION 7: CLOSE-OUT (after final phase)
# ============================================================================
# Runs ONCE after the last execution phase completes.

close_out:
  cross_build_learning:
    label: "Retrospective — most expensive mistake, what to change, template additions"
    skill: "/REFLECT"
    questions:
      - "What was the most expensive mistake (time or tokens)?"
      - "What would you do differently?"
      - "What should be added to this template?"

  training_data:
    label: "Should execution traces feed Arena training?"
    skill: "/ENRICH"
    questions:
      - "Were there novel tool-use patterns worth preserving?"
      - "Did any phase produce training-quality examples?"

  cross_build_memory:
    label: "SOUL helix enrichment (if significance >= 7.0)"
    questions:
      - "What should SOUL remember for future builds?"
      - "Significance score (0-10)?"
    helix_write: true
    significance_threshold: 7.0

  spec_audit:
    label: "Compliance matrix — compliant / partial / deviates"
    skill: "/GATE"
    output: "Matrix of spec requirements vs. actual delivery"

  squad_review:
    label: "Multi-sibling SCRUM assessment (GOOD / GAPS / FIXES)"
    skill: "/SCRUM"
    mode: "plan_review"

  deploy_verification:
    label: "Final deploy check — binary, codesign, health, MCP reconnect"
    skill: "/DEPLOY"
    checks: [binary_built, codesigned, deployed, health_200, mcp_reconnect]

# ============================================================================
# SECTION 7.5: POST-IMPLEMENTATION VALIDATION CYCLE (NEW v2.2.0)
# ============================================================================
# Extends Section 7 close_out with the structured code → analysis →
# adjustment feedback loop validating against all 4 truth-source pyramid
# levels. Composes Section 2.5 loop_cycle for the post-implementation phase.

post_implementation_validation_cycle:
  description: |
    After implementation completes, validation runs the canonical 5-step
    loop (Section 2.5) one final time against all 4 truth-source pyramid
    levels (Section 4.7). Iterates until aggregate effectiveness score
    crosses threshold OR explicit defer-with-reason. Different from per-
    phase cross-validation: this is the integrative pass over the entire
    build's output, not just the phase that just completed.
  source_memory: "Kevin scope clarification 2026-05-04 (v2.2.0 directive — code → analysis → adjustment feedback loop against source of truth + Northstar + rubric + project architecture)"
  source_canons: ["XXVI (post-edit gates)", "XXXIII (independent verification)", "XXXIV (interval reporting)"]
  added_in_template_version: "2.2.0"

  integrative_validation_steps:
    - step: 1
      name: code_analysis
      description: "Read what was actually shipped — full diff, not summaries; actual deployed binary state"
      against_truth_source: "1_source_of_truth (actual code in repo + canon compliance)"
      mandatory_actions:
        - "git diff <merge-base>..HEAD on the program branch"
        - "Run all tests + capture coverage delta"
        - "Run cargo audit + sonatype-guide for any new deps"
        - "Read changed manifest files for canon compliance"
      output: "code_analysis_report at <build_root>/.validation/code-analysis-<timestamp>.md"

    - step: 2
      name: northstar_alignment_check
      description: "Verify shipped code advances the Northstar per Section 0.5 build_to_northstar_mapping"
      against_truth_source: "2_northstar"
      mandatory_actions:
        - "Re-read Northstar helix entry"
        - "Run northstar_assertion test (e.g., terminal_window_open_count === 0 for OD-10)"
        - "Compare expected delta from build_to_northstar_mapping.northstar_metric_delta_estimate vs measured"
      failure_action: "If shipped code does NOT advance Northstar: flag as scope drift; halt close_out; LÆX Layer 3 review"

    - step: 3
      name: rubric_score_compute
      description: "Compute aggregate effectiveness score per Architects Blueprint Part XIV (C1-C8 rubric, 8 components)"
      against_truth_source: "3_effectiveness_rubric"
      mandatory_actions:
        - "Score each of C1-C8 (see rubric); apply N/A escapes per HIGH fix 3"
        - "Compute weighted aggregate"
        - "Report as interval (Canon XXXIV) with width reflecting calibration confidence"
      gate_predicate: "Aggregate ≥ acceptance band (60-74% ACCEPTABLE; 75-89% STRONG; 90+ EXEMPLARY) per rubric §5"

    - step: 4
      name: architecture_conformance_check
      description: "Verify shipped code conforms to project's actual architecture; introduces no orphan patterns"
      against_truth_source: "4_project_architecture"
      mandatory_actions:
        - "Re-read project CLAUDE.md + per-crate CLAUDE.md (post-ship snapshot)"
        - "Spot-check: are new patterns consistent with existing reference impls?"
        - "Lightarchitects:knowledge agent dispatch for architecture-orientation pass"
      failure_action: "If new orphan patterns introduced (no reference impl): either retroactively document as architectural evolution OR refactor to existing pattern"

    - step: 5
      name: adjustment_or_close
      description: "Apply fix-its for any defects from steps 1-4; OR close build if all 4 pyramid levels validate"
      mandatory_actions:
        - "If defects found: feedback to fix-it cycle (Section 2.5 loop_cycle steps 4 + 5)"
        - "If all clear: write helix entry per close_out.cross_build_memory + invoke /ENRICH for 8-layer enrichment if sig ≥7.0"
        - "Update active.yaml builds[].status to 'shipped'"
        - "Final aggregate score recorded in helix entry (per rubric §6.3)"
      exit_condition: "Either (a) all 4 pyramid levels validate + aggregate score ≥ ACCEPTABLE → close_out; OR (b) iterate from step 1 with adjustments applied"

  iteration_limits:
    max_iterations: 3
    after_max: "Halt; surface to operator HITL — build may need scope re-think rather than further iteration"
    rationale: "If 3 cycles haven't closed validation, the build's premise is likely flawed (not its execution); operator decision required"

  composition_with_existing_blocks:
    section_2_5_loop_cycle: "This section IS loop_cycle applied at the build-level post-implementation; the per-phase loop runs during phases, this runs after final phase"
    section_4_7_truth_source_pyramid: "Steps 1-4 each validate against one pyramid level"
    section_7_close_out: "This section gates close_out (existing close_out blocks run AFTER this validation cycle passes)"

  webshell_render:
    widget: "post_impl_validation_cycle_progress"
    view_mode: "/builds/<codename>/validation"
    update_signal: "sse_subscribe(validation_cycle_events)"
    note: "/builds/<codename>/validation is a proposed route — register in webshell_routes_registry.proposed_routes"

# ============================================================================
# SECTION 7.6: CALIBRATION SUBSTRATE (NEW v2.2.5)
# ============================================================================
# Per Canon XXXVI Phase 2 readiness — turn per-build rubric scoring into
# a cross-build calibration sample that reveals: which gate predicates
# catch defects vs theater, the real self-validation ceiling on YOUR work
# (not literature's 70-75%), which agent pairings hit ≥95% confidence
# floor, which decision classes need Tier 3-4 escalation. Output of
# Section 7.5 post-implementation validation; input to Section 0.7
# auto-decision eligibility gate (v2.3.0).

calibration_substrate:
  description: |
    Per-build .calibration/<codename>.json populated at end of
    post-implementation validation (Section 7.5). Aggregated to a
    cross-build sample at $HELIX/corso/builds/.calibration-sample/aggregate.json.
    The aggregate IS the empirical evidence that converts prior canons
    (XXXIII/XXXIV/XXXV) from literature-anchored to YOUR-work-anchored.
  added_in_template_version: "2.2.5"
  source_canon: "Canon XXXVI (Quality-First Compression Sequencing) — Phase 2 substrate"
  source_directive: "Kevin /btw 2026-05-04 + 'Review then do it all' 2026-05-04"

  per_build_record:
    description: "One file per completed build. Written by Section 7.5 step 5 close-out."
    file_location: "<build_root>/.calibration/<codename>.json"
    schema:
      build_id:
        type: string
        example: "luminous-tracing-polytope"
      completed_at:
        type: ISO8601
      tier:
        enum: ["SMALL", "MEDIUM", "LARGE"]
      template_version:
        type: string
        example: "2.2.5"
      rubric_scores:
        description: "Per-component rubric score with evidence pointer."
        components:
          C1_plan_completeness:
            score: { interval: { low, point, high } }   # per Canon XXXIV
            evidence_path: "<build_root>/.evidence/rubric/C1.json"
          C2_cross_validation: { score, evidence_path }
          C3_gate_coverage:
            score: { interval }
            sub_scores: { C3a, C3b, C3c, C3d, C3e, C3f, C3g }   # per L1 fix
            evidence_path: "<build_root>/.evidence/rubric/C3.json"
          C4_operator_experience: { score, evidence_path }
          C5_cost_observability: { score, evidence_path }
          C6_loop_cycle: { score, evidence_path }
          C7_northstar_alignment:
            score: { interval }
            n_a_invoked: { type: bool, rationale_field: string }   # per E6 fix
            evidence_path: "<build_root>/.evidence/rubric/C7.json"
          C8_context_precision:
            score: { interval }
            sub_scores: { C8a, C8b, C8c, C8d, C8e, C8f }
            evidence_path: "<build_root>/.evidence/rubric/C8.json"
        aggregate:
          formula: "0.10·C1 + 0.15·C2 + 0.15·C3 + 0.10·C4 + 0.10·C5 + 0.10·C6 + 0.15·C7 + 0.15·C8"
          interval: { low, point, high }
          band:
            enum: ["EXEMPLARY", "STRONG", "ACCEPTABLE", "WEAK", "FAILED"]
            thresholds:
              EXEMPLARY: ">=90"
              STRONG: "75-89"
              ACCEPTABLE: "60-74"
              WEAK: "40-59"
              FAILED: "<40"
      predicate_effectiveness:
        description: "Per-predicate tally — caught a defect vs fired-but-theater."
        total_predicates_evaluated: integer
        defects_caught_by_self_validation: integer
        defects_caught_by_independent_verification_only: integer   # per Canon XXXIII
        defects_missed_entirely: integer                           # discovered post-deploy
        per_predicate_records:
          - predicate_id: "string (e.g. 'phase_2_arch_gate', 'security.no_injection')"
            section_anchor: "lasdlc://<section>"
            fired_count: integer
            blocked_count: integer
            real_defect_caught: bool
            categorized_as_theater: bool
            theater_signal_threshold: "fired ≥5 times AND blocked 0 times"
      self_validation_outcomes:
        description: "Empirical measurement of Canon XXXIII ceiling on THIS build."
        self_validated_aggregate_score: number
        independently_verified_aggregate_score: number
        delta_pp: number   # |self - independent|; literature says ~23pp; YOUR work TBD
        independent_verifier_agent: string   # which Explore/sibling agent ran independent verification
      agent_pairings:
        description: "Per dispatch — preparation agent + review agent + outcome."
        records:
          - preparation_agent: "string (e.g. 'lightarchitects:engineer')"
            review_agent: "string (e.g. 'lightarchitects:quality')"
            decision_class: "architecture | design | algorithm | empirical | security | performance | standards_compliance | data_modeling"
            confidence_floor_achieved: number
            hit_95_floor: bool
            wave_id: string
      research_tier_frequency:
        description: "Distribution of where citations came from (per §0.6 Tier 1-4 escalation)."
        tier_1_local_count: integer
        tier_2_library_count: integer        # Context7
        tier_3_web_count: integer            # Firecrawl/WebSearch
        tier_4_sibling_count: integer        # /Q QUANTUM, /SOUL, /SERAPH
        hitl_escalation_count: integer       # all 4 tiers failed
      decision_class_breakdown:
        description: "Count per decision_class on this build."
        architecture: integer
        design: integer
        algorithm: integer
        empirical: integer
        security: integer
        performance: integer
        standards_compliance: integer
        data_modeling: integer
      citation_reuse:
        description: "Cache hit rate (composes with §0.6 inline_citation_protocol)."
        citations_inherited_from_prior_builds: integer
        citations_freshly_fetched: integer
        citations_internal_canon_cookbook: integer
        cache_hit_rate: "freshly_fetched / total"
      deliverable_benchmark:
        description: "v2.4.0 — LDB v1.0 output recorded here per Section 7.7 deliverable_benchmark.output_schema. Contains 8-component scores (D1-D8), weights_applied per profile, aggregate band, citations, validation_status per component, n_a_components, insufficient_evidence_components."
        added_in_template_version: "2.4.0"
        ldb_schema_version: "LDB-v1.0"
        full_schema_ref: "Section 7.7 deliverable_benchmark.output_schema"
        composition: "§7.6 calibration_substrate is the per-build CONTAINER; §7.7 deliverable_benchmark is the SCHEMA + RUNNER. PostDeploy hook (v2.4.0) writes here."

  cross_build_aggregate:
    description: |
      Auto-recomputed on each new per-build .calibration/<codename>.json
      write. The aggregate IS the empirical substrate for Phase 2
      guardrails and Phase 3 auto-decision eligibility (P2 precondition).
    file_location: "$HELIX/corso/builds/.calibration-sample/aggregate.json"
    update_trigger: "PostToolUse:Write hook fires on per-build .calibration/<codename>.json write"
    schema:
      sample_size_N: integer
      build_ids: ["array of completed build codenames"]
      generated_at: ISO8601
      template_versions_seen: ["array of template versions in sample"]
      mean_rubric_aggregate: number
      median_rubric_aggregate: number
      rubric_aggregate_interval: { low, high }   # narrows as N grows
      band_distribution: { EXEMPLARY: count, STRONG: count, ACCEPTABLE: count, WEAK: count, FAILED: count }
      self_validation_ceiling_observed:
        description: "YOUR-work-specific ceiling — the central tendency of self-vs-independent delta_pp"
        mean_delta_pp: number
        median_delta_pp: number
        ceiling_interval: { low, high }
        comparison_to_literature: "literature says ~23pp; observed = <observed>; YOUR work %s"
      effective_predicates:
        description: "Predicates that caught ≥1 defect across the sample"
        records: ["array of { predicate_id, total_fires, defects_caught, false_positive_rate }"]
      theater_predicates:
        description: "Predicates that fired but never blocked anything (candidates for retirement)"
        records: ["array of { predicate_id, total_fires, blocked_count: 0 }"]
      best_agent_pairings:
        description: "Top-K preparation+review pairings by 95-floor hit rate"
        top_k: 10
        records: ["array of { preparation, review, decision_class, hit_rate, sample_size }"]
      decision_classes_calibrated:
        description: "Decision classes with ≥3 examples — eligible for Phase 3 auto-decision (P2 precondition)"
        records: ["array of { decision_class, count, hit_95_rate }"]
      decision_classes_uncalibrated:
        description: "Decision classes with <3 examples — Phase 3 auto-decision blocked (P2 fail-open)"
        records: ["array of { decision_class, count }"]
      research_tier_distribution:
        description: "Aggregated Tier 1-4 frequencies — guides where to invest in pre-cached substrate"
        tier_1_pct: number
        tier_2_pct: number
        tier_3_pct: number
        tier_4_pct: number
        hitl_pct: number
      citation_reuse_trend:
        description: "Cache hit rate trend over time — Phase 3 compression signal"
        per_build_hit_rates: ["array of { build_id, completed_at, hit_rate }"]
        trend_slope: "positive = compression working; flat/negative = needs investigation"
      ldb_band_distribution:
        description: "v2.4.0 — distribution of LDB aggregate bands across the calibration sample. Composes with §7.7 deliverable_benchmark."
        added_in_template_version: "2.4.0"
        bands: { EXEMPLARY: count, STRONG: count, ACCEPTABLE: count, WEAK: count, FAILED: count }
        purpose: "discrimination signal — heterogeneous band outcomes prove LDB itself discriminates between strong and weak deliverables"
      ldb_per_component_means:
        description: "v2.4.0 — cross-build mean per D-component; identifies systematic strengths/weaknesses"
        added_in_template_version: "2.4.0"
        per_component:
          D1_mean: number
          D2_mean: number
          D3_mean: number
          D4_mean: number
          D5_mean: number
          D6_mean: number
          D7_mean: number
          D8_mean: number
        purpose: "if D8 mean is low across sample, Phase 3 compression claim is empirically false; if D6 mean low, security posture is concern"
      ldb_d8_compression_trend:
        description: "v2.4.0 — directly evaluates Canon XXXVI Phase 3 hours→minutes compression promise"
        added_in_template_version: "2.4.0"
        per_build_d8a: ["array of { build_id, tier, completed_at, d8a_delivery_time_hours, normalized_to_tier_baseline }"]
        trend_slope: "negative slope = compression working over time; flat/positive = Phase 3 promise unfulfilled"
        canon_xxxvi_phase_3_status: "supported | unsupported | inconclusive (per N + slope significance)"
      ldb_d6_security_posture:
        description: "v2.4.0 — cross-build security posture trend"
        added_in_template_version: "2.4.0"
        d6_mean_by_classification: { Public: number, Confidential: number, Restricted: number, Secret: number }
        critical_findings_open: integer
        compliance_override_log_count: integer
        purpose: "Restricted/Secret classification builds MUST trend D6 ≥ 90; lower trend triggers LÆX Layer 1+4 review"

  enforcement_via_hooks:
    "PostToolUse:Write_CalibrationRecord":
      automates: ["Section 7.6 calibration_substrate per-build write + aggregate recomputation"]
      fires_on: "Section 7.5 post-implementation validation cycle close-out (step 5)"
      action: |
        v2.2.5 Canon XXXVI Phase 2 substrate:
        1. Read per-build evidence files (.evidence/rubric/C*.json,
           .evidence/predicates/*.json, .handoff/*.json) for the
           completed build.
        2. Compose per-build record per schema above.
        3. Write to <build_root>/.calibration/<codename>.json.
        4. Read $HELIX/corso/builds/.calibration-sample/aggregate.json
           (create if missing).
        5. Append/update build_ids; recompute aggregate fields.
        6. Write back to aggregate.json.
        7. Surface delta to operator: "calibration sample N now <N>;
           ceiling moved from <prev> to <new>".
      blocks_tool_if: false
      operator_visible: "calibration_dashboard at /ops/calibration shows live N + band distribution + ceiling interval + theater_predicate candidates"
      added_in_template_version: "2.2.5 (Canon XXXVI Phase 2)"

  exit_criteria_for_phase_2_readiness:
    description: "When the calibration sample has matured enough to enable Phase 3 auto-decisions per Canon XXXVI."
    sample_size_N: ">=10"
    band_distribution_visibility: "≥1 build in each of {STRONG, ACCEPTABLE} bands (heterogeneous outcomes prove rubric discriminates)"
    ceiling_interval_width: "<=15pp (ceiling has stabilized; not still ping-ponging)"
    decision_classes_calibrated_count: ">=3 (at least three decision classes with ≥3 examples each)"
    effective_predicates_identified: ">=10 predicates with ≥1 defect caught"
    theater_predicates_pruned: "documented list; retirement scheduled"
    notes: "Until ALL exit criteria met, Section 0.7 auto_decision_eligibility_gate's P2 precondition fails open for ALL decision classes — system stays in Phase 1+2."

  webshell_render:
    widget: "calibration_dashboard"
    view_mode: "/ops/calibration"
    sub_views:
      - "/ops/calibration/sample"     # N + band distribution + ceiling
      - "/ops/calibration/predicates" # effective vs theater
      - "/ops/calibration/pairings"   # agent-pairing matrix
      - "/ops/calibration/classes"    # decision_class calibration count
    update_signal: "sse_subscribe(calibration_aggregate_changes)"
    note: "/ops/calibration is a proposed route — register in webshell_routes_registry.proposed_routes (added v2.2.5)"

  related_canon:
    - "Canon XXXIII (Self-Validation Ceiling) — calibration measures YOUR ceiling"
    - "Canon XXXIV (Confidence Interval Reporting) — aggregate intervals narrow as N grows"
    - "Canon XXXV (Confidence Threshold Gate) — predicate effectiveness validates the ≥95% threshold itself"
    - "Canon XXXVI (Quality-First Compression) — this section IS Phase 2 substrate"

  composition_with_section_7_5:
    description: "Section 7.5 post_implementation_validation_cycle is the WRITER; this section is the SCHEMA + AGGREGATOR"
    contract: "7.5 step 5 close-out invokes PostToolUse:Write_CalibrationRecord; this section defines what gets written + how it aggregates"

# ============================================================================
# SECTION 7.7: DELIVERABLE BENCHMARK (LDB v1.0) — NEW v2.4.0
# ============================================================================
# Per Kevin operator directive 2026-05-04 — empirical truth-telling layer
# for Canon XXXVI. Effectiveness rubric (C1-C8) measures PLAN quality
# (process); LDB measures OUTPUT quality (result vs industry-wide standards
# independent of LASDLC's own opinions). Eight components × multi-standard
# anchors; weighted by build profile. Run ONLY by cold-context benchmark
# agents per Canon XXXIII (the build's own agents never grade themselves).
#
# Full spec recorded at:
#   helix://shared/entries/2026-05-04-lasdlc-deliverable-benchmark-v1.0-spec.md

deliverable_benchmark:
  description: |
    LASDLC Deliverable Benchmark v1.0 — measures the OUTPUT against
    industry-wide standards (ISO/IEC 25010 + CISQ + DORA + SPACE + Flow
    Framework + Amdahl + Karp-Flatt + Apdex + OpenTelemetry + AYIN +
    OWASP ASVS + ISO/IEC 27001/27034 + OWASP LLM Top 10 + MITRE ATLAS +
    MITRE ATT&CK + CWE Top 25 + NIST SSDF + SLSA + STRIDE + LINDDUN).
    Eight components D1-D8; D6 (Security) and D8 (Performance & parallel
    agentic orchestration) are first-class.
  schema_version: "LDB-v1.0"
  added_in_template_version: "2.4.0"
  source_canon: "Canon XXXVI (Quality-First Compression Sequencing) — empirical truth-telling layer for Phase 3 claims"
  source_directive: "Kevin operator directive 2026-05-04"
  full_spec_helix_entry: "helix://shared/entries/2026-05-04-lasdlc-deliverable-benchmark-v1.0-spec.md"

  components:
    D1_request_fidelity:
      anchor: "build's own acceptance criteria + Northstar predicate (§0.5) + operator post-deploy validation"
      always_run: true
      sub_components:
        D1a:
          measure: "Acceptance criteria pass rate"
          predicate: "% of declared acceptance criteria mechanically satisfied"
        D1b:
          measure: "Northstar predicate evaluation"
          predicate: "P1 mechanical check from §0.7 evaluates true"
        D1c:
          measure: "Operator semantic-match rating"
          predicate: "1-5 scale: did this deliver what I asked"
        D1d:
          measure: "Open-question residue"
          predicate: "unresolved AskUserQuestion HITL items at close-out should be zero"
      independent_runner: "cold-context benchmark agent + operator survey"

    D2_iso_25010_conformance:
      anchor: "ISO/IEC 25010:2011 (revised 2023) — international software quality standard"
      always_run: true
      excludes: "Security (carved to D6 first-class)"
      sub_components:
        D2a:
          characteristic: "Functional Suitability"
          predicate: "Functional Completeness + Correctness + Appropriateness"
        D2b:
          characteristic: "Performance Efficiency (runtime perf of SHIPPED software, distinct from D8 build perf)"
          predicate: "Time Behaviour + Resource Utilization + Capacity"
        D2c:
          characteristic: "Compatibility"
          predicate: "Co-existence + Interoperability"
        D2d:
          characteristic: "Usability"
          predicate: "Recognizability + Learnability + Operability + UI Aesthetics + Accessibility-baseline"
        D2e:
          characteristic: "Reliability"
          predicate: "Maturity + Availability + Fault Tolerance + Recoverability"
        D2f:
          characteristic: "Maintainability"
          predicate: "Modularity + Reusability + Analyzability + Modifiability + Testability"
        D2g:
          characteristic: "Portability"
          predicate: "Adaptability + Installability + Replaceability"
      independent_runner: "cold-context benchmark agent reading deliverable + ISO/IEC 25010 spec"

    D3_cisq_automated:
      anchor: "Consortium for Information & Software Quality + ASCQM (ISO/IEC 5055:2021)"
      always_run: true
      sub_components:
        D3a: { measure: "Reliability score (per ISO/IEC 5055 reliability rules)" }
        D3b: { measure: "Performance Efficiency score (ASCQM)" }
        D3c: { measure: "Maintainability score (technical debt ratio)" }
        D3d: { measure: "Cyclomatic complexity distribution (Cookbook §44 — ≤10 per function)" }
        D3e: { measure: "Dependency CVE exposure (cargo audit / pnpm audit / sonatype-guide)" }
        D3f: { measure: "Defect density (defects per KLOC; CISQ rule violations / KLOC)" }
      independent_runner: "CORSO automated tools (clippy / cargo audit / sonatype-guide / lizard)"

    D4_dora_operational:
      anchor: "DORA 'Accelerate' research + State of DevOps Report"
      run_when: "deliverable is deployable (not for spec docs / templates / non-runtime artifacts)"
      sub_components:
        D4a: { measure: "Deployment frequency", banding: "Elite=on-demand / High=daily-weekly / Medium=wk-mo / Low=<monthly" }
        D4b: { measure: "Lead time for changes (commit → production)", banding: "Elite<1h / High=1d-1wk / Medium=1wk-1mo / Low>6mo" }
        D4c: { measure: "Mean time to recovery", banding: "Elite<1h / High<1d / Medium<1d / Low>1wk" }
        D4d: { measure: "Change failure rate", banding: "Elite=0-15% / High=16-30% / Medium=16-30% / Low>30%" }
      independent_runner: "git log + deploy system records + AYIN traces"

    D5_domain_conditional_non_security:
      anchor: "domain-specific standards selected by build profile"
      run_when: "build profile triggers domain match (NOT security — that goes to D6)"
      domain_anchors:
        ui_facing: { standards: ["WCAG 2.2 (A/AA/AAA)", "ARIA Authoring Practices Guide"], trigger: "UI build OR operator-experience-layer present" }
        ai_ml_quality: { standards: ["ML Test Score (Breck et al. 2017)", "MLOps maturity model"], trigger: "risk_classification.ai_risk_tier ≠ none" }
        data_privacy: { standards: ["GDPR Article 25 + 32", "HIPAA Security Rule", "CCPA reasonable-security"], trigger: "data_handling.classification ∈ {PII, PHI, PCI}" }
        accessibility_eu: { standards: ["EN 301 549"], trigger: "EU public-sector deliverable" }
        api_design: { standards: ["OpenAPI 3.1 conformance", "REST maturity (Richardson 0-3)", "gRPC style guide"], trigger: "API surface present" }
      independent_runner: "cold-context benchmark agent (per domain)"

    D6_security_adversarial_robustness:
      anchor: "multi-standard stack (security-first platform requires first-class billing, not one-of-eight)"
      always_run: true
      first_class: true
      rationale: "LASDLC ships on a security-first platform (CORSO + SERAPH); folding security into D2 as one of 8 ISO characteristics under-weights the platform's defining property. D6 is its own dimension."
      sub_components:
        # v2.4.2: cache_path + verbatim_anchor_quote added per cookbook §60.9 + Canon XXXV [3]
        D6a:
          standard: "OWASP ASVS Level 1-3 (level chosen by security_classification)"
          owner: "CORSO GUARD static + SERAPH offensive"
          cache_path: "<HELIX>/user/standards/industry-baselines/security/owasp/owasp-asvs-2026-05-04.md"
          verbatim_anchor_quote: "OWASP ASVS — open standard for verifying application security; three verification levels (L1/L2/L3) escalating in rigor"
          ref: "[13]"
        D6b:
          standard: "ISO/IEC 27001 + ISO/IEC 27034 (application security)"
          owner: "CORSO + LÆX Layer 1+4 control mapping"
          cache_path: "<HELIX>/user/standards/industry-baselines/security/iso/iso-27001-2022-stub.md (stub — institutional access required) + iso/iso-27034-stub.md"
          companion_artifact: "§6.5 iso_27001_27034_control_checklist (concrete subset shipped v2.4.1)"
          verbatim_anchor_quote: "ISO/IEC 27001:2022 — 93 Annex A controls organized into 4 themes: A.5 Organizational (37), A.6 People (8), A.7 Physical (14), A.8 Technological (34)"
        D6c:
          standard: "OWASP LLM Top 10 + MITRE ATLAS (AI/agentic threats)"
          owner: "SERAPH STRIKE adversarial probes; composes with §8 Quality.Security agentic criteria"
          cache_path:
            owasp_llm_top_10: "<HELIX>/user/standards/industry-baselines/security/owasp/owasp-llm-top-10-v1.1-2026-05-04.md"
            mitre_atlas: "<HELIX>/user/standards/industry-baselines/security/mitre/mitre-atlas-2026-05-04.md"
          verbatim_anchor_quote: "OWASP LLM Top 10 v1.1 (2024): LLM01 Prompt Injection / LLM02 Insecure Output Handling / LLM03 Training Data Poisoning / LLM04 Model DoS / LLM05 Supply Chain / LLM06 Sensitive Information Disclosure / LLM07 Insecure Plugin Design / LLM08 Excessive Agency / LLM09 Overreliance / LLM10 Model Theft"
          ref: "[15], [17]"
        D6d:
          standard: "MITRE ATT&CK technique coverage on §6 threat_model entry_points"
          owner: "SERAPH RECON + EXAMINE per-technique pass/fail"
          cache_path: "<HELIX>/user/standards/industry-baselines/security/mitre/mitre-attack-enterprise-2026-05-04.md"
          verbatim_anchor_quote: "MITRE ATT&CK is a globally-accessible knowledge base of adversary tactics and techniques based on real-world observations"
          ref: "[16]"
        D6e:
          standard: "CWE Top 25 detection on shipped code"
          owner: "CORSO GUARD via clippy + custom lints + deps audit"
          cache_path: "<HELIX>/user/standards/industry-baselines/security/mitre/mitre-cwe-top-25-2024-list-2026-05-04.md"
          verbatim_anchor_quote: "CWE Top 25 (2024) Rank 1-5: CWE-79 Cross-site Scripting / CWE-787 Out-of-bounds Write / CWE-89 SQL Injection / CWE-352 CSRF / CWE-22 Path Traversal"
          ref: "[18]"
        D6f:
          standard: "NIST SSDF (Prepare/Produce/Respond practices)"
          owner: "LÆX Layer 1+4 process audit"
          cache_path: "<HELIX>/user/standards/industry-baselines/security/nist/nist-ssdf-v1.1-2026-05-04.md"
          companion_artifact: "§6.5 nist_ssdf_practice_list (20 practices PO/PS/PW/RV mapped to LASDLC sections, shipped v2.4.1)"
          verbatim_anchor_quote: "Souppaya, Scarfone, Dodson 2022: SSDF — a core set of high-level secure software development practices that can be integrated into each SDLC implementation"
          ref: "[19]"
        D6g:
          standard: "SLSA Build Levels 0-3 + CycloneDX SBOM + sonatype-guide dep audit"
          owner: "CORSO GUARD; output: signed SBOM at <build_root>/.security/sbom.cdx.json"
          cache_path:
            slsa_levels: "<HELIX>/user/standards/industry-baselines/security/openssf/slsa-levels-v1.0-2026-05-04.md"
            slsa_threats: "<HELIX>/user/standards/industry-baselines/security/openssf/slsa-threats-v1.0-2026-05-04.md"
          verbatim_anchor_quote: "SLSA v1.0: Build L0 No guarantees / Build L1 Provenance exists (mistakes, documentation) / Build L2 Hosted build platform (tampering after the build) / Build L3 Hardened builds (tampering during the build)"
          v2_4_2_correction_note: "v2.4.0/v2.4.1 said 'SLSA Levels 1-4'; SLSA v1.0 spec defines L0-L3 (Build track); corrected per cached spec"
          ref: "[20]"
        D6h:
          standard: "Threat modeling completeness — STRIDE + LINDDUN (privacy) coverage of every entry_point"
          owner: "SERAPH SCOPE + CORSO GUARD"
          cache_path: "academic foundations not yet pulled (deferred); §6 security_threat_model schema applies"
          verbatim_anchor_quote: "STRIDE = Spoofing, Tampering, Repudiation, Information disclosure, Denial of service, Elevation of privilege; LINDDUN = Linkability, Identifiability, Non-repudiation, Detectability, Disclosure, Unawareness, Non-compliance"
        D6i:
          standard: "Live pen-test (SERAPH end-to-end against deployed deliverable, ScopeGovernor-bounded)"
          owner: "SERAPH; binding: zero CRITICAL unfixed; HIGH require operator sign-off"
          run_when: "deliverable is deployable"
          cache_path: "N/A — runtime engagement, not document-anchored"
        D6j:
          standard: "Compliance attestation against §6.5 selected frameworks (SOC 2 / HIPAA / GDPR / PCI / FedRAMP / EU AI Act / OWASP_LLM_Top_10 / MITRE_ATLAS)"
          owner: "LÆX Layer 1+4 with compliance_override_log if any control fails"
          cache_path: "composes selected_frameworks; per-framework anchor varies (e.g., GDPR text scoped separately when needed)"
          companion_artifact: "northstar_lineage.compliance_self_attestation (template's own compliance frameworks declared per LDB N=1 D6j fix)"
      weighting_by_security_classification:
        Public: { aggregate_weight_pct: 10, required_sub_components: ["D6a", "D6e", "D6g"] }
        Confidential: { aggregate_weight_pct: 20, required_sub_components: ["D6a", "D6c", "D6e", "D6g", "D6h"] }
        Restricted: { aggregate_weight_pct: 30, required_sub_components: ["D6a", "D6c", "D6d", "D6e", "D6g", "D6h", "D6i"] }
        Secret: { aggregate_weight_pct: 40, required_sub_components: ["D6a", "D6b", "D6c", "D6d", "D6e", "D6f", "D6g", "D6h", "D6i", "D6j"] }
      independent_runner: "SERAPH (offensive) + CORSO GUARD (static) + LÆX Layer 1+4 (governance)"

    D7_comparative_baseline:
      anchor: "self-baseline from §7.6 aggregate.json + published industry baselines (Firecrawl-pulled)"
      run_when: "sample N≥3 (partial signal); N≥10 (full discriminator); N<3 → suppressed"
      sub_components:
        D7a: { measure: "Self-baseline delta (this build's aggregate vs cross-build mean)" }
        D7b: { measure: "Industry baseline comparison (vs published CISQ State of Software Quality + DORA State of DevOps + OWASP statistics)" }
        D7c: { measure: "Trend slope (improving / flat / regressing across last N=5 builds)" }
        D7d: { measure: "Decision-class peer comparison (vs prior builds in same decision_class)" }
      industry_baseline_cache: "<HELIX>/user/standards/industry-baselines/"
      independent_runner: "aggregator hook + Firecrawl pulls"

    D8_performance_parallel_agentic_orchestration:
      anchor: "multi-standard stack (DORA + SPACE + Flow + Amdahl + Karp-Flatt + Gustafson + Little's Law + Apdex + OpenTelemetry + AYIN)"
      always_run: true
      first_class: true
      rationale: "D8 measures the AGENTIC PIPELINE producing this deliverable — distinct from D2 (runtime perf of shipped software) and D4 (deployment-level org metrics). Canon XXXVI Phase 3 compression claim ('hours→minutes') lives ONLY in D8; this is the empirical truth-telling layer."
      anchor_origins:
        DORA: "Lead Time for Changes / Cycle Time — DORA 'Accelerate' research"
        SPACE: "Microsoft Research 2021 (Forsgren et al.) — Performance + Efficiency & Flow dimensions"
        Flow_Framework: "Mik Kersten 'Project to Product' — Flow Velocity / Flow Time / Flow Efficiency / Flow Load"
        Amdahls_Law: "Gene Amdahl 1967 — theoretical parallel speedup ceiling for parallelizable fraction P"
        Karp_Flatt: "Karp & Flatt 1990 — empirical serial-fraction measurement; catches when Amdahl-predicted speedup doesn't materialize"
        Gustafsons_Law: "John Gustafson 1988 — scalable parallelism for problems where work grows with parallelism"
        Littles_Law: "John Little 1961 (L = λW) — queue-theory grounding for agent dispatch throughput"
        Apdex: "Apdex Alliance — operator satisfaction-based perf scoring (Satisfied / Tolerating / Frustrated)"
        OpenTelemetry: "CNCF OpenTelemetry — span-based critical-path analysis on AYIN traces; W3C Trace Context"
        AYIN: "Light Architects internal observability sibling — objective span data across all sibling tool calls"
      sub_components:
        D8a:
          measure: "End-to-end delivery time (idea → ratified plan → first deploy → operator-validated)"
          anchor: "DORA Lead Time + Flow Time"
          per_tier_baseline_target:
            SMALL: "<8h"
            MEDIUM: "<40h"
            LARGE: "<160h"
          baseline_calibrated_at: "§7.6 aggregate when N≥3"
          # v2.4.2: cache_path
          cache_path:
            dora: "<HELIX>/user/standards/industry-baselines/operations/google-cloud/dora-research-index-2026-05-04.md"
            flow: "<HELIX>/user/standards/industry-baselines/operations/academic/flow/kersten-2018.md"
          ref: "[27]"
        D8b:
          measure: "Parallel speedup achieved"
          anchor: "Amdahl's Law theoretical ceiling vs measured"
          formula: "S = T_serial / T_parallel"
          goal: "S ≥ 0.7 × Amdahl ceiling for the planned parallelizable fraction P"
          # v2.4.2: cache_path
          cache_path: "<HELIX>/user/standards/industry-baselines/performance/academic/amdahl/amdahl-1967.md"
          verbatim_anchor_quote: "Amdahl 1967: the overall performance improvement gained by optimizing a single part of a system is limited by the fraction of time that the improved part is actually used"
          ref: "[23]"
        D8c:
          measure: "Empirical serial fraction"
          anchor: "Karp-Flatt metric"
          formula: "e = (1/S - 1/N) / (1 - 1/N)"
          goal: "e should approach planned serial fraction; drift surfaces hidden serialization (hand-off bottleneck or unplanned synchronization)"
          cache_path: "<HELIX>/user/standards/industry-baselines/performance/academic/karp-flatt/karp-flatt-1990.md"
