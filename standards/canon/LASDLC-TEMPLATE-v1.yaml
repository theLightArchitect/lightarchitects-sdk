    "/builds/<codename>/findings":
      status: proposed
      referenced_by: "Section 2.5 loop_cycle steps 3 (cross_validation_qa) + 4 (feedback)"
      eef_deliverable: "manifest-plan-helix-editing — findings table component already declared in EEF; route extension needed"
      blocking_for_render: "findings table widget non-functional until route exists; also referenced by operator_experience_layer.finding_surface"
    "/builds/<codename>/score":
      status: proposed
      referenced_by: "architects-blueprint.md Part XIV §14.1 (proposed view-mode for full per-component breakdown)"
      eef_deliverable: "manifest-plan-helix-editing sub-build extends route pattern"
      blocking_for_render: "rubric score breakdown widget non-functional"
    "/ops/drift":
