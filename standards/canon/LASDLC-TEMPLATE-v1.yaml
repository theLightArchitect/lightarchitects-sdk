# ============================================================================
# SECTION 8: QUALITY GATE DIMENSIONS
# ============================================================================
# Seven dimensions checked IN PARALLEL at every phase boundary.
# ALL blocking dimensions must PASS before phase transition.
# Documentation (D) is soft — advisory only, does not block.

quality_dimensions:
  # Dimensions are checked IN PARALLEL at every phase boundary by the sibling that owns them.
  # owner: which sibling runs this dimension
  # skill: invocation syntax  |  cycle_step: where in the 7-step cycle it runs
  # A/Q both use SNIFF — same step, different focus lens (structure vs. code hygiene)

  Architecture:
    abbrev: A
    color: "#8B5CF6"  # violet
    blocking: true
    owner: corso
    skill: "/CORSO"
    cycle_step: SNIFF   # lens: component boundaries, coupling, separation of concerns
    criteria:
      - id: no_circular_deps
        label: "No circular dependencies between modules"
        type: automated
      - id: module_boundaries
        label: "Module boundaries respected (no cross-module internal imports)"
        type: automated
      - id: interface_segregation
        label: "No god objects — interfaces are focused and minimal"
        type: automated
      - id: separation_of_concerns
        label: "Business logic separated from I/O and presentation"
        type: automated
    example_catches:
      - "UI component importing another component's internal store state directly"
      - "MCP tool handler calling Neo4j queries instead of delegating to the graph-engine crate"
      - "Helix search logic inlined into an HTTP response handler (bypasses soul-helix abstraction)"

  Security:
    abbrev: S
    color: "#EF4444"  # red
    blocking: true
    owner: seraph          # primary: SERAPH red-team lens
    co_owner: corso        # secondary: CORSO GUARD static scan
    skill: "/SERAPH"
    cycle_step: GUARD      # CORSO runs GUARD; SERAPH cross-validates with offensive lens
    criteria:
      - id: no_injection
        label: "No injection vulnerabilities (SQL, XSS, command, path traversal)"
        type: automated
      - id: no_permission_bypass
        label: "No permission bypass paths"
        type: automated
      - id: no_scope_escape
        label: "No scope escape vectors"
        type: automated
      - id: secrets_redacted
        label: "Secrets never appear in logs, errors, or public responses"
        type: automated
      - id: deps_cve_free
        label: "Dependencies free of known critical CVEs"
        type: automated
      # v2.2.2 SEC-H4 fix: agentic threat criteria for AI-system security (OWASP_LLM_Top_10 + MITRE_ATLAS aligned)
      # v2.4.2: technique_id arrays now reference verbatim cached anchors per Canon XXXV [3]
      - id: prompt_injection_sanitization
        label: "All user-controlled inputs reaching agent prompts pass through prompt-injection sanitization (system-prompt extraction, role-confusion, instruction-override defenses)"
        type: hybrid              # automated regex + SERAPH manual review on novel surfaces
        owner: seraph
        threat_class: ai_system
        technique_id: ["LLM01:Prompt Injection [15]", "AML.T0051 (Adversarial ML evasion via prompt) [17]"]
        cite_anchor:
          owasp_llm_top_10: "<HELIX>/user/standards/industry-baselines/security/owasp/owasp-llm-top-10-v1.1-2026-05-04.md#LLM01"
          mitre_atlas: "<HELIX>/user/standards/industry-baselines/security/mitre/mitre-atlas-2026-05-04.md"
          verbatim_quote_from_owasp: "Manipulating LLMs via crafted inputs can lead to unauthorized access, data breaches, and compromised decision-making."
        gate_predicate: "v2.2.2 SEC-H4 fix + v2.4.2 anchor: every code path where user-controlled string flows into ClaudeSDKClient/agent_prompt/system_message MUST invoke a sanitizer (e.g. lightarchitects-sdk::sanitize::strip_role_markers); SERAPH audits via SCRIBE pattern recognition + STRIKE adversarial probes; matches OWASP LLM01 mitigation pattern"
        fallback: "grep -rn 'agent_prompt\\|system_message\\|ClaudeSDKClient::new' --include='*.rs' | xargs -I {} grep -L 'sanitize::' {} && exit 1 || exit 0"
      - id: inter_agent_role_marker_propagation
        label: "Sibling-to-sibling messages preserve role-markers (no flattening of system/user/assistant boundaries when a sibling forwards content from another sibling)"
        type: hybrid
        owner: seraph
        co_owner: eva             # EVA owns inter-agent comms substrate
        threat_class: ai_system
        technique_id: ["LLM01:Prompt Injection (transitive via inter-agent comms) [15]", "LLM07:Insecure Plugin Design [15]", "AML.T0051 [17]"]
        cite_anchor:
          owasp_llm_top_10: "<HELIX>/user/standards/industry-baselines/security/owasp/owasp-llm-top-10-v1.1-2026-05-04.md#LLM01,LLM07"
          verbatim_quote_from_owasp: "LLM07 Insecure Plugin Design — LLM plugins processing untrusted inputs and having insufficient access control risk severe exploits like remote code execution."
        gate_predicate: "v2.2.2 SEC-H4 fix + v2.4.2 anchor: typed message contracts (12 typed types) MUST carry source_role + content_role fields distinctly; sibling forwarding logic MUST NOT collapse forwarded content into its own system role; addresses LLM07 plugin-boundary trust"
        fallback: "manual SERAPH review per HITL gate when squad-comms protocol changes"
      - id: sanitization_boundary_completeness
        label: "Sanitization boundaries are exhaustive — no agent surface receives user-controlled bytes without passing through a documented boundary"
        type: hybrid
        owner: seraph
        threat_class: ai_system
        technique_id: ["LLM02:Insecure Output Handling [15]", "AML.T0049 [17]"]
        cite_anchor:
          owasp_llm_top_10: "<HELIX>/user/standards/industry-baselines/security/owasp/owasp-llm-top-10-v1.1-2026-05-04.md#LLM02"
          verbatim_quote_from_owasp: "LLM02 Insecure Output Handling — Neglecting to validate LLM outputs may lead to downstream security exploits, including code execution that compromises systems and exposes data."
        gate_predicate: "v2.2.2 SEC-H4 fix + v2.4.2 anchor: every entry point in pre_flight.security_threat_model MUST declare its sanitizer; un-sanitized surfaces require LÆX Layer 1+4 compliance_override_log entry; CORSO GUARD static-scans for grep-coverage of all entry_points"
        fallback: "audit pre_flight.security_threat_model.entry_points × code grep for sanitize:: invocation; flag any entry_point without matching sanitizer"
      - id: tool_call_authorization
        label: "Agent tool invocations check ScopeGovernor authorization before execution (no unscoped tool reach)"
        type: automated
        owner: seraph
        threat_class: ai_system
        technique_id: ["LLM08:Excessive Agency [15]", "AML.T0048 [17]"]
        cite_anchor:
          owasp_llm_top_10: "<HELIX>/user/standards/industry-baselines/security/owasp/owasp-llm-top-10-v1.1-2026-05-04.md#LLM08"
          verbatim_quote_from_owasp: "LLM08 Excessive Agency — Granting LLMs unchecked autonomy to take action can lead to unintended consequences, jeopardizing reliability, privacy, and trust."
        gate_predicate: "v2.2.2 SEC-H4 fix + v2.4.2 anchor: every Tool::execute() path MUST invoke ScopeGovernor::check_authorized() before side effects; CORSO GUARD enforces via clippy lint custom rule; addresses LLM08 unchecked-autonomy mitigation"
        fallback: "grep -rn 'impl Tool' --include='*.rs' | xargs grep -L 'ScopeGovernor::check' && exit 1 || exit 0"
      # v2.4.2 NEW: covers LLM03/05/06/09/10 surfaces not yet gated in v2.2.2
      - id: training_data_supply_chain_integrity
        label: "ML/agent training data + dependency components verified for integrity (poisoning + supply-chain compromise resistance)"
        type: hybrid
        owner: corso              # supply-chain audit
        co_owner: seraph          # adversarial probing
        threat_class: ai_system
        technique_id: ["LLM03:Training Data Poisoning [15]", "LLM05:Supply Chain Vulnerabilities [15]", "AML.T0019 (Data Poisoning) [17]"]
        cite_anchor:
          owasp_llm_top_10: "<HELIX>/user/standards/industry-baselines/security/owasp/owasp-llm-top-10-v1.1-2026-05-04.md#LLM03,LLM05"
          slsa: "<HELIX>/user/standards/industry-baselines/security/openssf/slsa-levels-v1.0-2026-05-04.md"
          verbatim_quote_from_owasp_llm03: "LLM03 Training Data Poisoning — Tampered training data can impair LLM models leading to responses that may compromise security, accuracy, or ethical behavior."
          verbatim_quote_from_owasp_llm05: "LLM05 Supply Chain Vulnerabilities — Depending upon compromised components, services or datasets undermine system integrity, causing data breaches and system failures."
        gate_predicate: "v2.4.2 NEW: builds shipping ML systems MUST audit training data lineage; SLSA Build L2+ provenance for build artifacts; sonatype-guide CVE check on all deps; LÆX Layer 1+4 sign-off if any component below SLSA L2 in security_classification ∈ {Restricted, Secret}"
        fallback: "sonatype-guide audit + cargo audit + ML data lineage attestation review"
      - id: sensitive_information_disclosure_prevention
        label: "Agent outputs filtered for PII/PHI/PCI/secrets disclosure; no leakage of training data or system-prompt context"
        type: hybrid
        owner: seraph
        co_owner: corso
        threat_class: ai_system
        technique_id: ["LLM06:Sensitive Information Disclosure [15]", "LLM10:Model Theft [15]"]
        cite_anchor:
          owasp_llm_top_10: "<HELIX>/user/standards/industry-baselines/security/owasp/owasp-llm-top-10-v1.1-2026-05-04.md#LLM06,LLM10"
          verbatim_quote_from_owasp_llm06: "LLM06 Sensitive Information Disclosure — Failure to protect against disclosure of sensitive information in LLM outputs can result in legal consequences or a loss of competitive advantage."
        gate_predicate: "v2.4.2 NEW: agent outputs reaching user surfaces MUST pass through redaction matching agent_capability_declaration.data_handling.redaction_required field (composes with §0.6 SEC-C1 fix); SERAPH probes via system-prompt-extraction tests"
        fallback: "regex audit for PII/PHI/PCI patterns in agent outputs; manual SERAPH adversarial test"
      - id: dos_resource_consumption_bounds
        label: "Agent operations bounded in token/time/cost to prevent DoS via resource exhaustion"
        type: automated
        owner: seraph
        threat_class: ai_system
        technique_id: ["LLM04:Model Denial of Service [15]", "CWE-400:Uncontrolled Resource Consumption [18]"]
        cite_anchor:
          owasp_llm_top_10: "<HELIX>/user/standards/industry-baselines/security/owasp/owasp-llm-top-10-v1.1-2026-05-04.md#LLM04"
          cwe: "<HELIX>/user/standards/industry-baselines/security/mitre/mitre-cwe-top-25-2024-list-2026-05-04.md"
          verbatim_quote_from_owasp: "LLM04 Model Denial of Service — Overloading LLMs with resource-heavy operations can cause service disruptions and increased costs."
        gate_predicate: "v2.4.2 NEW: every agent invocation bounded by §2.6 cost_budget (token + dollar + wall_clock_sla_h + HITL_threshold); HITL_threshold MUST fire on overage; AYIN observability_contract validates per-phase consumption against budget"
        fallback: "audit Section 2.6 cost_budget completeness across all phases; alert if any phase missing token_budget or wall_clock_sla_h"
    example_catches:
      - "Build name rendered in HTML without escaping (stored XSS in Kanban detail panel)"
      - "User-supplied --user flag passed directly to Path::join() without validation (path traversal)"
      - "HF_TOKEN literal in .mcp.json — committed to git, visible in history"
      - "Shell command constructed from user input with format!() (command injection)"
      # v2.2.2 SEC-H4 fix: agentic threat example_catches
      - "User issue title forwarded to a sibling agent without role-marker stripping — sibling interprets 'IGNORE PRIOR INSTRUCTIONS' as system instruction (prompt injection)"
      - "Hand-off message from CORSO to EVA collapsed user content into system role (inter-agent role-marker flattening)"
      - "New MCP tool surface added without entry to pre_flight.security_threat_model.entry_points (sanitization boundary gap)"
      - "Tool::execute() path skips ScopeGovernor::check_authorized() under happy-path branch (excessive agency)"

  Quality:
    abbrev: Q
    color: "#F59E0B"  # amber
    blocking: true
    owner: corso
    skill: "/CORSO"
    cycle_step: SNIFF   # lens: formatting, lint, complexity, dead code — same step as A, different focus
    criteria:
      - id: fmt_clean
        label: "Code formatting clean (cargo fmt / prettier)"
        type: automated
        fallback: "cargo fmt --check"
      - id: lint_zero
        label: "Zero lint warnings (clippy -D warnings / eslint)"
        type: automated
        fallback: "cargo clippy --all-targets -- -D warnings"
      - id: complexity_bounded
        label: "Cyclomatic complexity <= 10 per function"
        type: automated
      - id: function_length
        label: "Functions <= 60 lines"
        type: automated
      - id: no_dead_code
        label: "No unused imports, variables, or functions"
        type: automated
    example_catches:
      - "drawFrame() is 120 lines — must split into render_particles(), update_positions(), draw_connections()"
      - "Nested ternaries in a Svelte template (cyclomatic complexity >= 4)"
      - "Unused import left after refactor (clippy::unused_imports fires as -D warnings error)"

  Performance:
    abbrev: P
    color: "#3B82F6"  # blue
    blocking: true
    owner: quantum
    skill: "/Q"
    cycle_step: PROBE   # QUANTUM cycle: SCAN→SWEEP→TRACE→PROBE→THEORIZE→VERIFY→CLOSE
    criteria:
      - id: no_n_squared
        label: "No O(n²) in hot paths"
        type: automated
      - id: no_unbounded_alloc
        label: "No unbounded memory allocation (Vec growth without cap)"
        type: automated
      - id: no_blocking_async
        label: "No blocking I/O in async context"
        type: automated
      - id: budget_respected
        label: "Memory/CPU budget documented and respected"
        type: manual
    example_catches:
      - "Particle canvas recomputes all inter-particle distances every frame (O(n²) per frame at 60fps)"
      - "KanbanBoard re-derives column groupings on every mouse-move event instead of memoising"
      - "tokio::fs::read_to_string inside an async handler loop (blocking I/O starves the executor)"

  Testing:
    abbrev: T
    color: "#10B981"  # emerald
    blocking: true
    owner: corso
    skill: "/CORSO"
    cycle_step: CHASE   # runs the full test suite + coverage + ratchet check
    criteria:
      - id: all_tests_pass
        label: "All tests passing"
        type: automated
        fallback: "cargo test --all-features"
      - id: coverage_90
        label: "Coverage >= 90% on new code"
        type: automated
      - id: test_ratchet
        label: "Test count >= previous phase (never decreases)"
        type: automated
      - id: contract_tests
        label: "Contract tests for new interfaces"
        type: automated
      - id: no_mocking_internals
        label: "Tests exercise real behavior (no mocking internal implementation)"
        type: manual
    example_catches:
      - "New BuildDetailPanel has zero tests — ratchet fires because count decreased"
      - "Color theme change silently broke 3 existing snapshot tests"
      - "New pub fn has no contract test asserting its return type and error variants"

  Documentation:
    abbrev: D
    color: "#6366F1"  # indigo
    blocking: false   # SOFT — advisory only; never blocks a phase transition
    owner: corso
    skill: "/CORSO"
    cycle_step: HUNT    # documents findings; D warns never blocks
    criteria:
      - id: public_api_documented
        label: "All public functions/types have doc comments"
        type: automated
      - id: breaking_changes_noted
        label: "Breaking changes documented in CHANGELOG"
        type: manual
      - id: adr_for_decisions
        label: "Architecture Decision Record for significant choices"
        type: manual
    example_catches:
      - "pub fn scaffold_helix_dir() has no doc comment (warns; does not block)"
      - "Breaking gateway API change not noted in CHANGELOG (warns; does not block)"

  Operations:
    abbrev: O
    color: "#EC4899"  # pink
    blocking: true
    owner: eva
    skill: "/EVA"
    cycle_step: DISCOVER  # EVA cycle: DISCOVER→IMAGINE→CRAFT→SHARE→REMEMBER; DISCOVER = observe + verify
    criteria:
      - id: build_succeeds
        label: "Release build succeeds (cargo build --release / vite build)"
        type: automated
      - id: binary_codesigned
        label: "Binary codesigned for target platform"
        type: automated
      - id: deploy_script_valid
        label: "Deployment script runs without errors"
        type: automated
      - id: rollback_documented
        label: "Rollback procedure documented"
        type: manual
    example_catches:
      - "vite build fails because new CSS feature is unsupported in the target bundle target"
      - "codesign breaks on the rewritten gateway binary after a Rust edition upgrade"
      - "make deploy exits 0 but lightarchitects status returns non-zero (gateway not actually running)"

# ============================================================================
# SECTION 8.6: CODE QUALITY + EFFICIENCY + PRECISION-OVER-PLAUSIBILITY (NEW v2.2.0)
# ============================================================================
# Beyond lint/format. Composes Canon XXVI (post-edit gates), Section 2.7
# (surgical context hydration), Section 8 (quality_dimensions). Refuses
# "plausible" implementations; demands technical precision + efficiency.

code_quality_efficiency_precision:
  inline_refs: ["[1]", "[3]", "[5]"]
  decision_class: design
  description: |
    Section 8 quality_dimensions covers 9 [A+S+Q+C+O+P+K+D+T+R] dimensions at gate boundaries.
    This section adds an integrative layer: code quality + efficiency +
    precision-over-plausibility — the three properties that distinguish
    "code that ships safely" from "code that compiles and looks reasonable."
    Per Canon XXXV [3], precision is verifiable only by verbatim primary-
    source citation [5]; "looks reasonable" produces UNVALIDATED status,
    not VALIDATED. Independent verification per Canon XXXIII [1] catches
    what self-validation cannot.
    Composes with Section 2.7 surgical_context_hydration as the prevention
    layer; this section is the verification layer.
  source_memory: "Kevin scope clarification 2026-05-04 (v2.2.0 directive — technically precise, not plausible; secure + efficient)"
  source_canons: ["XXVI (post-edit gates)", "XXXIII (independent verification)"]
  added_in_template_version: "2.2.0"

  three_properties:
    quality:
      definition: "Conformance to Builders Cookbook + Canon standards. Beyond mechanical lint: cyclomatic complexity, function length, naming conventions, error-handling patterns, documentation."
      verification:
        - "cargo clippy --all-targets -- -D warnings (Rust)"
        - "pnpm exec svelte-check --threshold error (Svelte/TS)"
        - "lizard for cyclomatic complexity"
        - "coderabbit:review skill for human-quality lens"
        - "feature-dev:code-reviewer agent for orthogonal review"
      gate_predicate: "All quality verifications PASS at phase exit; ratchet check (test count never decreases)"

    efficiency:
      definition: "Bounded resource consumption: tokens (context window), dollars (LLM API + compute), wall-clock (phase SLA), runtime perf (algorithmic complexity), bundle size (web), memory footprint."
      verification:
        - "Per-phase cost_budget tracking (Section 2.6 cost_budget_schema)"
        - "Section 8 quality_dimensions.Performance criteria (no O(n²) hot paths, no blocking async, etc.)"
        - "Bundle analyzer (vite build for web; cargo bloat for Rust binary)"
      gate_predicate: "actual_tokens / actual_dollars / actual_wall_clock_h within cost_budget thresholds; perf criteria pass"

    precision_over_plausibility:
      definition: "Code is technically correct against the actual codebase, not just against intuitions about the codebase."
      verification:
        - "Surgical context hydration evidence_artifact present (Section 2.7 hydration_gate)"
        - "Implementation references existing pattern (cited reference impl) when extending"
        - "Edge cases derived from actual callers (not invented)"
        - "Tests exercise real behavior (no mocking internal implementation per Section 8 quality_dimensions.Testing)"
      gate_predicate: "Agent can quote evidence_artifacts when challenged 'why this approach?'; cannot pass with only intuition-based justification"
      anti_patterns_blocked:
        - "Plausible-but-wrong: code that compiles + matches naming conventions + appears similar to nearby examples but doesn't satisfy actual contract"
        - "Bulk-context-without-precision: agent reads everything, picks nothing relevant, produces same plausible code"
        - "Pattern-by-osmosis: applying pattern from one part of codebase where it doesn't fit"
        - "Speculative generality: building abstractions for hypothetical future requirements (per ~/.claude/CLAUDE.md 'Don't add features...beyond what the task requires')"

  composition_with_existing_blocks:
    section_2_7_surgical_context_hydration: "Hydration is prevention; this section is verification. Hydration ensures inputs; this section verifies outputs."
    section_8_quality_dimensions: "Q (Quality) + P (Performance) + T (Testing) dimensions are the dimensional surfaces; this section integrates them with precision-vs-plausibility distinction."
    canon_xxxiii: "Independent verification (cold-context Explore agent OR different sibling) is the test for precision; if precision-over-plausibility holds, independent agent reads same evidence and confirms; if it doesn't, precision claim was false."
    section_2_6_phase_level_schemas: "agent_capability_declaration.output_validation predicate uses this section's gate_predicates."

  webshell_render:
    widget: "code_quality_efficiency_precision_panel"
    view_mode: "/builds/<codename>/quality"
    update_signal: "sse_subscribe(quality_efficiency_events)"
    note: "/builds/<codename>/quality is a proposed route — register in webshell_routes_registry.proposed_routes"

# ============================================================================
# SECTION 8.5: HOOKS INTEGRATION (added v2.0.3 per R3)
# ============================================================================
# Claude Code hooks automate gates that would otherwise be manual.
# Each hook below maps to one or more LASDLC gates. Per-build settings can
# be generated from this declaration into .claude/settings.local.json.

hooks_integration:
  source_memory: "~/.claude/CLAUDE.md hooks-guide reference"
  added_in_template_version: "2.0.3"
  rationale: |
    The template has many gates that are currently manual or bash-fallback.
    Many can be automated via Claude Code hooks (~/.claude/settings.json or
    per-project .claude/settings.local.json). Operators don't see hooks fire —
    they see "Phase passed" rather than running gate commands manually. Hooks
    are the mechanism that makes gates invisible to primary-ICP operators per
    OD-10 Northstar.

  hooks:
    SessionStart:
      automates: ["pre_flight.bilateral_session_authority", "pre_flight.worktree_isolation", "Section 0.4 preflight_establishment_wizard invocation (v2.2.2 E4 fix)", "Section 0.5 northstar_first_planning prerequisite_gate (v2.2.2 E4 fix)"]
      action: |
        1. Read active.yaml top-level canonical_reconciliation block; verify
           current session ID matches declared <program>_authoring_authority.
        2. Verify pwd + git branch --show-current align with feat/<codename>.
        3. v2.2.2 E4 fix: Read project's preflight-establishment.yaml at
           helix/user/{user_id}/projects/{project_id}/preflight-establishment.yaml.
           If missing OR stale (>90 days OR Northstar amendment unprocessed):
             invoke Section 0.4 preflight_establishment_wizard via AskUserQuestion;
             halt session until completed.
        4. v2.2.2 E4 fix: Verify Northstar helix entry referenced in
           preflight-establishment.yaml.northstar_pointer resolves + sig ≥9.0.
           If not: halt + surface to operator for refinement.
      blocks_session_if: "Authority mismatch OR worktree state inconsistent OR preflight-establishment.yaml missing/stale OR Northstar reference unresolved"
      operator_visible: "Session start banner shows: 'Working on <codename> as <session_id> authority + preflight established' OR halt prompt with specific failure reason"

    UserPromptSubmit:
      automates: "Phase context injection (eliminates 'what phase are we in' rediscovery)"
      action: |
        If pwd is in active build worktree, inject phase + wave + active
        sub-build context into the prompt as system-reminder. Operator
        doesn't see this; the assistant context gets it.
      operator_visible: "(invisible — assistant has phase context without operator stating it)"

    "PreToolUse:Manifest":
      automates: ["Section 0.5 risk_classification_required.auto_derivation_rules enforcement (v2.2.2 SEC-C3-RESIDUAL + N-V221-2 fix)", "Section 9.5 compliance_framework_drift detection"]
      action: |
        Before any plan/manifest write OR mutation, check:
        1. Read manifest's risk_classification block.
        2. Compute required_frameworks per Section 0.5 auto_derivation_rules
           (8 rules: PII+EU_GDPR→GDPR; PHI→HIPAA; PCI→PCI_DSS; etc.;
           security_classification rules added v2.2.2).
        3. Diff against manifest's selected_frameworks.
        4. If any required framework missing AND no compliance_override_log
           entry justifies it: BLOCK manifest write; surface required-framework
           list + override-path link via AskUserQuestion.
        5. If override exists: verify laex_layer_1_signoff + (if scope-reduction)
           laex_layer_4_signoff present; if missing: BLOCK.
        6. v2.2.2 SEC-NEW-H2 fix: also check adversarial_environment ≠ none →
           security_threat_model.threats has ≥1 threat_class: ai_system entry.
      blocks_tool_if: "Required framework missing AND no signed override OR adversarial threat_class entry missing when adversarial_environment requires it"
      operator_visible: "Pre-write block surfaces in webshell with concrete missing frameworks + override-path link"
      added_in_template_version: "2.2.2 (SEC-C3-RESIDUAL + N-V221-2 fix per security-agent re-verification)"

    "PreToolUse:Task":
      automates: ["Section 2.7 hydration_gate mechanical enforcement (E1 fix v2.2.1)", "Section 0.4 wizard establishment check (v2.2.2 E4)", "Section 8.6 data_handling.redaction_required check (v2.2.2 SEC-C1-RESIDUAL)"]
      action: |
        Before any Agent tool dispatch (subagent_type), read
        <build_root>/.handoff/hydration-<agent_key>-<timestamp>.json. Validate:
        (a) all 5 evidence_artifact categories present + non-empty;
        (b) category_1_codebase.files_read entries are present in session's
            Read tool call log (cross-reference, not self-attest);
        (c) category_3_source_of_truth.canon_sections_quoted entries appear
            verbatim in canon.md (grep validation);
        (d) category_4_northstar.northstar_helix_entry resolves to a real helix
            entry at sig ≥9.0 (file existence + frontmatter check).
        Per Section 2.7 hydration_gate.cross_reference_validation.hook_logic.
      blocks_tool_if: "Any of (a)-(d) fails; agent receives error with missing/invalid categories listed"
      operator_visible: "Pre-dispatch gate fail surfaces in webshell hydration_gate_status panel + halts agent dispatch with structured error"
      added_in_template_version: "2.2.1 (E1 fix per engineer-agent verification)"

    "PreToolUse:Edit":
      automates: ["Canon XXIII enforcement"]
      action: |
        Verify the file path being edited is in the current agent's owns: list
        per file_function_map_schema. Reject (block tool execution) if not.
      blocks_tool_if: "File not owned by current agent (Canon XXIII violation)"
      operator_visible: "(invisible unless violation; then surfaces as 'cannot edit; not in owned set' message)"

    "PreToolUse:Write":
      automates: "Same as PreToolUse:Edit; applies to file creation"
      action: "Verify file path is in current agent's owns: list (Canon XXIII)"
      blocks_tool_if: "File not owned by current agent"

    "PostToolUse:Edit":
      automates: ["Canon XXVI post-edit gate", "quality_dimensions.Quality automation"]
      action: |
        For Rust files: cargo fmt --check + cargo clippy --all-targets -- -D warnings.
        For Svelte/TS files: pnpm exec svelte-check --threshold error + prettier --check.
        Failures surface as findings to the build's findings table; operator
        sees them in webshell, not as terminal output.
      operator_visible: "Webshell findings table updates with quality issues; phase progress widget shows new lint warnings count"

    "PostToolUse:Write":
      automates: "Same as PostToolUse:Edit; applies to file creation"
      action: "Run formatter + linter against new file"

    "PostToolUse:Bash":
      automates: ["Phase status auto-update from cargo test / cargo build / make output", "v2.2.2 SEC-H2 fix: CVE detection → SERAPH HARD GATE invocation"]
      action: |
        1. Parse known build/test commands' exit codes + summary output.
           Update phase_status_history in active.yaml with cargo_check=PASS/FAIL,
           test_count, coverage delta.
        2. v2.2.2 SEC-H2 fix: If command is `cargo audit`, `sonatype-guide`, OR
           `pnpm audit` AND output contains CRITICAL or HIGH severity CVE:
           a) Halt subsequent build phases until SERAPH HARD GATE pass.
           b) Auto-dispatch lightarchitects:security agent via Agent tool with
              CVE details + recommended remediation path.
           c) Update Section 9.5 dependency_drift dashboard with CVE entry.
           d) Emit AYIN audit event {severity: critical, source: cargo_audit, action: serpah_invoked}.
      filter_match: "cargo (test|build|check|clippy|audit)\\b | sonatype-guide.* | make (deploy|deploy-fast|test|quality|build) | pnpm (run )?(test|build|dev|audit) | npm (test|audit)"
      operator_visible: "Phase progress widget shows updated test count + coverage; Build status changes to PASS/FAIL; CVE-detected events surface in security dashboard with halt indicator"

    "PostToolUse:Edit_PrecisionEvidence":
      automates: ["Section 2.7 precision_vs_plausibility.deterministic_verification (v2.2.2 E2 producer-side wiring)"]
      action: |
        v2.2.2 E2 producer-side fix: After agent completes Edit/Write,
        invoke precision_evidence validation per Section 2.7
        deterministic_verification.hook_validation:
        1. Read <build_root>/.handoff/precision-<agent_key>-<change_id>.json.
        2. Validate evidence_artifact_refs files exist + were generated for
           this agent_key + this session.
        3. Validate pattern_reference_files appear in session Read tool log
           + line-ranges within file bounds.
        4. Validate edge_cases_derived_from file:line entries appear in
           session Read tool log.
        5. If any assertion fails: surface precision violation; flag edit
           for cross-validation OR revert via Edit-revert tool.
      blocks_tool_if: false   # Surfaces precision violation; doesn't block edit; cross-validation handles
      operator_visible: "precision_score_indicator widget updates per change_id; violations surface in findings panel"
      added_in_template_version: "2.2.2 (E2 producer-side wiring fix per engineer-agent re-verification)"

    # v2.2.3 Canon XXXV enforcement
    "PreToolUse:Assertion_ConfidenceThresholdGate":
      automates: ["Section 0.6 confidence_threshold_gate enforcement on every decision-bearing assertion"]
      fires_on:
        - "Edit/Write/Manifest writes containing gate_predicate / validation_predicate / decisions_made / hand_off / finding / rubric assertion"
        - "Task dispatch with assertion-bearing instructions"
        - "AskUserQuestion responses recorded as decisions"
      action: |
        v2.2.3 Canon XXXV gate:
        1. Parse the assertion for the required schema fields:
           confidence_value, primary_source_citations[], validation_status.
        2. If validation_status missing → auto-flip to UNVALIDATED.
        3. If validation_status == VALIDATED:
           a. Verify confidence_value floor ≥95 (if interval, floor; if point, value).
              Floor < 95 → flip to INSUFFICIENT_EVIDENCE → BLOCK.
           b. Verify ≥1 primary_source_citation has non-empty quote + source.
              Empty → flip to UNVALIDATED → BLOCK.
           c. For each citation: verify file path resolves OR URL accessed
              date is present. Failure → flip to UNVALIDATED → BLOCK.
           d. For each citation with file path: grep file for verbatim quote
              text. Absent → flip to UNVALIDATED → BLOCK (paraphrase-as-quote
              detection per §60.6).
           e. Detect citation cycles via graph trace. Cycle → UNVALIDATED → BLOCK.
        4. If validation_status == EXEMPT: verify exemption justification
           matches enum (arithmetic / regex / file-existence / deterministic
           computation). Mismatched → flip to UNVALIDATED → BLOCK.
        5. If validation_status ∈ {UNVALIDATED, INSUFFICIENT_EVIDENCE, DISPUTED}:
           Surface to operator with research escalation prompt; agent MUST
           run Tier 1-4 research before re-asserting. Lowering threshold
           is forbidden; reframing claim as "best-guess" is forbidden.
      blocks_tool_if: true
      operator_visible: "confidence_threshold_dashboard at /builds/<id>/confidence shows live state per assertion_id; blocked assertions surface in findings panel with research_escalation_prompt"
      added_in_template_version: "2.2.3 (Canon XXXV enforcement per Kevin operator directive 2026-05-04)"

    "PostToolUse:Citation_StalenessCheck":
      automates: ["Section 0.6 confidence_threshold_gate.anti_patterns.stale_citation"]
      fires_on:
        - "any gate evaluation that re-runs after initial assertion"
      action: |
        v2.2.3 Canon XXXV anti-stale:
        1. For each primary_source_citation in the asserted gate, compute
           age = today - accessed_date.
        2. age > 7 days: warn (re-verification recommended).
        3. age > 30 days: auto-flip to UNVALIDATED → BLOCK gate; agent
           MUST re-pull the source via Tier 1-4 escalation and update
           accessed_date.
      blocks_tool_if: true        # only blocks at 30d+ stale
      operator_visible: "stale citation badge in confidence_threshold_dashboard; auto-clears on re-verification"
      added_in_template_version: "2.2.3 (Canon XXXV anti-stale enforcement)"

    # v2.4.0 — LDB v1.0 self-bootstrap enforcement
    "PostDeploy:RunDeliverableBenchmark":
      automates: ["Section 7.7 deliverable_benchmark execution per LDB v1.0 spec"]
      fires_on:
        - "post-deploy completion (deployable builds)"
        - "post-implementation validation cycle close-out for non-deployable builds (Section 7.5 step 5)"
      action: |
        v2.4.0 Canon XXXVI Phase 3 truth-telling layer:
        1. Read build profile from <build_root>/.preflight/wizard-complete
           + manifest.yaml: tier, security_classification, deployable,
           ai_ml_system.
        2. Select default_aggregate_weights row matching profile.
        3. Determine applicable components per tiered_application:
           - Tier A always: D1, D2, D3, D6, D8
           - Tier B conditional: D4 (if deployable), D5 (if domain match)
           - Tier C comparative: D7 (if N≥3 in aggregate.json)
        4. For each component, dispatch INDEPENDENT cold-context runner
           per independent_verification_roster (Canon XXXIII compliance —
           NEVER the build's own agents):
           - D1: cold-context Explore agent + AskUserQuestion operator survey
           - D2: cold-context Explore agent reading deliverable + ISO/IEC 25010
           - D3: CORSO automated tools (clippy/cargo audit/sonatype-guide/lizard)
           - D4: git log + AYIN traces + deploy system records
           - D5: cold-context Explore agent (per matched domain anchor)
           - D6: SERAPH (offensive) + CORSO GUARD (static) + LÆX Layer 1+4
           - D7: aggregator hook (reads §7.6 aggregate.json + Firecrawl
                 industry-baselines)
           - D8: AYIN traces (objective spans) + AskUserQuestion operator
                 survey for D8i only
        5. Each runner produces: { interval, sub_scores, citations,
           validation_status } per Section 0.6 confidence_threshold_gate
           (every D-score requires verbatim primary-source citation).
        6. Compute aggregate score = weighted sum of D-scores per
           weights_applied; compute band per thresholds.
        7. Write <build_root>/.calibration/<codename>.deliverable_benchmark.json
           per output_schema.
        8. Append to §7.6 per_build_record.deliverable_benchmark field;
           recompute §7.6 cross_build_aggregate (ldb_band_distribution +
           ldb_per_component_means + ldb_d8_compression_trend +
           ldb_d6_security_posture).
        9. If aggregate band ∈ {WEAK, FAILED}: surface to operator with
           per-component breakdown + lowest-scoring sub-components +
           recommended remediation; require operator review before
           closing the build.
        10. If D6 has any CRITICAL pen-test finding (D6i) unfixed: BLOCK
            close-out; require LÆX Layer 1+4 review.
        11. If D8 ldb_d8_compression_trend.canon_xxxvi_phase_3_status ==
            "unsupported" with sample N≥10: surface drift alert;
            Canon XXXVI Phase 3 promise empirically falsified for current
            build profiles.
      blocks_tool_if: true   # blocks on D6 CRITICAL unfixed; advisory on others
      operator_visible: "deliverable_benchmark_dashboard at /builds/<codename>/deliverable-benchmark; cross-build trends at /ops/calibration"
      added_in_template_version: "2.4.0 (LDB v1.0 enforcement)"
      composes_with:
        section_7_5: "fires at post-implementation validation cycle close-out"
        section_7_6: "writes to per_build_record.deliverable_benchmark + recomputes aggregate"
        section_0_6: "every D-score honors confidence_threshold_gate schema"
        canon_xxxiii: "independent runners only; build's own agents never grade"
        canon_xxxiv: "every score reported as interval"
        canon_xxxv: "every score requires verbatim primary-source citation"
        canon_xxxvi: "D8 directly evaluates Phase 3 compression claim"

    SubagentStop:
      automates: ["wave_structure agent completion manifest writing"]
      action: |
        When a subagent (Agent tool dispatch) completes, write
        /tmp/<agent-id>-manifest.json with completion status + cargo_check
        result + agent's findings. Downstream agents read these before starting
        (per Implement.phase_execution_steps step 5 description).
      operator_visible: "Live agent dispatch panel shows agent completion + status badge"

    PreCompact:
      automates: ["Phase handoff summary writing"]
      action: |
        Before context compaction, write phase handoff summary to active build
        dir at <build_root>/.handoff/<timestamp>.md with: current phase, current
        wave, completed exit_criteria, pending exit_criteria, recent decisions,
        blocking issues. New session reads on resume.
      operator_visible: "(invisible — handoff is automatic on session resume)"

    Stop:
      automates: ["Worktree clean state verification on session end"]
      action: |
        Verify worktree clean state per pre_flight.worktree_isolation.cleanup
        preconditions. Surface uncommitted changes / unpushed commits / unstashed
        items as warnings in the webshell phase_progress_widget at session-end.
      blocks_session_end_if: false   # advisory only; operator can dismiss
      operator_visible: "Session-end summary shows worktree state + any uncommitted/unpushed work"

  per_phase_hook_map:
    Plan:
      relevant_hooks: [SessionStart, UserPromptSubmit, "PostToolUse:Write", "PreCompact"]
    Research:
      relevant_hooks: [UserPromptSubmit, "PostToolUse:Write", "PreCompact"]
    Implement:
      relevant_hooks: ["PreToolUse:Edit", "PreToolUse:Write", "PostToolUse:Edit", "PostToolUse:Write", "PostToolUse:Bash", SubagentStop, "PreCompact"]
    Harden:
      relevant_hooks: ["PreToolUse:Edit", "PostToolUse:Edit", "PostToolUse:Bash", SubagentStop]
    Verify:
      relevant_hooks: ["PostToolUse:Bash", SubagentStop]
    Ship:
      relevant_hooks: ["PostToolUse:Bash"]
    Learn:
      relevant_hooks: ["PostToolUse:Write", Stop]

  settings_template:
    location: ".claude/settings.local.json"
    note: |
      Per-build .claude/settings.local.json scaffold can be generated from this
      declaration. The webshell exposes 'Generate hook config' button on the
      build detail page (proposed component). Operator clicks; backend writes
      the settings file scoped to the active worktree.
    eef_sub_build: "build-spawn-monitor (settings generation button)"

# ============================================================================
# SECTION 9: AGENTIC SDLC (unique to LASDLC)
# ============================================================================
# Configuration for AI agent execution — not applicable to human-only teams.

agentic:
  agent_composition:
    canon: "XXIII"
    rule: "File-ownership partitioning, not feature partitioning"
    ordering: "DAG-ordered batching (Kahn's BFS for dependency resolution)"

  context_budget:
    estimate_per_phase: true
    compaction_threshold: 0.7  # compact at 70% of context window
    handoff_format: "Key decisions + current state, <2K tokens"

  tool_permissions:
    plan_phase: [Read, Grep, Glob, WebSearch, WebFetch]
    research_phase: [Read, Grep, Glob, WebSearch, WebFetch]
    implement_phase: [Read, Edit, Write, Grep, Glob, Bash]
    harden_phase: [Read, Grep, Glob, Bash]  # read-heavy, run scanners
    verify_phase: [Read, Grep, Glob, Bash]   # run tests
    ship_phase: [Read, Bash]                  # deploy commands only
    learn_phase: [Read, Grep, Write]          # write helix entry

  fallback_chains:
    llm_fails: "Retry 3x → escalate to HITL"
    mcp_down: "Filesystem fallback → warn user"
    context_overflow: "Compact → split phase if still over"
    tool_denied: "Log + skip + inject error context"

  hitl_protocol:
    must_be_human:
      - "Destructive file operations (rm, git reset)"
      - "Scope violations (touching files outside owned set)"
      - "Architecture divergence from approved plan"
      - "Rollback decisions"
      - "Cost gate exceeding $10"
      - "Security findings with CRITICAL severity"
    can_be_autonomous:
      - "Read-only operations"
      - "Test execution"
      - "Compilation and formatting"
      - "Non-destructive tool calls"
      - "Gate evaluation (automated criteria)"

  training_capture:
    trace_format: "AYIN NDJSON spans"
    arena_eligible: "Phases with novel tool-use patterns"
    signal_types: [format_reward, auxiliary_loss, process_supervision]

# ============================================================================
# SECTION 9.5: DRIFT MANAGEMENT (NEW v2.1.0 per Phase B-2)
# ============================================================================
# Tracks + prevents drift across 4 surfaces: prompts, schemas, dependencies,
# canon. Each surface has its own drift signal + check rule + remediation
# protocol. Composes Canon XXVI (post-edit gates) + Canon XXXIII (cross-
# validation) + the v2.0.2 sync-template-history.sh mirror pattern.

drift_management:
  description: |
    Drift = silent divergence between two systems that should agree. The
    LASDLC build surface has 4 categories of drift; each gets explicit
    tracking + prevention. Canon XXXIII identifies self-validation as
    structurally drift-blind; this section operationalizes the response.
  source_memory: "Kevin scope clarification 2026-05-04 (v2.1.0 directive)"
  added_in_template_version: "2.1.0"

  drift_categories:
    prompt_drift:
      description: "Agent dispatch prompts evolve over time; without versioning + drift checks, prompt regressions can silently change agent behavior"
      tracking_artifact: "helix/agents/<agent_id>/prompts/<prompt_name>.md (versioned + signed)"
      check_rule: |
        Pre-dispatch: hash current prompt + compare to last-known-good hash.
        On mismatch: surface diff for HITL approval before dispatch.
        On approve: update last-known-good registry + log drift event to AYIN.
      remediation_protocol:
        - "If unintended drift: revert to last-known-good prompt; investigate cause"
        - "If intended drift: update last-known-good registry + bump prompt version + add to changelog"
      registry_schema:
        prompt_id: "<agent>:<prompt_name>"
        prompt_version: "semver"
        prompt_hash: "sha256"
        last_validated_at: "ISO timestamp"
        last_validated_by: "<operator OR sibling>"
      webshell_render:
        widget: "prompt_drift_dashboard"
        view_mode: "/ops/drift/prompts"
        update_signal: "sse_subscribe(prompt_drift_events)"

    schema_drift:
      description: "Schemas (manifest, plan, helix-entry, JSONSchema codegen output) drift from their source-of-truth Rust types or YAML schemas"
      tracking_artifact: "research/jsonschema-codegen/dist/schemas/ + checksums"
      check_rule: |
        CI gate: regenerate schemas from source Rust types; diff against
        committed dist/schemas/. Any diff = schema drift; block merge until
        re-committed or source-of-truth updated.
        Reference: LASDLC v2.0.4 R-5 mitigation (codegen JSONSchema from Rust types).
      remediation_protocol:
        - "If Rust types changed: re-emit schemas + commit; update editor lock-field matrix if locked fields changed"
        - "If schema manually edited: revert; manual edits forbidden — must come from codegen"
      registry_schema:
        schema_id: "<file_basename>"
        source_type: "<rust_type_path> OR <yaml_schema_path>"
        last_codegen_at: "ISO timestamp"
        codegen_pipeline: "research/jsonschema-codegen/src/bin/emit_schema.rs OR equivalent"
      webshell_render:
        widget: "schema_drift_dashboard"
        view_mode: "/ops/drift/schemas"
        update_signal: "sse_subscribe(schema_drift_events)"

    dependency_drift:
      description: "Dependencies (cargo.toml, package.json, plugin versions) drift from declared baseline; CVEs accumulate; license changes silently"
      tracking_artifact: "Cargo.lock + pnpm-lock.yaml + sonatype-guide audit reports"
      check_rule: |
        Pre-flight (Section 6 dependency_audit): cargo deny check + sonatype-guide.
        Per-PR: dependabot OR equivalent for security advisory triggers.
        Quarterly: full audit pass + license re-verification (per project_license_architecture).
      remediation_protocol:
        - "Critical CVE: halt + patch; SERAPH co-review on the patched version"
        - "License change: license-migration-playbook.sh dispatched; CI gate per LD-1"
        - "Major version bumps: full Phase 2 Research re-pass for the affected library"
      webshell_render:
        widget: "dependency_drift_dashboard"
        view_mode: "/ops/drift/dependencies"
        update_signal: "sse_subscribe(dependency_advisory_events)"

    canon_drift:
      description: "Canon registry (canon.md) drifts from cookbook (builders-cookbook.md) or template (LASDLC-TEMPLATE-v1.yaml). Surfaced 2026-05-04: cookbook §56+§57 declared Canon XXXI+XXXII without canon.md ratification — invisible drift for ~weeks. v2.2.2: extended with compliance_framework_drift sub-category per N-V221-1 false-witness fix."
      tracking_artifact: "canon.md `Engineering Canon Added` line + cookbook version-history block + template `history_file` pointer"
      check_rule: |
        Mirror-sync script: scripts/sync-template-history.sh (extends to canon ↔ cookbook in v2.1.x).
        Pre-PR check: any cookbook §N referencing 'Canon XXX' must have a corresponding canon.md entry.
        Pre-PR check: any canon.md entry must reference at least one cookbook section if applicable.
      remediation_protocol:
        - "If cookbook ahead of canon.md: backfill canon.md entry with full Source/Decision-shaping/Pressure-tested/Convergent-evidence/Biblical-grounding/Ratified-by sections"
        - "If canon.md ahead of cookbook: add §N entry to cookbook OR mark canon as 'no operational complement needed' explicitly"
        - "If template references canon that doesn't exist: surface as CRITICAL drift; halt build until canon registered"
      webshell_render:
        widget: "canon_drift_dashboard"
        view_mode: "/ops/drift/canon"
        update_signal: "sse_subscribe(canon_registry_events)"
        special_note: "Canon drift is the slowest to detect; longer signal latency budget acceptable (weekly sync)"

      # ─── Compliance framework drift extension (v2.2.2 N-V221-1 false-witness fix) ──
      # v2.2.1 SEC-C1 + SEC-C3 referenced "canon_drift extended" — claim was false witness;
      # canon_drift was unchanged. v2.2.2 actually extends with compliance_framework_drift
      # sub-category covering: data_handling.classification ↔ selected_frameworks mismatch,
      # risk_classification.data_categories_touched ↔ auto_derivation_rules outcome mismatch,
      # selected_frameworks ↔ jurisdiction_enum coverage mismatch, OWASP/ATLAS framework
      # selection without corresponding security_threat_model.threats[threat_class: ai_system].
      compliance_framework_drift:
        description: "Sub-category of canon_drift covering compliance-framework consistency between manifest fields. Referenced by SEC-C1 data_handling_classification_rules.validation_predicate + SEC-C3 risk_classification_required.validation_predicate."
        added_in_template_version: "2.2.2 (N-V221-1 false-witness fix; cross-references real)"
        check_rules:
          - rule_id: "compliance_framework_drift.classification_framework_mismatch"
            condition: "agent_capability_declaration.data_handling.classification ∈ {PII, PHI, PCI} AND security_compliance.selected_frameworks lacks corresponding framework"
            action: "Surface as CRITICAL drift; halt agent dispatch via PreToolUse:Task hook"
            example: "agent declares data_handling.classification: PHI but selected_frameworks omits HIPAA → drift"
          - rule_id: "compliance_framework_drift.framework_classification_mismatch"
            condition: "security_compliance.selected_frameworks contains compliance framework AND no agent_capability_declaration.data_handling.classification covers required category"
            action: "Surface as CRITICAL drift; halt build until reconciled"
            example: "selected_frameworks contains GDPR but no agent declares data_handling.classification: PII → drift (resolves Explore HIGH bidirectional binding gap)"
          - rule_id: "compliance_framework_drift.jurisdiction_mismatch"
            condition: "Northstar.risk_classification.jurisdictions OR data_handling.jurisdictions reference token NOT in canonical jurisdiction_enum (Section 0.3 v2.2.2)"
            action: "Surface as HIGH drift; rule will silently mismatch on auto_derivation_rules"
            example: "Northstar uses 'EU'; data_handling uses 'EU_GDPR' — both refer to GDPR but auto_derivation_rules check 'EU ∈ jurisdictions' → mismatch (resolves SEC-NEW-H1)"
          - rule_id: "compliance_framework_drift.ai_system_threat_missing"
            condition: "selected_frameworks contains OWASP_LLM_Top_10 OR MITRE_ATLAS AND security_threat_model.threats lacks ≥1 entry with threat_class: ai_system"
            action: "Surface as CRITICAL drift; OWASP/ATLAS verification predicate cannot be satisfied without ai_system threats"
            example: "selected GDPR + OWASP_LLM_Top_10 but threats[] only has appsec entries → drift"
          - rule_id: "compliance_framework_drift.compliance_override_unrecorded"
            condition: "Operator declined an auto_derivation_rule (Section 0.5 risk_classification_required.operator_override_protocol) without recording in compliance_override_log"
            action: "Surface as CRITICAL drift; override path requires explicit log entry per LÆX Layer 1+4 review"
        enforcement_binding:
          mechanical: "PreToolUse:Task hook (v2.2.1) extended to check compliance_framework_drift rules per v2.2.2"
          surfaces_in: ["plan-phase squad_review", "phase exit gate", "/ops/drift/compliance dashboard (proposed route)"]
        webshell_render:
          widget: "compliance_framework_drift_dashboard"
          view_mode: "/ops/drift/compliance"
          update_signal: "sse_subscribe(compliance_drift_events)"

  cross_drift_correlation:
    description: "Drift in one category often signals drift in another (e.g., prompt drift + agent_capability_declaration drift; schema drift + canon drift on locked-field matrix)"
    correlation_rules:
      - "Prompt drift + tool list change → agent_capability_declaration MUST be re-validated"
      - "Schema drift on Helix v5 frontmatter → canon.md helix-mutability rules MUST be re-checked"
      - "Dependency drift introducing CVE → security_threat_model T-N may need new entry"
      - "Canon drift (cookbook ↔ canon.md) → template `history_file` mirror MUST re-run"
    webshell_render:
      widget: "drift_correlation_graph"
      view_mode: "/ops/drift"
      update_signal: "sse_subscribe(any_drift_event)"

# ============================================================================
# SECTION 9.7: LIGHTARCHITECTS-FIRST AGENT DISPATCH (NEW v2.2.0)
# ============================================================================
# Default agent priority order: lightarchitects:* > feature-dev:* >
# coderabbit:* > generic. Optimizes for platform-portable (Codex / Cursor /
# other coding agents). lightarchitects:* agents are the canonical default.

lightarchitects_first_dispatch:
  description: |
    LASDLC was authored on Claude Code, but the framework MUST work across
    coding agents (Codex, Cursor, future agents). lightarchitects:* agents
    are platform-portable — they're MCP-server-backed, not Claude-Code-
    specific. feature-dev:* + coderabbit:* + Claude-Code-shipped agents
    are Claude-Code-specific and break on other coding agents.

    This section establishes priority order: prefer lightarchitects:* over
    Claude-Code-shipped agents whenever functionally equivalent. Updates
    existing per-phase agents: lists to honor this priority by default.
  source_memory: "Kevin scope clarification 2026-05-04 (v2.2.0 directive — prioritize lightarchitects agents in case not using Claude Code or another coding agent; optimize for the lightarchitects platform)"
  added_in_template_version: "2.2.0"

  # ─── Canonical subagent_types registry (E3 fix v2.2.1) ──
  # Engineer-agent verification 2026-05-04 found: agents files exist at
  # ~/.claude/plugins/cache/light-architects/lightarchitects/1.0.0/agents/
  # but CLAUDE.md plugin inventory only lists 'tools'. This registry is the
  # canonical source-of-truth for what subagent_type strings are dispatchable.
  canonical_subagent_registry:
    description: "8 lightarchitects:* subagent_types canonically dispatchable via Agent tool"
    added_in_template_version: "2.2.1 (E3 fix per engineer-agent verification)"
    registry_root: "~/.claude/plugins/cache/light-architects/lightarchitects/1.0.0/agents/"
    presets_source_of_truth: "~/.claude/plugins/cache/light-architects/lightarchitects/1.0.0/skills/SQUAD/references/presets.md"
    registered_subagents:
      - subagent_type: "lightarchitects:engineer"
        file: "engineer.md"
        purpose: "Engineering domain expert — builds, architects, implements features"
        dispatchable_via: "Agent tool with subagent_type='lightarchitects:engineer'"
      - subagent_type: "lightarchitects:knowledge"
        file: "knowledge.md"
        purpose: "Knowledge domain expert — enriches helix, preserves memory, codebase orientation, doc audit"
        dispatchable_via: "Agent tool with subagent_type='lightarchitects:knowledge'"
      - subagent_type: "lightarchitects:ops"
        file: "ops.md"
        purpose: "Operations domain expert — deploys, monitors, profiles, incident response"
        dispatchable_via: "Agent tool with subagent_type='lightarchitects:ops'"
      - subagent_type: "lightarchitects:quality"
        file: "quality.md"
        purpose: "Quality domain expert — reviews, optimizes, enforces standards"
        dispatchable_via: "Agent tool with subagent_type='lightarchitects:quality'"
      - subagent_type: "lightarchitects:researcher"
        file: "researcher.md"
        purpose: "Research domain expert — investigates, analyzes, discovers knowledge"
        dispatchable_via: "Agent tool with subagent_type='lightarchitects:researcher'"
      - subagent_type: "lightarchitects:security"
        file: "security.md"
        purpose: "Security domain expert — assesses, audits, hardens (SERAPH lens)"
        dispatchable_via: "Agent tool with subagent_type='lightarchitects:security'"
      - subagent_type: "lightarchitects:squad"
        file: "squad.md"
        purpose: "Direct sibling invocation + multi-sibling consultation (SCRUM mode)"
        dispatchable_via: "Agent tool with subagent_type='lightarchitects:squad'"
      - subagent_type: "lightarchitects:testing"
        file: "testing.md"
        purpose: "Testing domain expert — designs/writes/validates test suites (Canon XXVII)"
        dispatchable_via: "Agent tool with subagent_type='lightarchitects:testing'"
    total_registered: 8
    validation_predicate: |
      For any agent_capability_declaration_schema entry with target_type: subagent_type
      AND target starts with 'lightarchitects:', the substring after ':' MUST appear in
      registered_subagents[].subagent_type. Mismatch surfaces as CRITICAL drift per
      Section 9.5 drift_management.canon_drift extended.
    upstream_canonicalization: "v2.2.1 also recommends ~/.claude/CLAUDE.md plugin inventory be updated to enumerate these 8 subagent_types in the lightarchitects plugin entry. Pending operator action."

  priority_order:
    1_lightarchitects:
      description: "Platform-portable; MCP-server-backed; works across coding agents. Canonical registry in canonical_subagent_registry above (8 subagent_types registered)."
      agents:
        - "lightarchitects:engineer (replaces feature-dev:code-architect for architecture work)"
        - "lightarchitects:researcher (replaces feature-dev:code-explorer for exploration)"
        - "lightarchitects:quality (already canonical in wave_structure)"
        - "lightarchitects:security (replaces SERAPH-direct for security work)"
        - "lightarchitects:testing (replaces feature-dev:code-reviewer for test design)"
        - "lightarchitects:knowledge (replaces feature-dev:code-explorer for canon-aware orientation)"
        - "lightarchitects:ops (replaces feature-dev:code-reviewer for ops-lens review)"
        - "lightarchitects:squad (replaces multi-sibling-direct for SCRUM)"
      preferred_for: "All substantive declarative work, code review, and dispatch where functionally equivalent to Claude-Code-specific alternative"

    2_claude_code_specific_fallback:
      description: "Use only when lightarchitects:* doesn't have functional equivalent OR when Claude-Code-specific affordances (Skill tool, specific MCP integrations) are required"
      agents:
        - "feature-dev:code-architect (when lightarchitects:engineer insufficient)"
        - "feature-dev:code-explorer (when lightarchitects:researcher insufficient)"
        - "feature-dev:code-reviewer (when lightarchitects:quality + lightarchitects:testing insufficient)"
        - "coderabbit:review (Skill tool; security or code-review lens)"
        - "Explore (general codebase exploration; no platform-portable equivalent yet)"
      caveat: "Not platform-portable; breaks on Codex / Cursor / non-Claude-Code"

    3_plugin_invocations:
      description: "Plugin invocations (MCP tools) — platform-portable when MCP-supported"
      examples:
        - "context7 (resolve-library-id + query-docs)"
        - "firecrawl (scrape + search)"
        - "sonatype-guide (dep audit)"
        - "rust-analyzer-lsp (Rust code intelligence)"
        - "playwright (browser automation)"
      portability: "Available via MCP across coding agents that speak MCP"

    4_bash_invocations:
      description: "Shell commands; universally portable"
      examples:
        - "cargo (Rust toolchain)"
        - "pnpm / npm (Node toolchain)"
        - "git"
        - "make"
      portability: "Universal — works in any coding agent with shell access"

  composition_with_existing_blocks:
    per_phase_agents_lists: |
      Existing per-phase agents: lists in Section 2 phases.<phase>.agents
      should be updated to prefer lightarchitects:* over feature-dev:* where
      functionally equivalent. v2.2.0 marks this as a planned update; v2.2.1
      will execute the bulk per-phase rewrite. Until then, agent_id (legacy)
      + target + target_type fields preserve both values.
    section_2_6_phase_level_schemas: "agent_capability_declaration_schema.target_type accepts subagent_type | plugin | skill | bash | composite | reference; lightarchitects:* maps to subagent_type"

  platform_portability_test:
    description: "Verify a build plan can be executed by a non-Claude-Code coding agent (e.g., Codex CLI)"
    test_predicate: "Strip all feature-dev:* + coderabbit:* + Skill-tool references from a build manifest; can the remaining graph still execute?"
    pass_threshold: "≥80% of build steps execute via lightarchitects:* + plugin + bash; <20% Claude-Code-specific"

  webshell_render:
    widget: "agent_dispatch_priority_panel"
    view_mode: "/ops/agents"
    update_signal: "sse_subscribe(agent_dispatch_events)"
    note: "/ops/agents is a proposed route — register in webshell_routes_registry.proposed_routes"

# ============================================================================
# SECTION 9.6: WEBSHELL ROUTES REGISTRY (NEW v2.2.0 per CRITICAL fix 2)
# ============================================================================
# Catalogs all webshell routes referenced by the template with explicit
# status: live | proposed | deprecated. Resolves the v2.1.0 defect class
