# ============================================================================
# SECTION 0.5: NORTHSTAR-FIRST PLANNING (PREREQUISITE — NEW v2.2.0)
# ============================================================================
# Northstar MUST be established + ratified BEFORE any build plan is authored
# against this template. Build plans without a ratified Northstar fail this
# pre-flight gate. Composes OD-10 Northstar (sig 9.0) + Canon XXXIII
# (independent verification of Northstar fit).

northstar_first_planning:
  description: |
    Every build plan exists to advance a product Northstar [7]. The Northstar
    declares "what shipped means" + "primary-ICP user value" + "what gets
    optimized for." Without a ratified Northstar, build plans optimize for
    the wrong thing — engineering elegance, agent capability demonstration,
    proof-of-work — and ship features that don't move the product. This
    section makes the Northstar a hard prerequisite, not a hopeful framing.
    Per Canon XXXVI [4], Northstar-driven planning is the Phase 1 substrate
    that calibration data later refines.
  source_memory: "Kevin scope clarification 2026-05-04 (v2.2.0 directive)"
  source_canons: ["OD-10 [7]", "Canon XXXIII (independent verification) [1]", "Canon XXXVI (Quality-First Compression) [4]"]
  added_in_template_version: "2.2.0"
  inline_refs: ["[7]", "[4]", "[1]"]
  decision_class: architecture

  prerequisite_gate:
    label: "Northstar declared, ratified, and accessible BEFORE template instantiation"
    blocking: true
    type: manual
    runs: "Once per project; then inherited by all child builds within the project"
    procedure:
      - "1. Locate Northstar declaration: helix/shared/entries/<date>-<northstar-codename>.md OR equivalent ratified helix entry at sig ≥9.0"
      - "2. Verify ratification authority: helix entry frontmatter shows ratified_by: <operator OR LÆX Layer 1> with date stamp"
      - "3. Verify Northstar contains: (a) primary-ICP definition; (b) 'what shipped means' criterion; (c) optimization target (user value, not proxy metrics); (d) measurable assertion (e.g., terminal_window_open_count === 0 for OD-10); (e) NEW v2.2.1 per SEC-C3 — risk_classification block (see below)"
      - "4. If any of (a)-(e) missing OR sig <9.0 OR not ratified: HALT template instantiation; surface to operator for Northstar refinement"
      - "5. If Northstar present + ratified + complete: link in build manifest as northstar_lineage block (per parent-program EEF pattern); auto-derive minimum compliance framework set from risk_classification (Section 6.5 selected_frameworks)"
    halt_condition: "Northstar absent OR sig <9.0 OR ratification incomplete OR (a)-(e) missing"

    risk_classification_required:
      description: "NEW v2.2.1 per SEC-C3 fix — Northstar declaration MUST include risk_classification so compliance frameworks auto-derive instead of being operator-discretionary at framework selection time"
      added_in_template_version: "2.2.1"
      schema:
        ai_risk_tier: "<minimal | limited | high | unacceptable>"   # per EU AI Act risk tiers
        data_categories_touched: ["<PII | PHI | PCI | financial | biometric | location | inferred-sensitive | public | internal>"]
        security_classification: "<Secret | Restricted | Confidential | Public>"   # handling tier (added v2.2.2 per Kevin directive); orthogonal to data_categories_touched
        jurisdictions: ["<jurisdiction_enum_key>", ...]   # MUST match canonical_jurisdiction_enum (Section 0.3); v2.2.2 SEC-NEW-H1 fix
        vulnerable_populations: ["<minors | medical_patients | refugees | low_literacy | none>"]
        adversarial_environment: "<none | curious_users | adversarial_users | nation_state>"   # determines OWASP_LLM_Top_10 + MITRE_ATLAS applicability
      auto_derivation_rules:
        - "ai_risk_tier ∈ {high, unacceptable} → EU_AI_Act MUST be in selected_frameworks"
        - "PHI ∈ data_categories_touched → HIPAA MUST be in selected_frameworks"
        - "PII ∈ data_categories_touched AND EU_GDPR ∈ jurisdictions → GDPR MUST be in selected_frameworks"
        - "PII ∈ data_categories_touched AND US_CALIFORNIA_CCPA ∈ jurisdictions → CCPA_CPRA MUST be in selected_frameworks"
        - "PCI ∈ data_categories_touched OR US_PCI ∈ jurisdictions → PCI_DSS MUST be in selected_frameworks"
        - "US_FEDERAL ∈ jurisdictions → FedRAMP MUST be in selected_frameworks"
        - "adversarial_environment ∈ {adversarial_users, nation_state} OR Build deploys LLM-backed agents → OWASP_LLM_Top_10 MUST be in selected_frameworks AND security_threat_model.threats MUST contain ≥1 entry with threat_class: ai_system (v2.2.2 SEC-NEW-H2 wiring)"
        - "ai_risk_tier ∈ {high, unacceptable} AND adversarial_environment ≠ none → MITRE_ATLAS MUST be in selected_frameworks AND security_threat_model.threats MUST contain ≥1 entry with threat_class: ai_system + technique_id citing ATLAS"
        - "security_classification ∈ {Secret} → FedRAMP (High) + ISO_27001 (top tier) + NIST_CSF (Tier 4) MUST be in selected_frameworks (v2.2.2 Kevin directive)"
        - "security_classification ∈ {Restricted} AND classification ∈ {PHI} → HIPAA + ISO_27001 (standard) + 7y AYIN audit log retention MUST be set (v2.2.2)"
        - "security_classification ∈ {Restricted} AND classification ∈ {PCI} → PCI_DSS + ISO_27001 (standard) MUST be in selected_frameworks (v2.2.2)"
        - "security_classification ∈ {Confidential, Restricted, Secret} → SOC_2_Type_II MUST be in selected_frameworks at minimum (v2.2.2)"
      validation_predicate: "auto_derivation_rules MUST be honored at Plan phase squad_review; missing required framework = CRITICAL drift"
      operator_override_protocol: "Operator MAY decline an auto-derived framework only with explicit AskUserQuestion HITL + recorded reason in build manifest's compliance_override_log; LÆX Layer 1 + Layer 4 review required for any override"
      webshell_render:
        widget: "northstar_risk_classification_panel"
        view_mode: "/project/<projectId>"
        update_signal: "sse_subscribe(risk_classification_events)"

  northstar_fit_check:
    description: "Per-phase verification that the build plan continues to advance the Northstar; not just at start"
    when_to_run: "Plan phase squad_review (initial) + every phase exit gate (continuous)"
    composes_with: "OD-9 Axis 6 (Northstar fit) — applies LÆX Layer 3 product lens"
    failure_action: "Halt phase + surface scope-vs-Northstar drift via AskUserQuestion"

  build_to_northstar_mapping:
    description: "Each build plan declares how its deliverables advance the Northstar"
    required_fields:
      build_advances_northstar_via: "<concrete chain — e.g., 'sub-build code-and-files closes E1 gate (edit code in webshell, no terminal); E1 is one of 6 OD-10 measurable assertions'>"
      northstar_metric_delta_estimate: "<expected change in northstar_assertion measurement post-ship>"
      if_northstar_changes_during_build: "<protocol for re-evaluating scope; default: pause + squad_review with Layer 3 LÆX>"
    validation_predicate: "Plan phase squad_review verifies the chain is concrete, not aspirational"

  composition_with_existing_blocks:
    operator_experience_layer: "Northstar provides the contract OD-10 Section 5 operationalizes"
    security_compliance: "Compliance frameworks selected MUST be compatible with Northstar primary-ICP (e.g., GDPR if EU primary-ICP)"
    effectiveness_rubric: "C7 Northstar Alignment (rubric v2.0) reads from this section's mapping"
    contracts: "phase_contract.northstar_advance is a required sub-contract"

  webshell_render:
    widget: "northstar_status_panel"
    view_mode: "/project/<projectId>"
    update_signal: "sse_subscribe(northstar_ratification_events)"
    badge: "Green = ratified; Yellow = draft; Red = missing/expired/superseded"

  related_helix_entries:
    - "2026-05-03-od10-northstar-e2e-ui-from-fullstack.md (OD-10 Northstar; sig 9.0)"
    - "feedback_northstar_product_lens.md (operate from product-lens, not proof-of-work)"

# ============================================================================
# SECTION 0.6: CONFIDENCE THRESHOLD GATE (PREREQUISITE — NEW v2.2.3)
# ============================================================================
# Per Kevin operator directive 2026-05-04 + Canon XXXV.
# Every assertion that gates a decision MUST carry confidence_value +
# primary_source_citations[] + validation_status. Threshold: ≥95% required
# (block on failure), ≥99.99% preferred (target). Confidence is measured
# ONLY by verbatim primary-source citation that another reader can
# cross-validate. No primary source → UNVALIDATED → research mandatory
# before re-asserting.

confidence_threshold_gate:
  description: |
    Cross-cutting gate that fires on every decision-bearing assertion in
    this template per Canon XXXV [3]. Composes with Canon XXXIV [2]
    (interval reporting) — the interval FLOOR gates, not the point.
    Composes with Canon XXXIII [1] (self-validation ceiling) — wide
    self-validated intervals correctly land below the 95% floor, forcing
    research rather than aspirational ship. The ≥95% threshold itself is
    measured ONLY by verbatim primary-source citation per the rule [3] —
    paraphrase, training-data recall, and "I think" all fail the gate.
  added_in_template_version: "2.2.3"
  source_canon: "Canon XXXV (Confidence Threshold Gate Doctrine) [3]"
  source_cookbook: "builders-cookbook.md §60 [3]"
  source_directive: "Kevin operator directive 2026-05-04"
  inline_refs: ["[3]", "[2]", "[1]"]
  decision_class: standards_compliance

  thresholds:
    required: 95             # numeric % — gate BLOCKS on floor < 95
    preferred: 99.99         # numeric % — target ceiling for "we have proof"
    rationale: |
      95% aligns with safety-critical engineering convention (95% confidence
      intervals in aerospace + clinical trials). 99.99% aligns with five-9s
      reliability targets. Both anchor in industry norms, not arbitrary.
      Asymmetric on purpose: floor (95%) is operational ("we can ship");
      ceiling (99.99%) is aspirational ("we have proof").

  measurement_protocol:
    description: "Confidence is measured ONLY by verbatim primary-source citation that another reader can cross-validate. Paraphrase, training-data recall, vibes, and 'I think' all produce UNVALIDATED."
    required_fields_per_assertion:
      confidence_value:
        type: "number_or_interval"
        examples: ["96", "92-98% (point ~95%)", "interval: 90-99%"]
        rule: "When interval is reported (per Canon XXXIV §59), the FLOOR is what gates."
      primary_source_citations:
        type: "array<citation>"
        min_length_for_validated: 1
        item_schema:
          quote: "verbatim text from the source — no paraphrase"
          source: "<file_path or URL>"
          line_range: "L42-L47 (for files) or section anchor (for URLs)"
          accessed: "YYYY-MM-DD"
      validation_status:
        type: "enum"
        values: ["VALIDATED", "INSUFFICIENT_EVIDENCE", "UNVALIDATED", "DISPUTED", "EXEMPT"]

  validation_states:
    VALIDATED:
      definition: "confidence floor ≥95% AND ≥1 verbatim primary-source citation that re-resolves"
      gate_effect: "PASS"
    INSUFFICIENT_EVIDENCE:
      definition: "citations exist but confidence floor <95% (citations don't fully ground claim)"
      gate_effect: "BLOCK — research more before re-asserting"
    UNVALIDATED:
      definition: "no primary-source citation present (paraphrase, training recall, 'I think', or 'common knowledge')"
      gate_effect: "BLOCK — research mandatory; agent NOT permitted to lower threshold or reframe as 'best-guess'"
    DISPUTED:
      definition: "≥2 citations conflict on the asserted value"
      gate_effect: "BLOCK — escalate to HITL via AskUserQuestion OR LÆX Layer 1+4 review"
    EXEMPT:
      definition: "mechanical assertions where citation IS the code (e.g. 'this regex matches ^foo$') — citation field carries the code path; assertions about deterministic computation"
      gate_effect: "PASS"
      examples:
        - "Arithmetic: 8 + 4 = 12 (compute is the citation)"
        - "Regex match: '^foo$'.matches('foo') (the regex semantics is the citation)"
        - "File-existence test: cited file path is the test result"

  primary_source_what_counts:
    counts_as_primary_source:
      - "File contents at a specific path + line range (re-readable)"
      - "Canon entries / standards docs (path + section anchor)"
      - "Helix entries (entry path)"
      - "Library documentation pulled via Context7 (library_id + topic)"
      - "Live web pulled via Firecrawl (URL + accessed date)"
      - "arXiv papers (paper_id + section)"
      - "Test results (file path + test name + run id)"
      - "Manifest / config files (path + key path)"
    does_NOT_count_unvalidated:
      - "'I think / I believe / it should / it appears'"
      - "'Based on my training data'"
      - "'From memory' without a memory file path"
      - "Paraphrase of a source without the verbatim quote"
      - "'Common knowledge' / 'widely known'"
      - "Synthesized claim across multiple sources without naming each"
      - "Sibling-agent assertion not backed by a tool-result citation"

  research_escalation_tiers:
    description: "When validation_status is UNVALIDATED, the agent MUST attempt research in priority order. Lowering threshold or reframing the claim is forbidden."
    tier_1_local:
      tools: ["Read", "Grep", "Glob"]
      target: "project files, helix vault, memory files"
      use_when: "information should already exist in repo / vault"
    tier_2_library:
      tools: ["mcp__plugin_context7_context7__resolve-library-id", "mcp__plugin_context7_context7__query-docs"]
      target: "library / framework / API / SDK docs"
      use_when: "claim is about a library or framework"
    tier_3_live_web:
      tools: ["mcp__plugin_firecrawl_firecrawl__scrape", "mcp__plugin_firecrawl_firecrawl__search", "mcp__plugin_firecrawl_firecrawl__extract", "WebSearch"]
      target: "post-cutoff content; external resources"
      use_when: "claim involves live or recent web content"
    tier_4_sibling:
      tools: ["/Q (QUANTUM forensic)", "/SOUL (helix RRF)", "/SERAPH (offensive verification)", "lightarchitects:researcher"]
      target: "cross-cutting investigation; failed Tiers 1-3"
      use_when: "Tiers 1-3 returned nothing; sibling-domain expertise needed"
    failure_mode:
      description: "If ALL four tiers fail to produce a primary source"
      action: "MUST rewrite the claim as an open_question and route via AskUserQuestion HITL — never re-assert as fact"

  composition_with_canon_xxxiv:
    description: "Canon XXXIV gives the format (interval); Canon XXXV gives the threshold. The interval FLOOR is what gates."
    examples:
      - reported: "97%"
        gate: "PASS at 97 ≥ 95"
      - reported: "92-98% (point ~95%)"
        gate: "BLOCK — floor 92 < 95"
      - reported: "95-99% (point ~97%)"
        gate: "PASS — floor meets threshold"
      - reported: "60-99% (point ~80%)"
        gate: "BLOCK — floor 60 < 95 (wide self-validated interval correctly forces research, per §58 ceiling)"
      - reported: "70-86% (point ~78%) [self-validated, post-fix]"
        gate: "BLOCK — floor 70 < 95 → research; matches Canon XXXIII expectation"

  load_bearing_surfaces:
    description: "Every one of these MUST honor confidence_threshold_gate. Hooks in Section 8.5 enforce."
    enforced_at:
      - "Section 0.4 preflight_establishment_wizard answers"
      - "Section 0.5 northstar_first_planning.prerequisite_gate decisions"
      - "Section 2.7 surgical_context_hydration evidence_artifact_schema"
      - "Section 4.6 squad_coordination_across_hierarchy hand_off_record_schema.decisions_made[]"
      - "Section 6 pre_flight.security_threat_model entries"
      - "Section 6.5 security_compliance.per_phase_compliance_check.gate_predicate"
      - "Section 6.5 security_compliance.compliance_override_log entries"
      - "Section 7.5 post_implementation_validation_cycle assertions"
      - "Section 8 quality_dimensions criteria results"
      - "Section 8.6 precision_evidence.json"
      - "Cross-validation findings (independent verification reports)"
      - "Effectiveness rubric (architects-blueprint.md Part XIV) §C1-C8 sub-scores"

  anti_patterns:
    threshold_laundering:
      description: "lowering threshold from 95 to 90 to 'ship'"
      detection: "any plan or manifest declaring local_threshold below 95"
      response: "BLOCK + escalate to LÆX Layer 1+4 (only canon-amendment can change the threshold globally)"
    citation_fabrication:
      description: "inventing file paths or URLs that don't resolve"
      detection: "PostToolUse:Edit hook re-reads predicate; file/URL unreachable → UNVALIDATED regardless of declared status"
      response: "auto-flip to UNVALIDATED; re-run research escalation"
    paraphrase_as_quote:
      description: "'the source says X' without verbatim text"
      detection: "grep the cited file for the verbatim quote string; absent → UNVALIDATED"
      response: "auto-flip to UNVALIDATED"
    recursive_self_citation:
      description: "agent A cites agent B which cites agent A"
      detection: "trace citation graph for cycles"
      response: "UNVALIDATED for both endpoints of the cycle"
    stale_citation:
      description: "file or URL valid at write time but has since changed"
      detection: "accessed > 7d ago AND gate re-runs"
      response: "warn + require re-verification; auto-stale after 30d"

  webshell_render:
    widget: "confidence_threshold_dashboard"
    view_mode: "/builds/<codename>/confidence"
    columns: ["assertion_id", "confidence_value", "validation_status", "primary_source_count", "last_verified", "stale?"]
    sse_subscribe: "validation_status_changes"
    note: "/builds/<codename>/confidence is a proposed route — register in webshell_routes_registry.proposed_routes (added v2.2.3)"

  related_canon:
    - "Canon V (Arithmetic Before Assertions) — quantify before asserting"
    - "Canon XXI (Evidence Must Speak) — let data shape the claim"
    - "Canon XXV (Epistemic Rigor) — calibrate, don't just assert"
    - "Canon XXXIII (Self-Validation Ceiling) — independent verification recovers what self-misses"
    - "Canon XXXIV (Confidence Interval Reporting) — interval format; floor gates"
    - "Canon XXXV (Confidence Threshold Gate) — this canon"

  related_communication_covenant_rules:
    - "Rule 1 (Arithmetic before assertions)"
    - "Rule 2 (No false witness — UNVALIDATED enforced)"
    - "Rule 3 (Calculated confidence target ≥99%)"
    - "Rule 5 (Research before spending — Tier 1-4 escalation)"
    - "Rule 7 (Directness without padding)"
    - "Rule 8 (Honest uncertainty — KNOW vs DON'T KNOW vs ASSUMING)"

  # v2.4.1 — Reference to aggregate-reconciliation rule (canonical home in cookbook §60.10)
  insufficient_evidence_aggregate_reconciliation_rule_ref:
    description: |
      When a component carries validation_status: INSUFFICIENT_EVIDENCE
      AND (interval floor <30 OR ≥50% sub-components are N/A or IE),
      it is treated as N/A-equivalent in any canonical weighted aggregate.
      Both readings (canonical + with-IE-as-point) MUST be recorded for
      trajectory honesty per Canon XXXIII / XXXIV calibration discipline.
    canonical_definition: "cookbook://60.10"
    added_in_template_version: "2.4.1"
    source: "LDB v1.0 N=1 self-bootstrap (2026-05-04) — surfaced 74-vs-87 aggregate ambiguity that this rule canonizes mechanically"
    fires_at:
      - "Section 7.7 deliverable_benchmark.aggregate computation"
      - "Effectiveness rubric C1-C8 aggregate computation"
      - "Section 7.6 calibration_substrate cross_build_aggregate per-component means"
      - "Any future weighted scoring operating on validation_status enum"

  # v2.2.4 — Inline citation protocol per Kevin operator directive 2026-05-04
  # Scoped to research-backed decisions. Adopts IEEE numeric reference format
  # for trackability; extends with internal-source URI schemes for canon /
  # cookbook / helix vault / template / memory; binds caching convention so
  # Firecrawl + Context7 results become re-citable without re-fetching.
  inline_citation_protocol:
    description: |
      Architectural, design, algorithmic, empirical, security, performance,
      and standards decisions in build plans + manifests + plan markdown
      MUST carry inline IEEE-style numeric references [N] backed by a
      `references:` block. Citations enable durable context hydration
      across sessions / compactions: a future agent reads the cached
      reference content without re-scraping or re-querying the source.
    added_in_template_version: "2.2.4"
    source_directive: "Kevin operator directive 2026-05-04 (extension of Canon XXXV / Section 0.6 confidence_threshold_gate)"
    citation_format_standard: "IEEE Reference Style (electronic + adapted for internal sources)"

    when_required:
      description: "Inline citations are MANDATORY for these decision classes. Operational facts (file paths, internal naming conventions) do NOT require [N] references."
      decision_classes_requiring_citation:
        - architecture          # "Use SDK persistent sessions over subprocess [1]"
        - design                # "AG-UI protocol over bespoke WebSocket dialect [2]"
        - algorithm             # "RRF retrieval scoring over BM25 [3]"
        - empirical             # "Self-validation ceiling ~70-75% on declarative work [4]"
        - security              # "OWASP_LLM_Top_10 LLM01 mitigation requires sanitization [5]"
        - performance           # "Neo4j 5.x query latency <50ms p95 for graph traversal [6]"
        - standards_compliance  # "GDPR Article 25 'data protection by design' [7]"
        - data_modeling         # "Vector embedding dimensionality 1536 per OpenAI ada-002 [8]"
      operational_facts_not_requiring_citation:
        - "internal file paths (e.g. ~/lightarchitects/soul/...)"
        - "naming conventions defined in this build's manifest"
        - "deterministic computation results (arithmetic, regex matches)"
        - "type signatures of code being authored in this build"

    inline_form:
      description: "Numeric reference inline; full citation in references block."
      examples:
        prose_form: "The conductor uses persistent SDK sessions [1] rather than subprocess spawning, gaining session resumption and tool approval callbacks [1, §session.resume]."
        yaml_form: |
          decision: "Use persistent SDK sessions over subprocess spawning"
          inline_refs: ["[1]", "[1, §session.resume]"]
          decision_class: "architecture"
        multiple_sources: "BCRA blast scoring uses graph centrality [3] augmented with temporal decay per [4, §3.2]."

    references_block_schema:
      description: "Required block at end of every build plan + manifest. One entry per [N] referenced inline."
      location_in_plan: "appended as final `## References` section in the markdown plan"
      location_in_manifest: "top-level `references:` array in the YAML manifest"
      entry_schema:
        id: "[N] — sequential numeric, matches inline reference"
        decision_class: "architecture | design | algorithm | empirical | security | performance | standards_compliance | data_modeling"
        ieee_citation: "full IEEE-style citation string (see formats below)"
        source_type: "external_research | external_standard | external_doc | internal_canon | internal_cookbook | internal_template | internal_helix | internal_memory | internal_test_result | internal_source_code"
        primary_quote: "verbatim text from the source supporting the cited claim (composes with §0.6)"
        accessed: "YYYY-MM-DD"
        cache_path: "<build_root>/.context/<source_type_subdir>/<slug>-<accessed>.md (REQUIRED for external_*; OPTIONAL for internal_* which already live in repo)"
        validation_status: "VALIDATED | INSUFFICIENT_EVIDENCE | UNVALIDATED | DISPUTED | EXEMPT (per §0.6)"
        confidence_value: "numeric or interval per Canon XXXIV (per §0.6)"

    ieee_format_examples:
      external_research_paper: |
        [1] L. Page, S. Brin, R. Motwani, T. Winograd, "The PageRank Citation Ranking: Bringing Order to the Web," Stanford InfoLab Technical Report 1999-66, 1999. [Online]. Available: http://ilpubs.stanford.edu/422/. [Accessed: 2026-05-04]. Cached: <build_root>/.context/firecrawl/ilpubs.stanford.edu/422-2026-05-04.md
      external_standard: |
        [2] OWASP, "Top 10 for Large Language Model Applications," v1.1, 2024. [Online]. Available: https://owasp.org/www-project-top-10-for-large-language-model-applications/. [Accessed: 2026-05-04]. Cached: <build_root>/.context/firecrawl/owasp.org/llm-top-10-2026-05-04.md
      external_documentation: |
        [3] Anthropic, "Claude Agent SDK — Persistent Sessions," v1.4.2, 2026. [Online]. Available: https://docs.claude.com/en/docs/claude-code/sdk-headless. [Accessed: 2026-05-04]. Cached: <build_root>/.context/firecrawl/docs.claude.com/sdk-headless-2026-05-04.md
      external_via_context7: |
        [4] Anthropic, "Claude Code SDK — TypeScript Reference," via Context7 library_id `/anthropics/claude-code` topic `sdk-headless`, retrieved 2026-05-04. Cached: <build_root>/.context/context7/anthropics-claude-code/sdk-headless-2026-05-04.md
      internal_canon: |
        [5] Light Architects, "Canon XXXV — Confidence Threshold Gate Doctrine," 2026. [Internal]. canon://XXXV. helix/user/standards/canon/canon.md#canon-xxxv-confidence-threshold-gate-doctrine
      internal_cookbook: |
        [6] Light Architects, "Builders Cookbook §60 — Confidence Threshold Gates," 2026. [Internal]. cookbook://60. helix/user/standards/canon/builders-cookbook.md#60-confidence-threshold-gates-canon-xxxv
      internal_template: |
        [7] Light Architects, "LASDLC Template v1 §0.6 — Confidence Threshold Gate," 2026. [Internal]. lasdlc://0.6. helix/user/standards/canon/LASDLC-TEMPLATE-v1.yaml#confidence_threshold_gate
      internal_helix_entry: |
        [8] Light Architects, "Self-Validation Ceiling Independent Verification Pattern," helix entry, 2026-05-04. [Internal]. helix://shared/entries/2026-05-04-self-validation-ceiling-independent-verification-pattern.md
      internal_memory: |
        [9] Light Architects, "Confidence Threshold Gates — feedback memory," 2026-05-04. [Internal]. memory://feedback_confidence_threshold_gates.md
      internal_test_result: |
        [10] Test Run, "lasdlc-cross-validation-pass-v4.1," 2026-05-04, run id `wsh-2026-05-04T10:24:11Z`. [Internal]. test://<build_root>/.evidence/test-results/wsh-2026-05-04T10:24:11Z.json
      internal_source_code: |
        [11] Light Architects, "lightarchitects-gateway::conductor::loop_driver," 2026, commit `abc1234`. [Internal]. file://Projects/lightarchitects-sdk/crates/lightarchitects-gateway/src/conductor/loop_driver.rs#L42-L87

    uri_schemes_for_internal_sources:
      description: "Compact in-prose forms that resolve to file paths via convention. All schemes resolve relative to $HELIX root unless absolute."
      schemes:
        canon:           # canon://XXXV → helix/user/standards/canon/canon.md anchor
          format: "canon://<roman_numeral>"
          resolves_to: "$HELIX/user/standards/canon/canon.md#canon-<roman-numeral-lower>"
          example: "canon://XXXV"
        cookbook:        # cookbook://60 → helix/user/standards/canon/builders-cookbook.md §60
          format: "cookbook://<section_number>"
          resolves_to: "$HELIX/user/standards/canon/builders-cookbook.md#<section-anchor>"
          example: "cookbook://60"
        lasdlc:          # lasdlc://0.6 → LASDLC template section 0.6
          format: "lasdlc://<section_number>"
          resolves_to: "$HELIX/user/standards/canon/LASDLC-TEMPLATE-v1.yaml#<section-key>"
          example: "lasdlc://0.6"
        helix:           # helix://shared/entries/<file>.md
          format: "helix://<sibling>/<subdir>/<filename>"
          resolves_to: "$HELIX/<sibling>/<subdir>/<filename>"
          example: "helix://shared/entries/2026-05-04-confidence-intervals-over-points-pattern.md"
        memory:          # memory://feedback_<name>.md
          format: "memory://<filename>"
          resolves_to: "~/.claude/projects/-Users-kft-Projects/memory/<filename>"
          example: "memory://feedback_confidence_threshold_gates.md"
        rubric:          # rubric://C8f
          format: "rubric://<component_id>"
          resolves_to: "$HELIX/user/standards/canon/architects-blueprint.md#part-xiv-pre-finalization-quality-gate-c1c8-rubric"
          example: "rubric://C8f"
        test:            # test://<absolute or build-rooted path>
          format: "test://<path-to-test-result-file>"
          resolves_to: "absolute path or <build_root>-relative"
          example: "test://<build_root>/.evidence/test-results/wsh-2026-05-04T10:24:11Z.json"
        file:            # file://<absolute path>
          format: "file://<absolute_path>#L<start>-L<end>"
          resolves_to: "absolute filesystem path; line range for source-code citations"
          example: "file:///Users/kft/Projects/lightarchitects-sdk/crates/lightarchitects-gateway/src/conductor/loop_driver.rs#L42-L87"

    context_cache_convention:
      description: |
        Firecrawl + Context7 results saved at deterministic local paths,
        making them re-citable without re-fetching. The cache layer
        becomes part of the build's context substrate — durable across
        agent dispatches + session compactions.
      cache_root: "<build_root>/.context/"
      subdirectories:
        firecrawl:
          path_template: "<build_root>/.context/firecrawl/<domain>/<url-slug>-<YYYY-MM-DD>.md"
          example: "<build_root>/.context/firecrawl/docs.claude.com/sdk-headless-2026-05-04.md"
          metadata_sidecar: "<build_root>/.context/firecrawl/<domain>/<url-slug>-<YYYY-MM-DD>.meta.json"
          metadata_fields:
            - "original_url"
            - "accessed_iso8601"
            - "etag (if returned)"
            - "last_modified (if returned)"
            - "content_sha256"
            - "scrape_tool: firecrawl"
            - "scrape_options (depth, format, extracted_fields)"
        context7:
          path_template: "<build_root>/.context/context7/<library_id_slug>/<topic_slug>-<YYYY-MM-DD>.md"
          example: "<build_root>/.context/context7/anthropics-claude-code/sdk-headless-2026-05-04.md"
          metadata_sidecar: "<build_root>/.context/context7/<library_id_slug>/<topic_slug>-<YYYY-MM-DD>.meta.json"
          metadata_fields:
            - "library_id (e.g. /anthropics/claude-code)"
            - "topic"
            - "accessed_iso8601"
            - "snapshot_version (if Context7 returns one)"
            - "content_sha256"
        websearch:
          path_template: "<build_root>/.context/websearch/<query-slug>-<YYYY-MM-DD>.md"
          note: "WebSearch results are summary-only; full pages should be follow-up Firecrawl scrapes for citation"
        local_links:
          path_template: "<build_root>/.context/local/<source_type>/<filename>"
          purpose: "symlinks to canonical files (canon.md, cookbook.md, helix entries) so that the cache directory is the single uniform substrate; symlinks NOT copies — original is source of truth"

    re_scrape_decision_logic:
      description: "When to re-fetch vs re-use the cached citation."
      rules:
        - condition: "cache file does NOT exist at declared path"
          action: "MANDATORY re-fetch via the original tool (Firecrawl URL / Context7 library_id+topic)"
        - condition: "cache file exists; accessed date <=7 days ago"
          action: "USE CACHED — trust the cache; no re-fetch"
        - condition: "cache file exists; accessed date 8-30 days ago"
          action: "USE CACHED with stale warning; agent MAY re-fetch if claim is high-stakes; PostToolUse:Citation_StalenessCheck (§0.6) emits warn"
        - condition: "cache file exists; accessed date >30 days ago"
          action: "MANDATORY re-fetch (per §0.6 stale_citation anti-pattern); auto-flip status to UNVALIDATED until re-fetched"
        - condition: "cache file exists BUT meta.json etag/last_modified differs from current HEAD response (HEAD probe optional)"
          action: "MANDATORY re-fetch; original page changed"
        - condition: "claim is security or compliance critical (decision_class ∈ {security, standards_compliance})"
          action: "TIGHTER staleness — re-fetch if accessed >7d ago regardless of warn/block tier"

    rescrape_workflow:
      description: "Concrete steps when re-scrape is required."
      steps:
        - "1. Read original_url + scrape_options from .meta.json sidecar"
        - "2. Re-invoke Firecrawl with identical options (e.g. mcp__plugin_firecrawl_firecrawl__scrape with same URL+format)"
        - "3. Compute content_sha256 of new result"
        - "4. If new sha != cached sha: write new cache file at <slug>-<NEW_YYYY-MM-DD>.md; update sidecar; PRESERVE old cache file (audit trail)"
        - "5. If new sha == cached sha: only update accessed_iso8601 in sidecar; reuse existing cache content"
        - "6. Update reference entry's `accessed` field to new date; recompute validation_status per §0.6"

    enforcement_via_hooks:
      description: "Hooks in Section 8.5 enforce the citation protocol mechanically."
      hook_extensions:
        "PreToolUse:Manifest":
          additional_check: |
            v2.2.4 inline_citation_protocol enforcement:
            1. Parse manifest YAML for entries with decision_class ∈
               {architecture, design, algorithm, empirical, security,
               performance, standards_compliance, data_modeling}.
            2. For each, verify the entry has inline_refs[] populated +
               every [N] resolves to a references[] entry with full schema.
            3. For each external_* reference: verify cache_path exists OR
               flag as UNVALIDATED and trigger re-scrape workflow.
            4. For each internal_* reference: verify the URI scheme
               resolves to an existing file (canon/cookbook/helix/memory).
            5. Block manifest write if any decision_class entry lacks
               citation OR any [N] dangles to nothing.
        "PreToolUse:Assertion_ConfidenceThresholdGate":
          additional_check: |
            v2.2.4 inline_citation_protocol composition:
            primary_source_citations[] entries SHOULD reference [N] from
            the build's references block when applicable. Inline IEEE
            references and primary_source_citations are complementary:
            inline_refs are the trackable in-prose markers; primary_source_citations
            carry the verbatim quote test for §0.6 gate evaluation.
            When both present, prefer inline_refs as canonical handle.

    benefits_for_context_hydration:
      description: |
        The protocol turns the build's .context/ directory into a durable,
        re-readable knowledge substrate. New agent sessions hydrate from
        cached references without re-fetching. Compacted sessions resume
        with citations intact. Cross-session continuity is mechanical, not
        memory-dependent.
      benefits:
        - "Compacted sessions resume with intact citation graph (no re-research)"
        - "Cold-context Explore agents hydrate from .context/ rather than re-scraping (per Canon XXXIII independent verification — they read the same primary sources without paying the fetch cost again)"
        - "Cross-session continuity: build B's references can include build A's cached external_* citations as internal_* (path-based)"
        - "Auditability: the .context/ directory is the build's full epistemic provenance — what was known, when, from where"
        - "Determinism: an external claim grounded in a 30-day-old cache is reproducible; a claim grounded in 'I read it last week' is not"

    operator_disclosure:
      description: "What operators see when reviewing a plan or finding."
      surface: "/builds/<codename>/references — full IEEE-formatted reference list with cache status badges + decision_class filters"
      route_status: "proposed (added v2.2.4)"
      badges:
        - "FRESH (accessed ≤7d)"
        - "STALE (8-30d)"
        - "EXPIRED (>30d, MUST re-fetch)"
        - "MISSING (cache_path declared but file absent — re-scrape required)"
        - "INTERNAL (no expiration)"

    composition_with_section_2_7:
      description: |
        Section 2.7 surgical_context_hydration's evidence_artifact_schema
        is extended in v2.2.4 to read the .context/ cache. Agents
        completing hydration may declare cached citations as part of their
        evidence_artifact, eliminating duplicate fetching across the
        build.

    composition_with_section_0_6:
      description: |
        Inline IEEE references and §0.6 primary_source_citations are
        COMPLEMENTARY layers, not duplicates:
        - Inline `[N]` = trackable in-prose marker pointing to references list
        - §0.6 primary_source_citations = verbatim quote bound to a confidence_value
          gate decision
        For research-backed decisions both MUST be present; the inline
        ref provides traceability, the §0.6 quote provides gate-level
        verification.

    documents:
      - "Canon XXXV (Confidence Threshold Gate Doctrine): canon://XXXV"
      - "Builders Cookbook §60.9 (Inline Citations + IEEE Format): cookbook://60.9"
      - "Behavioral memory: memory://feedback_inline_citation_protocol.md"

# ============================================================================
# SECTION 0.7: AUTO-DECISION ELIGIBILITY GATE (PREREQUISITE — NEW v2.3.0)
# ============================================================================
# Per Canon XXXVI Phase 3 — three preconditions for an agent to auto-execute
# a decision without HITL. All three MUST be met OR the gate fails open
# to AskUserQuestion. Composes with §0.6 (P3) and §7.6 (P2 calibration).

auto_decision_eligibility_gate:
  description: |
    Cross-cutting gate that fires when an agent considers auto-executing
    a decision (no HITL). Three preconditions MUST ALL be met; if any
    misses → fail open to HITL via AskUserQuestion. Plus categorical
    exclusion zones that always fail open regardless. Composes with §0.6
    confidence_threshold_gate and §7.6 calibration_substrate. The system
    stays trustworthy because it knows what it doesn't know.
  added_in_template_version: "2.3.0"
  source_canon: "Canon XXXVI (Quality-First Compression Sequencing) — Phase 3 enabler"
  source_directive: "Kevin /btw 2026-05-04 + 'Review then do it all' 2026-05-04"

  preconditions:
    P1_northstar_mechanically_checkable:
      description: "The Northstar criterion this decision aims to satisfy MUST be expressible as a mechanical check."
      evaluation:
        check: "<northstar_criterion>.machine_checkable_predicate field populated AND predicate_type ∈ valid_set"
        valid_predicate_types:
          - playwright_assertion
          - file_exists
          - grep_pattern
          - type_check
          - exit_code
          - test_pass
          - metric_threshold
        rejected_predicate_types:
          - opinion_based                  # "feels right" / "looks good"
          - aesthetic                      # "more elegant" / "cleaner"
          - debate_shaped                  # "should we use X or Y" without measurable criterion
          - vague_threshold                # "fast enough" / "reasonably secure"
      failure_mode: "Northstar predicate is opinion / aesthetic / debate-shaped → fail open to HITL"

    P2_decision_class_calibrated:
      description: "The decision_class of this decision MUST have ≥3 prior calibrated examples in the cross-build aggregate."
      evaluation:
        check: "$HELIX/corso/builds/.calibration-sample/aggregate.json.decision_classes_calibrated CONTAINS this decision_class WITH count >= 3"
        minimum_count: 3
        source: "§7.6 calibration_substrate.cross_build_aggregate"
      failure_mode: "Decision class has <3 prior calibrated examples → first-of-kind decision → fail open to HITL"
      transition_note: "Until §7.6 calibration_sample reaches its phase_2_readiness exit criteria (N≥10 + ≥3 calibrated classes), P2 fails open for ALL decision classes — system stays in Phase 1+2."

    P3_confidence_floor_with_citations:
      description: "Auto-decision MUST carry confidence_value with floor ≥95% (per §0.6) AND ≥1 verbatim primary-source citation (per §0.6 + §60.9 inline IEEE references)."
      evaluation:
        check: "validation_status == VALIDATED AND interval_floor >= 95 AND len(primary_source_citations) >= 1 AND len(inline_refs) >= 1"
        composes_with: "§0.6 confidence_threshold_gate (validation_status enum + threshold) + §0.6 inline_citation_protocol ([N] resolution)"
      failure_mode: "Below threshold OR missing citation → research more (Tier 1-4 escalation per §0.6); if still below threshold → fail open to HITL. Threshold-laundering forbidden (§60.6 anti-pattern)."

  exclusion_zones:
    description: "Categorical fail-open regardless of preconditions. The system NEVER auto-decides on these surfaces."
    excluded_categories:
      first_of_kind:
        description: "decision_class has zero prior examples in calibration aggregate (not just <3 — actually zero)"
        rationale: "no calibration data means no validation that auto-decision behaves correctly on this surface"
      contested_northstar_interpretation:
        description: "multiple Northstar entries conflict on what success means for this surface"
        detection: "AskUserQuestion posed to operator before plan creation IF >1 Northstar entry tags this build_id"
        rationale: "auto-execution requires unambiguous success criterion"
      security_or_compliance_touching:
        description: "any decision_class ∈ {security, standards_compliance} OR any decision affecting <build_root>/.compliance/* OR security_threat_model entries"
        required_review: "LÆX Layer 1+4 per §6.5 + SERAPH cross-validation per §8 Quality.Security"
        rationale: "blast radius of an incorrectly auto-decided security/compliance change is permanent and externally consequential"
      irreversible_blast_radius:
        description: "decisions producing irreversible side effects — destructive git ops, dropped tables, deleted credentials, production deploys, external API calls with non-idempotent effects"
        detection: "PreToolUse:Bash + PreToolUse:Edit hooks tag tool calls matching destructive patterns"
        rationale: "matches global CLAUDE.md 'Executing actions with care' policy + memory feedback_no_destructive_git.md"

  fail_open_to_hitl:
    description: "When ANY precondition misses or ANY exclusion zone applies, auto-execution is BLOCKED."
    action_sequence:
      - step: 1
        action: "Surface decision via AskUserQuestion HITL with up to 4 options"
      - step: 2
        action: "Include reasoning in question body: which precondition failed (P1/P2/P3) OR which exclusion applied; what alternative was being considered; what citation evidence (if any) was found"
      - step: 3
        action: "Operator decides; agent does NOT auto-proceed under any circumstance"
      - step: 4
        action: "Operator decision logged to <build_root>/.calibration/<codename>.json under hitl_escalation_count + hitl_escalations[].record"
    rationale: |
      The system stays trustworthy because it knows what it doesn't know.
      Better to escalate than to ship plausibly-wrong on a surface that
      hasn't been calibrated. Fail-open is the trustworthiness mechanism,
      not a bug to engineer around.
    composes_with_communication_covenant: "Rule 4 (Stop early, explain why) + Rule 9 (When reality diverges, acknowledge immediately)"

  auto_decision_outcome_logging:
    description: "Every auto-decision (P1+P2+P3 met, no exclusion) logged to calibration substrate for predicate-effectiveness analysis."
    file_location: "<build_root>/.calibration/<codename>.json under auto_decisions[]"
    fields:
      decision_id: "string"
      decision_class: "architecture | design | algorithm | empirical | security | performance | standards_compliance | data_modeling"
      preconditions_evaluation:
        P1: { passed: bool, predicate_type, predicate_evaluated_to: bool }
        P2: { passed: bool, decision_class_count_at_decision_time, calibrated: bool }
        P3: { passed: bool, validation_status, interval_floor, citation_count }
        all_met: bool
      exclusion_check:
        first_of_kind: bool
        contested_northstar: bool
        security_or_compliance: bool
        irreversible_blast: bool
        any_exclusion: bool
      outcome:
        auto_executed: bool
        escalated_to_hitl: bool
        hitl_operator_decision: "string (if escalated)"
      post_hoc_correctness:
        description: "Filled in by Section 7.5 post-implementation validation"
        status: "pending | confirmed_correct | confirmed_wrong | partial"
        cross_validation_finding: "string"
        operator_review_rating: "1-5 (1=should never have auto-decided; 5=correct call)"

  enforcement_via_hooks:
    "PreToolUse:Decision_AutoEligibility":
      automates: ["Section 0.7 auto_decision_eligibility_gate enforcement"]
      fires_on:
        - "any agent action where allow_auto_decision: true in agent_capability_declaration"
        - "any decision payload marked auto_execute: true"
        - "any wave-boundary auto-dispatch attempt"
      action: |
        v2.3.0 Canon XXXVI Phase 3 enforcement:
        1. Parse decision payload for: decision_class, northstar_criterion,
           confidence_value, primary_source_citations, inline_refs.
        2. Evaluate P1: machine_checkable_predicate populated AND
           predicate_type ∈ valid_set; reject opinion/aesthetic/
           debate-shaped/vague_threshold.
        3. Evaluate P2: read aggregate.json; assert decision_classes_calibrated
           contains decision_class with count ≥3.
        4. Evaluate P3: invoke §0.6 confidence_threshold_gate evaluation;
           assert VALIDATED + floor ≥95 + ≥1 citation + ≥1 inline_ref.
        5. Evaluate exclusion zones: first_of_kind / contested_northstar /
           security_compliance_touching / irreversible_blast_radius.
        6. If ALL preconditions met AND no exclusion: auto-execute proceeds;
           log outcome to <build_root>/.calibration/<codename>.json.
        7. If ANY precondition fails OR ANY exclusion applies: BLOCK auto;
           AskUserQuestion HITL with reasoning per fail_open_to_hitl.action_sequence.
      blocks_tool_if: true
      operator_visible: "auto_decision_eligibility_dashboard at /ops/auto-decisions; blocked decisions surface with precondition_failed_reason + exclusion_triggered fields"
      added_in_template_version: "2.3.0 (Canon XXXVI Phase 3 enforcement)"

  webshell_render:
    widget: "auto_decision_eligibility_dashboard"
    view_mode: "/ops/auto-decisions"
    columns:
      - decision_id
      - decision_class
      - P1_passed
      - P2_passed
      - P3_passed
      - exclusion_triggered
      - outcome
      - post_hoc_correctness
    update_signal: "sse_subscribe(auto_decision_events)"
    note: "/ops/auto-decisions is a proposed route — register in webshell_routes_registry.proposed_routes (added v2.3.0)"

  related_canon:
    - "Canon XXXIII (Self-Validation Ceiling) — calibration sample is the alternative to literature ceiling"
    - "Canon XXXIV (Confidence Interval Reporting) — interval floor evaluated by P3"
    - "Canon XXXV (Confidence Threshold Gate) — P3 ≥95% threshold composes here"
    - "Canon XXXVI (Quality-First Compression Sequencing) — this gate IS Phase 3 enabler"

  related_communication_covenant_rules:
    - "Rule 3 (Calculated confidence target ≥99%)"
    - "Rule 4 (Stop early, explain why — fail-open IS stop-early)"
    - "Rule 5 (Research before spending — Tier 1-4 escalation precedes auto-decision)"
    - "Rule 9 (When reality diverges, acknowledge — exclusion zones acknowledge limits)"

  composition_with_section_0_6:
    description: "§0.6 confidence_threshold_gate is the single-assertion gate; §0.7 is the meta-gate that asks 'may this assertion be auto-acted-upon without HITL?'"
    layered_evaluation: |
      §0.6 evaluates: is THIS claim trustworthy? (≥95% + verbatim citation)
      §0.7 evaluates: may this trustworthy claim auto-execute without operator? (P1+P2+P3 + no exclusion)
      Both must pass for auto-decision; either failing routes to HITL or research escalation.

  composition_with_section_7_6:
    description: "§7.6 calibration_substrate WRITES the data §0.7 reads for P2 evaluation"
    contract: "§7.6 maintains aggregate.json; §0.7 P2 reads decision_classes_calibrated from it; until §7.6 sample matures (phase_2_readiness exit criteria), P2 fails open universally"

  documents:
    - "Canon XXXVI (Quality-First Compression Sequencing): canon://XXXVI"
    - "Helix entry: helix://shared/entries/2026-05-04-quality-first-compression-sequencing.md"
    - "Builders Cookbook §61: cookbook://61"
    - "Behavioral memory: memory://feedback_quality_first_compression.md"
    - "Calibration substrate (P2 source): lasdlc://7.6"
    - "Confidence threshold gate (P3 composes): lasdlc://0.6"

# ============================================================================
# SECTION 1: TIER DEFINITIONS
# ============================================================================
# Select ONE tier. Phase set adapts accordingly.

tiers:
  SMALL:
    # WHY: smallest unit of LASDLC work; self-approving, single-agent, no HITL
    #   overhead. Used for typo fixes, env bumps, single-function patches.
    description: "Bug fix, config change, single-file edit, <100 lines"
    #   MAPS-TO: build_list.tier_badge (green) + build_detail.tier_header
    #   TYPE: string (human-readable)
    #   WHY: operator-facing description in webshell lists and detail views

    phases: [Plan, Implement, Verify, Ship]
    #   MAPS-TO: phase_progress.timeline + phase_status_timeline.widget
    #   TYPE: string[] (ordered)
    #   WHY: defines which LASDLC phases execute; SMALL skips Research/Harden/Learn

    phase_count: 4
    #   MAPS-TO: phase_progress.total_steps + build_detail.phase_counter
    #   TYPE: int
    #   WHY: derived from phases.length; displayed as "4/4" on progress widgets

    sla_hours: 4
    #   MAPS-TO: build_detail.sla_countdown + operator notifications
    #   TYPE: int
    #   WHY: hard deadline for build completion; after 4h status flips to OVERDUE

    agents_max: 1
    #   MAPS-TO: gate_dashboard.concurrency_badge + SQUAD.dispatcher.max_parallel
    #   TYPE: int
    #   WHY: caps parallel agents to 1; prevents resource contention for trivial edits

    meta_skills: [/BUILD]
    #   MAPS-TO: orchestration_topology_panel.skill_timeline
    #   TYPE: string[]
    #   WHY: SMALL builds use only /BUILD meta-skill; no /PLAN or /VERIFY needed

    sibling_dispatch: [CORSO]
    #   MAPS-TO: orchestration_topology_panel.avatar_row
    #   TYPE: string[]
    #   WHY: only CORSO needed for lint/gate enforcement; no multi-sibling coordination

    autonomy_level: autonomous
    #   MAPS-TO: orchestration_topology_panel.lock_icon (open padlock)
    #   TYPE: enum
    #   WHY: SMALL builds self-approve all gates; no HITL unless operator overrides

    assumption_register_default_count: 1
    #   MAPS-TO: risk_register_editor.default_row_count
    #   TYPE: int
    #   WHY: SMALL builds declare 1 assumption max; keeps overhead minimal

    comprehension_spike: false
    #   MAPS-TO: wave_progress.spike_badge (hidden for SMALL)
    #   TYPE: bool
    #   WHY: no spike needed; trivial edits don't warrant skeleton validation

    examples:
      - "Typo fix in README"
      - "Environment variable addition"
      - "Dependency version bump"
      - "Single function bug fix"

  MEDIUM:
    # WHY: feature-sized work that benefits from planning + research + verification
    #   but doesn't require full security hardening. Multi-agent supervised mode.
    description: "Feature, refactor, new component, 100-1000 lines"
    phases: [Plan, Research, Implement, Verify, Ship, Learn]
    phase_count: 6
    sla_hours: 24
    agents_max: 3
    meta_skills: [/PLAN, /BUILD, /VERIFY]
    sibling_dispatch: [CORSO, EVA, QUANTUM]
    autonomy_level: supervised
    assumption_register_default_count: 3
    comprehension_spike: false
    examples:
      - "New API endpoint"
      - "UI component with tests"
      - "Crate module addition"
      - "Refactor with interface change"

  LARGE:
    # WHY: architectural or security-critical work requiring full squad
    #   coordination, mandatory hardening phase, and HITL on every gate.
    description: "Multi-crate, breaking change, security-sensitive, >1000 lines"
    phases: [Plan, Research, Implement, Harden, Verify, Ship, Learn]
    phase_count: 7
    sla_hours: 72
    agents_max: 6
    meta_skills: [/PLAN, /RESEARCH, /BUILD, /VERIFY, /SECURE, /DEPLOY]
    sibling_dispatch: [CORSO, EVA, QUANTUM, SERAPH, AYIN, SOUL]
    autonomy_level: hitl-gated
    assumption_register_default_count: 5
    comprehension_spike: true
    examples:
      - "Authentication system"
      - "Architecture migration"
      - "New sibling MCP server"
      - "Cross-crate breaking refactor"

# Tier selection criteria (evaluated in order, first match wins):
tier_selection:
  LARGE_if_any:
    - "Touches authentication, cryptography, or user input handling"
    - "Breaking change to public API"
    - "Affects 3+ crates/packages"
    - "Estimated >1000 lines changed"
    - "Requires 4+ agents in parallel"
    - "Security audit required"
  MEDIUM_if_any:
    - "New feature or component"
    - "Refactor with interface changes"
    - "Estimated 100-1000 lines"
    - "Touches 2+ files with logic changes"
    - "Requires dependency research"
  SMALL_otherwise: true

  # ────────────────────────────────────────────────────────────────────────────
  # §1.4 — Late-Stage Tier Re-Evaluation Triggers (Ratified 2026-05-13)
  # ────────────────────────────────────────────────────────────────────────────
  # When iteration N (typically iter 3+) surfaces canon-audit BLOCKING/CRITICAL
  # items, the plan's tier MUST be re-evaluated BEFORE /BUILD spawn. ZERO-EXCEPTION
  # canon items typically add ARCHITECTURAL SURFACE (new code, new struct fields,
  # new gates), NOT just documentation amendments.
  #
  # This rule prevents the silent failure mode where a MEDIUM-tier plan grows
  # into LARGE-tier scope via in-iteration fold-in without tier acknowledgment.

  late_stage_reeval_triggers:
    description: |
      Re-evaluate tier when ANY of these conditions hold at iteration N≥3.
      Re-evaluation is HITL via AskUserQuestion with three options:
        (1) Stay current tier + fold (acceptable if marginal overflow + operator override)
        (2) Escalate tier + extend phase set (canonical response when ZERO-EXCEPTION
            items materially expand scope)
        (3) Split into follow-up build (when amendments belong to a separate concern)

    triggers:
      - id: wall_clock_growth_overflow
        condition: "Post-fold-in wall_clock estimate exceeds current tier ceiling by >15%"
        ceilings:
          SMALL: 4   # hours
          MEDIUM: 12
          LARGE: 48
        rationale: |
          15% growth in a single iteration is a tier-boundary-crossing signal.
          Calibrated from 2026-05-13 gateway-action-audit-claude-runtime evidence:
          Iter 4 grew 15.1h → 18.5h (+22%) when Security §2.6/§5.1/§10.2 ZERO-EXCEPTION
          items were folded; that growth crossed MEDIUM ceiling (~12h) into LARGE
          territory but the plan stayed MEDIUM via in-iteration fold-in. The trigger
          catches this case explicitly.

      - id: zero_exception_canon_items_added
        condition: "Iteration N folds ZERO-EXCEPTION canon items not present in earlier iterations"
        examples:
          - "Security Guardrails §2.6 Multi-Agent Trust Chain"
          - "Security Guardrails §5.1 OS Sandboxing"
          - "Security Guardrails §10.2 HMAC Audit Log Chain"
          - "Builders Cookbook §51 Boundary Sanitization Doctrine (canonical reuse mandate)"
          - "Platform Canon XXXVIII gate vocabulary additions"
          - "LASDLC shipped_means_5_conditions additions"
        rationale: |
          ZERO-EXCEPTION canon items add architectural surface (new code, new struct
          fields, new mandatory gates). Documentation amendments alone cannot satisfy
          them. Detection at iter 3+ typically signals the plan's tier was
          mis-classified at draft.

      - id: canons_frontmatter_growth_overflow
        condition: "Frontmatter `canons:` list grew by >3 entries at iter N (vs iter 1)"
        rationale: |
          Substantial canon-citation growth signals the build's scope materially
          expanded beyond the original tier. Each new canon citation typically
          introduces 1-3 new acceptance criteria or gate evaluations.

      - id: mandatory_test_coverage_expansion
        condition: "Phase 2/5 acceptance criteria added ≥3 new MANDATORY test categories at iter N"
        rationale: |
          Test scope expansion signals architectural scope expansion. New property
          tests, new integration tests, new adversarial tests = new attack surface
          or new contract surface.

      - id: critical_risk_register_growth
        condition: "Risk register added ≥2 new CRITICAL or HIGH severity entries at iter N"
        rationale: |
          Risk register growth at late iteration signals discovery of attack
          surfaces or operational failure modes that the original tier did not
          account for.

    enforcement: |
      The /BUILD orchestrator MUST check these triggers AT EVERY iteration close
      (Step 5 self-review completion). If ANY trigger fires, halt iteration loop
      and surface AskUserQuestion before Step 8 Decision Loop. Do NOT auto-escalate
      tier — operator authority required (per Canon XV Principal Hierarchy).

    documentation_requirement: |
      Re-evaluation outcome MUST be recorded in plan frontmatter:
        tier_re_evaluation:
          triggered_at: iteration_N
          triggers_fired: [<list>]
          outcome: <stay|escalate|split>
          rationale: <prose>
          operator_decision_recorded: <timestamp>

    ratified_by: "Kevin (2026-05-13)"
    canon_reference: "Platform Canon XXXIX (Canon Promotion Pipeline); composition with Canon II (Cost of the Deploy) + Canon X (Cost of the Tower)"

# ============================================================================
# SECTION 1.5: TIER HIERARCHY (NEW v2.1.0 per Phase B-2)
# ============================================================================
# Formalizes the 6-tier hierarchy: project → program → build → phase → wave
# → task. Each tier has well-defined granularity, ownership, and webshell
# surface. Composes with Section 1 tier_selection (build-level tier) — this
# section establishes the surrounding hierarchy.

tier_hierarchy:
  description: |
    The Light Architects engineering surface is a 6-tier hierarchy:
    project → program → build → phase → wave → task. Each tier has its own
    granularity, registry artifact, and operator-experience surface.
    Build plans (Section 2 phases) sit at the build tier; phases are intra-
    build sub-tiers; waves are intra-phase (specifically intra-Implement)
    sub-tiers; tasks are intra-wave (or intra-phase for non-wave-structured
    phases) sub-tiers; programs + projects are super-tiers.
  source_memory: "Kevin scope clarification 2026-05-04 (v2.1.0 directive)"
  added_in_template_version: "2.1.0"

  tiers:
    project:
      description: "Long-running initiative spanning multiple programs. Persistent identity; multi-month timeline."
      granularity: "Strategic; multiple programs as deliverables"
      registry_artifact: "helix/user/{user_id}/projects/manifest.toml"
      ownership: "Operator (Kevin) + LÆX Layer 4 (GTM) + LÆX Layer 2 (strategic alignment)"
      example: "lightarchitects-platform (this project — encompasses webshell, gateway, all sibling MCPs)"
      sub_tier: "program"
      webshell_render:
        widget: "project_detail"
        view_mode: "/project/<projectId>"
        update_signal: "sse_subscribe(project_events)"

    program:
      description: "Multi-build coordinated initiative; PROGRAM tier per LASDLC. Cross-build sequencing + program-level squad_review + coordinated gates."
      granularity: "Strategic-tactical; multiple builds as deliverables; ~140-200h aggregate"
      registry_artifact: "active.yaml builds[].codename + helix/corso/builds/<codename>/manifest.yaml (with tier: PROGRAM)"
      ownership: "Program orchestrator (claude/Kevin) + sibling co-leads per sub-build"
      example: "embodied-engineering-forge (EEF — 6 sub-builds: code-and-files, shell-and-output, git-and-pr, manifest-plan-helix-editing, build-spawn-monitor, test-and-deploy)"
      super_tier: "project"
      sub_tier: "build (sub-builds within program)"
      webshell_render:
        widget: "program_overview"
        view_mode: "/builds/<programCodename>"
        update_signal: "sse_subscribe(program_phase_changes)"

    build:
      description: "Single build at SMALL/MEDIUM/LARGE tier per LASDLC Section 1 tier_selection. The primary unit of LASDLC orchestration."
      granularity: "Tactical; single build deliverable; 4-72h SLA per tier"
      registry_artifact: "active.yaml builds[].codename + helix/corso/builds/<codename>/manifest.yaml"
      ownership: "Build owner (declared in manifest.owner field)"
      example: "code-and-files (Wave 1 sub-build of EEF; MEDIUM tier; 35h)"
      super_tier: "program (or directly project for standalone builds)"
      sub_tier: "phase (every build decomposes into phases per LASDLC Section 2)"
      webshell_render:
        widget: "build_detail"
        view_mode: "/builds/<codename>"
        update_signal: "sse_subscribe(build_status_changes)"

    phase:
      description: "LASDLC lifecycle stage within a build: Plan, Research, Implement, Harden, Verify, Ship, Learn. SMALL builds use 4 phases; MEDIUM 6; LARGE 7. Each phase has its own exit_gate_type + exit_criteria + phase_execution_steps."
      granularity: "Tactical; coherent lifecycle stage; hours-to-days per phase"
      registry_artifact: "manifest.yaml phases.<phase> block + active.yaml builds[].phase_status_history"
      ownership: "Phase owner (typically same as build owner; may delegate per phase)"
      example: "Implement phase of code-and-files (4 agents in parallel; 3 waves; ~25h)"
      super_tier: "build"
      sub_tier: "wave (Implement phase only) OR task directly (Plan/Research/Harden/Verify/Ship/Learn — non-wave phases)"
      lifecycle_position: "Composes with loop_cycle (Section 2.5) — every phase runs the 5-step loop (pre-flight → implement → cross-val → feedback → correction)"
      webshell_render:
        widget: "phase_progress"
        view_mode: "/builds/<codename>/phase/<phase>"
        update_signal: "sse_subscribe(phase_status_events)"

    wave:
      description: "Sub-step within Implement phase per Section 2 wave_structure. Four-step canonical: preparation → implementation → hypothesis_verification (per task) → post-wave review. Waves DO NOT exist outside Implement phase — other phases decompose phase → task directly."
      granularity: "Tactical-operational; single coherent file-set modification"
      registry_artifact: "manifest.yaml phases.Implement.wave_structure + dag_order"
      ownership: "Wave lead (subset of build agents per Canon XXIII)"
      example: "Wave 1 (foundational, blocks others) of Implement phase"
      super_tier: "phase (specifically Implement phase)"
      sub_tier: "task (per-agent within wave)"
      reviewer_agent: |
        lightarchitects:<domain_agent> — spawned by Governor after each Worker signals
        IMPLEMENTATION_COMPLETE; reviews task diff for correctness, architecture fit, and
        security surface before FILE_RELEASE (Playbook §7.7, Blueprint §23.8).
        Default: lightarchitects:quality.
        Override to lightarchitects:security for security-touching waves.
        Declare per-wave in plan Part VIII wave decomposition.
      webshell_render:
        widget: "wave_progress"
        view_mode: "/builds/<codename>/phase/implement/wave/<wave>"
        update_signal: "sse_subscribe(wave_events)"

    task:
      description: "Per-agent unit of work within a wave (Implement) OR within a phase directly (non-Implement). Bounded by Canon XXIII file-ownership."
      granularity: "Operational; single agent's owned file-set + functions"
      registry_artifact: "manifest.yaml file_function_map (per-file owner declaration)"
      ownership: "Single agent (subagent_type per Section 4 agent_topology)"
      example: "MCP-tools-agent owns lightarchitects-gateway/src/code_comms.rs (6 functions)"
      super_tier: "wave (within Implement) OR phase (within non-Implement phases like Plan/Research/Harden/etc.)"
      webshell_render:
        widget: "task_detail"
        view_mode: "/builds/<codename>/phase/<phase>/wave/<wave>/agent/<agentKey>"
        update_signal: "sse_subscribe(task_events)"

  navigation_pattern:
    description: "Operator drills down through hierarchy in webshell"
    sequence: "/project/<id> → /builds (filtered by project) → /builds/<codename> → /builds/<codename>/phase/<phase> → /phase/<phase>/wave/<wave> (Implement only) → /wave/<wave>/agent/<agentKey>"
    breadcrumb_required: true
    skip_levels:
      - "Non-Implement phases skip wave level: /phase/<phase>/agent/<agentKey> directly"
      - "Standalone builds (no program) skip program level: /builds/<codename>"
    webshell_render:
      widget: "tier_breadcrumb"
      view_mode: "all routes"
      update_signal: "static (route-derived)"

# ============================================================================
# SECTION 1.6: TIER ORCHESTRATION TOPOLOGY (NEW v2.5.0 per agentic adaptation)
# ============================================================================
# Replaces generic "agent type" taxonomy with squad meta-skill dispatch model.
# Maps every LASDLC tier to: meta-skills invoked, siblings dispatched, autonomy
# level, assumption count, and HITL triggers. Concretizes the abstract intent /
# boundaries / tools / acceptance framework into machine-readable plan fields.

tier_orchestration_topology:
  description: |
    Concrete dispatch profile per tier. Every field below is rendered in the
    webshell operator_experience_layer.orchestration_topology_panel as an
    interactive timeline. All values are selectable at plan instantiation and
    overridable per-build.
  added_in_template_version: "2.5.0"
  source_memory: "feedback_match_existing_convention.md + project_sdlc_coverage_map.md"

  topology_table:
    # WHY: provides a single lookup table so the webshell and dispatcher can
    #   resolve tier → full orchestration profile without chasing defaults
    #   across multiple sections. Deduplicates tier metadata into one source.
    - tier: SMALL
      #   MAPS-TO: orchestration_topology_panel.tier_selector.selected
      #   TYPE: enum(SMALL,MEDIUM,LARGE)
      #   WHY: row key; every other field in this row is the canonical default
      #   for builds at this tier
      meta_skills: [/BUILD]
      #   MAPS-TO: orchestration_topology_panel.skill_timeline (1 node)
      #   TYPE: string[]
      #   WHY: only /BUILD needed; no /PLAN because Plan phase is lightweight
      sibling_dispatch: [CORSO]
      #   MAPS-TO: orchestration_topology_panel.avatar_row (1 avatar)
      #   TYPE: string[]
      #   WHY: single sibling keeps coordination overhead zero
      autonomy_level: autonomous
      #   MAPS-TO: orchestration_topology_panel.lock_icon (open)
      #   TYPE: enum
      #   WHY: no HITL overhead for trivial edits
      assumption_register_count: 1
      #   MAPS-TO: risk_register_editor.default_row_count + pre-flight validator
      #   TYPE: int
      #   WHY: 1 assumption max keeps pre-flight under 1 minute
      comprehension_spike: false
      #   MAPS-TO: wave_progress.spike_badge (hidden)
      #   TYPE: bool
      #   WHY: trivial edits don't need skeleton validation
      hitl_triggers_default: ["none — self-approving"]
      #   MAPS-TO: HITLGateOverlay.trigger_registry (empty for SMALL)
      #   TYPE: string[]
      #   WHY: no default triggers; operator may add custom ones if desired
      gate_cadence: "exit gates only"
      #   MAPS-TO: gate_dashboard.cadence_label
      #   TYPE: string
      #   WHY: gates run only at final phase exit, not at every boundary
      max_concurrent_agents: 1
      #   MAPS-TO: gate_dashboard.concurrency_badge
      #   TYPE: int
      #   WHY: prevents parallel contention on single-file edits
      webshell_widget: "build_detail_compact"
      #   MAPS-TO: router.component (Svelte dynamic import)
      #   TYPE: string (component name)
      #   WHY: compact layout hides advanced panels (risk register, topology
      #   timeline) to reduce cognitive load for trivial builds

    - tier: MEDIUM
      meta_skills: [/PLAN, /BUILD, /VERIFY]
      sibling_dispatch: [CORSO, EVA, QUANTUM]
      autonomy_level: supervised
      assumption_register_count: 3
      comprehension_spike: false
      hitl_triggers_default: ["cost > $10", "security gate failure"]
      gate_cadence: "phase boundaries + squad_review optional"
      max_concurrent_agents: 3
      webshell_widget: "build_detail_standard"

    - tier: LARGE
      meta_skills: [/PLAN, /RESEARCH, /BUILD, /VERIFY, /SECURE, /DEPLOY]
      sibling_dispatch: [CORSO, EVA, QUANTUM, SERAPH, AYIN, SOUL]
      autonomy_level: hitl-gated
      assumption_register_count: 5
      comprehension_spike: true
      hitl_triggers_default: ["cost > $10", "security gate failure", "cross-sibling contract mutation", "LÆX canon-override", "operator_rating < 4"]
      gate_cadence: "every phase boundary + mandatory squad_review"
      max_concurrent_agents: 6
      webshell_widget: "build_detail_full"

  override_policy:
    description: "Tier defaults may be overridden at plan instantiation; overrides are logged in assumption_register as item A0 'Tier topology override declared'"
    permitted_overrides: [meta_skills, sibling_dispatch, autonomy_level, hitl_triggers_default]
    blocked_overrides: [assumption_register_count, comprehension_spike]
    rationale: "Assumption count and spike flag are safety-calibrated per tier; changing them changes risk classification and requires LÆX Layer 1 review"
    hitl_required_for: ["sibling_dispatch additions", "autonomy_level downgrade (autonomous→hitl-gated)"]

  webshell_binding:
    panel: "orchestration_topology_panel"
    route: "/builds/<codename>/topology"
    render_fields: [tier, meta_skills, sibling_dispatch, autonomy_level, assumption_register_count, comprehension_spike, hitl_triggers_default]
    update_signal: "sse_subscribe(build_topology_changes)"
    edit_button: "Override topology (opens HITL confirmation for permitted fields)"

# ============================================================================
# SECTION 1.7: GIT ORCHESTRATION TOPOLOGY (NEW v2.5.1 per git-orchestration-standard)
# ============================================================================
# Canonical branch, worktree, and multi-agent dispatch rules for Light Architects.
# This section is the gold standard for how builds create branches, manage worktrees,
# enforce commit/merge gates, and dispatch concurrent agents. Every build manifest
# MUST declare its git topology block; builds without it fail Phase 1 spot-check.
#
# DESIGN PRINCIPLE: The topology is the contract between the operator, the gateway,
# and the git state. If the gateway cannot verify the declared topology against
# the actual repo state, the build does not proceed.

git_orchestration_topology:
  #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel
  #   TYPE: object (required)
  #   WHY: operator needs visual confirmation that branch + worktree + agent state matches plan

  branch_topology:
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.branch_graph
    #   TYPE: enum(linear, trunk-based, gitflow)
    #   WHY: linear = feat/<codename> → main (canonical for LA platform)
    default: linear
    canonical_branch_prefix: "feat/"
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.branch_prefix_badge
    #   TYPE: string
    #   WHY: ensures operator sees at a glance that branch naming matches codename
    main_branch: "main"
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.main_branch_label
    #   TYPE: string
    #   WHY: explicit merge target; supports repos with "master" or custom default
    branch_naming_rule: "{prefix}{codename}"
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.branch_naming_template
    #   TYPE: string (template with {prefix}, {codename} placeholders)
    #   WHY: machine-checkable: gateway verifies actual branch name matches template
    forbidden_patterns: ["feat/trunk", "feat/main", "feat/develop"]
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.forbidden_branch_list
    #   TYPE: string[]
    #   WHY: prevents ambiguity collisions; these patterns are reserved or anti-patterns

  worktree_lifecycle:
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.worktree_list
    #   TYPE: object (required)
    #   WHY: worktree isolation is the primary sandbox for agent file operations
    base_path_persistent: "~/lightarchitects/worktrees/{codename}/"
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.worktree_base_path
    #   TYPE: string (path template)
    #   WHY: persistent worktrees live under the platform runtime root (~/$USER/lightarchitects/);
    #        this keeps agent working directories outside the source tree and consistent with
    #        the deploy root (binaries, vault, etc.) — git-lifecycle-canon §I.3
    base_path_ephemeral: "/tmp/lightarchitects-cli-worktrees/"
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.ephemeral_base_path
    #   TYPE: string (absolute path)
    #   WHY: ephemeral worktrees are auto-cleaned; CI/automated builds use this
    naming_pattern: "{agent_id}"
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.worktree_naming_template
    #   TYPE: string (template with {agent_id}, {wave}, {phase} placeholders)
    #   WHY: predictable paths enable fast-resume and stale sweeper regex matching
    fast_resume: true
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.fast_resume_toggle
    #   TYPE: bool
    #   WHY: skips `git worktree add` if worktree exists + HEAD matches branch
    stale_sweeper:
      enabled: true
      #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.stale_sweeper_toggle
      #   TYPE: bool
      cutoff_days: 30
      #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.stale_cutoff_input
      #   TYPE: int (days)
      safety_gates:
        - "git status --porcelain -uno must be empty"
        - "git rev-list HEAD --not --remotes must be empty"
        - "branch must match ephemeral pattern (worktree-agent-<8hex>)"
      #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.safety_gate_list
      #   TYPE: string[]
      #   WHY: fail-closed: only removes worktrees we are certain are safe to delete

  commit_gate:
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.commit_gate_card
    #   TYPE: object (required)
    #   WHY: fast feedback inside agent worktree; prevents dirty commits
    description: "Runs before every git commit inside an agent worktree"
    cadence: "per-commit"
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.commit_gate_cadence_badge
    #   TYPE: enum(per-commit, per-wave, manual)
    blocking: true
    tools:
      - { name: "cargo fmt --check", timeout_seconds: 10, blocking: true }
      - { name: "cargo clippy --all-targets --all-features -- -D warnings", timeout_seconds: 60, blocking: true }
      - { name: "cargo test --lib", timeout_seconds: 120, blocking: true }
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.commit_gate_tool_list
    #   TYPE: object[] (name, timeout, blocking)
    #   WHY: explicit tool list with timeouts prevents runaway agents
    fallback: "Commit blocked on any failure. Agent fixes and re-runs."
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.commit_gate_fallback_text
    #   TYPE: string

  phase_boundary_gate:
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.phase_gate_card
    #   TYPE: object (required)
    description: "Runs at wave completion before integrating deliverables"
    cadence: "per-wave"
    blocking: true
    dimensions: [A, S, Q, C, O, P, K, D, T, R]
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.phase_gate_dimensions
    #   TYPE: enum[] (A,S,Q,C,O,P,K,D,T,R)
    tools:
      - { skill: "/SQUAD code_review", blocking: true }
      - { skill: "/CORSO guard", blocking: true }
      - { name: "cargo test --all-features", blocking: true }
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.phase_gate_tool_list
    #   TYPE: object[] (skill|name, blocking)

  merge_gate:
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.merge_gate_card
    #   TYPE: object (required)
    description: "Runs before PR from feat/<codename> to main"
    cadence: "per-merge"
    blocking: true
    tools:
      - { skill: "SERAPH analyze", blocking: true, exception_mode: "pentest for security-critical paths" }
      - { skill: "/REVIEW", blocking: true }
      - { skill: "LÆX CANON-CHECK", blocking: true }
      - { name: "cargo test --all-features", blocking: true }
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.merge_gate_tool_list
    #   TYPE: object[] (skill|name, blocking, exception_mode)
    #   WHY: exception_mode captures Northstar categorical exclusion for security paths
    security_critical_paths: ["auth/", "crypto/", "container/", "vault/"]
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.security_critical_path_list
    #   TYPE: string[] (path prefixes)
    #   WHY: gateway checks if PR touches these paths and upgrades scan mode automatically

  agent_dispatch_rules:
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.dispatch_rules_table
    #   TYPE: object (required)
    max_concurrent_agents: 4
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.max_concurrent_agents_input
    #   TYPE: int
    #   WHY: resource bounds + operator cognitive load; gateway enforces hard limit
    file_ownership: absolute
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.file_ownership_badge
    #   TYPE: enum(absolute, advisory, none)
    #   WHY: absolute = agent A cannot edit agent B's files unless delegated (Canon XXIII)
    worktree_isolation: mandatory
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.worktree_isolation_badge
    #   TYPE: enum(mandatory, optional, none)
    #   WHY: every agent MUST have a worktree; native PTY fallback is degraded posture
    merge_strategy: "gateway_coordinator"
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.merge_strategy_selector
    #   TYPE: enum(gateway_coordinator, manual, auto-merge)
    #   WHY: gateway_coordinator = centralized merge at wave boundaries; manual = operator HITL; auto-merge = CI bot
    merge_target: "feat/{codename}"
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.merge_target_label
    #   TYPE: string (template)
    #   WHY: agent deliverables merge to build branch, not main directly

  northstar_compliance:
    #   MAPS-TO: operator_experience_layer.build_detail.git_topology_panel.northstar_compliance_badge
    #   TYPE: object
    pillar_2_advance: "≥2 concurrent agent sessions w/ worktree isolation + squad-comms typed bus"
    #   WHY: this section directly enables Pillar 2 mechanical check #3
    categorical_exclusions:
      - "Security-critical path changes → SERAPH pentest (not analyze) + LÆX Layer 1+4 review"
      - "First-of-kind merge strategy → HITL mandatory regardless of gate pass"
      - "Contested Northstar interpretation → escalate to LÆX Layer 3"

# ============================================================================
# SECTION 2: EXECUTION PHASES
# ============================================================================
# Each phase defines: purpose, deliverables, default gate type, skills.
# Quality gates [A+S+Q+C+O+P+K+D+T+R] are checked at EVERY phase boundary (Section 7).

phases:

  Plan:
    order: 1
    tiers: [SMALL, MEDIUM, LARGE]
    purpose: "Define requirements, architecture, interfaces, scope, and file-function ownership map"
    deliverables:
      - "Approved specification (scope, acceptance criteria)"
      - "Architecture plan (interfaces, data models, module boundaries)"
      - "File-function map (which files, which functions, which agent owns what)"
    skills: ["/PLAN"]
    ui_surface:
      ref: "operator_experience_layer.per_phase_operator_view.Plan"
      route: "/builds/<codename>/phase/plan"
      eef_sub_build: "manifest-plan-helix-editing (Wave 3)"
    agents:
      # Plugin agent dispatch (R5). Operator sees the operator_label; wire uses agent_id.
      - operator_label: "Architecture design"
        target: "feature-dev:code-architect"
        target_type: subagent_type
        agent_id: "feature-dev:code-architect"
        invocation: "Agent dispatch with subagent_type code-architect"
        required_for: [LARGE]
        optional_for: [MEDIUM]
      - operator_label: "Codebase exploration"
        target: "feature-dev:code-explorer"
        target_type: subagent_type
        agent_id: "feature-dev:code-explorer"
        invocation: "Agent dispatch with subagent_type code-explorer"
        required_for: [LARGE, MEDIUM]
      - operator_label: "Plan refinement (multi-sibling review)"
        target: "squad_review.agents"
        target_type: reference
        agent_id: "see squad_review.agents (6 siblings dispatched parallel)"
        required_for: [LARGE]
        optional_for: [MEDIUM]
        skip_for: [SMALL]
    fallback: "Write plan.md with phases, deliverables, and file list"
    exit_gate_type: structural
    exit_criteria:
      - id: spec_approved
        label: "Specification reviewed and approved"
        type: manual
      - id: architecture_sound
        label: "Architecture passes ARCH dimension review"
        type: automated
      - id: file_map_complete
        label: "File-function map covers all deliverables"
        type: automated
      - id: no_scope_creep
        label: "Scope bounded — no unbounded lists or open-ended goals"
        type: manual
      - id: squad_review_complete
        label: "Multi-sibling review applied (LARGE tier) or explicitly waived (MEDIUM/SMALL)"
        type: manual
      - id: standards_compliance_verified
        label: "CORSO standards check: Builders Cookbook non-negotiables + Canon XXIII/XXVI/XXVII/XXVIII/XXIX — no FAIL verdicts"
        type: manual
        note: "WARN is acceptable if explicitly acknowledged; FAIL must be resolved or waived with reason"

    squad_review:
      description: |
        Multi-sibling plan review for refinement and hardening — required before any
        implementation begins. Mirrors the team review we do for every LARGE build.
        Agents read the plan manifest, identify gaps, and produce classified findings.
        The orchestrator applies CRITICAL + HIGH findings; MEDIUM/LOW are tracked.
      tiers_required: [LARGE]
      tiers_optional: [MEDIUM]
      tiers_skip: [SMALL]
      skill: "/SQUAD code_review"
      spawn_all_in_one_message: true   # parallel — do not spawn sequentially
      agents:
        - sibling: corso
          focus: |
            DAG ordering and race conditions — does every wave properly block on its predecessors?
            Missing /GATE placement — are wave boundaries and destructive ops gated?
            File ownership completeness — are all modified files owned by exactly one agent?
            Builders Cookbook non-negotiables in agent task specs (see standards_compliance):
              - Does each task spec forbid .unwrap()/.expect()? If not, flag MEDIUM.
              - Does each task spec producing Rust code specify Result<T, E> return types?
              - Does any task spec involve unsafe blocks without a // SAFETY: requirement?
              - Are functions with complex logic (>3 branches) decomposed into helpers in the spec?
              - Is checked arithmetic required for any numeric computation in the spec?
            Canon compliance (see standards_compliance):
              - Canon XXIII: every file in the spec has exactly one owner — no file appears in two agents' owns:
              - Canon XXVI: post-edit gates are present after every wave that modifies files
              - Canon XXVII: test pyramid is addressed — are unit, integration, and contract layers specified?
              - Canon XXVIII: boundary sanitization — user inputs in the spec validated before any operation?
              - Canon XXIX: is a complete test pyramid (not just "add tests") called out in the plan?
        - sibling: quantum
          focus: |
            Unregistered risks — threats the plan doesn't account for.
            Test isolation gaps — integration tests that could touch production state.
            Missing unknowns — assumptions baked into the plan without explicit verification.
            Dependency audit completeness.
        - sibling: seraph
          focus: |
            Security gaps in credential handling, git history scrubbing.
            Injection vectors in user-facing CLI inputs (path traversal, shell injection).
            Secrets visibility gaps (env var resolution in launchd vs shell).
            Attack surface of new public API or CLI entry points.
        - sibling: eva
          focus: |
            Operational gaps: deploy ordering between coupled crates.
            Health checks before config changes (never modify mcp.json before verifying gateway).
            Rollback procedures — are they defined and reversible?
            Environment variable visibility (launchctl setenv vs .zshrc export).
            Missing redeploy steps for siblings with path dependencies.
        - sibling: soul
          focus: |
            Knowledge capture gaps — decisions made but not written to helix.
            21-day knowledge loss risk — sig >= 8.0 decisions need immediate helix entries.
            Missing decision rationale that future builds will need.
            Helix entry significance scoring for plan deliverables.
        - sibling: laex
          tier_required: [LARGE]
          tier_optional: [MEDIUM]
          axis: 6
          axis_label: "Northstar fit (OD-10) — product-strategist primary-ICP lens"
          source_decision: "OD-10 (helix/shared/entries/2026-05-03-od10-northstar-e2e-ui-from-fullstack.md, sig 9.0)"
          focus: |
            Does every user-facing capability have a webshell primary path?
            Can a non-technical primary-ICP operator complete the task in the
            webshell without dropping to terminal/file editing?
            Is terminal/file access correctly framed as escape hatch (not equal
            alternative)?
            Does the build advance E2E UI coverage or move backwards (introduce
            new terminal-only flows)?
            Scope-vs-Northstar drift: is anything in scope that doesn't advance
            primary-ICP webshell completability? If so, defer or reject.
      standards_compliance:
        description: |
          Authoritative standards that CORSO verifies against every plan manifest.
          Agents should read these sources before reviewing; do not rely on training data.
        builders_cookbook:
          path: "~/lightarchitects/soul/helix/user/standards/canon/builders-cookbook.md"
          non_negotiables:
            - id: BC-1
              rule: "No .unwrap()/.expect() in production — use ? or match"
              plan_check: "Task specs for Rust code must explicitly prohibit .unwrap() or list it in Builders Cookbook reference"
            - id: BC-2
              rule: "No panic!() — use Result<T, E>"
              plan_check: "All fn signatures in file-function maps should show Result return types"
            - id: BC-3
              rule: "unsafe requires // SAFETY: comment"
              plan_check: "Any task spec mentioning unsafe must require SAFETY justification"
            - id: BC-4
              rule: "clippy::pedantic as errors"
              plan_check: "Cargo.toml tasks include clippy pedantic configuration"
            - id: BC-5
              rule: "Checked arithmetic — no integer overflow"
              plan_check: "Numeric computation tasks must spec checked_add/checked_mul or saturating variants"
            - id: BC-6
              rule: "Cyclomatic complexity <= 10 per function"
              plan_check: "Functions with >3 branches in the spec must be decomposed into helpers"
            - id: BC-7
              rule: "60-line function limit"
              plan_check: "Large tasks should list multiple helper functions, not one monolithic fn"
        canon:
          path: "~/lightarchitects/soul/helix/user/standards/canon/canon.md"
          rules:
            - id: XXIII
              rule: "One file, one owner — no two agents edit the same file"
              plan_check: "Scan all agents' owns: lists — flag any file appearing more than once"
              automatable: true
            - id: XXVI
              rule: "Post-edit gates after every wave that modifies files"
              plan_check: "Every wave with Edit/Write tasks must have a /GATE step after it"
              automatable: true
            - id: XXVII
              rule: "6 test suites: unit, integration, contract, property, E2E, regression"
              plan_check: "Verify phase agents cover all 6 layers, not just 'add tests'"
              automatable: false
            - id: XXVIII
              rule: "Boundary sanitization — validate user inputs before any operation"
              plan_check: "CLI and API task specs must include explicit input validation step"
              automatable: false
            - id: XXIX
              rule: "Complete test pyramid — not just happy path"
              plan_check: "Test tasks include edge cases, error paths, and real-world inputs"
              automatable: false
        license_discipline:
          path: "~/lightarchitects/soul/helix/user/standards/licenses/license-migration-playbook.md"
          script: "~/lightarchitects/soul/helix/user/standards/scripts/migrate-license.sh"
          related:
            - "~/lightarchitects/soul/helix/user/standards/licenses/notice-template.md"
            - "~/lightarchitects/soul/helix/user/standards/licenses/deny-toml-template.toml"
            - "~/lightarchitects/soul/helix/user/standards/licenses/"
          rules:
            - id: LD-1
              rule: "License migrations MUST go through migrate-license.sh with --assert-current"
              plan_check: "Any task touching Cargo.toml license= field, LICENSE, or NOTICE must spec migrate-license.sh as the mechanism — never raw Edit/sed"
              automatable: true
              prevents: "Migration-body lie pattern (claiming source license that does not match Cargo.toml)"
            - id: LD-2
              rule: "Every Cargo workspace has a deny.toml derived from the canonical deny-toml-template.toml"
              plan_check: "Build plan touching deny.toml or adding a new workspace member must list deny-toml-template.toml as the source-of-truth"
              automatable: true
            - id: LD-3
              rule: "NOTICE is regenerated via cargo-about + about.hbs from notice-template.md after any license change"
              plan_check: "License-changing tasks must include 'cargo about generate' as a step before commit"
              automatable: true
            - id: LD-4
              rule: "Per-crate license stance follows the public/private split (MPL-2.0 / Apache-2.0 / Proprietary)"
              plan_check: "New crate creation tasks must declare license type with rationale; cross-reference project_license_architecture memory"
              automatable: false
        workspace_integrity:
          path: "~/lightarchitects/soul/helix/user/standards/licenses/workspace-integrity-ci.yml"
          rules:
            - id: WI-1
              rule: "CI runs `cargo metadata --format-version 1 --no-deps` on every push to detect missing workspace member sources"
              plan_check: "Any plan adding a workspace member or modifying Cargo.toml [workspace] must spec the workspace-integrity gate runs in the affected repo's CI"
              automatable: true
              prevents: "Workspace member declared but source untracked — the shining-opening-vault PR #4/#5/#8 bug class"
            - id: WI-2
              rule: "CI runs both `cargo build --workspace --no-default-features` AND `--all-features` to catch feature-gate breakage"
              plan_check: "Plans modifying [features] tables or feature flags must include both build-matrix runs in CI"
              automatable: true
            - id: WI-3
              rule: "Workspace integrity gate runs on push and pull_request (not only on merge to main)"
              plan_check: "CI workflow files in any plan affecting Rust repos must trigger on both push and pull_request events"
              automatable: true
        secret_leak_prevention:
          path: "~/lightarchitects/soul/helix/user/standards/runbooks/secret-leak-runbook.md"
          rules:
            - id: SL-1
              rule: "Pre-commit hook runs a secret scanner (trufflehog or equivalent) before every commit"
              plan_check: "Plan tasks must not bypass pre-commit hooks (--no-verify) without explicit HITL approval; remediation tasks must address the underlying hook breakage rather than normalize bypass"
              automatable: true
            - id: SL-2
              rule: "Token-leak response order: rotate FIRST, enumerate ALL remotes via `git remote -v`, filter-repo with backup bundle, then force-push to EVERY remote (not just origin)"
              plan_check: "Plans responding to credential leaks must list rotation as Step 0 and force-push to every push target — never assume single-remote"
              automatable: false
              prevents: "Token-residue-on-mirror pattern — filter-repo applied only to canonical remote leaves leaked history on mirrors"
            - id: SL-3
              rule: "Diff inspection blocks credential patterns: sk-ant-api, eyJ (JWT), AKIA, github_pat_, hf_, PEM headers"
              plan_check: "PR templates and CI must include grep checks for credential patterns in changed files; HF_TOKEN and similar in .mcp.json or fixtures must be flagged"
              automatable: true
        verdict_format: |
          For each standard checked, CORSO must report:
            PASS — spec reflects this standard explicitly
            WARN — spec is silent; standard may be followed but is not enforced in the plan
            FAIL — spec contradicts or omits this standard (classify as MEDIUM or HIGH finding)

      findings_classification:
        CRITICAL:
          label: "Plan is incorrect or dangerous — MUST be fixed before Phase 1 starts"
          examples:
            - "Race condition that will corrupt data if unaddressed"
            - "Security vulnerability baked into implementation spec"
            - "Agent owns no files (task will silently do nothing)"
        HIGH:
          label: "Plan gap that will cause phase failure or rework — fix before affected phase"
          examples:
            - "Missing health check before irreversible state change"
            - "Rollback procedure absent for destructive step"
            - "Test isolation not specified for Neo4j or production filesystem"
        MEDIUM:
          label: "Risk or gap worth tracking — fix before the affected phase starts"
          examples:
            - "Missing HITL gate on high-risk edit"
            - "Incomplete Builders Cookbook checklist in task spec"
        LOW:
          label: "Minor improvement — address in Learn phase or next build"
      apply_findings:
        CRITICAL: "Orchestrator applies to plan manifest immediately, before spawning Phase 1"
        HIGH: "Orchestrator applies to plan manifest immediately, before spawning Phase 1"
        MEDIUM: "Orchestrator adds to plan's risk_register; applies before relevant phase"
        LOW: "Orchestrator notes in close_out.cross_build_learning"

      finding_routing_by_signature:
        description: |
          Composes with severity-based apply_findings above. Severity sets
          urgency; agreement signature sets provenance. A CRITICAL multi-axis
          converged finding has higher provenance than a CRITICAL single-axis
          finding even though both apply immediately.
        source_memory: "feedback_six_axis_finding_routing.md"
        source_helix: "helix/shared/entries/2026-05-04-six-axis-methodology-calibration-multi-axis-convergence-tpr.md"
        rationale: |
          Different siblings use different lenses (engineering / security /
          forensic / UX / canon / product). When ≥2 lenses surface the same
          defect via cross-validation against the manifest, the underlying
          gap is real (not a lens artifact). Single-axis findings have lower
          true-positive rate; balanced splits (e.g. 2-vs-2) signal that
          consensus failed and judgment is needed. EEF Phase 1 calibration
          sample (2026-05-03): 6/6 multi-axis findings cleared 95%+ TPR;
          1/3 single-axis became real fix-it; 2/2 splits required HITL.
        routing_table:
          - signature: "≥2 agents converge via different lenses AND manifest evidence backs it"
            action: AUTO_APPLY
            note: "No HITL needed; orchestrator applies fix-it; logged in findings: with provenance MULTI_AXIS"
          - signature: "1 agent flags AND manifest evidence backs it"
            action: CROSS_VALIDATE
            note: "Surface to next phase squad_review or HITL if stakes are high (CRITICAL/HIGH severity); apply only after corroboration"
          - signature: "≥2 agents balanced-split (no consensus, e.g. 2-vs-2)"
            action: HITL_TIEBREAKER
            note: "Surface to user via AskUserQuestion with the split positions and tradeoffs; do not auto-decide"
          - signature: "1 agent flags AND no manifest evidence"
            action: DECLINE
            note: "Track in close_out.cross_build_learning for pattern detection across builds; do not apply"
        cross_validation_required: true
        cross_validation_procedure: |
          After parallel agent dispatch returns findings, the orchestrator MUST
          read the relevant manifest sections directly (Read tool, not via
          agent reports) and verify each claim. Per OD-9: "agent reports describe
          INTENT, not REALITY." Without cross-validation, even multi-axis
          findings rest on weaker provenance.

      deliverable:
        location: "findings: section in this build plan manifest (add after squad_review runs)"
        format: |
          findings:
            corso: [{severity, signature, description, file, line, fix_applied}]
            quantum: [{severity, signature, description, fix_applied}]
            seraph: [{severity, signature, description, fix_applied}]
            eva: [{severity, signature, description, fix_applied}]
            soul: [{severity, signature, description, fix_applied}]
            laex: [{severity, signature, axis, description, fix_applied}]   # tier_required: [LARGE]
        signature_field_values: ["MULTI_AXIS", "SINGLE_AXIS_CROSS_VALIDATED", "DISPUTED_HITL", "DECLINED"]

    phase_execution_steps:
      description: "Ordered execution sequence for Plan phase — agents follow this exactly"
      tiers: [SMALL, MEDIUM, LARGE]
      steps:
        - step: 1
          action: "Draft plan — scope, tier selection, phase set, file-function map, agent topology"
          skill: "/PLAN"
        - step: 2
          action: "/GATE — pre-review structural check"
          skill: "/GATE"
          blocking: true
          checks:
            - "File-function map covers all deliverables (no unbounded 'etc.')"
            - "Each agent owns at least one file"
            - "Tier selection matches criteria (LARGE if touching auth/crypto/3+ crates)"
            - "Scope bounded — no open-ended goals"
            - "Canon XXIII: grep all agents' owns: lists — no file appears in two agents (automatable)"
            - "Canon XXVI: every wave with Edit/Write tasks has a /GATE step immediately after"
        - step: 3
          action: "squad_review — spawn all review agents in one parallel message"
          required_for: [LARGE]
          optional_for: [MEDIUM]
          skip_for: [SMALL]
          note: "Spawn CORSO + QUANTUM + SERAPH + EVA + SOUL + LÆX (Layer 3) in one Agent tool message. LÆX covers Axis 6 (Northstar fit / OD-10) for LARGE-tier; optional at MEDIUM."
        - step: 4
          action: "Cross-validation pass per OD-9 — orchestrator reads manifest directly, classifies each finding by agreement signature (MULTI_AXIS / SINGLE_AXIS / DISPUTED / DECLINED), then routes per finding_routing_by_signature"
          required_for: [LARGE]
          optional_for: [MEDIUM]
          blocking: true
          note: |
            Sequence:
              4a. Read each manifest section flagged by any sibling — verify the claim
                  with concrete grep/Read evidence (or absence of evidence).
              4b. Classify each finding's signature: MULTI_AXIS (≥2 agents converge
                  via different lenses + evidence), SINGLE_AXIS_CROSS_VALIDATED
                  (1 agent + evidence), DISPUTED_HITL (≥2 split, no consensus),
                  DECLINED (no evidence).
              4c. Apply MULTI_AXIS findings auto. Apply SINGLE_AXIS_CROSS_VALIDATED
                  if CRITICAL/HIGH severity OR cross-validation corroborated; else
                  surface to next phase. Surface DISPUTED_HITL to operator via
                  AskUserQuestion. Track DECLINED in close_out.
              4d. Update findings: section in manifest with severity + signature
                  + provenance per finding.
            No findings may be deferred without explicit signature classification +
            recorded reason.
          source_memory: "feedback_six_axis_finding_routing.md + feedback_cross_validation_required.md"
        - step: 5
          action: "HITL — Kevin reviews final plan + resolves any DISPUTED_HITL splits surfaced in step 4"
          type: manual
          blocking: true
          note: "DISPUTED_HITL items surfaced via AskUserQuestion (1-4 questions per call per feedback_use_askuserquestion)"

  Research:
    order: 2
    tiers: [MEDIUM, LARGE]
    purpose: "Audit dependencies, gather prior art, consult library docs, model threats"
    deliverables:
      - "Dependency list with advisory check results"
      - "Research notes (Context7 refs, prior art, alternatives considered)"
      - "Threat model (for LARGE tier with security concerns)"
    skills: ["/RESEARCH"]
    ui_surface:
      ref: "operator_experience_layer.per_phase_operator_view.Research"
      route: "/builds/<codename>/phase/research"
      eef_sub_build: "manifest-plan-helix-editing (Research panel) + build-spawn-monitor (gate badges)"
    fallback: "cargo deny check && context7 query"
    exit_gate_type: quality
    exit_criteria:
      - id: deps_audited
        label: "All new dependencies audited (cargo deny / npm audit / sonatype-guide)"
        type: automated
      - id: docs_consulted
        label: "Library documentation consulted via Context7 (resolve-library-id + query-docs)"
        type: automated
      - id: live_web_consulted
        label: "Live web research via Firecrawl for content not in Context7 OR post-cutoff"
        type: manual
      - id: prior_art_documented
        label: "Prior art and alternatives documented"
        type: manual
      - id: no_known_cves
        label: "No unmitigated CVEs in dependency tree"
        type: automated

    agents:
      # Plugin agent dispatch table per phase (R5 in 2026-05-04 review doc).
      # Operator-facing label is what the webshell shows; agent_id is wire-level.
      - operator_label: "Library docs lookup"
        target: "context7"
        target_type: plugin
        agent_id: "context7"
        invocation: "mcp__plugin_context7_context7__resolve-library-id → __query-docs"
      - operator_label: "Live web research"
        target: "firecrawl"
        target_type: plugin
        agent_id: "firecrawl"
        invocation: "mcp__plugin_firecrawl_firecrawl__scrape | __search"
      - operator_label: "Dependency audit"
        target: "sonatype-guide"
        target_type: plugin
        agent_id: "sonatype-guide"
        invocation: "sonatype-guide before any new dep"
      - operator_label: "ML papers / models lookup"
        target: "huggingface-skills:AGENTS"
        target_type: subagent_type
        agent_id: "huggingface-skills"
        invocation: "mcp__claude_ai_Hugging_Face__paper_search | hub_repo_search"
        required_when: "Build is ML-adjacent"
      - operator_label: "LSP code intelligence"
        target: "rust-analyzer-lsp"
        target_type: plugin
        agent_id: "rust-analyzer-lsp"
        invocation: "rust-analyzer-lsp definitions/references before editing Rust"
        required_when: "Build modifies Rust source"
      - operator_label: "Forensic investigation"
        target: "lightarchitects:researcher"
        target_type: subagent_type
        agent_id: "lightarchitects:researcher"
        invocation: "Agent dispatch lightarchitects:researcher"
        required_when: "Multi-source investigation needed"

    phase_execution_steps:
      description: |
        Scaffold-vs-live-run discipline — runs especially when Phase 3 has a
        downstream HARD GATE (e.g. predecessor program ship, external API
        availability). Decompose deliverables into INTENT + REALITY + MIXED;
        author all; run self-contained REALITY artifacts pre-gate. Do NOT
        block Phase 2 on Phase 3's gate; do NOT speculate Phase 3 with stubs.
      source_memory: "feedback_phase_2_scaffold_vs_live_run.md"
      source_helix: "helix/shared/entries/2026-05-04-phase-2-research-scaffold-vs-live-run-discipline.md"
      tiers: [MEDIUM, LARGE]
      steps:
        - step: 0
          action: "External research protocol — Context7 + Firecrawl per pre_flight.external_research_protocol"
          required_for: [MEDIUM, LARGE]
          required_when: "Build consumes any external library, framework, or API"
          procedure:
            - "Context7: resolve-library-id for each dep; query-docs for each ID"
            - "Firecrawl: scrape blogs / post-cutoff docs / competitive analysis URLs"
            - "Capture refs in plan manifest research_refs: block"
          output: "research_refs: [{library, source, url, retrieved_at, summary}]"
          source_memory: "~/.claude/CLAUDE.md PLUGIN ECOSYSTEM MANDATES rule 2 (Specialist Routing)"
          operator_surface: "external_research_panel — webshell renders as live cards as queries return"

        - step: 1
          action: "Enumerate Phase 2 deliverables; classify each as INTENT, REALITY, or MIXED"
          classification:
            INTENT: |
              Scaffolds — fail-by-default tests, harness skeletons, type
              definitions, scripts, plan documents. No live execution required;
              their value is contractual (codify target behavior) and
              promotable (Phase 3 Implement consumes them as TDD anchors).
            REALITY: |
              Anything runnable to completion against current state without the
              gated dependency — cargo build of standalone crate, vite build
              of standalone harness, gh CLI test against external GitHub,
              Context7 query, sonatype-guide dep audit. Output is a one-shot
              artifact (numbers, verdict, report).
            MIXED: |
              Reality runs that depend on the gated thing (e.g., e2e test
              against not-yet-shipped UI). Defer the live-run portion;
              document the procedure; treat the prep portion as the Phase 2
              deliverable.

        - step: 2
          action: "Author INTENT artifacts in research/<deliverable>/ under canonical build dir"
          location: "helix/corso/builds/<codename>/research/<deliverable>/"
          note: |
            NOT canonical sdk paths yet (preserves bisectability; promotion
            happens at Phase 3 Implement on dedicated worktree). Document the
            promotion path explicitly in research/<deliverable>/README.md so
            Phase 3 doesn't have to rediscover where the canonical destination
            lives. Capture any path correction (e.g., 'playwright/e2e/' →
            'e2e/' per existing testDir convention) as an explicit note.

        - step: 3
          action: "Run REALITY artifacts; capture concrete numbers + verdicts"
          output_location: "research/<deliverable>/results/<timestamp>.md"
          note: |
            Verdicts retire risk. Even if the live run is on a synthetic
            harness or sandbox target, the numbers are honest. Examples:
              - vite build → bundle sizes per chunk vs perf budget
              - cargo run --bin emit_schema → JSONSchema artifacts vs spec
              - gh-cli-test.sh against sandbox PR → capability matrix

        - step: 4
          action: "For MIXED deliverables, run prep portion + flag deferred live-run"
          note: |
            Schema for the deferred record:
              deliverable: <name>
              prep_complete: <yes|partial|no>
              live_run_deferred_to: <Phase 3 sub-build OR explicit gate event>
              live_run_procedure: <bash/commands/preconditions>
              dependency: <gated thing this awaits>

        - step: 5
          action: "Registry sync — mark Phase 2 status honestly"
          required_for: [LARGE]
          optional_for: [MEDIUM]
          blocking: true
          note: |
            Phase 2 status transitions:
              IN_PROGRESS_PRE_<GATE>_SHIP   → currently authoring scaffolds
              COMPLETE_PRE_<GATE>_SHIP      → all INTENT authored + all REALITY
                                              run + MIXED deferrals documented
            Phase 3 status (downstream):
              WAITING_FOR_<GATE>_SHIP_HITL_LOCKED → operator selected WAIT path
                                                    via AskUserQuestion HITL
            Both states discoverable in active.yaml phase_status_history.
            Do NOT use this pattern to JUSTIFY violating the HARD GATE for
            Phase 3 — Phase 2's licit pre-gate work doesn't extend to Phase 3
            Implement.

        - step: 6
          action: "Phase exit gate — confirm exit_criteria + scaffold-vs-live-run completeness"
          blocking: true
          checks:
            - "All deliverables classified as INTENT/REALITY/MIXED with rationale"
            - "INTENT artifacts at research/<deliverable>/ with README documenting promotion path"
            - "REALITY artifacts have results/<timestamp>.md with verdict"
            - "MIXED deliverables have deferral record with procedure + gate event"
            - "active.yaml + manifest phase_status_history reflect honest state"

  Implement:
    order: 3
    tiers: [SMALL, MEDIUM, LARGE]
    purpose: "Write code — types, logic, modules, wiring, integration"
    deliverables:
      - "Source code (all planned files created/modified)"
      - "Inline documentation (public APIs)"
      - "Integration between modules (wiring complete)"
    skills: ["/BUILD"]
    ui_surface:
      ref: "operator_experience_layer.per_phase_operator_view.Implement"
      route: "/builds/<codename>/phase/implement/wave/<wave>"
      eef_sub_build: "code-and-files (file edit) + build-spawn-monitor (progress) + manifest-plan-helix-editing (file-function map editor) + shell-and-output (agent log streams)"
    agents:
      # Per wave_structure (existing in template). Plugin agent dispatch (R5).
      - operator_label: "Pre-wave preparation (analyze before edit)"
        target_type: composite
        targets:
          - { target: "feature-dev:code-explorer", target_type: subagent_type }
          - { target: "lightarchitects:quality", target_type: subagent_type }
        dispatch_pattern: parallel
        agent_id: "feature-dev:code-explorer + lightarchitects:quality"
        invocation: "Parallel dispatch — see wave_structure.preparation"
      - operator_label: "Code generation"
        target: "lightarchitects:engineer"
        target_type: subagent_type
        agent_id: "lightarchitects:engineer"
        invocation: "Implementation SOP — see wave_structure.implementation"
      - operator_label: "Post-wave review"
        target_type: composite
        targets:
          - { target: "feature-dev:code-reviewer", target_type: subagent_type }
          - { target: "lightarchitects:quality", target_type: subagent_type }
          - { target: "coderabbit:review", target_type: skill }
        dispatch_pattern: parallel
        agent_id: "feature-dev:code-reviewer + lightarchitects:quality + coderabbit:review"
        invocation: "Parallel dispatch — see wave_structure.review"
      - operator_label: "LSP code intelligence"
        target: "rust-analyzer-lsp"
        target_type: plugin
        agent_id: "rust-analyzer-lsp"
        invocation: "rust-analyzer-lsp before editing Rust files"
        required_when: "Build modifies Rust source"
    fallback: "Write code, run cargo check / tsc --noEmit"
    exit_gate_type: quality
    exit_criteria:
      - id: compiles_clean
        label: "Code compiles without errors (cargo check / tsc)"
        type: automated
      - id: fmt_clean
        label: "Formatting clean (cargo fmt / prettier)"
        type: automated
      - id: lint_clean
        label: "Zero lint warnings (clippy -D warnings / eslint)"
        type: automated
      - id: planned_files_complete
        label: "All files in file-function map are implemented"
        type: automated
      - id: no_todo_in_prod
        label: "No TODO/FIXME in production code paths"
        type: automated

    phase_execution_steps:
      description: "Ordered execution sequence for Implement phase — /GATE invocations are mandatory, not optional"
      note: "SMALL/MEDIUM: steps 1 → 2 → 5. LARGE with waves: all steps."
      steps:
        - step: 1
          action: "Execute Wave 1 agents (parallel, per dag_order wave 1)"
          note: "Wave 1 should contain only non-destructive operations (credential scrub, license headers, schema checks)"
        - step: 2
          action: "/GATE — wave_security_gate (after Wave 1; blocks Waves 2/3a/4)"
          skill: "/GATE"
          blocking: true
          required_for: [LARGE]
          checks:
            - "No credential literals introduced in Wave 1 output (trufflehog clean)"
            - "cargo check passes on all modified workspaces"
            - "License/security changes did not break compilation"
          on_fail: "HALT — do not start subsequent waves. Report blocking issue to user."
        - step: 3
          action: "Execute read-only audit waves (Wave 3a pattern — classify, do not modify)"
          required_for: [LARGE]
          note: "Audit waves produce manifests only — no file mutations"
        - step: 4
          action: "/GATE — hitl_classification_gate (before any destructive wave)"
          skill: "/GATE"
          blocking: true
          type: manual
          required_for: [LARGE]
          note: "Kevin reviews classification manifest before file deletions or migrations begin"
        - step: 5
          action: "Execute destructive/productive waves (Wave 3b, Wave 4 pattern)"
          note: |
            Each agent writes a completion manifest to /tmp/<agent-id>-manifest.json on finish.
            Downstream agents that depend on multiple predecessors MUST read all manifests
            before starting — verify each shows cargo_check=PASS.
        - step: 6
          action: "/GATE — identity or high-risk HITL gate (if identity files modified)"
          skill: "/GATE"
          blocking: true
          type: manual
          required_when: "Any wave modifies identity.md, mcp.json, or core config files"
          procedure: "Backup → count occurrences → HITL approval → edit → verify coherence → rollback if needed"
        - step: 7
          action: "Phase exit gate [A+S+Q+C+O+P+K+D+T+R] — all 9 dimensions checked in parallel"
          skill: "/GATE"
          blocking: true
          checks: [compiles_clean, fmt_clean, lint_clean, planned_files_complete, no_todo_in_prod]

    internal_gates:
      description: |
        Intra-phase checkpoints for LARGE-tier multi-wave Implement phases.
        Agents post a wave-complete signal; next wave agents MUST read gate output before starting.
      when_to_use: "Any wave boundary involving security operations or destructive file changes"
      protocol:
        trigger: "Wave N agents complete; gate evaluates before Wave N+1 starts"
        skill: "/GATE"
        fallback: "manual checklist — halt and present findings to user"
        enforcement: "blocking: true — next wave cannot start without gate PASS"
      example_gates:
        wave_security_gate:
          label: "Security + build check after first implementation wave"
          trigger: "After Wave 1 (credential scrub, license changes, schema checks)"
          checks:
            - "No credential literals introduced in Wave 1 output"
            - "cargo check passes on all modified workspaces"
            - "trufflehog filesystem reports zero findings"
          blocking: true
          type: automated
        hitl_classification_gate:
          label: "Human reviews audit manifest before destructive operations"
          trigger: "After read-only audit wave; before any file deletions or migrations"
          blocking: true
          type: manual
          note: "Prevents accidental destruction of unique server-side logic"
        identity_backup_gate:
          label: "Backup + occurrence count before identity template substitution"
          trigger: "Before any identity.md modification"
          blocking: true
          type: manual
          procedure:
            - "cp <identity_file> /tmp/<file>-backup.md"
            - "grep -c 'Kevin\\|user_name_placeholder' <identity_file>"
            - "Present count to HITL; get approval before edit proceeds"

    wave_structure:
      description: |
        Canonical three-step structure for every wave in a LARGE-tier Implement phase.
        Applied per-wave; each step is mandatory unless tier is SMALL/MEDIUM (then omit
        preparation and review — implementation SOP only).
      steps:
        preparation:
          label: "Pre-wave analysis — understand before touching"
          agents: ["feature-dev:code-explorer", "lightarchitects:quality"]
          dispatch: parallel
          produces:
            - "File-function-owner table: every file targeted this wave with function names + owning agent"
            - "Integration risk list: upstream/downstream callers affected by planned changes"
            - "Existing test coverage snapshot: which paths are already covered"
          gate:
            label: "Validated before task creation"
            action: "Cross-reference both agents' outputs; discard findings that don't appear in both or lack file evidence"
            blocking: true
          note: "If preparation reveals scope misalignment, halt and revise wave scope before implementation begins"
        comprehension_spike:
          # WHY: per-wave skeleton validation gate. Catches interface mismatches
          #   that are invisible in prose specs but surface immediately in type
          #   signatures. Prevents agents from writing 500 lines against a
          #   misunderstood contract. Only runs for LARGE tier with spike enabled.
          label: "Comprehension validation — skeleton check before full implementation"
          #   MAPS-TO: wave_progress.spike_badge.tooltip + task_detail.phase_label
          #   TYPE: string
          #   WHY: human-readable name of the spike step shown in progress widgets

          condition: "tier == LARGE AND comprehension_spike == true"
          #   MAPS-TO: SQUAD.dispatcher.wave_step_enabled (boolean eval)
          #   TYPE: string (predicate expression)
          #   WHY: gate condition evaluated by the dispatcher before spawning the
          #   spike agent; if false the step is skipped entirely

          duration_minutes_max: 15
          #   MAPS-TO: wave_progress.spike_badge.countdown_timer
          #   TYPE: int
          #   WHY: hard cap prevents spike from consuming build budget; after 15
          #   minutes the spike is auto-failed and surfaced to HITL

          agents: ["feature-dev:code-explorer"]
          #   MAPS-TO: task_detail.assigned_agent_avatar + SQUAD.dispatcher.agent_pool
          #   TYPE: string[]
          #   WHY: single code-explorer agent generates skeleton; no parallel
          #   dispatch needed because output is deterministic (signatures only)

          dispatch: single
          #   MAPS-TO: SQUAD.dispatcher.mode (single | parallel | fan-out)
          #   TYPE: enum
          #   WHY: single-agent dispatch for deterministic output; parallel would
          #   create merge conflicts on skeleton files

          produces:
            #   MAPS-TO: task_detail.deliverables_list + wave_progress.output_files
            #   TYPE: string[]
            #   WHY: declares expected artifacts so the gate evaluator knows what
            #   to verify after the spike agent completes
            - "Skeleton file(s): function signatures + types, no bodies"
            - "Compile-check result: cargo check (or language-equivalent)"
            - "Comprehension brief: 3 bullets stating what agent understood vs. ambiguous"

          gate:
            # WHY: exit gate for the spike step. All conditions must pass before
            #   the wave proceeds to implementation. Prevents half-understood
            #   specs from entering the write phase.
            label: "Skeleton compiles AND ambiguity == 0"
            #   MAPS-TO: gate_dashboard.gate_row.label
            #   TYPE: string
            #   WHY: human-readable gate name shown to operator

            action: "cargo check must pass; comprehension brief must have 0 ambiguity bullets"
            #   MAPS-TO: gate_dashboard.gate_row.action_text + pre-flight.executor.command
            #   TYPE: string (shell command or assertion list)
            #   WHY: machine-readable condition evaluated by the gate runner

            blocking: true
            #   MAPS-TO: gate_dashboard.gate_row.status (red = blocking)
            #   TYPE: bool
            #   WHY: true means the wave cannot proceed to implementation until
            #   the gate passes

            on_failure: "Halt wave, refine spec, re-spike. Max 2 cycles before HITL escalation."
            #   MAPS-TO: HITLGateOverlay.prompt_body (when gate fails)
            #   TYPE: string
            #   WHY: operator-facing instruction when the spike fails; tells them
            #   the remediation path before HITL is triggered

          note: "This is the pre-Phase 1 'rapid prototype' gate adapted to per-wave context. Prevents agents from writing 500 lines against a misunderstood interface."
          webshell_render:
            widget: "wave_progress"
            sub_widget: "comprehension_spike_badge"
            route: "/builds/<codename>/phase/implement/wave/<wave>/spike"
            labels:
              running: "Spike in progress..."
              passed: "Spike validated — skeleton compiles"
              failed: "Spike failed — ambiguity detected"
        implementation:
          label: "Write code — Implementation SOP"
          sop: "Prepare → Write → Gate → Repeat"
          detail: "Per ~/.claude/CLAUDE.md Implementation SOP: read current files, map gaps, write, run quality gates, loop until clean"
        hypothesis_verification:
          label: "Per-task hypothesis verification — semantic review before FILE_RELEASE"
          trigger: "Worker signals IMPLEMENTATION_COMPLETE per task (not wave)"
          agent_source: "reviewer_agent field declared on this wave in plan Part VIII decomposition"
          default_agent: "lightarchitects:quality"
          override_required:
            - condition: "wave touches auth / crypto / permissions / injection surfaces"
              override_to: "lightarchitects:security"
          dispatch: "single per task (Governor spawns; not part of Worker session)"
          confidence_threshold: 0.95
          verdict_routing:
            REVIEW_PASS: "FILE_RELEASE; task status → completed; count toward WAVE_COMPLETE eligibility"
            REVIEW_FAIL: "Fix-it task created for same Worker; FILE_RELEASE withheld; WAVE_COMPLETE blocked"
            review_hitl: "confidence < 0.95 — AskUserQuestion with diff + findings"
          fix_it_cycles_max: 2
          on_max_cycles_exceeded: "HITL escalation — spec ambiguity or capability ceiling"
          note: |
            This is the Hypothesis Protocol (Playbook §7.7, Blueprint §23.8).
            Worker code is a hypothesis; this step provides the independent semantic
            verification. Distinct from the Gatekeeper (§7.2) which runs mechanical
            checks after WAVE_COMPLETE. Sequence: IMPLEMENTATION_COMPLETE →
            hypothesis_verification → (REVIEW_PASS) → FILE_RELEASE → WAVE_COMPLETE
            → Gatekeeper.
        review:
          label: "Post-wave code review — catch what implementation missed"
          agents: ["feature-dev:code-reviewer", "lightarchitects:quality"]
          dispatch: parallel
          confidence_threshold: 0.80
          gate:
            label: "Validated before fix-task creation"
            action: |
              Cross-reference both agents' findings.
              HIGH-confidence findings that appear in both reports → blocking fix tasks.
              HIGH-confidence single-agent findings → investigate + validate manually before creating task.
              MEDIUM/LOW findings → log for follow-up; do not block wave completion.
            blocking: true
          note: "Never create fix tasks from unvalidated single-agent findings; phantom findings waste cycles"

    wave_policy:
      description: "Enforcement rules for wave_structure compliance across all LARGE-tier waves"
      preparation_required: true
      review_required: true
      hypothesis_verification_required: true
      hypothesis_verification_note: |
        Every task in every wave must receive REVIEW_PASS from lightarchitects:<reviewer_agent>
        before FILE_RELEASE. Declared per-wave in plan Part VIII. Default: lightarchitects:quality.
        Security-touching waves: lightarchitects:security (non-negotiable).
        Governed by Playbook §7.7 + Blueprint §23.8.
      fix_threshold: HIGH
      agent_pairing:
        preparation: ["feature-dev:code-explorer", "lightarchitects:quality"]
        hypothesis_verification: "lightarchitects:<reviewer_agent> (per wave declaration)"
        review: ["feature-dev:code-reviewer", "lightarchitects:quality"]
      parallel_dispatch: true
      validation_step: required
      rationale: |
        Derived from luminous-tracing-polytope build retro (2026-05-03):
        - Two-agent pairing (code-explorer + quality at prep; code-reviewer + quality at review)
          consistently surfaces orthogonal findings. Single-agent review misses one dimension.
        - Parallel dispatch saves ~60% wall-clock time vs sequential.
        - Validation gate between agent findings and task creation filters phantom reports.
          In luminous-tracing-polytope both agents found different real issues PLUS several
          false positives that didn't survive cross-validation.

  Harden:
    order: 4
    tiers: [LARGE]
    purpose: "Security scanning, performance profiling, observability instrumentation"
    deliverables:
      - "Vulnerability scan report (zero critical/high unresolved)"
      - "Performance baseline (benchmarks for hot paths)"
      - "AYIN spans instrumented on new async operations"
    skills: ["/SECURE", "/OBSERVE"]
    ui_surface:
      ref: "operator_experience_layer.per_phase_operator_view.Harden"
      route: "/builds/<codename>/phase/harden"
      eef_sub_build: "manifest-plan-helix-editing (findings table) + build-spawn-monitor (gate state)"
    agents:
      - operator_label: "Security audit"
        target: "lightarchitects:security"
        target_type: subagent_type
        agent_id: "lightarchitects:security"
        invocation: "Agent dispatch lightarchitects:security (SERAPH lens)"
      - operator_label: "Static security scan"
        target: "coderabbit:review"
        target_type: skill
        skill_lens: "security"
        agent_id: "coderabbit:review (security lens)"
        invocation: "coderabbit:review with security focus"
      - operator_label: "Observability instrumentation review"
        target: "lightarchitects:ops"
        target_type: subagent_type
        agent_id: "lightarchitects:ops"
        invocation: "Agent dispatch lightarchitects:ops"
      - operator_label: "Threat investigation"
        target: "lightarchitects:researcher"
        target_type: subagent_type
        subagent_lens: "threat-modeling"
        agent_id: "lightarchitects:researcher (threat-modeling lens)"
        invocation: "Agent dispatch for novel threat surfaces"
    fallback: "cargo audit && grep -r 'unsafe' && check #[instrument] coverage"
    exit_gate_type: security
    exit_criteria:
      - id: vuln_scan_clean
        label: "No critical/high vulnerabilities (cargo audit / SERAPH scan)"
        type: automated
      - id: no_injection_paths
        label: "No injection vectors in user-facing inputs"
        type: automated
      - id: secrets_redacted
        label: "No secrets in logs, errors, or public responses"
        type: automated
      - id: perf_baseline_set
        label: "Performance baseline documented for hot paths"
        type: manual
      - id: observability_wired
        label: "AYIN spans on new async operations"
        type: automated

    phase_execution_steps:
      description: "Ordered execution sequence for Harden phase — scan first, gate, then remediate"
      steps:
        - step: 1
          action: "Execute all static scan agents in parallel (SERAPH + CORSO GUARD + QUANTUM surface check)"
          note: "Read-only — scanners produce findings manifests; they do NOT modify files"
        - step: 2
          action: "/GATE — static_analysis_gate"
          skill: "/GATE"
          blocking: true
          type: manual
          note: |
            Human reviews consolidated findings manifest.
            Classify each finding: ACCEPT (known risk) / FIX (agent-addressable) / ESCALATE (requires Kevin).
            CRITICAL findings must be ESCALATE — never auto-remediate without human review.
        - step: 3
          action: "Execute remediation agents (HITL-approved FIX items only)"
          required_when: "Any FIX items exist in classified manifest"
          note: "Agent reads classification manifest; only implements FIX-classified items"
        - step: 4
          action: "/GATE — post-remediation security check"
          skill: "/GATE"
          blocking: true
          type: automated
          checks:
            - "trufflehog filesystem reports zero findings"
            - "cargo audit reports zero critical/high CVEs"
            - "No injection vectors in user-facing inputs (static analysis)"
        - step: 5
          action: "/GATE — ayin_topology_gate (if gateway unification is in scope)"
          skill: "/GATE"
          blocking: true
          type: manual
          required_when: "Build scope includes multi-process → single-process consolidation"
          check: "AYIN can trace gateway as multiplexer OR transition plan documented"
        - step: 6
          action: "Phase exit gate [A+S+Q+C+O+P+K+D+T+R] — all 9 dimensions checked in parallel"
          skill: "/GATE"
          blocking: true
          checks: [vuln_scan_clean, no_injection_paths, secrets_redacted, perf_baseline_set, observability_wired]

    internal_gates:
      description: "Intra-phase checkpoints for Harden phase — scan before remediate"
      protocol:
        trigger: "Static scan agents complete; remediation agents wait for gate"
        skill: "/GATE"
        enforcement: "Never auto-remediate CRITICAL findings — always HITL"
      example_gates:
        static_analysis_gate:
          label: "Human reviews severity classification before any automated remediation"
          trigger: "After all static scans (SERAPH, CORSO GUARD) complete"
          blocking: true
          type: manual
          note: "Agent posts findings manifest; human classifies accept/fix/escalate"
        ayin_topology_gate:
          label: "AYIN trace model compatibility verified if gateway unification is in scope"
          trigger: "When Harden phase covers multi-process → single-process consolidation"
          blocking: true
          type: manual
          check: "AYIN can trace gateway as multiplexer (not 6 independent processes)"

  Verify:
    order: 5
    tiers: [SMALL, MEDIUM, LARGE]
    purpose: "Testing — unit, integration, contract, property-based, E2E"
    deliverables:
      - "Test suite (all new code paths covered)"
      - "Coverage report (>= 90% on new code)"
      - "Regression check (existing tests still pass)"
    skills: ["/VERIFY"]   # v2.0.2: was /TESTING; meta-skill canonical name is /VERIFY per CLAUDE.md
    ui_surface:
      ref: "operator_experience_layer.per_phase_operator_view.Verify"
      route: "/builds/<codename>/phase/verify"
      eef_sub_build: "shell-and-output (test execution + results tree) + test-and-deploy (coverage)"
    agents:
      - operator_label: "Test design (Canon XXVII pyramid)"
        target: "lightarchitects:testing"
        target_type: subagent_type
        agent_id: "lightarchitects:testing"
        invocation: "Agent dispatch lightarchitects:testing"
      - operator_label: "E2E browser testing"
        target: "playwright"
        target_type: plugin
        agent_id: "playwright"
        invocation: "mcp__plugin_playwright_playwright__* (always headed per feedback_playwright_headed.md)"
        required_when: "Build has user-facing UI flows"
      - operator_label: "Coverage measurement"
        target: "cargo llvm-cov | vitest --coverage"
        target_type: bash
        agent_id: "cargo llvm-cov | vitest --coverage"
        invocation: "via /VERIFY meta-skill"
    fallback: "cargo test --all-features && check coverage"
    exit_gate_type: testing
    exit_criteria:
      - id: all_tests_pass
        label: "All tests passing (cargo test / vitest)"
        type: automated
      - id: coverage_target
        label: "Coverage >= 90% on new code"
        type: automated
      - id: test_ratchet
        label: "Test count >= previous phase (ratchet — never decrease)"
        type: automated
      - id: contract_tests
        label: "Contract tests for new interfaces/APIs"
        type: automated
      - id: real_world_inputs
        label: "Tested with real-world inputs (not just happy path)"
        type: manual

    phase_execution_steps:
      description: "Ordered execution sequence for Verify phase — gate between every test layer"
      steps:
        - step: 1
          action: "/GATE — isolation_gate (before any integration tests execute)"
          skill: "/GATE"
          blocking: true
          type: automated
          checks:
            - "Neo4j integration tests use NEO4J_TEST_URL env var or are annotated #[ignore]"
            - "Filesystem integration tests use tempdir crate — never production helix path"
            - "Teardown is guaranteed (Drop impl or explicit cleanup; runs even on test failure)"
        - step: 2
          action: "Execute: cargo test --all-features (full regression check)"
          note: "Run entire existing test suite — not just new tests"
        - step: 3
          action: "/GATE — regression_gate"
          skill: "/GATE"
          blocking: true
          type: automated
          check: "Zero test failures from step 2 — any failure blocks coverage and new test work"
          on_fail: "HALT — do not proceed to step 4 or 5. Fix regressions first."
        - step: 4
          action: "Execute: cargo llvm-cov --workspace --all-features (coverage measurement)"
          required_for: [LARGE, MEDIUM]
          note: "Measure first; enforce floor later. Record baseline in plan's coverage: section."
        - step: 5
          action: "Write new test code (contract tests, integration tests, property tests)"
          note: "Only after steps 1-4 confirm existing tests are green and coverage is measured"
        - step: 6
          action: "/GATE — contract_gate"
          skill: "/GATE"
          blocking: true
          type: manual
          check: "Each new pub interface has at least one contract test asserting type + behavior (not just compilation)"
        - step: 7
          action: "Execute init-CLI or E2E integration test if applicable"
          required_when: "Build scope includes a new CLI subcommand or user-facing workflow"
        - step: 8
          action: "Phase exit gate [A+S+Q+C+O+P+K+D+T+R] — all 9 dimensions checked in parallel"
          skill: "/GATE"
          blocking: true
          checks: [all_tests_pass, coverage_target, test_ratchet, contract_tests, real_world_inputs]

    internal_gates:
      description: "Intra-phase checkpoints for Verify phase — layer by layer"
      protocol:
        trigger: "Each test layer completes; gate before next layer starts"
        skill: "/GATE"
      example_gates:
        regression_gate:
          label: "All existing tests pass before new coverage is measured"
          trigger: "After cargo test completes; before llvm-cov measurement"
          blocking: true
          type: automated
          fallback: "cargo test --all-features 2>&1 | tail -5  # must show 0 failures"
          note: "Never accept 'all new tests pass' if existing tests are failing"
        contract_gate:
          label: "Contract tests for new interfaces reviewed before Verify exits"
          trigger: "After all test files written; before phase exit gate"
          blocking: true
          type: manual
          check: "Each new pub interface has at least one contract test asserting type + behavior"
        isolation_gate:
          label: "Integration tests use isolated resources (test DB, temp dirs)"
          trigger: "Before any integration test that touches Neo4j or filesystem"
          blocking: true
          type: automated
          check: |
            - Neo4j tests: NEO4J_TEST_URL env var OR #[ignore] annotation
            - Filesystem tests: tempdir crate, never production helix path
            - Test teardown: always runs (even on failure) via Drop impl or defer

  Ship:
    order: 6
    tiers: [SMALL, MEDIUM, LARGE]
    purpose: "Build, codesign, deploy, reconnect, smoke test"
    deliverables:
      - "Release binary (compiled, optimized)"
      - "Codesigned (macOS ad-hoc or distribution)"
