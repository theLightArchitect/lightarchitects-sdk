      blocking_for_render: "contracts dashboard widget non-functional until route exists"
    "/builds/<codename>/compliance":
      status: proposed
      referenced_by: "Section 6.5 security_compliance.webshell_render"
      eef_deliverable: "manifest-plan-helix-editing sub-build extends route pattern"
