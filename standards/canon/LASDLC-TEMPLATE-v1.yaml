    Canon_XXXIV: "Every D-score reported as low/point/high interval, never point alone"
    Canon_XXXV: "Every D-score requires verbatim primary-source citation from the standard's spec text + deliverable file paths; ≥95% threshold to PASS each component"
    Canon_XXXVI: "LDB IS Phase 3's empirical truth-telling layer; D8 directly measures the compression claim"

  composition_with_template_sections:
    section_0_4_preflight_wizard: "Wizard answers determine build profile (tier, security_classification, deployable) which selects weighting"
    section_0_5_northstar: "D1b reads northstar_criterion.machine_checkable_predicate"
    section_0_6_confidence_threshold_gate: "every D-score honors §0.6 schema (confidence_value + primary_source_citations + validation_status)"
    section_0_7_auto_decision_eligibility: "D6/D7 band per decision_class feeds §0.7 P2 calibration check"
    section_6_threat_model: "D6h/D6d evaluate threat_model entry_points coverage"
    section_6_5_compliance: "D6j evaluates compliance attestation against selected frameworks"
    section_7_5_post_implementation_validation: "LDB run is invoked at §7.5 step 5 close-out (post-deploy)"
    section_7_6_calibration_substrate: "LDB output written as deliverable_benchmark field on per-build record"
    section_8_quality_gate_dimensions: "D6 composes with §8 Quality.Security agentic criteria (no double-counting; D6 is product-level, §8 is gate-level)"
    section_9_5_drift_management: "LDB scores feed drift detection (regression in D-scores triggers drift alert)"

