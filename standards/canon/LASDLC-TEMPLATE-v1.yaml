    D6: "SERAPH (offensive) + CORSO GUARD (static) + LÆX Layer 1+4 (governance)"
    D7: "aggregator hook + Firecrawl (industry baselines)"
    D8: "AYIN traces (objective spans) — D8 cannot be self-reported; operator survey for D8i only"

  composition_with_prior_canon:
