  output_schema:
    file_location: "<build_root>/.calibration/<codename>.deliverable_benchmark.json"
    schema:
      schema_version: "LDB-v1.0"
      build_id: <codename>
      benchmarked_at: ISO8601
      benchmarked_by: "cold-context-agent-id (NEVER the build's own agents)"
      build_profile:
        tier: "SMALL | MEDIUM | LARGE"
        security_classification: "Public | Confidential | Restricted | Secret"
        deployable: bool
        ai_ml_system: bool
      weights_applied:
        description: "selected from default_aggregate_weights based on profile"
        D1: pct
        D2: pct
        D3: pct
        D4: pct
        D5: pct
        D6: pct
        D7: pct
        D8: pct
      scores:
        D1_request_fidelity:
          interval: { low: number, point: number, high: number }
          sub_scores: { D1a, D1b, D1c, D1d }
          citations: ["array of {quote, source, line_range, accessed} per §0.6"]
          validation_status: "VALIDATED | INSUFFICIENT_EVIDENCE | UNVALIDATED | DISPUTED | EXEMPT | N_A"
        D2_iso_25010:
          interval: { low, point, high }
          sub_scores: { D2a, D2b, D2c, D2d, D2e, D2f, D2g }
          citations: []
          validation_status: <enum>
        D3_cisq:
          interval: { low, point, high }
          sub_scores: { D3a, D3b, D3c, D3d, D3e, D3f }
          citations: []
          validation_status: <enum>
        D4_dora:
          interval: { low, point, high }
          sub_scores: { D4a, D4b, D4c, D4d }
          dora_band: "Elite | High | Medium | Low | N_A"
          citations: []
          validation_status: <enum>
        D5_domain:
          interval: { low, point, high }
          domain_anchors_applied: ["array of which domains triggered"]
          sub_scores: { applicable_subset }
          citations: []
          validation_status: <enum>
        D6_security:
          interval: { low, point, high }
          sub_scores: { D6a, D6b, D6c, D6d, D6e, D6f, D6g, D6h, D6i, D6j }
          security_classification_applied: "Public|Confidential|Restricted|Secret"
          required_sub_components_met: bool
          compliance_override_log_refs: []
          citations: []
          validation_status: <enum>
        D7_comparative:
          interval: { low, point, high }
          sub_scores: { D7a, D7b, D7c, D7d }
          sample_n_at_time: integer
          citations: []
          validation_status: <enum>
        D8_performance:
          interval: { low, point, high }
          sub_scores: { D8a, D8b, D8c, D8d, D8e, D8f, D8g, D8h, D8i, D8j }
          ayin_trace_refs: ["array of trace ids if available"]
          operator_survey_ref: "path to survey response file"
          citations: []
          validation_status: <enum>
      aggregate:
        # v2.4.1 — dual reading per cookbook §60.10 INSUFFICIENT_EVIDENCE reconciliation rule
        canonical:
          interval: { low, point, high }
          band: "EXEMPLARY | STRONG | ACCEPTABLE | WEAK | FAILED"
          formula: "weighted sum of D1-D8 scores per weights_applied; components meeting §60.10 trigger (IE + floor<30 OR ≥50% sub-IE) dropped + weights renormalized"
          components_dropped:
            description: "array of {component_id, reason, floor, sub_ie_proportion}"
          renormalized_weights:
            description: "weights after dropping IE-no-evidence components; sum to 100"
        with_ie_as_point:
          interval: { low, point, high }
          band: "..."
          note: "trajectory-honesty reading — IE components counted at point value; preserved per cookbook §60.10.3 mandatory dual reporting"
        reconciliation_rule_applied: "cookbook://60.10 v1.0"
      n_a_components: ["array of components marked N/A and why"]
      insufficient_evidence_components:
        description: "array of components with INSUFFICIENT_EVIDENCE per §0.6"
        triggered_canonical_drop:
          description: "subset that met §60.10 trigger (floor<30 OR ≥50% sub-IE) and were dropped from canonical"
        kept_in_canonical_at_point:
          description: "IE components that did NOT meet trigger (floor≥30, <50% sub-IE) — stayed in canonical at point value"
      feeds:
        section_7_6_calibration_substrate: "<build_root>/.calibration/<codename>.json"
        section_0_7_auto_decision_eligibility: "aggregate.json.decision_class_band_per_class"

  independent_verification_roster:
    description: "Per Canon XXXIII — never the build's own agents. Each component has a designated cold-context runner."
    D1: "cold-context benchmark agent + operator post-deploy survey"
    D2: "cold-context benchmark agent reading deliverable + ISO/IEC 25010 spec"
    D3: "CORSO automated tools (clippy / cargo audit / sonatype-guide / lizard / cyclomatic counters)"
