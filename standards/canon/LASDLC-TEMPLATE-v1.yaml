  description: "How CORSO evaluates quality gates at each phase boundary"
  steps:
    - step: 1
      action: SCOUT
      role: "Plan the gate evaluation strategy"
    - step: 2
      action: FETCH
      role: "Gather evidence (read code, run tools)"
    - step: 3
      action: SNIFF
      role: "Analyze code against quality criteria"
    - step: 4
      action: GUARD
      role: "Security-specific scanning"
    - step: 5
      action: CHASE
      role: "Run tests, check coverage"
    - step: 6
      action: HUNT
      role: "Document findings"
    - step: 7
      action: SCRUM
      role: "Synthesize verdict (PASS / FAIL / WARN)"
  note: "This cycle runs at EVERY gate boundary. It is NOT the execution phase sequence."

