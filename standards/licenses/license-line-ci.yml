# uuid: f8979dc6-296f-4442-ae6e-65b07bbf2f58
# license-line-ci.yml — canonical CI gate for license-line drift detection
#
# Drop-in `.github/workflows/license-line-guard.yml` that catches the bug
# class documented in helix entry sig-8.2 (audit-reports-as-tertiary-sources):
# license metadata silently flipped inside an unrelated feature commit.
#
# Bug class prevented:
#   Commit `6f7f85a` (titled "cognitive loop MVP with async polish") changed
#   `license = "AGPL-3.0-only"` → `license = "Proprietary"` while shipping
#   unrelated cognitive-loop work. Reviewers cannot reasonably be expected
#   to spot a Cargo.toml license string flip buried inside a 200-file MVP
#   diff. This guard fails CI on any PR that touches a `license = ...`
#   line UNLESS the PR is intentionally labelled `license-migration`.
#
# Cross-references:
#   ~/.claude/plans/permanent-fixes-2026-04-29.md (Layer 2 → L2.5)
#   ~/lightarchitects/soul/helix/user/standards/canon/builders-cookbook.md
#   ~/lightarchitects/soul/helix/user/standards/scripts/check-license-line.sh  (sibling detector)
#   ~/lightarchitects/soul/helix/user/standards/licenses/license-migration-playbook.md
#   ~/lightarchitects/soul/helix/claude/journal/projects/2026-04-29-audit-reports-as-tertiary-sources.md  (sig-8.2)
#
# Principle: **process drift before state drift.** A valid surface state
# reached via an invalid path is still a process violation. Catching it
# at the path layer (this guard) complements catching it at the state
# layer (file-level canonical-state checker, future work).

# ════════════════════════════════════════════════════════════════════════════
# OPTION A — drop-in standalone workflow (recommended)
# ════════════════════════════════════════════════════════════════════════════
#
# Save as `.github/workflows/license-line-guard.yml` in each LA repo.
# Runs in parallel with other CI jobs; fast red signal on license drift.

name: License-line guard

on:
  pull_request:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - 'Cargo.toml'
  workflow_dispatch:

jobs:
  license-line:
    name: detect license-line drift in non-migration PRs
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout (with full history for diff)
        uses: actions/checkout@v4
        with:
          # We need the merge-base, so fetch enough history to resolve
          # `origin/${{ github.base_ref }}...HEAD`. fetch-depth: 0 is the
          # safe default; tune down if your repo has heavy history.
          fetch-depth: 0

      - name: Fetch base ref
        run: git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Detect license-line drift
        id: detect
        # The detector script lives in the SOUL canonical standards folder.
        # Each repo vendors a copy at `.github/scripts/check-license-line.sh`
        # (kept in sync via `make sync-standards`) so CI doesn't depend on
        # an external checkout.
        run: |
          chmod +x .github/scripts/check-license-line.sh
          if .github/scripts/check-license-line.sh \
              --base "origin/${{ github.base_ref }}" \
              --head HEAD \
              --quiet \
              > /tmp/license-line-drift.txt 2>&1; then
              echo "drift=false" >> "${GITHUB_OUTPUT}"
          else
              echo "drift=true" >> "${GITHUB_OUTPUT}"
              cat /tmp/license-line-drift.txt
          fi

      - name: Allow drift if PR is labelled `license-migration`
        if: steps.detect.outputs.drift == 'true'
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "${PR_LABELS}" | grep -q '"license-migration"'; then
              echo "::notice::license-line drift detected, but PR is labelled \`license-migration\` — allowed."
              exit 0
          fi
          echo "::error::license-line drift detected and PR is NOT labelled \`license-migration\`."
          echo "::error::Either (a) split the license change into a dedicated migration PR following"
          echo "::error::    ~/lightarchitects/soul/helix/user/standards/licenses/license-migration-playbook.md"
          echo "::error::or (b) apply the \`license-migration\` label and re-run this check."
          cat /tmp/license-line-drift.txt
          exit 1


