# OPTION C — pre-PR-create local hook (faster local feedback)
# ════════════════════════════════════════════════════════════════════════════
#
# Run before `gh pr create` to catch drift before it reaches CI:
#
#   ~/lightarchitects/soul/helix/user/standards/scripts/check-license-line.sh \
#       --base origin/main --head HEAD
#
# Exit 0 = clean to push; exit 1 = drift detected.


# ════════════════════════════════════════════════════════════════════════════
# DOCUMENTATION — what this catches and why
# ════════════════════════════════════════════════════════════════════════════
#
# 1. The detector script (`check-license-line.sh`)
#    -------------------------------------------------------------------------
#    What:  `git diff --no-color -U0 base...head -- '**/Cargo.toml'` filtered
#           for lines starting with `+`/`-` that match `^[+-]\s*license\s*=`.
#    Why:   The bundled-license-change pattern requires a SPDX field flip in
#           a Cargo.toml. Detecting that single line change reliably and
#           reporting it is sufficient — the workflow handles policy.
#    Cost:  <1 second local; <5 seconds CI cold start.
#
# 2. The label-based override (`license-migration`)
#    -------------------------------------------------------------------------
#    What:  PR-level signal that the migration is intentional, reviewed, and
#           scoped. Setting the label requires write access to the repo.
#    Why:   We don't want to block license migrations — we want to make them
#           VISIBLE. Labelling forces a deliberate action; bundled drift is
#           by definition unlabelled.
#    Cost:  Zero — github labels are free.
#
# 3. Why `license-file` is NOT caught
#    -------------------------------------------------------------------------
#    The detector regex matches `license = ...` but not `license-file = ...`.
#    Renaming the LICENSE file path (e.g., `LICENSE` → `LICENSE-Apache-2.0`)
#    is a routine refactor that should not require migration ceremony.
#    The actual SPDX identifier flip (which has legal/redistribution implications)
#    is what we gate.
#
# 4. Why the script lives in `.github/scripts/`, not `~/lightarchitects/`
#    -------------------------------------------------------------------------
#    CI runners do not have access to `~/lightarchitects/`. The canonical copy
#    lives at `~/lightarchitects/soul/helix/user/standards/scripts/check-license-line.sh`,
#    and each repo vendors a copy at `.github/scripts/check-license-line.sh`,
#    kept in sync via the standards-sync hook (or a manual `cp` for now).


# ════════════════════════════════════════════════════════════════════════════
# HOW TO ADD TO A NEW REPO
# ════════════════════════════════════════════════════════════════════════════
#
# 1. Vendor the detector:
#      mkdir -p .github/scripts
#      cp ~/lightarchitects/soul/helix/user/standards/scripts/check-license-line.sh \
#         .github/scripts/check-license-line.sh
#      chmod +x .github/scripts/check-license-line.sh
#
# 2. Vendor this workflow as a separate file:
#      mkdir -p .github/workflows
#      # Copy OPTION A (lines 28-79 of this file) to:
#      .github/workflows/license-line-guard.yml
#
# 3. Open the `license-migration` label in the repo:
#      gh label create license-migration \
#         --description 'PR intentionally migrates license metadata' \
#         --color 'B60205' \
#         --repo TheLightArchitects/<REPO>
#
# 4. Push and open a PR. The first run on a non-migration PR that touches
#    Cargo.toml license fields will fail — that's expected, and exactly the
#    bug class this gate is designed to catch.
#
# 5. To migrate a license intentionally, apply the `license-migration` label
#    AND follow the migration playbook
#    (~/lightarchitects/soul/helix/user/standards/licenses/license-migration-playbook.md).


