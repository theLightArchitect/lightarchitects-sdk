# ════════════════════════════════════════════════════════════════════════════
# DOCUMENTATION — what this catches and why each step matters
# ════════════════════════════════════════════════════════════════════════════
#
# 1. `cargo metadata --no-deps`
#    -------------------------------------------------------------------------
#    What:  Resolves the workspace graph WITHOUT fetching dependencies.
#    Why:   Catches:
#              - Workspace member declared but source missing (PR #4 today).
#              - Cargo.toml syntax errors.
#              - Path-dep pointing to nonexistent path.
#              - Duplicate package names across the workspace.
#    Cost:  ~1 second locally; ~5 seconds in CI cold start.
#
# 2. `cargo build --workspace --no-default-features`
#    -------------------------------------------------------------------------
#    What:  Compiles every crate with default features disabled.
#    Why:   Catches the bug pattern: code that compiles only when one of the
#           default features is enabled, but the feature gate is missing on
#           an `impl` block or a `pub use` re-export. Library consumers who
#           opt out of defaults hit this; CI without this step does not.
#    Cost:  ~30-90 seconds depending on workspace size.
#
# 3. `cargo build --workspace --all-features`
#    -------------------------------------------------------------------------
#    What:  Compiles every crate with EVERY feature enabled.
#    Why:   Catches code under #[cfg(feature = "...")] that has bit-rotted
#           because no test path exercised it. Also catches mutually-exclusive
#           features that should be enforced at Cargo.toml level (e.g. via
#           [features] subtraction or ResolverV2 explicit dep activation).
#    Cost:  ~60-180 seconds depending on feature surface.
#
# Total CI cost added: ~2-4 minutes. Bug class prevented: every shipped PR
# from the 2026-04-28 session that fell into the workspace-integrity bucket.


# ════════════════════════════════════════════════════════════════════════════
# HOW TO ADD TO A NEW REPO
# ════════════════════════════════════════════════════════════════════════════
#
# 1. Open .github/workflows/ci.yml in the target repo.
# 2. Either:
#    a. Insert OPTION A's three steps into your existing test job (fastest path
#       — runs on the same runner as the rest of CI, reuses the cargo cache).
#    b. Add OPTION B as a separate workflow file (`.github/workflows/integrity.yml`)
#       — gives you a dedicated red signal independent of test/clippy jobs.
# 3. Push and open a PR. The first run will fail if any latent integrity bug
#    exists in main HEAD — that's expected and is exactly the bug class this
#    gate is designed to catch.
# 4. Fix the underlying issue (don't disable the gate). Common fixes:
#    - Add the missing source directory.
#    - Remove the dead workspace member from Cargo.toml.
#    - Fix the cfg(feature) gate that broke under --no-default-features.
# 5. Land the integrity gate alongside the fix in the same PR.


