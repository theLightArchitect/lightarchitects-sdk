[package]
name = "lightarchitects-gateway"
version = "0.3.0"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Light Architects unified gateway — MCP server, Arena HTTP API, and autonomous agent runtime."

[[bin]]
name = "lightarchitects"
path = "src/main.rs"
doc = false

[lints]
workspace = true

[dependencies]
# ── Workspace sibling clients ─────────────────────────────────────────────────
lightarchitects-core = { path = "../lightarchitects-core" }
lightarchitects-corso = { path = "../lightarchitects-corso" }
lightarchitects-eva = { path = "../lightarchitects-eva" }
lightarchitects-soul = { path = "../lightarchitects-soul" }
lightarchitects-quantum = { path = "../lightarchitects-quantum" }
lightarchitects-seraph = { path = "../lightarchitects-seraph" }
lightarchitects-ayin = { path = "../lightarchitects-ayin" }
lightarchitects-crypto = { path = "../lightarchitects-crypto" }

# ── Shared (both MCP + Arena modes) ──────────────────────────────────────────
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["io-std", "signal", "fs"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
chrono = { workspace = true }
chrono-tz = { workspace = true }
reqwest = { workspace = true }
uuid = { workspace = true }
dirs-next = { workspace = true }

# ── Arena mode (HTTP gateway + scheduler + heartbeat agents) ──────────────────
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
governor = { workspace = true }
rusqlite = { workspace = true }
cron = { workspace = true }
notify = { workspace = true }
dashmap = { workspace = true }
futures-util = { workspace = true }
tokio-tungstenite = { workspace = true }
libc = { workspace = true }
anyhow = { workspace = true }
secrecy = { workspace = true }
zeroize = { workspace = true }
subtle = { workspace = true }
keyring = { workspace = true }

# ── Platform-specific ─────────────────────────────────────────────────────────
[target.'cfg(target_os = "macos")'.dependencies]
security-framework = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio-test = { workspace = true }
