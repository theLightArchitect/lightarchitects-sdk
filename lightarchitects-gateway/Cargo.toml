[package]
name = "lightarchitects-gateway"
version = "0.3.0"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false
description = "Light Architects unified gateway — MCP server, Arena HTTP API, and autonomous agent runtime."

[[bin]]
name = "lightarchitects"
path = "src/main.rs"
doc = false

[features]
default = ["spawner"]

## Subprocess spawn mode (current behaviour). Retained as fallback even when
## inline handlers are enabled so that agents configured as `mode = "spawner"`
## still work.
spawner = []

## In-process sibling handlers — compile handler logic directly into the binary
## instead of spawning a subprocess per call.
## NOTE: inline-ayin and inline-corso deps removed — ayin-core/engine/mcp and
## corso-server/trinity-core not yet published. Re-add when those crates are
## available on crates.io or GitHub.
inline-ayin = []
inline-corso = []
inline-eva = []
inline-soul = []
inline-quantum = []
# inline-seraph intentionally omitted — SERAPH stays spawner-only for process
# isolation (offensive security tools must not crash the gateway).

## Convenience: enable all five inline handlers at once.
inline-all = [
    "inline-ayin", "inline-corso", "inline-eva",
    "inline-soul", "inline-quantum",
]

## SOUL heavy dependencies (Neo4j + fastembed). Without this, the SOUL handler
## uses the filesystem vault backend only — no graph database or embeddings.
helix = ["inline-soul"]

[lints]
workspace = true

[dependencies]
# ── Unified SDK (replaces all individual sibling crate deps) ──────────────────
lightarchitects = { path = "../lightarchitects" }

# ── Shared (both MCP + Arena modes) ──────────────────────────────────────────
async-trait = "0.1"
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
toml = { workspace = true }
rpassword = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["io-std", "signal", "fs"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
chrono = { workspace = true }
chrono-tz = { workspace = true }
reqwest = { workspace = true }
uuid = { workspace = true }
dirs-next = { workspace = true }

# ── Arena mode (HTTP gateway + scheduler + heartbeat agents) ──────────────────
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
governor = { workspace = true }
rusqlite = { workspace = true }
cron = { workspace = true }
notify = { workspace = true }
dashmap = { workspace = true }
futures-util = { workspace = true }
tokio-tungstenite = { workspace = true }
libc = { workspace = true }
anyhow = { workspace = true }
regex = { workspace = true }
secrecy = { workspace = true }
zeroize = { workspace = true }
subtle = { workspace = true }
keyring = { workspace = true }
tempfile = { workspace = true }

# ── Platform-specific ─────────────────────────────────────────────────────────
[target.'cfg(target_os = "macos")'.dependencies]
security-framework = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio-test = { workspace = true }
