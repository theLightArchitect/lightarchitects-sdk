[package]
name = "lightarchitects-gateway"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Light Architects MCP Gateway — unified tool interface for all siblings."

[[bin]]
name = "lightarchitects"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
lightarchitects-core = { path = "../lightarchitects-core" }
lightarchitects-corso = { path = "../lightarchitects-corso" }
lightarchitects-eva = { path = "../lightarchitects-eva" }
lightarchitects-soul = { path = "../lightarchitects-soul" }
lightarchitects-quantum = { path = "../lightarchitects-quantum" }
lightarchitects-seraph = { path = "../lightarchitects-seraph" }
lightarchitects-ayin = { path = "../lightarchitects-ayin" }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["io-std", "signal", "fs"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
chrono = { workspace = true }
reqwest = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio-test = { workspace = true }
