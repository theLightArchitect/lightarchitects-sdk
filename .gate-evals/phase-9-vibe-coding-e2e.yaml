notes:
  - "W9.2 adversarial tests: 5 new tests specifically target the two new endpoints
    (interrupt, clear) plus the copilot size-guard. These endpoints were added in
    Phase 7/8 and had no adversarial coverage until now."
  - "W9.3 Invariant D companion test: SseTransport is a pure pass-through — the session
    layer (ConversationSession) is responsible for not emitting after Complete. The
    companion test proves the checker mechanism is non-tautological without requiring a
    ConversationSession-level guard test (which would need live AI backend)."
  - "GAP-2 fix: Response::builder() with static header constants cannot fail in practice,
    but the match pattern is required by the no-unwrap/no-expect Cookbook policy. The Err
    branch logs a BUG tracing event, drops the stream (which fires AbortOnDrop cancelling
    the task), and returns 500. This is safe and correct."
  - "GAP-3 (HIGH, tracked): Native SSE body bypasses the global sse_handler.rs redact()
    path. This is acceptable for the current threat model (bearer token does not appear in
    SOUL vault entries or user messages in normal operation). Defense-in-depth improvement
    is queued for Phase 10 as part of the planned security hardening pass."
  - "GAP-8 sequential grounding: SOUL search (400ms timeout) and git gather (800ms timeout)
    run sequentially in gather_grounding(). Converting to tokio::join! is a clean
    optimization (1200ms serial → 800ms parallel worst-case) queued for Phase 10
    performance optimization wave."
  - "Phase 9 commit history: 60561ff (W9.1+W9.2+W9.5) → 5c0fad8 (W9.3 BLOCKING fix)
    → current (GAP-2 fix)"
