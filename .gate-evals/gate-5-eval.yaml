root_cause_notes: >
  Two implementation bugs surfaced during E2E authoring and fixed in this phase:
  (1) routes.ts BUILD_VIEW_PATTERN missing 'fleet' — /builds/:id/fleet fell
  through to Ops screen. Fixed by adding fleet to BuildViewMode + regex.
  (2) Playwright strict mode on getByText('Running') — FleetPanel header
  "1 running · 1 total" contains lowercase "running" triggering multi-match.
  Fixed by { exact: true } on all status badge locators.
  Stale binary (rust-embed bakes dist at compile time) required full
  pnpm build + make deploy-fast cycle to pick up routes.ts fix.

