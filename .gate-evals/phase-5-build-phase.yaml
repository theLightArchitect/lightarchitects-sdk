math_oracle:
  scope: "SSM update rule · stable softmax · largest-remainder rounding · GraphSAGE cosine"
  algo_1_ssm:
    verdict: PROVEN
    note: >
      Faithful h_t = A⊙h + Bx_t (diagonal A=0.9). BIBO stable; fixed-point
      |h*|_inf ≤ 10‖B‖_{inf,1}·M. Caveats: (1) fixed LCG B not trained —
      |h*| may be O(1000) at saturation; (2) label "Mamba SSM" implies full ZOH
      discretization (arXiv:2312.00752 §3.1) but implementation uses simplified
      fixed-A variant. Deliberate design choice, not a defect.
  algo_2_softmax:
    verdict: PROVEN
    tracked_finding: >
      MEDIUM — NaN/±∞ guard absent. For finite inputs sum ≥ 1.0 > 0 is proven.
      NaN input: exp(NaN) = NaN; sum = NaN; produces NaN exact[i]. Inputs are
      internal scoring only (no external vector path), so NaN is unlikely in
      production. Add assert!(logits.iter().all(|l| l.is_finite())) in Phase 6
      cleanup.
  algo_3_largest_remainder:
    verdict: PROVEN
    note: >
      Σout = Σfloors + remainder = Σfloors + (100 - Σfloors) = 100 algebraically.
      Cast safety proven: floors_sum ∈ [0,100] ⊆ [0,255]; remainder ∈ [0,100] ⊆
      u8. NaN chain from algo_2 is the only failure mode (NaN as u8 = 0 in Rust
      saturating cast; result is valid shape but meaningless).
  algo_4_cosine:
    verdict: PROVEN
    tracked_finding: >
      MEDIUM — zip truncation on dimension mismatch is silent. qe.zip(se) truncates
      to min(|qe|, |se|); mismatched dimensions produce incorrect cosine without
      error. By architecture qe and se are both 384-dim; add debug_assert_eq! in
      Phase 6 cleanup.

