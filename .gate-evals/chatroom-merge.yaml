  S1_security:
    result: conditional_pass
    findings:
      - id: S1-F1
        severity: MEDIUM
        status: resolved_in_gate
        description: >
          copilot_hitl_resolve_handler accepts `choice: usize` from HTTP body but
          did not validate choice < hitl.options.len() — doc comment promises 422
          but code did not implement it.
        fix: >
          Added `options_count: usize` field to ParkedState; updated ResumeRegistry::park()
          to accept and store options_count (passed as hitl.options.len() by dispatcher);
          updated take() return type to 3-tuple (LoopState, String, usize); handler now
          checks body.choice >= options_count → 422 UNPROCESSABLE_ENTITY before proceeding.
          All webshell tests pass (exit 0). Committed post-gate.
        in_gate_criteria_met:
          same_branch: true
          strengthens_existing: true
          lines_changed: 18

      - id: S1-F2
        severity: MEDIUM
        status: resolved_in_gate
        description: >
          SSE strategy_pause handler passed payload.options directly as string[]
          without element-type validation. Non-string array elements would reach
          strategyHitl store and render as [object Object] in StrategyPhaseRibbon.
        fix: >
          Applied type predicate filter and 16-element cap:
          (payload.options as unknown[]).filter((o): o is string => typeof o === 'string').slice(0, 16)
          Committed at f000cf7.
        in_gate_criteria_met:
          same_branch: true
          strengthens_existing: true
          lines_changed: 1

      - id: S1-F3
        severity: LOW
        status: resolved_in_gate
        description: >
          window.__e2e bridge guarded only by import.meta.env.DEV (compile-time).
          If webshell bundled with --mode development for staging, bridge is live
          in a non-local deployment, exposing all writable Svelte stores.
        fix: >
          Added runtime belt-and-suspenders: DEV check AND window.location.hostname === 'localhost'.
          Prevents staging exposure even on development-mode builds.
          Committed at f000cf7.
        in_gate_criteria_met:
          same_branch: true
          strengthens_existing: true
          lines_changed: 2

      - id: S1-F4
        severity: INFO
        status: accepted
        description: >
          StrategyPhaseRibbon dismiss does not POST to /api/copilot/hitl/resolve —
          the ResumeRegistry nonce is not consumed on dismiss. Parked LoopState
          leaks until TTL eviction (~5 minutes). Not exploitable (session binding
          prevents cross-session access). Minor resource leak + operator-confusion
          (server thinks strategy still paused while UI shows dismissed).
        accepted_rationale: >
          INFO severity; TTL eviction handles cleanup. Follow-on: add dismissed sentinel.

