# Light Architects Arena — Example Configuration
#
# Copy this file, edit it for your setup, and run:
#   lightarchitects-arena run --config my-config.yaml

model:
  endpoint: "http://localhost:8080/v1"
  api_key_env: "MY_MODEL_API_KEY"  # reads from environment variable
  name: "my-model"
  max_tokens: 2048
  temperature: 0.7

mcp_servers:
  - name: "filesystem"
    command: "npx @modelcontextprotocol/server-filesystem /tmp"
    transport: stdio
    timeout_secs: 30

  # Example HTTP server:
  # - name: "my-api"
  #   url: "http://localhost:3000/mcp"
  #   transport: http
  #   timeout_secs: 30

exercises:
  types:
    - tool-selection
    - parameter-filling
    - multi-step-chain
    - error-recovery
    - distractor
    - no-tool-needed
    # - cross-server  # requires 2+ servers
  count: 100
  difficulty: [easy, medium, hard]
  seed: 42  # deterministic generation

output:
  formats: [sft, dpo, rl]
  path: ./training-data/
  include_reasoning: true
  include_scores: true
  sft_threshold: 0.7  # minimum reward for SFT examples

# Optional: override default reward weights
# rewards:
#   judgment: 0.22
#   parameter_accuracy: 0.18
#   timing: 0.13
#   result_usage: 0.13
#   safety: 0.10
#   efficiency: 0.08
#   escalation: 0.05
#   hallucination: 0.11

# Optional: LLM-as-Judge scoring
# judge:
#   enabled: true
#   endpoint: "http://localhost:8081/v1"
#   api_key_env: "JUDGE_API_KEY"
#   weight: 0.3

# Optional: pass^k reliability testing
# pass_k:
#   k: 5
#   report_consistency: true
