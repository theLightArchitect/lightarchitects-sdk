# cargo-deny configuration for lightarchitects-sdk
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# All entries below: no safe upgrade available (verified 2026-04-30).
# Re-evaluate 2026-07-30 (Q3 2026). Track fastembed releases — v6+ may drop the core2/rav1e/bitstream-io chain.
# These are transitive deps we do not own. Each entry documents the chain and why we cannot fix it.
ignore = [
    # number_prefix: unmaintained, via lightarchitects-arena → indicatif. ML utility crate only.
    "RUSTSEC-2025-0119",
    # core2: all versions yanked (maintainer abandoned), via fastembed → image → ravif → rav1e →
    # bitstream-io. No upgrade path — fastembed 5.13.4 still pulls this chain. Track for fastembed
    # v6 or a fastembed alternative that drops the AV1 image codec dependency.
    "RUSTSEC-2026-0105",
    # backoff: unmaintained, via neo4rs → backoff. neo4rs has no upstream fix yet. Alternative:
    # replace backoff with backon once neo4rs ≥0.9 releases (tracks this upstream).
    "RUSTSEC-2025-0012",
    # instant: unmaintained, via neo4rs → backoff → instant. Same neo4rs chain as RUSTSEC-2025-0012.
    "RUSTSEC-2024-0384",
    # paste: no longer maintained, via neo4rs + fastembed → tokenizers + rav1e.
    # Three separate chains; no upstream fixes available.
    "RUSTSEC-2024-0436",
    # rustls-pemfile: unmaintained (archived), via neo4rs + bollard → testcontainers (dev-dep).
    # No upgrade path for neo4rs; testcontainers is dev-only.
    "RUSTSEC-2025-0134",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    # MPL-2.0 (file-level copyleft only): option-ext, reached via lightarchitects-auth → dirs.
    # Acceptable for internal tooling; does not affect library consumers.
    "MPL-2.0",
    # CDLA-Permissive-2.0: webpki-roots TLS root certificates (permissive, data-only).
    "CDLA-Permissive-2.0",
    # Zlib: foldhash (fast hashing, OSI-approved, permissive).
    "Zlib",
    # NCSA: libfuzzer-sys via rav1e → fastembed (OSI-approved, FSF free).
    "NCSA",
    # CC0-1.0: notify (public domain dedication, permissive).
    "CC0-1.0",
    # LicenseRef-LA-Proprietary: CORSO workspace sub-crates only (corso-sandbox-bridge,
    # corso-server, corso-trinity, corso-trinity-core). All SDK workspace crates and
    # the AYIN path dep are now Apache-2.0 and do not need this entry.
    "LicenseRef-LA-Proprietary",
]

# ── CORSO workspace sub-crates (still Proprietary — not yet relicensed) ───────

[[licenses.clarify]]
name = "corso-sandbox-bridge"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "corso-server"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "corso-trinity"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "corso-trinity-core"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[bans]
multiple-versions = "warn"
# Workspace path deps (`path = "../lightarchitects-core"`) have no version spec; cargo-deny
# treats these as wildcards. For an internal-only, never-published SDK this is
# standard practice — downgrade to warn so the check doesn't block CI.
wildcards = "warn"
highlight = "all"
deny = [
    # Never use openssl — use rustls (Security-Guardrails §4, Cookbook §63.P1)
    { crate = "openssl" },
    # Use ring or aws-lc-rs; native-tls binds openssl on Linux and is banned accordingly.
    # Exemptions require explicit security review.
    { crate = "native-tls", wrappers = ["hf-hub", "ureq"] },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
