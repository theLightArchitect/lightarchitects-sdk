# cargo-deny configuration for la-sdk
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
# Our crate is proprietary — that's fine, we only check dependencies.
exceptions = [
    { allow = ["OpenSSL"], crate = "ring" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Deny known-problematic crates
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
