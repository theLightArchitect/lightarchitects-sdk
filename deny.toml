# cargo-deny configuration for l-arc-sdk
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# RUSTSEC-2025-0119: number_prefix crate unmaintained.
# Only reaches us via l-arc-arena → indicatif. l-arc-arena is an ML training
# utility crate not used by the core SDK. No upgrade path exists upstream.
ignore = ["RUSTSEC-2025-0119"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    # MPL-2.0 (file-level copyleft only): option-ext, reached via l-arc-auth → dirs.
    # Acceptable for internal tooling; does not affect library consumers.
    "MPL-2.0",
    # CDLA-Permissive-2.0: webpki-roots TLS root certificates (permissive, data-only).
    "CDLA-Permissive-2.0",
    # Light Architects proprietary license — used by all internal workspace crates
    # and the AYIN path dependency. These are never published to crates.io.
    "LicenseRef-LA-Proprietary",
]

# ── Internal workspace crates ─────────────────────────────────────────────────
# These crates use `license = "Proprietary"` which is not a valid SPDX expression.
# cargo-deny cannot auto-detect the license, so we clarify it here.
# All are private, internal-only, and not published to any registry.

[[licenses.clarify]]
name = "l-arc"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "l-arc-core"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "l-arc-crypto"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "l-arc-soul"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "l-arc-corso"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "l-arc-eva"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "l-arc-quantum"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "l-arc-seraph"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "l-arc-ayin"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "l-arc-cli"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "l-arc-arena"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[[licenses.clarify]]
name = "l-arc-auth"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

# ── External path dependencies ────────────────────────────────────────────────
# AYIN lives outside the l-arc-sdk workspace but is referenced as a path dep.

[[licenses.clarify]]
name = "ayin"
version = "*"
expression = "LicenseRef-LA-Proprietary"
license-files = []

[bans]
multiple-versions = "warn"
# Workspace path deps (`path = "../l-arc-core"`) have no version spec; cargo-deny
# treats these as wildcards. For an internal-only, never-published SDK this is
# standard practice — downgrade to warn so the check doesn't block CI.
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
